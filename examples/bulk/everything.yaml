# Everything: mixed rules and tasks for bulk authoring
# This demonstrates YAML's flexibility with heterogeneous structures.
# In practice, export uses separate files; this is for demonstration.

rules:
  - name: "Morning focus bonus"
    trigger_kind: "Schedule"
    event_type: "daily_6am"
    action_kind: "GrantCredit"
    amount: 75
    cooldown: "24h"
    priority: 1
    enabled: true
    version: "1.0"

  - name: "Afternoon slump recovery"
    trigger_kind: "StateChange"
    event_type: "low_focus_detected"
    action_kind: "Intervention"
    priority: 2
    enabled: true
    version: "1.0"

  - name: "Exercise reward"
    trigger_kind: "Event"
    event_type: "fitness_logged"
    action_kind: "GrantCredit"
    amount: 200
    priority: 1
    enabled: true
    version: "1.0"

  - name: "Deadline approaching alert"
    trigger_kind: "Event"
    event_type: "task_24h_warning"
    action_kind: "Notify"
    priority: 3
    enabled: true
    version: "1.0"

  - name: "Weekly reset"
    trigger_kind: "Schedule"
    event_type: "sunday_midnight"
    action_kind: "StreakReset"
    priority: 0
    enabled: true
    version: "1.0"


id = "gym-routine"
name = "Gym Routine"
version = "0.1.0"
author = "focalpoint-team"
description = "Event-triggered credits for completed workouts, block social during scheduled sessions, maintain weekly streak consistency."
recommended_connectors = ["fitbit", "apple-health", "gcal"]

[mascot_copy]
session_start = "Time to move. You've got this."
session_end = "Nice workout. Rest up."

# Reward — workout completed (Fitbit)
[[rules]]
id = "fitbit-workout-credit"
name = "Credit on workout complete"
priority = 50
cooldown_seconds = 60
explanation_template = "Completed {payload.activity} ({payload.duration_minutes} min) — +{payload.credit_amount} credits."
enabled = true
trigger = { kind = "event", value = "fitbit:workout_completed" }
actions = [
  { type = "grant_credit", amount = 30 },
  { type = "streak_increment", name = "workouts_completed" },
]

# Reward — Apple Health workout (alternative)
[[rules]]
id = "apple-health-workout-credit"
name = "Credit on Apple Health workout"
priority = 50
cooldown_seconds = 60
explanation_template = "Completed {payload.workout_type} — +25 credits."
enabled = true
trigger = { kind = "event", value = "apple-health:workout" }
actions = [
  { type = "grant_credit", amount = 25 },
]

# Streak — weekly consistency (3 per week)
[[rules]]
id = "weekly-workout-streak"
name = "Weekly workout consistency"
priority = 60
cooldown_seconds = 86400
explanation_template = "3+ workouts this week — streak milestone."
enabled = true
trigger = { kind = "event", value = "fitbit:workout_completed" }
conditions = [
  { kind = "custom", params = { rule = "weekly_count_gte_3" } },
]
actions = [
  { type = "streak_increment", name = "weekly_consistency" },
]

# Block — social apps during scheduled workout slots
[[rules]]
id = "scheduled-workout-block"
name = "Block social during workout"
priority = 80
cooldown_seconds = 600
duration_seconds = 3600
explanation_template = "Workout scheduled — social locked for session duration."
enabled = true
trigger = { kind = "event", value = "gcal:event_started" }
conditions = [
  { kind = "payload_contains", params = { field = "title", value = "workout" } },
]
actions = [
  { type = "block", profile = "social", duration_seconds = 3600, rigidity = "hard" },
  { type = "notify", message = "Workout locked in — no distractions." },
]

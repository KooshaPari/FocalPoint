avoid-breaking-exported-api = true
msrv = "1.82"
cognitive-complexity-threshold = 25
too-many-arguments-threshold = 8
type-complexity-threshold = 350

# Intentionally no `disallowed-methods` block: previous ban on `unwrap` fired
# inside every `serde_json::json!` macro expansion + every test module,
# making the workspace clippy-red without flagging any real risk. Library
# hygiene is enforced by PR review + tests instead; `expect("invariant: …")`
# remains the house style for panics but is not machine-enforced.

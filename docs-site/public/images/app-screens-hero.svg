<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAFAFA"/>
      <stop offset="100%" style="stop-color:#F5F5F5"/>
    </linearGradient>
    <linearGradient id="phoneGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A1A"/>
      <stop offset="100%" style="stop-color:#0F0F0F"/>
    </linearGradient>
    <linearGradient id="screenGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF5F2"/>
      <stop offset="100%" style="stop-color:#FFE8E2"/>
    </linearGradient>
    <linearGradient id="screenGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FAFA"/>
      <stop offset="100%" style="stop-color:#E0F5F5"/>
    </linearGradient>
    <linearGradient id="screenGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D2D2D"/>
      <stop offset="100%" style="stop-color:#1A1A1A"/>
    </linearGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B3D"/>
      <stop offset="100%" style="stop-color:#E85A30"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A9396"/>
      <stop offset="100%" style="stop-color:#08858A"/>
    </linearGradient>

    <!-- Shadows -->
    <filter id="phoneShadow" x="-30%" y="-10%" width="160%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="15" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    <filter id="mascotShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="300" fill="url(#bgGrad)"/>

  <!-- Decorative circles -->
  <circle cx="50" cy="250" r="80" fill="#FF6B3D" fill-opacity="0.06"/>
  <circle cx="550" cy="50" r="60" fill="#0A9396" fill-opacity="0.06"/>

  <!-- Title -->
  <text x="300" y="30" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#1A1A1A" text-anchor="middle">Your Daily Focus Journey</text>

  <!-- Phone 1: Morning Brief (left) -->
  <g transform="translate(60, 50)">
    <!-- iPhone frame -->
    <rect x="0" y="0" width="100" height="200" rx="16" fill="url(#phoneGrad)" filter="url(#phoneShadow)"/>
    <!-- Screen -->
    <rect x="5" y="20" width="90" height="160" rx="8" fill="url(#screenGrad1)"/>

    <!-- Dynamic Island -->
    <rect x="30" y="24" width="40" height="8" rx="4" fill="#0F0F0F"/>

    <!-- Morning Brief Content -->
    <text x="50" y="42" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" font-weight="600" fill="#FF6B3D" text-anchor="middle">GOOD MORNING</text>
    <text x="50" y="54" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="700" fill="#1A1A1A" text-anchor="middle">6:30 AM</text>

    <!-- Today's focus card -->
    <rect x="12" y="65" width="76" height="45" rx="6" fill="#FFFFFF"/>
    <circle cx="24" cy="78" r="6" fill="#FF6B3D"/>
    <text x="35" y="81" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="7" font-weight="600" fill="#1A1A1A">Deep Work</text>
    <text x="35" y="90" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="6" fill="#666666">9:00 - 11:00 AM</text>
    <rect x="12" y="115" width="76" height="5" rx="2" fill="#FFE4DE"/>
    <rect x="12" y="115" width="30" height="5" rx="2" fill="#FF6B3D"/>

    <!-- Weather widget -->
    <rect x="12" y="128" width="36" height="35" rx="6" fill="#FFFFFF"/>
    <text x="30" y="145" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="300" fill="#1A1A1A" text-anchor="middle">72°</text>
    <text x="30" y="157" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="6" fill="#666666" text-anchor="middle">Sunny</text>

    <!-- Tasks widget -->
    <rect x="52" y="128" width="36" height="35" rx="6" fill="#FFFFFF"/>
    <circle cx="62" cy="138" r="4" fill="none" stroke="#0A9396" stroke-width="1.5"/>
    <text x="70" y="142" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="7" font-weight="600" fill="#1A1A1A">3 Tasks</text>
    <rect x="58" y="148" width="20" height="3" rx="1" fill="#E0E0E0"/>
    <rect x="58" y="153" width="14" height="3" rx="1" fill="#E0E0E0"/>

    <!-- Label -->
    <text x="50" y="218" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" font-weight="500" fill="#666666" text-anchor="middle">Morning Brief</text>
  </g>

  <!-- Phone 2: Focus Mode (center) -->
  <g transform="translate(200, 45)">
    <!-- iPhone frame (slightly larger/elevated) -->
    <rect x="0" y="0" width="110" height="220" rx="18" fill="url(#phoneGrad)" filter="url(#phoneShadow)"/>
    <!-- Screen -->
    <rect x="5" y="22" width="100" height="176" rx="10" fill="url(#screenGrad2)"/>

    <!-- Dynamic Island -->
    <rect x="35" y="26" width="40" height="10" rx="5" fill="#0F0F0F"/>

    <!-- Focus Mode Content -->
    <circle cx="55" cy="65" r="30" fill="none" stroke="#0A9396" stroke-width="4"/>
    <circle cx="55" cy="65" r="30" fill="none" stroke="#0A9396" stroke-width="4" stroke-dasharray="150" stroke-dashoffset="40" stroke-linecap="round"/>

    <!-- Timer -->
    <text x="55" y="70" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="18" font-weight="700" fill="#1A1A1A" text-anchor="middle">1:45:32</text>

    <!-- Session info -->
    <text x="55" y="110" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="600" fill="#0A9396" text-anchor="middle">FOCUS MODE</text>
    <text x="55" y="125" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#666666" text-anchor="middle">Deep Work Session</text>

    <!-- Blocked apps -->
    <rect x="12" y="135" width="86" height="30" rx="8" fill="#FFFFFF"/>
    <text x="18" y="147" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="6" font-weight="500" fill="#EF476F">Blocked:</text>
    <rect x="18" y="152" width="18" height="6" rx="2" fill="#FFE4E4"/>
    <rect x="40" y="152" width="18" height="6" rx="2" fill="#FFE4E4"/>
    <rect x="62" y="152" width="18" height="6" rx="2" fill="#FFE4E4"/>

    <!-- Pause button -->
    <rect x="35" y="172" width="40" height="16" rx="8" fill="#0A9396"/>
    <rect x="41" y="177" width="4" height="6" rx="1" fill="#FFFFFF"/>
    <rect x="48" y="177" width="4" height="6" rx="1" fill="#FFFFFF"/>

    <!-- Label -->
    <text x="55" y="238" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" font-weight="500" fill="#666666" text-anchor="middle">Focus Mode</text>
  </g>

  <!-- Phone 3: Evening Shutdown (right) -->
  <g transform="translate(350, 50)">
    <!-- iPhone frame -->
    <rect x="0" y="0" width="100" height="200" rx="16" fill="url(#phoneGrad)" filter="url(#phoneShadow)"/>
    <!-- Screen -->
    <rect x="5" y="20" width="90" height="160" rx="8" fill="url(#screenGrad3)"/>

    <!-- Dynamic Island -->
    <rect x="30" y="24" width="40" height="8" rx="4" fill="#0F0F0F"/>

    <!-- Evening Content -->
    <text x="50" y="42" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" font-weight="600" fill="#E8A87C" text-anchor="middle">GOOD EVENING</text>
    <text x="50" y="54" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">8:30 PM</text>

    <!-- Summary card -->
    <rect x="12" y="65" width="76" height="55" rx="8" fill="#2D2D2D" stroke="#3D3D3D" stroke-width="1"/>
    <text x="20" y="80" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="7" font-weight="500" fill="#999999">Today's Summary</text>

    <!-- Stats row -->
    <text x="20" y="95" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">4.2h</text>
    <text x="50" y="95" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="700" fill="#0A9396">3</text>
    <text x="75" y="95" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="700" fill="#FF6B3D">+15</text>

    <text x="20" y="107" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="5" fill="#666666">Focus Time</text>
    <text x="50" y="107" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="5" fill="#666666">Sessions</text>
    <text x="75" y="107" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="5" fill="#666666">Streak</text>

    <!-- Shutdown button -->
    <rect x="12" y="128" width="76" height="28" rx="8" fill="#1A1A1A" stroke="#FF6B3D" stroke-width="1.5"/>
    <circle cx="50" cy="142" r="8" fill="none" stroke="#FF6B3D" stroke-width="1.5" stroke-dasharray="3,2"/>
    <path d="M50 136 L50 142 L54 145" stroke="#FF6B3D" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <text x="50" y="152" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="7" font-weight="600" fill="#FF6B3D" text-anchor="middle">End Day</text>

    <!-- Label -->
    <text x="50" y="218" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" font-weight="500" fill="#666666" text-anchor="middle">Evening Shutdown</text>
  </g>

  <!-- Coachy mascot (floating, top right) -->
  <g transform="translate(480, 20)" filter="url(#mascotShadow)">
    <!-- Bubble -->
    <ellipse cx="50" cy="60" rx="45" ry="35" fill="#FFFFFF"/>

    <!-- Coachy face -->
    <circle cx="50" cy="60" r="25" fill="#0A9396"/>
    <circle cx="50" cy="60" r="22" fill="#FFFFFF"/>

    <!-- Eyes -->
    <ellipse cx="43" cy="55" rx="4" ry="5" fill="#1A1A1A"/>
    <ellipse cx="57" cy="55" rx="4" ry="5" fill="#1A1A1A"/>
    <circle cx="44" cy="54" r="1.5" fill="#FFFFFF"/>
    <circle cx="58" cy="54" r="1.5" fill="#FFFFFF"/>

    <!-- Smile -->
    <path d="M42 67 Q50 73 58 67" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" fill="none"/>

    <!-- Cheeks -->
    <ellipse cx="36" cy="62" rx="4" ry="2.5" fill="#FF6B3D" fill-opacity="0.4"/>
    <ellipse cx="64" cy="62" rx="4" ry="2.5" fill="#FF6B3D" fill-opacity="0.4"/>

    <!-- Speech tail -->
    <path d="M30 85 Q20 100 35 95 Q40 93 38 88" fill="#FFFFFF"/>

    <!-- Text in bubble -->
    <text x="50" y="42" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="7" font-weight="600" fill="#1A1A1A" text-anchor="middle">Great day!</text>
    <text x="50" y="52" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="6" fill="#666666" text-anchor="middle">Tomorrow too?</text>
  </g>

  <!-- Floating decorative elements -->
  <g transform="translate(480, 240)">
    <!-- Mini achievement badges -->
    <circle cx="0" cy="0" r="12" fill="#FF6B3D" fill-opacity="0.2"/>
    <circle cx="0" cy="0" r="6" fill="#FF6B3D"/>
    <path d="M-3 0 L-1 2 L3 -2" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  </g>
  <g transform="translate(520, 260)">
    <circle cx="0" cy="0" r="10" fill="#0A9396" fill-opacity="0.2"/>
    <circle cx="0" cy="0" r="5" fill="#0A9396"/>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient - warm base -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9500"/>
      <stop offset="50%" stop-color="#FF7A00"/>
      <stop offset="100%" stop-color="#FF6B00"/>
    </linearGradient>

    <!-- Glass overlay gradient -->
    <linearGradient id="glassOverlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.05"/>
    </linearGradient>

    <!-- Top shine gradient -->
    <linearGradient id="topShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="30%" stop-color="#FFFFFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- F symbol gradient - teal -->
    <linearGradient id="fGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C7BE"/>
      <stop offset="50%" stop-color="#00B4AE"/>
      <stop offset="100%" stop-color="#0A84FF"/>
    </linearGradient>

    <!-- F symbol inner glow -->
    <linearGradient id="fInnerGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Accent glow gradient -->
    <radialGradient id="accentGlow" cx="70%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#FF9500" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop shadow filter -->
    <filter id="dropShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#1a1a2e" flood-opacity="0.35"/>
    </filter>

    <!-- Highlight glow -->
    <filter id="highlightGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip path for rounded square -->
    <clipPath id="iconClip">
      <rect x="32" y="32" width="448" height="448" rx="100" ry="100"/>
    </clipPath>
  </defs>

  <!-- Main icon container with shadow -->
  <g filter="url(#dropShadow)">
    <!-- Base rounded square -->
    <rect x="32" y="32" width="448" height="448" rx="100" ry="100" fill="url(#bgGradient)"/>

    <!-- Glass layer 1 - top highlight -->
    <rect x="32" y="32" width="448" height="280" rx="100" ry="100" fill="url(#topShine)" clip-path="url(#iconClip)"/>

    <!-- Glass layer 2 - center overlay -->
    <rect x="32" y="32" width="448" height="448" rx="100" ry="100" fill="url(#glassOverlay)" clip-path="url(#iconClip)"/>

    <!-- Accent glow spot -->
    <ellipse cx="360" cy="180" rx="180" ry="140" fill="url(#accentGlow)" clip-path="url(#iconClip)"/>

    <!-- Inner border highlight -->
    <rect x="36" y="36" width="440" height="440" rx="96" ry="96" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.3"/>

    <!-- Stylized F symbol -->
    <g transform="translate(256, 256)" filter="url(#highlightGlow)">
      <!-- F main body with gradient -->
      <path d="
        M -40 -100
        L -40 -60
        L -90 -60
        L -90 -30
        L -40 -30
        L -40 80
        L 70 80
        L 70 110
        L -40 110
        L -40 -100
        Z
        M 10 -60
        L 10 50
        L 60 50
        L 60 80
        L 10 80
        L 10 -30
        L -70 -30
        L -70 -60
        L 10 -60
        Z
      " fill="url(#fGradient)" fill-rule="evenodd"/>

      <!-- F inner highlight -->
      <path d="
        M -35 -95
        L -35 -65
        L -75 -65
        L -75 -35
        L -35 -35
        L -35 75
        L 65 75
        L 65 100
        L -35 100
        L -35 -95
        Z
        M 5 -55
        L 5 45
        L 55 45
        L 55 75
        L 5 75
        L 5 -35
        L -65 -35
        L -65 -55
        L 5 -55
        Z
      " fill="url(#fInnerGlow)" fill-rule="evenodd"/>

      <!-- F top bar highlight -->
      <path d="M -35 -95 L 10 -95 L 10 -35 L -65 -35 L -65 -55 L -35 -55 Z" fill="#FFFFFF" fill-opacity="0.4"/>

      <!-- F vertical bar highlight -->
      <path d="M -35 -55 L -5 -55 L -5 75 L -35 75 Z" fill="#FFFFFF" fill-opacity="0.25"/>
    </g>

    <!-- Secondary accent - small teal dot -->
    <circle cx="380" cy="400" r="20" fill="#00C7BE" fill-opacity="0.8" filter="url(#highlightGlow)"/>
    <circle cx="380" cy="400" r="12" fill="#FFFFFF" fill-opacity="0.5"/>

    <!-- Bottom right subtle glow -->
    <ellipse cx="420" cy="420" rx="80" ry="60" fill="#FF9500" fill-opacity="0.3"/>
  </g>

  <!-- Extra glass shine overlay - curved highlight -->
  <g clip-path="url(#iconClip)">
    <ellipse cx="256" cy="80" rx="200" ry="80" fill="#FFFFFF" fill-opacity="0.15"/>
  </g>

  <!-- Edge highlight for liquid glass effect -->
  <rect x="36" y="36" width="440" height="220" rx="96" ry="96" fill="none" stroke="url(#topShine)" stroke-width="3"/>
</svg>
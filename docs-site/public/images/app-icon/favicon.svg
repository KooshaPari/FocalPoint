<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="favBgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9500"/>
      <stop offset="100%" stop-color="#FF6B00"/>
    </linearGradient>

    <!-- F symbol gradient -->
    <linearGradient id="favFGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C7BE"/>
      <stop offset="100%" stop-color="#0A84FF"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="favDropShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1a1a2e" flood-opacity="0.4"/>
    </filter>

    <!-- Clip path for rounded square -->
    <clipPath id="favClip">
      <rect x="2" y="2" width="28" height="28" rx="6" ry="6"/>
    </clipPath>
  </defs>

  <!-- Main icon container -->
  <g filter="url(#favDropShadow)">
    <!-- Base rounded square -->
    <rect x="2" y="2" width="28" height="28" rx="6" ry="6" fill="url(#favBgGradient)"/>

    <!-- Glass highlight overlay -->
    <rect x="2" y="2" width="28" height="14" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.25" clip-path="url(#favClip)"/>

    <!-- Inner border -->
    <rect x="3" y="3" width="26" height="26" rx="5" ry="5" fill="none" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.4"/>
  </g>

  <!-- Stylized F symbol - simplified for small size -->
  <g transform="translate(16, 16)">
    <!-- F shape -->
    <path d="
      M -5 -8
      L -5 -4
      L -8 -4
      L -8 -1
      L -5 -1
      L -5 7
      L 7 7
      L 7 9
      L -5 9
      L -5 -8
      Z
      M 1 -4
      L 1 5
      L 6 5
      L 6 7
      L 1 7
      L 1 -1
      L -6 -1
      L -6 -4
      L 1 -4
      Z
    " fill="url(#favFGradient)" fill-rule="evenodd"/>

    <!-- F highlight -->
    <path d="M -4 -7 L 0 -7 L 0 -2 L -5 -2 L -5 -4 L -4 -4 Z" fill="#FFFFFF" fill-opacity="0.5"/>
  </g>

  <!-- Small accent dot -->
  <circle cx="24" cy="24" r="2" fill="#00C7BE" fill-opacity="0.8"/>
  <circle cx="24" cy="24" r="1" fill="#FFFFFF" fill-opacity="0.6"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Monochrome gradient - white to light gray -->
    <linearGradient id="monoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#F5F5F7"/>
      <stop offset="100%" stop-color="#E8E8EC"/>
    </linearGradient>

    <!-- Glass overlay gradient -->
    <linearGradient id="glassOverlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.05"/>
    </linearGradient>

    <!-- Top shine gradient -->
    <linearGradient id="topShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Drop shadow filter -->
    <filter id="dropShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <!-- Clip path for rounded square -->
    <clipPath id="iconClip">
      <rect x="32" y="32" width="448" height="448" rx="100" ry="100"/>
    </clipPath>
  </defs>

  <!-- Main icon container with shadow -->
  <g filter="url(#dropShadow)">
    <!-- Base rounded square - dark background for mono version -->
    <rect x="32" y="32" width="448" height="448" rx="100" ry="100" fill="#1C1C1E"/>

    <!-- Glass layer - top highlight -->
    <rect x="32" y="32" width="448" height="280" rx="100" ry="100" fill="url(#topShine)" clip-path="url(#iconClip)"/>

    <!-- Glass layer - center overlay -->
    <rect x="32" y="32" width="448" height="448" rx="100" ry="100" fill="url(#glassOverlay)" clip-path="url(#iconClip)"/>

    <!-- Inner border highlight -->
    <rect x="36" y="36" width="440" height="440" rx="96" ry="96" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.25"/>

    <!-- Stylized F symbol - white monochrome -->
    <g transform="translate(256, 256)">
      <!-- F main body -->
      <path d="
        M -40 -100
        L -40 -60
        L -90 -60
        L -90 -30
        L -40 -30
        L -40 80
        L 70 80
        L 70 110
        L -40 110
        L -40 -100
        Z
        M 10 -60
        L 10 50
        L 60 50
        L 60 80
        L 10 80
        L 10 -30
        L -70 -30
        L -70 -60
        L 10 -60
        Z
      " fill="url(#monoGradient)" fill-rule="evenodd"/>

      <!-- F highlight overlay -->
      <path d="
        M -35 -95
        L -35 -65
        L -75 -65
        L -75 -35
        L -35 -35
        L -35 75
        L 65 75
        L 65 100
        L -35 100
        L -35 -95
        Z
        M 5 -55
        L 5 45
        L 55 45
        L 55 75
        L 5 75
        L 5 -35
        L -65 -35
        L -65 -55
        L 5 -55
        Z
      " fill="#FFFFFF" fill-opacity="0.5" fill-rule="evenodd"/>

      <!-- F top bar highlight -->
      <path d="M -35 -95 L 10 -95 L 10 -35 L -65 -35 L -65 -55 L -35 -55 Z" fill="#FFFFFF" fill-opacity="0.6"/>

      <!-- F vertical bar highlight -->
      <path d="M -35 -55 L -5 -55 L -5 75 L -35 75 Z" fill="#FFFFFF" fill-opacity="0.4"/>
    </g>

    <!-- Secondary accent - small white dot -->
    <circle cx="380" cy="400" r="20" fill="#FFFFFF" fill-opacity="0.7"/>
    <circle cx="380" cy="400" r="12" fill="#FFFFFF" fill-opacity="0.9"/>
  </g>

  <!-- Extra glass shine overlay -->
  <g clip-path="url(#iconClip)">
    <ellipse cx="256" cy="80" rx="200" ry="80" fill="#FFFFFF" fill-opacity="0.12"/>
  </g>

  <!-- Edge highlight -->
  <rect x="36" y="36" width="440" height="220" rx="96" ry="96" fill="none" stroke="url(#topShine)" stroke-width="3"/>
</svg>
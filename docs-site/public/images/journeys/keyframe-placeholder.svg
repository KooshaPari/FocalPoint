<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-labelledby="placeholder-title">
  <title id="placeholder-title">Screenshot Placeholder</title>
  <desc>Generic placeholder for pending screenshots</desc>

  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>

    <!-- Glass effect gradient -->
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.08)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.02)"/>
    </linearGradient>

    <!-- Dashed stroke pattern -->
    <pattern id="gridPattern" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGradient)" rx="12"/>

  <!-- Subtle grid pattern -->
  <rect width="400" height="300" fill="url(#gridPattern)" rx="12"/>

  <!-- Dashed border container -->
  <rect x="30" y="50" width="340" height="200" rx="8" fill="url(#glassGradient)" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="8,6"/>

  <!-- Corner accents -->
  <g stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round">
    <!-- Top left -->
    <path d="M30,65 L30,50 L45,50"/>
    <!-- Top right -->
    <path d="M355,50 L370,50 L370,65"/>
    <!-- Bottom left -->
    <path d="M30,235 L30,250 L45,250"/>
    <!-- Bottom right -->
    <path d="M355,250 L370,250 L370,235"/>
  </g>

  <!-- Camera/placeholder icon -->
  <g transform="translate(200, 130)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="28" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

    <!-- Camera body -->
    <rect x="-18" y="-12" width="36" height="24" rx="4" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>

    <!-- Lens -->
    <circle cx="0" cy="0" r="8" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="4" fill="rgba(255,255,255,0.2)"/>

    <!-- Flash -->
    <rect x="-12" y="-16" width="8" height="4" rx="1" fill="rgba(255,255,255,0.3)"/>
  </g>

  <!-- Text: Coming Soon -->
  <text x="200" y="195" font-family="SF Pro Display, -apple-system, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.8)" text-anchor="middle">Screenshot Coming Soon</text>

  <!-- Subtitle -->
  <text x="200" y="215" font-family="SF Pro Text, -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">This feature screenshot is pending</text>
</svg>

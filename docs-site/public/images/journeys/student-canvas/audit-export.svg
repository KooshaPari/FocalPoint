<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.1)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.03)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGrad)" rx="20"/>

  <!-- Header -->
  <g transform="translate(30, 30)">
    <circle cx="25" cy="25" r="25" fill="#10b981" opacity="0.3"/>
    <text x="25" y="32" font-family="SF Pro Text, sans-serif" font-size="24" text-anchor="middle">📜</text>
  </g>
  <text x="80" y="45" font-family="SF Pro Display, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#fff">Audit Export</text>
  <text x="80" y="65" font-family="SF Pro Text, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">Share your focus achievements</text>

  <!-- Export Options -->
  <g transform="translate(50, 100)">
    <!-- PDF Export -->
    <rect width="230" height="90" rx="14" fill="url(#cardGrad)" stroke="#ef4444" stroke-width="2"/>
    <text x="30" y="30" font-family="SF Pro Text, sans-serif" font-size="24">📄</text>
    <text x="65" y="28" font-family="SF Pro Display, sans-serif" font-size="14" font-weight="500" fill="#fff">Export PDF</text>
    <text x="65" y="45" font-family="SF Pro Text, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Focus stats + audit chain</text>
    <rect x="30" y="60" width="80" height="18" rx="9" fill="#ef4444" opacity="0.2"/>
    <text x="70" y="73" font-family="SF Pro Text, sans-serif" font-size="11" fill="#ef4444" text-anchor="middle">Download</text>

    <!-- Share -->
    <g transform="translate(260, 0)">
      <rect width="230" height="90" rx="14" fill="url(#cardGrad)" stroke="#3b82f6" stroke-width="2"/>
      <text x="30" y="30" font-family="SF Pro Text, sans-serif" font-size="24">📤</text>
      <text x="65" y="28" font-family="SF Pro Display, sans-serif" font-size="14" font-weight="500" fill="#fff">Share</text>
      <text x="65" y="45" font-family="SF Pro Text, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Social media / email</text>
      <rect x="30" y="60" width="80" height="18" rx="9" fill="#3b82f6" opacity="0.2"/>
      <text x="70" y="73" font-family="SF Pro Text, sans-serif" font-size="11" fill="#3b82f6" text-anchor="middle">Share</text>
    </g>
  </g>

  <!-- Preview Card -->
  <g transform="translate(50, 210)">
    <rect width="500" height="170" rx="14" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.15)"/>

    <text x="25" y="30" font-family="SF Pro Display, sans-serif" font-size="16" font-weight="600" fill="#fff">Focus Report</text>
    <text x="25" y="50" font-family="SF Pro Text, sans-serif" font-size="12" fill="rgba(255,255,255,0.5)">Generated April 30, 2026</text>

    <!-- Stats in preview -->
    <g transform="translate(25, 70)">
      <rect width="100" height="40" rx="8" fill="rgba(59,130,246,0.1)"/>
      <text x="50" y="20" font-family="SF Pro Display, sans-serif" font-size="18" font-weight="600" fill="#3b82f6" text-anchor="middle">67</text>
      <text x="50" y="34" font-family="SF Pro Text, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">Day Streak</text>
    </g>

    <g transform="translate(135, 70)">
      <rect width="100" height="40" rx="8" fill="rgba(16,185,129,0.1)"/>
      <text x="50" y="20" font-family="SF Pro Display, sans-serif" font-size="18" font-weight="600" fill="#10b981" text-anchor="middle">187h</text>
      <text x="50" y="34" font-family="SF Pro Text, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">Focus Time</text>
    </g>

    <g transform="translate(245, 70)">
      <rect width="100" height="40" rx="8" fill="rgba(245,158,11,0.1)"/>
      <text x="50" y="20" font-family="SF Pro Display, sans-serif" font-size="18" font-weight="600" fill="#f59e0b" text-anchor="middle">32/32</text>
      <text x="50" y="34" font-family="SF Pro Text, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">On Time</text>
    </g>

    <g transform="translate(355, 70)">
      <rect width="100" height="40" rx="8" fill="rgba(236,72,153,0.1)"/>
      <text x="50" y="20" font-family="SF Pro Display, sans-serif" font-size="18" font-weight="600" fill="#ec4899" text-anchor="middle">+0.3</text>
      <text x="50" y="34" font-family="SF Pro Text, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">GPA Gain</text>
    </g>

    <!-- Watermark -->
    <text x="450" y="155" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.2)" text-anchor="end">Powered by FocalPoint</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.1)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.03)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)" rx="20"/>

  <!-- Header -->
  <g transform="translate(30, 30)">
    <circle cx="25" cy="25" r="25" fill="#3b82f6" opacity="0.3"/>
    <text x="25" y="32" font-family="SF Pro Text, sans-serif" font-size="24" text-anchor="middle">📚</text>
  </g>
  <text x="80" y="45" font-family="SF Pro Display, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#fff">Student on Canvas</text>
  <text x="80" y="65" font-family="SF Pro Text, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">Alice's journey from onboarding to 67-day streak</text>

  <!-- Timeline -->
  <g transform="translate(40, 100)">
    <!-- Phase 1: Onboarding -->
    <rect width="160" height="120" rx="14" fill="url(#cardGrad)" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="25" cy="25" r="18" fill="#3b82f6" opacity="0.3"/>
    <text x="25" y="30" font-family="SF Pro Text, sans-serif" font-size="16" text-anchor="middle" fill="#3b82f6">1</text>
    <text x="15" y="55" font-family="SF Pro Text, sans-serif" font-size="13" font-weight="500" fill="#fff">Onboarding</text>
    <text x="15" y="72" font-family="SF Pro Text, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Week 1</text>
    <text x="15" y="90" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">• Install app</text>
    <text x="15" y="104" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">• Link Canvas</text>

    <!-- Connector -->
    <line x1="175" y1="60" x2="205" y2="60" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="4,4"/>

    <!-- Phase 2: Habit Formation -->
    <rect width="160" height="120" rx="14" fill="url(#cardGrad)" stroke="#10b981" stroke-width="2"/>
    <circle cx="25" cy="25" r="18" fill="#10b981" opacity="0.3"/>
    <text x="25" y="30" font-family="SF Pro Text, sans-serif" font-size="16" text-anchor="middle" fill="#10b981">2</text>
    <text x="15" y="55" font-family="SF Pro Text, sans-serif" font-size="13" font-weight="500" fill="#fff">Habit Formation</text>
    <text x="15" y="72" font-family="SF Pro Text, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Week 2-3</text>
    <text x="15" y="90" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">• Morning ritual</text>
    <text x="15" y="104" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">• Rules & focus</text>

    <!-- Connector -->
    <line x1="355" y1="60" x2="385" y2="60" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="4,4"/>

    <!-- Phase 3: Streak Achievement -->
    <rect width="160" height="120" rx="14" fill="url(#cardGrad)" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="25" cy="25" r="18" fill="#f59e0b" opacity="0.3"/>
    <text x="25" y="30" font-family="SF Pro Text, sans-serif" font-size="16" text-anchor="middle" fill="#f59e0b">3</text>
    <text x="15" y="55" font-family="SF Pro Text, sans-serif" font-size="13" font-weight="500" fill="#fff">Streak Achievement</text>
    <text x="15" y="72" font-family="SF Pro Text, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Week 4</text>
    <text x="15" y="90" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">• 14-day streak</text>
    <text x="15" y="104" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">• Share success</text>

    <!-- Connector -->
    <line x1="535" y1="60" x2="565" y2="60" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="4,4"/>

    <!-- Phase 4: Advanced Usage -->
    <rect width="160" height="120" rx="14" fill="url(#cardGrad)" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="25" cy="25" r="18" fill="#8b5cf6" opacity="0.3"/>
    <text x="25" y="30" font-family="SF Pro Text, sans-serif" font-size="16" text-anchor="middle" fill="#8b5cf6">4</text>
    <text x="15" y="55" font-family="SF Pro Text, sans-serif" font-size="13" font-weight="500" fill="#fff">Advanced Usage</text>
    <text x="15" y="72" font-family="SF Pro Text, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Month 2+</text>
    <text x="15" y="90" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">• Rule packs</text>
    <text x="15" y="104" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">• 67-day streak</text>
  </g>

  <!-- Stats Summary -->
  <g transform="translate(40, 250)">
    <rect width="720" height="120" rx="14" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.1)"/>

    <!-- Stat 1 -->
    <g transform="translate(50, 20)">
      <text x="0" y="20" font-family="SF Pro Display, sans-serif" font-size="28" font-weight="600" fill="#3b82f6">32/32</text>
      <text x="0" y="45" font-family="SF Pro Text, sans-serif" font-size="12" fill="rgba(255,255,255,0.5)">Assignments on time</text>
      <rect x="0" y="55" width="120" height="6" rx="3" fill="#3b82f6" opacity="0.3"/>
      <rect x="0" y="55" width="120" height="6" rx="3" fill="#3b82f6"/>
    </g>

    <!-- Stat 2 -->
    <g transform="translate(250, 20)">
      <text x="0" y="20" font-family="SF Pro Display, sans-serif" font-size="28" font-weight="600" fill="#10b981">187h</text>
      <text x="0" y="45" font-family="SF Pro Text, sans-serif" font-size="12" fill="rgba(255,255,255,0.5)">Total focus time</text>
      <rect x="0" y="55" width="80" height="6" rx="3" fill="#10b981" opacity="0.3"/>
      <rect x="0" y="55" width="80" height="6" rx="3" fill="#10b981"/>
    </g>

    <!-- Stat 3 -->
    <g transform="translate(450, 20)">
      <text x="0" y="20" font-family="SF Pro Display, sans-serif" font-size="28" font-weight="600" fill="#f59e0b">67</text>
      <text x="30" y="20" font-family="SF Pro Text, sans-serif" font-size="16" fill="#f59e0b">🔥</text>
      <text x="0" y="45" font-family="SF Pro Text, sans-serif" font-size="12" fill="rgba(255,255,255,0.5)">Day streak</text>
      <rect x="0" y="55" width="140" height="6" rx="3" fill="#f59e0b" opacity="0.3"/>
      <rect x="0" y="55" width="140" height="6" rx="3" fill="#f59e0b"/>
    </g>

    <!-- Stat 4 -->
    <g transform="translate(620, 20)">
      <text x="0" y="20" font-family="SF Pro Display, sans-serif" font-size="28" font-weight="600" fill="#ec4899">+0.3</text>
      <text x="0" y="45" font-family="SF Pro Text, sans-serif" font-size="12" fill="rgba(255,255,255,0.5)">GPA improvement</text>
      <rect x="0" y="55" width="60" height="6" rx="3" fill="#ec4899" opacity="0.3"/>
      <rect x="0" y="55" width="60" height="6" rx="3" fill="#ec4899"/>
    </g>
  </g>
</svg>

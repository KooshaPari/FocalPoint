<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" role="img" aria-labelledby="morning-ritual-title">
  <title id="morning-ritual-title">Morning Ritual Flow</title>
  <desc>Morning ritual timeline showing wake → brief → focus flow</desc>

  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>

    <!-- Glass morphism card gradient -->
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.1)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.03)"/>
    </linearGradient>

    <!-- Orange accent gradient -->
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8B65"/>
      <stop offset="100%" style="stop-color:#FF6B3D"/>
    </linearGradient>

    <!-- Teal accent gradient -->
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C7BE"/>
      <stop offset="100%" style="stop-color:#0A9396"/>
    </linearGradient>

    <!-- Purple accent gradient -->
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>

    <!-- Card shadow -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>

    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="350" fill="url(#bgGradient)" rx="16"/>

  <!-- Header -->
  <text x="350" y="40" font-family="SF Pro Display, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#fff" text-anchor="middle">Morning Ritual Flow</text>

  <!-- Timeline connector -->
  <g transform="translate(100, 175)">
    <line x1="0" y1="0" x2="500" y2="0" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-dasharray="8,4"/>
  </g>

  <!-- Phase 1: Wake -->
  <g transform="translate(80, 80)">
    <!-- Card -->
    <rect width="160" height="190" rx="16" fill="url(#cardGradient)" stroke="rgba(255,255,255,0.1)" filter="url(#cardShadow)"/>

    <!-- Icon circle -->
    <circle cx="80" cy="50" r="32" fill="url(#orangeGradient)" filter="url(#glow)"/>
    <circle cx="80" cy="50" r="20" fill="#0f172a"/>
    <circle cx="80" cy="50" r="8" fill="#FF6B3D"/>

    <!-- Sun rays -->
    <g stroke="#FF6B3D" stroke-width="2" stroke-linecap="round">
      <line x1="80" y1="20" x2="80" y2="14"/>
      <line x1="80" y1="80" x2="80" y2="86"/>
      <line x1="50" y1="50" x2="44" y2="50"/>
      <line x1="110" y1="50" x2="116" y2="50"/>
    </g>

    <!-- Label -->
    <text x="80" y="105" font-family="SF Pro Display, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">Wake</text>
    <text x="80" y="125" font-family="SF Pro Text, sans-serif" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle">6:00 AM</text>

    <!-- Steps -->
    <g transform="translate(20, 140)">
      <circle cx="6" cy="6" r="4" fill="#FF6B3D"/>
      <text x="18" y="10" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)">Alarm snoozed</text>
      <circle cx="6" cy="26" r="4" fill="#FF6B3D"/>
      <text x="18" y="30" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)">Out of bed</text>
    </g>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(250, 165)">
    <path d="M0,0 L30,0 M20,-8 L30,0 L20,8" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Phase 2: Brief -->
  <g transform="translate(290, 80)">
    <!-- Card -->
    <rect width="160" height="190" rx="16" fill="url(#cardGradient)" stroke="rgba(255,255,255,0.1)" filter="url(#cardShadow)"/>

    <!-- Icon circle -->
    <circle cx="80" cy="50" r="32" fill="url(#tealGradient)" filter="url(#glow)"/>
    <rect x="65" y="35" width="30" height="30" rx="4" fill="#0f172a"/>
    <line x1="72" y1="45" x2="88" y2="45" stroke="#00C7BE" stroke-width="2" stroke-linecap="round"/>
    <line x1="72" y1="52" x2="85" y2="52" stroke="#00C7BE" stroke-width="2" stroke-linecap="round"/>
    <line x1="72" y1="59" x2="82" y2="59" stroke="#00C7BE" stroke-width="2" stroke-linecap="round"/>

    <!-- Label -->
    <text x="80" y="105" font-family="SF Pro Display, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">Brief</text>
    <text x="80" y="125" font-family="SF Pro Text, sans-serif" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle">6:15 AM</text>

    <!-- Steps -->
    <g transform="translate(20, 140)">
      <circle cx="6" cy="6" r="4" fill="#00C7BE"/>
      <text x="18" y="10" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)">Daily briefing</text>
      <circle cx="6" cy="26" r="4" fill="#00C7BE"/>
      <text x="18" y="30" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)">Review schedule</text>
    </g>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(460, 165)">
    <path d="M0,0 L30,0 M20,-8 L30,0 L20,8" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Phase 3: Focus -->
  <g transform="translate(500, 80)">
    <!-- Card -->
    <rect width="160" height="190" rx="16" fill="url(#cardGradient)" stroke="rgba(255,255,255,0.1)" filter="url(#cardShadow)"/>

    <!-- Icon circle -->
    <circle cx="80" cy="50" r="32" fill="url(#purpleGradient)" filter="url(#glow)"/>
    <circle cx="80" cy="50" r="18" fill="none" stroke="#A78BFA" stroke-width="3"/>
    <circle cx="80" cy="50" r="8" fill="#A78BFA"/>

    <!-- Label -->
    <text x="80" y="105" font-family="SF Pro Display, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">Focus</text>
    <text x="80" y="125" font-family="SF Pro Text, sans-serif" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle">6:30 AM</text>

    <!-- Steps -->
    <g transform="translate(20, 140)">
      <circle cx="6" cy="6" r="4" fill="#A78BFA"/>
      <text x="18" y="10" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)">Focus session</text>
      <circle cx="6" cy="26" r="4" fill="rgba(167,139,250,0.3)" stroke="#A78BFA" stroke-width="1"/>
      <text x="18" y="30" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">No notifications</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="350" y="330" font-family="SF Pro Text, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">Morning Routine: 30 minutes</text>
</svg>

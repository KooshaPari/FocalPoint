<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="eveningGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#eveningGrad)" rx="20"/>

  <!-- Moon icon -->
  <g transform="translate(60, 40)">
    <circle cx="30" cy="30" r="28" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.3"/>
    <path d="M35 15 A20 20 0 1 0 35 45 A15 15 0 1 1 35 15" fill="#ffd700" filter="url(#glow)"/>
  </g>

  <!-- Title -->
  <text x="120" y="58" font-family="SF Pro Display, -apple-system, sans-serif" font-size="24" font-weight="600" fill="#fff">Evening Shutdown Ritual</text>
  <text x="120" y="78" font-family="SF Pro Text, -apple-system, sans-serif" font-size="14" fill="rgba(255,255,255,0.6)">Reflect • Celebrate • Prepare</text>

  <!-- Step Cards -->
  <g transform="translate(40, 110)">
    <!-- Card 1: Stats Review -->
    <rect width="170" height="120" rx="16" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.1)"/>
    <circle cx="30" cy="30" r="20" fill="#3b82f6" opacity="0.3"/>
    <text x="30" y="36" font-family="SF Pro Text, sans-serif" font-size="20" text-anchor="middle" fill="#3b82f6">📊</text>
    <text x="20" y="70" font-family="SF Pro Text, sans-serif" font-size="13" font-weight="600" fill="#fff">Stats Review</text>
    <text x="20" y="90" font-family="SF Pro Text, sans-serif" font-size="11" fill="rgba(255,255,255,0.6)">Focus time, streaks</text>
    <text x="20" y="105" font-family="SF Pro Text, sans-serif" font-size="11" fill="rgba(255,255,255,0.6)">and achievements</text>
  </g>

  <g transform="translate(230, 110)">
    <!-- Card 2: Connector Progress -->
    <rect width="170" height="120" rx="16" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.1)"/>
    <circle cx="30" cy="30" r="20" fill="#10b981" opacity="0.3"/>
    <text x="30" y="36" font-family="SF Pro Text, sans-serif" font-size="20" text-anchor="middle" fill="#10b981">🔗</text>
    <text x="20" y="70" font-family="SF Pro Text, sans-serif" font-size="13" font-weight="600" fill="#fff">Connector Progress</text>
    <text x="20" y="90" font-family="SF Pro Text, sans-serif" font-size="11" fill="rgba(255,255,255,0.6)">GitHub, Canvas,</text>
    <text x="20" y="105" font-family="SF Pro Text, sans-serif" font-size="11" fill="rgba(255,255,255,0.6)">Calendar sync</text>
  </g>

  <g transform="translate(420, 110)">
    <!-- Card 3: Reflection -->
    <rect width="170" height="120" rx="16" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.1)"/>
    <circle cx="30" cy="30" r="20" fill="#f59e0b" opacity="0.3"/>
    <text x="30" y="36" font-family="SF Pro Text, sans-serif" font-size="20" text-anchor="middle" fill="#f59e0b">💭</text>
    <text x="20" y="70" font-family="SF Pro Text, sans-serif" font-size="13" font-weight="600" fill="#fff">Reflection</text>
    <text x="20" y="90" font-family="SF Pro Text, sans-serif" font-size="11" fill="rgba(255,255,255,0.6)">What blocked you?</text>
    <text x="20" y="105" font-family="SF Pro Text, sans-serif" font-size="11" fill="rgba(255,255,255,0.6)">Tomorrow's priority</text>
  </g>

  <g transform="translate(610, 110)">
    <!-- Card 4: Coachy Insight -->
    <rect width="170" height="120" rx="16" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.1)"/>
    <circle cx="30" cy="30" r="20" fill="#ec4899" opacity="0.3"/>
    <text x="30" y="36" font-family="SF Pro Text, sans-serif" font-size="20" text-anchor="middle" fill="#ec4899">✨</text>
    <text x="20" y="70" font-family="SF Pro Text, sans-serif" font-size="13" font-weight="600" fill="#fff">Coachy Insight</text>
    <text x="20" y="90" font-family="SF Pro Text, sans-serif" font-size="11" fill="rgba(255,255,255,0.6)">Personalized</text>
    <text x="20" y="105" font-family="SF Pro Text, sans-serif" font-size="11" fill="rgba(255,255,255,0.6)">feedback & tips</text>
  </g>

  <!-- Timeline -->
  <line x1="105" y1="250" x2="695" y2="250" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <circle cx="105" cy="250" r="8" fill="#3b82f6"/>
  <circle cx="315" cy="250" r="8" fill="#10b981"/>
  <circle cx="505" cy="250" r="8" fill="#f59e0b"/>
  <circle cx="695" cy="250" r="8" fill="#ec4899"/>

  <text x="105" y="280" font-family="SF Pro Text, sans-serif" font-size="11" text-anchor="middle" fill="rgba(255,255,255,0.5)">7:00 PM</text>
  <text x="315" y="280" font-family="SF Pro Text, sans-serif" font-size="11" text-anchor="middle" fill="rgba(255,255,255,0.5)">7:02 PM</text>
  <text x="505" y="280" font-family="SF Pro Text, sans-serif" font-size="11" text-anchor="middle" fill="rgba(255,255,255,0.5)">7:04 PM</text>
  <text x="695" y="280" font-family="SF Pro Text, sans-serif" font-size="11" text-anchor="middle" fill="rgba(255,255,255,0.5)">7:05 PM</text>

  <!-- Stats Summary -->
  <g transform="translate(40, 320)">
    <rect width="720" height="60" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
    <text x="20" y="25" font-family="SF Pro Text, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)">TODAY'S SUMMARY</text>
    <text x="120" y="45" font-family="SF Pro Display, sans-serif" font-size="18" font-weight="600" fill="#fff">4h 30m</text>
    <text x="200" y="25" font-family="SF Pro Text, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">Focus Time</text>
    <text x="320" y="45" font-family="SF Pro Display, sans-serif" font-size="18" font-weight="600" fill="#ffd700">🔥 23</text>
    <text x="400" y="25" font-family="SF Pro Text, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">Day Streak</text>
    <text x="520" y="45" font-family="SF Pro Display, sans-serif" font-size="18" font-weight="600" fill="#10b981">45m</text>
    <text x="580" y="25" font-family="SF Pro Text, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">Distractions</text>
  </g>
</svg>

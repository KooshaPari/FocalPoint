<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.1)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.02)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="400" fill="url(#bgGrad)" rx="20"/>

  <!-- Header with Focus icon -->
  <g transform="translate(30, 25)">
    <circle cx="20" cy="20" r="20" fill="#8b5cf6" opacity="0.3"/>
    <circle cx="20" cy="20" r="12" fill="#8b5cf6" filter="url(#glow)"/>
  </g>
  <text x="80" y="38" font-family="SF Pro Display, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#fff">Focus Session</text>
  <text x="80" y="56" font-family="SF Pro Text, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">Deep work with Coachy</text>

  <!-- Central Timer Display -->
  <g transform="translate(280, 20)">
    <rect width="140" height="70" rx="20" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.15)"/>
    <text x="70" y="50" font-family="SF Pro Display, sans-serif" font-size="32" font-weight="300" fill="#fff" text-anchor="middle" letter-spacing="2">60:00</text>
  </g>

  <!-- Phase Timeline -->
  <g transform="translate(30, 110)">
    <!-- Phase 1: Notification -->
    <rect width="150" height="100" rx="14" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.1)"/>
    <circle cx="25" cy="25" r="18" fill="#3b82f6" opacity="0.3"/>
    <text x="25" y="30" font-family="SF Pro Text, sans-serif" font-size="16" text-anchor="middle" fill="#3b82f6">🔔</text>
    <text x="15" y="55" font-family="SF Pro Text, sans-serif" font-size="12" font-weight="500" fill="#fff">1. Notification</text>
    <text x="15" y="72" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">PR ready for</text>
    <text x="15" y="85" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">review alert</text>

    <!-- Connector -->
    <line x1="165" y1="50" x2="195" y2="50" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="4,4"/>

    <!-- Phase 2: Focus Mode -->
    <rect width="150" height="100" rx="14" fill="url(#glassGrad)" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="25" cy="25" r="18" fill="#8b5cf6" opacity="0.3"/>
    <text x="25" y="30" font-family="SF Pro Text, sans-serif" font-size="16" text-anchor="middle" fill="#8b5cf6">🎯</text>
    <text x="15" y="55" font-family="SF Pro Text, sans-serif" font-size="12" font-weight="500" fill="#fff">2. Focus Mode</text>
    <text x="15" y="72" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Apps blocked,</text>
    <text x="15" y="85" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">timer started</text>

    <!-- Connector -->
    <line x1="345" y1="50" x2="375" y2="50" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="4,4"/>

    <!-- Phase 3: Deep Work -->
    <rect width="150" height="100" rx="14" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.1)"/>
    <circle cx="25" cy="25" r="18" fill="#10b981" opacity="0.3"/>
    <text x="25" y="30" font-family="SF Pro Text, sans-serif" font-size="16" text-anchor="middle" fill="#10b981">💻</text>
    <text x="15" y="55" font-family="SF Pro Text, sans-serif" font-size="12" font-weight="500" fill="#fff">3. Deep Work</text>
    <text x="15" y="72" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Review PR,</text>
    <text x="15" y="85" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">write comments</text>
  </g>

  <!-- Blocked Apps Panel -->
  <g transform="translate(30, 230)">
    <rect width="200" height="150" rx="14" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.1)"/>
    <text x="15" y="25" font-family="SF Pro Text, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.6)">🔇 BLOCKED</text>

    <!-- Slack -->
    <rect x="15" y="40" width="50" height="50" rx="12" fill="#e01e5a" opacity="0.2"/>
    <text x="40" y="70" font-family="SF Pro Text, sans-serif" font-size="22" text-anchor="middle">💬</text>

    <!-- Discord -->
    <rect x="75" y="40" width="50" height="50" rx="12" fill="#5865f2" opacity="0.2"/>
    <text x="100" y="70" font-family="SF Pro Text, sans-serif" font-size="22" text-anchor="middle">🎮</text>

    <!-- Twitter -->
    <rect x="135" y="40" width="50" height="50" rx="12" fill="#1da1f2" opacity="0.2"/>
    <text x="160" y="70" font-family="SF Pro Text, sans-serif" font-size="22" text-anchor="middle">🐦</text>

    <text x="15" y="115" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">Notifications silenced</text>
    <text x="15" y="130" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">during focus</text>
  </g>

  <!-- Whitelisted Apps Panel -->
  <g transform="translate(250, 230)">
    <rect width="200" height="150" rx="14" fill="url(#glassGrad)" stroke="#10b981" stroke-width="1"/>
    <text x="15" y="25" font-family="SF Pro Text, sans-serif" font-size="11" font-weight="600" fill="#10b981">🔓 ALLOWED</text>

    <!-- GitHub -->
    <rect x="15" y="40" width="50" height="50" rx="12" fill="#24292e" opacity="0.4"/>
    <text x="40" y="70" font-family="SF Pro Text, sans-serif" font-size="22" text-anchor="middle">🐙</text>

    <!-- VS Code -->
    <rect x="75" y="40" width="50" height="50" rx="12" fill="#007acc" opacity="0.3"/>
    <text x="100" y="70" font-family="SF Pro Text, sans-serif" font-size="22" text-anchor="middle">⌨️</text>

    <!-- Terminal -->
    <rect x="135" y="40" width="50" height="50" rx="12" fill="#4d4d4d" opacity="0.4"/>
    <text x="160" y="70" font-family="SF Pro Text, sans-serif" font-size="22" text-anchor="middle">⚡</text>

    <text x="15" y="115" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">Full access during</text>
    <text x="15" y="130" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">focus session</text>
  </g>

  <!-- Coachy Message -->
  <g transform="translate(470, 230)">
    <rect width="200" height="150" rx="14" fill="url(#glassGrad)" stroke="rgba(168,85,247,0.3)"/>

    <!-- Coachy avatar -->
    <circle cx="35" cy="35" r="25" fill="url(#glassGrad)" stroke="#a855f7" stroke-width="2"/>
    <text x="35" y="42" font-family="SF Pro Text, sans-serif" font-size="24" text-anchor="middle">✨</text>

    <text x="15" y="80" font-family="SF Pro Text, sans-serif" font-size="11" fill="rgba(255,255,255,0.6)">Coachy says:</text>
    <text x="15" y="100" font-family="SF Pro Text, sans-serif" font-size="12" fill="#fff">"You're reviewing</text>
    <text x="15" y="118" font-family="SF Pro Text, sans-serif" font-size="12" fill="#fff">@alice's PR. Take</text>
    <text x="15" y="136" font-family="SF Pro Text, sans-serif" font-size="12" fill="#fff">your time."</text>
  </g>
</svg>

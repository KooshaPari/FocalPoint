<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" role="img" aria-labelledby="focus-complete-title">
  <title id="focus-complete-title">Focus Session Complete</title>
  <desc>Focus session completion screen with stats</desc>

  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>

    <!-- Glass morphism card gradient -->
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.04)"/>
    </linearGradient>

    <!-- Teal accent gradient -->
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C7BE"/>
      <stop offset="100%" style="stop-color:#0A9396"/>
    </linearGradient>

    <!-- Purple accent gradient -->
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>

    <!-- Orange accent gradient -->
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8B65"/>
      <stop offset="100%" style="stop-color:#FF6B3D"/>
    </linearGradient>

    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Card shadow -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" fill="url(#bgGradient)" rx="16"/>

  <!-- Success header -->
  <g transform="translate(250, 50)">
    <!-- Confetti particles -->
    <circle cx="-120" cy="-10" r="4" fill="#FF6B3D" opacity="0.8"/>
    <circle cx="130" cy="0" r="3" fill="#00C7BE" opacity="0.8"/>
    <circle cx="-100" cy="20" r="3" fill="#A78BFA" opacity="0.8"/>
    <circle cx="110" cy="15" r="4" fill="#FF6B3D" opacity="0.8"/>

    <!-- Checkmark circle -->
    <circle cx="0" cy="0" r="40" fill="url(#tealGradient)" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="32" fill="#0f172a"/>
    <path d="M-14,0 L-4,10 L16,-10" fill="none" stroke="#00C7BE" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <text x="250" y="115" font-family="SF Pro Display, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#fff" text-anchor="middle">Focus Complete!</text>
  <text x="250" y="138" font-family="SF Pro Text, sans-serif" font-size="13" fill="rgba(255,255,255,0.6)" text-anchor="middle">Great work on your deep work session</text>

  <!-- Stats row -->
  <g transform="translate(250, 180)">
    <!-- Duration stat -->
    <g transform="translate(-150, 0)">
      <rect width="130" height="80" rx="14" fill="url(#cardGradient)" stroke="rgba(255,255,255,0.1)" filter="url(#cardShadow)"/>
      <circle cx="65" cy="25" r="16" fill="url(#tealGradient)" opacity="0.2"/>
      <text x="65" y="30" font-family="SF Pro Display, sans-serif" font-size="16" fill="#00C7BE" text-anchor="middle">90m</text>
      <text x="65" y="60" font-family="SF Pro Text, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)" text-anchor="middle">Duration</text>
    </g>

    <!-- Blocks stat -->
    <g transform="translate(-20, 0)">
      <rect width="130" height="80" rx="14" fill="url(#cardGradient)" stroke="rgba(255,255,255,0.1)" filter="url(#cardShadow)"/>
      <circle cx="65" cy="25" r="16" fill="url(#purpleGradient)" opacity="0.2"/>
      <text x="65" y="30" font-family="SF Pro Display, sans-serif" font-size="16" fill="#A78BFA" text-anchor="middle">12</text>
      <text x="65" y="60" font-family="SF Pro Text, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)" text-anchor="middle">Blocked</text>
    </g>

    <!-- Score stat -->
    <g transform="translate(110, 0)">
      <rect width="130" height="80" rx="14" fill="url(#cardGradient)" stroke="rgba(255,255,255,0.1)" filter="url(#cardShadow)"/>
      <circle cx="65" cy="25" r="16" fill="url(#orangeGradient)" opacity="0.2"/>
      <text x="65" y="30" font-family="SF Pro Display, sans-serif" font-size="16" fill="#FF6B3D" text-anchor="middle">94</text>
      <text x="65" y="60" font-family="SF Pro Text, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)" text-anchor="middle">Focus Score</text>
    </g>
  </g>

  <!-- Action buttons -->
  <g transform="translate(110, 285)">
    <!-- Take break button -->
    <rect width="130" height="44" rx="12" fill="url(#cardGradient)" stroke="rgba(255,255,255,0.15)"/>
    <text x="65" y="27" font-family="SF Pro Display, sans-serif" font-size="14" font-weight="500" fill="rgba(255,255,255,0.8)" text-anchor="middle">Take Break</text>

    <!-- Continue button -->
    <g transform="translate(150, 0)">
      <rect width="130" height="44" rx="12" fill="url(#tealGradient)"/>
      <text x="65" y="27" font-family="SF Pro Display, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">Continue</text>
    </g>
  </g>

  <!-- Footer hint -->
  <text x="250" y="340" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)" text-anchor="middle">You've completed 3 focus sessions today</text>
</svg>

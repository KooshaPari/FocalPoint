<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.04)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="400" fill="url(#bgGrad)" rx="20"/>

  <!-- Header -->
  <text x="250" y="35" font-family="SF Pro Display, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#fff" text-anchor="middle">⏰ Break Time</text>

  <!-- Timer Circle -->
  <g transform="translate(250, 100)">
    <circle cx="0" cy="0" r="70" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="8"/>
    <circle cx="0" cy="0" r="70" fill="none" stroke="#f59e0b" stroke-width="8" stroke-dasharray="440" stroke-dashoffset="0" filter="url(#glow)"/>
    <text x="0" y="8" font-family="SF Pro Display, sans-serif" font-size="36" font-weight="300" fill="#fff" text-anchor="middle">15:00</text>
    <text x="0" y="28" font-family="SF Pro Text, sans-serif" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle">remaining</text>
  </g>

  <!-- Message Card -->
  <g transform="translate(50, 200)">
    <rect width="400" height="80" rx="16" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.15)"/>

    <text x="200" y="30" font-family="SF Pro Display, sans-serif" font-size="14" font-weight="500" fill="#fff" text-anchor="middle">90 minutes of deep focus completed!</text>

    <text x="200" y="55" font-family="SF Pro Text, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="middle">Research shows breaks improve</text>
    <text x="200" y="72" font-family="SF Pro Text, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="middle">retention and creativity.</text>
  </g>

  <!-- Break Suggestions -->
  <g transform="translate(50, 300)">
    <rect width="400" height="80" rx="14" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.1)"/>
    <text x="20" y="25" font-family="SF Pro Text, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.5)">SUGGESTED BREAK ACTIVITIES</text>

    <!-- Stretch -->
    <g transform="translate(20, 40)">
      <rect width="80" height="30" rx="15" fill="#3b82f6" opacity="0.2"/>
      <text x="40" y="20" font-family="SF Pro Text, sans-serif" font-size="11" fill="#3b82f6" text-anchor="middle">🧘 Stretch</text>
    </g>

    <!-- Hydrate -->
    <g transform="translate(110, 40)">
      <rect width="80" height="30" rx="15" fill="#06b6d4" opacity="0.2"/>
      <text x="40" y="20" font-family="SF Pro Text, sans-serif" font-size="11" fill="#06b6d4" text-anchor="middle">💧 Hydrate</text>
    </g>

    <!-- Look away -->
    <g transform="translate(200, 40)">
      <rect width="90" height="30" rx="15" fill="#10b981" opacity="0.2"/>
      <text x="45" y="20" font-family="SF Pro Text, sans-serif" font-size="11" fill="#10b981" text-anchor="middle">👀 Look away</text>
    </g>

    <!-- Walk -->
    <g transform="translate(300, 40)">
      <rect width="80" height="30" rx="15" fill="#f59e0b" opacity="0.2"/>
      <text x="40" y="20" font-family="SF Pro Text, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle">🚶 Walk</text>
    </g>
  </g>

  <!-- Coachy tip -->
  <text x="250" y="395" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" text-anchor="middle">✨ Breaks are part of sustainable productivity</text>
</svg>

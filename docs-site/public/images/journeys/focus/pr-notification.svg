<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" role="img" aria-labelledby="pr-notification-title">
  <title id="pr-notification-title">Pull Request Notification</title>
  <desc>PR notification modal with review action</desc>

  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>

    <!-- Glass morphism card gradient -->
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.04)"/>
    </linearGradient>

    <!-- Teal accent gradient -->
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C7BE"/>
      <stop offset="100%" style="stop-color:#0A9396"/>
    </linearGradient>

    <!-- Green accent gradient -->
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34D399"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>

    <!-- Modal shadow -->
    <filter id="modalShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.4"/>
    </filter>

    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="400" fill="url(#bgGradient)" rx="20"/>

  <!-- Modal card -->
  <g transform="translate(50, 50)">
    <rect width="400" height="300" rx="20" fill="url(#cardGradient)" stroke="rgba(255,255,255,0.15)" filter="url(#modalShadow)"/>

    <!-- Header with icon -->
    <g transform="translate(200, 50)">
      <!-- GitHub-style PR icon -->
      <circle cx="0" cy="0" r="28" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
      <circle cx="-8" cy="-4" r="8" fill="#3b82f6"/>
      <circle cx="8" cy="-4" r="8" fill="#8b5cf6"/>
      <path d="M-8,-4 L0,6 L8,-4" fill="#3b82f6"/>
    </g>

    <!-- Title -->
    <text x="200" y="105" font-family="SF Pro Display, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#fff" text-anchor="middle">Pull Request Ready</text>
    <text x="200" y="125" font-family="SF Pro Text, sans-serif" font-size="13" fill="rgba(255,255,255,0.6)" text-anchor="middle">Review requested</text>

    <!-- Divider -->
    <line x1="40" y1="145" x2="360" y2="145" stroke="rgba(255,255,255,0.1)"/>

    <!-- PR Details card -->
    <g transform="translate(40, 160)">
      <rect width="320" height="60" rx="12" fill="#0f172a" stroke="rgba(255,255,255,0.08)"/>

      <!-- Branch info -->
      <g transform="translate(15, 15)">
        <text x="0" y="0" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">feature/auth-refactor</text>
        <path d="M0,12 L-8,18 L0,24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
        <text x="0" y="36" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">main</text>
      </g>

      <!-- Stats -->
      <g transform="translate(200, 15)">
        <circle cx="0" cy="12" r="10" fill="#3b82f6" opacity="0.2"/>
        <text x="0" y="16" font-family="SF Pro Text, sans-serif" font-size="11" fill="#3b82f6" text-anchor="middle">+124</text>
        <circle cx="50" cy="12" r="10" fill="#ef4444" opacity="0.2"/>
        <text x="50" y="16" font-family="SF Pro Text, sans-serif" font-size="11" fill="#ef4444" text-anchor="middle">-12</text>
        <circle cx="90" cy="12" r="10" fill="rgba(255,255,255,0.1)"/>
        <text x="90" y="16" font-family="SF Pro Text, sans-serif" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle">8</text>
      </g>
    </g>

    <!-- Focus blocked indicator -->
    <g transform="translate(40, 235)">
      <rect width="320" height="36" rx="10" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1" stroke-opacity="0.3"/>

      <!-- Warning icon -->
      <circle cx="20" cy="18" r="10" fill="#ef4444" opacity="0.3"/>
      <text x="20" y="22" font-family="SF Pro Text, sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">!</text>

      <text x="40" y="23" font-family="SF Pro Text, sans-serif" font-size="12" fill="#ef4444">Focus session paused</text>
    </g>

    <!-- Action buttons -->
    <g transform="translate(40, 285)">
      <!-- Review button -->
      <rect width="150" height="44" rx="12" fill="url(#tealGradient)" filter="url(#glow)"/>
      <text x="75" y="27" font-family="SF Pro Display, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">Review PR</text>

      <!-- Dismiss button -->
      <g transform="translate(170, 0)">
        <rect width="150" height="44" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)"/>
        <text x="75" y="27" font-family="SF Pro Display, sans-serif" font-size="14" font-weight="500" fill="rgba(255,255,255,0.7)" text-anchor="middle">Not Now</text>
      </g>
    </g>
  </g>

  <!-- Footer hint -->
  <text x="250" y="385" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)" text-anchor="middle">Press Space to review · Esc to dismiss</text>
</svg>

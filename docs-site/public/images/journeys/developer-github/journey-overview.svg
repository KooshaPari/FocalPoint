<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.1)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.03)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="400" fill="url(#bgGrad)" rx="20"/>

  <!-- Header -->
  <g transform="translate(30, 30)">
    <circle cx="25" cy="25" r="25" fill="#8b5cf6" opacity="0.3"/>
    <text x="25" y="32" font-family="SF Pro Text, sans-serif" font-size="24" text-anchor="middle">🐙</text>
  </g>
  <text x="80" y="45" font-family="SF Pro Display, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#fff">Developer with GitHub</text>
  <text x="80" y="65" font-family="SF Pro Text, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">Bob's journey: PR reviews to 45-day commit streak</text>

  <!-- Timeline -->
  <g transform="translate(40, 100)">
    <!-- Phase 1: Onboarding -->
    <rect width="140" height="100" rx="14" fill="url(#cardGrad)" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="22" cy="22" r="16" fill="#3b82f6" opacity="0.3"/>
    <text x="22" y="27" font-family="SF Pro Text, sans-serif" font-size="14" text-anchor="middle" fill="#3b82f6">1</text>
    <text x="12" y="48" font-family="SF Pro Text, sans-serif" font-size="12" font-weight="500" fill="#fff">Onboarding</text>
    <text x="12" y="63" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Week 1</text>
    <text x="12" y="80" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">GitHub OAuth</text>

    <!-- Connector -->
    <line x1="152" y1="50" x2="180" y2="50" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="4,4"/>

    <!-- Phase 2: Deep Work -->
    <rect width="140" height="100" rx="14" fill="url(#cardGrad)" stroke="#10b981" stroke-width="2"/>
    <circle cx="22" cy="22" r="16" fill="#10b981" opacity="0.3"/>
    <text x="22" y="27" font-family="SF Pro Text, sans-serif" font-size="14" text-anchor="middle" fill="#10b981">2</text>
    <text x="12" y="48" font-family="SF Pro Text, sans-serif" font-size="12" font-weight="500" fill="#fff">Deep Work</text>
    <text x="12" y="63" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Week 2-3</text>
    <text x="12" y="80" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">PR review focus</text>

    <!-- Connector -->
    <line x1="330" y1="50" x2="358" y2="50" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="4,4"/>

    <!-- Phase 3: Milestone -->
    <rect width="140" height="100" rx="14" fill="url(#cardGrad)" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="22" cy="22" r="16" fill="#f59e0b" opacity="0.3"/>
    <text x="22" y="27" font-family="SF Pro Text, sans-serif" font-size="14" text-anchor="middle" fill="#f59e0b">3</text>
    <text x="12" y="48" font-family="SF Pro Text, sans-serif" font-size="12" font-weight="500" fill="#fff">Milestones</text>
    <text x="12" y="63" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Week 4</text>
    <text x="12" y="80" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">Ship v1.2</text>

    <!-- Connector -->
    <line x1="508" y1="50" x2="536" y2="50" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="4,4"/>

    <!-- Phase 4: Advanced -->
    <rect width="140" height="100" rx="14" fill="url(#cardGrad)" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="22" cy="22" r="16" fill="#8b5cf6" opacity="0.3"/>
    <text x="22" y="27" font-family="SF Pro Text, sans-serif" font-size="14" text-anchor="middle" fill="#8b5cf6">4</text>
    <text x="12" y="48" font-family="SF Pro Text, sans-serif" font-size="12" font-weight="500" fill="#fff">Advanced</text>
    <text x="12" y="63" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Month 2+</text>
    <text x="12" y="80" font-family="SF Pro Text, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">45-day streak</text>
  </g>

  <!-- Stats Summary -->
  <g transform="translate(40, 220)">
    <rect width="620" height="150" rx="14" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.1)"/>

    <!-- Stat Row 1 -->
    <g transform="translate(30, 25)">
      <text x="0" y="20" font-family="SF Pro Display, sans-serif" font-size="26" font-weight="600" fill="#3b82f6">52</text>
      <text x="0" y="42" font-family="SF Pro Text, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">PR Reviews</text>
    </g>

    <g transform="translate(160, 25)">
      <text x="0" y="20" font-family="SF Pro Display, sans-serif" font-size="26" font-weight="600" fill="#10b981">87m</text>
      <text x="0" y="42" font-family="SF Pro Text, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Avg Focus</text>
    </g>

    <g transform="translate(290, 25)">
      <text x="0" y="20" font-family="SF Pro Display, sans-serif" font-size="26" font-weight="600" fill="#f59e0b">45</text>
      <text x="25" y="20" font-family="SF Pro Text, sans-serif" font-size="14">🔥</text>
      <text x="0" y="42" font-family="SF Pro Text, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Commit Streak</text>
    </g>

    <g transform="translate(420, 25)">
      <text x="0" y="20" font-family="SF Pro Display, sans-serif" font-size="26" font-weight="600" fill="#ec4899">96%</text>
      <text x="0" y="42" font-family="SF Pro Text, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Code Quality</text>
    </g>

    <!-- Stat Row 2 -->
    <g transform="translate(30, 80)">
      <text x="0" y="20" font-family="SF Pro Display, sans-serif" font-size="26" font-weight="600" fill="#8b5cf6">24</text>
      <text x="0" y="42" font-family="SF Pro Text, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Focus Sessions</text>
    </g>

    <g transform="translate(160, 80)">
      <text x="0" y="20" font-family="SF Pro Display, sans-serif" font-size="26" font-weight="600" fill="#06b6d4">187</text>
      <text x="0" y="42" font-family="SF Pro Text, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Total Commits</text>
    </g>

    <g transform="translate(290, 80)">
      <text x="0" y="20" font-family="SF Pro Display, sans-serif" font-size="26" font-weight="600" fill="#f97316">-15%</text>
      <text x="0" y="42" font-family="SF Pro Text, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Time-to-merge</text>
    </g>

    <g transform="translate(420, 80)">
      <text x="0" y="20" font-family="SF Pro Display, sans-serif" font-size="26" font-weight="600" fill="#84cc16">2</text>
      <text x="0" y="42" font-family="SF Pro Text, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Context Switches (was 6)</text>
    </g>
  </g>
</svg>

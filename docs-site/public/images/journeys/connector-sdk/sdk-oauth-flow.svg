<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="purpleGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="blueGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="greenGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="orangeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardShadow2">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="500" fill="url(#bgGrad2)"/>

  <!-- Subtle dots pattern -->
  <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="#1e293b"/>
  </pattern>
  <rect width="600" height="500" fill="url(#dots)"/>

  <!-- Title -->
  <text x="300" y="40" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="22" font-weight="600">🔐 OAuth Authorization Flow</text>

  <!-- Your App Card -->
  <g filter="url(#cardShadow2)">
    <rect x="60" y="80" width="140" height="100" rx="14" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <rect x="60" y="80" width="140" height="36" rx="14" fill="url(#blueGrad2)" opacity="0.25"/>
    <rect x="60" y="104" width="140" height="12" fill="url(#blueGrad2)" opacity="0.25"/>
    <text x="130" y="104" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="13" font-weight="600">📱 Your App</text>
    <text x="130" y="135" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">Web/Mobile Client</text>
    <rect x="80" y="150" width="100" height="20" rx="6" fill="rgba(59,130,246,0.2)" stroke="rgba(59,130,246,0.4)"/>
    <text x="130" y="164" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="9">Client ID</text>
  </g>

  <!-- Connector SDK Card -->
  <g filter="url(#cardShadow2)">
    <rect x="230" y="200" width="140" height="120" rx="14" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <rect x="230" y="200" width="140" height="36" rx="14" fill="url(#purpleGrad2)" opacity="0.3"/>
    <rect x="230" y="224" width="140" height="12" fill="url(#purpleGrad2)" opacity="0.3"/>
    <text x="300" y="224" text-anchor="middle" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="13" font-weight="600">🔌 Connector SDK</text>
    <text x="300" y="260" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">OAuth Manager</text>
    <rect x="250" y="275" width="100" height="18" rx="5" fill="rgba(139,92,246,0.2)" stroke="rgba(139,92,246,0.4)"/>
    <text x="300" y="288" text-anchor="middle" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="8">Access Token</text>
    <rect x="250" y="298" width="100" height="18" rx="5" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.3)"/>
    <text x="300" y="311" text-anchor="middle" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="8">Refresh Token</text>
  </g>

  <!-- Provider Card -->
  <g filter="url(#cardShadow2)">
    <rect x="400" y="80" width="140" height="100" rx="14" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <rect x="400" y="80" width="140" height="36" rx="14" fill="url(#greenGrad2)" opacity="0.25"/>
    <rect x="400" y="104" width="140" height="12" fill="url(#greenGrad2)" opacity="0.25"/>
    <text x="470" y="104" text-anchor="middle" fill="#34d399" font-family="system-ui, sans-serif" font-size="13" font-weight="600">🌐 Provider</text>
    <text x="470" y="135" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">OAuth Server</text>
    <rect x="420" y="150" width="100" height="20" rx="6" fill="rgba(16,185,129,0.2)" stroke="rgba(16,185,129,0.4)"/>
    <text x="470" y="164" text-anchor="middle" fill="#34d399" font-family="system-ui, sans-serif" font-size="9">Auth Endpoint</text>
  </g>

  <!-- Authorization Server -->
  <g filter="url(#cardShadow2)">
    <rect x="400" y="350" width="140" height="90" rx="14" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <rect x="400" y="350" width="140" height="36" rx="14" fill="url(#orangeGrad2)" opacity="0.25"/>
    <rect x="400" y="374" width="140" height="12" fill="url(#orangeGrad2)" opacity="0.25"/>
    <text x="470" y="374" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="12" font-weight="600">🔑 Auth Server</text>
    <text x="470" y="405" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9">Token Generation</text>
    <text x="470" y="420" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9">Scope Validation</text>
  </g>

  <!-- Connection Lines -->
  <g filter="url(#glow2)" opacity="0.9">
    <!-- App to Provider (Authorization Request) -->
    <path d="M 200 120 Q 300 80 400 120" fill="none" stroke="url(#blueGrad2)" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="300" y="90" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="9">1. Auth Request</text>

    <!-- Provider to Auth Server -->
    <path d="M 470 180 L 470 350" fill="none" stroke="url(#greenGrad2)" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="490" y="270" fill="#34d399" font-family="system-ui, sans-serif" font-size="9">2. Validate</text>

    <!-- Auth Server to Connector SDK (Token Response) -->
    <path d="M 400 380 Q 300 440 300 320" fill="none" stroke="url(#orangeGrad2)" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="320" y="400" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="9">3. Token Response</text>

    <!-- Connector SDK to App -->
    <path d="M 230 260 L 130 180" fill="none" stroke="url(#purpleGrad2)" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="140" y="210" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="9">4. Token Ready</text>
  </g>

  <!-- Step indicators -->
  <circle cx="300" cy="100" r="8" fill="#3b82f6" filter="url(#glow2)"/>
  <text x="300" y="104" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="9" font-weight="600">1</text>

  <circle cx="470" cy="360" r="8" fill="#10b981" filter="url(#glow2)"/>
  <text x="470" y="364" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="9" font-weight="600">2</text>

  <circle cx="320" cy="380" r="8" fill="#f59e0b" filter="url(#glow2)"/>
  <text x="320" y="384" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="9" font-weight="600">3</text>

  <circle cx="150" cy="170" r="8" fill="#8b5cf6" filter="url(#glow2)"/>
  <text x="150" y="174" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="9" font-weight="600">4</text>

  <!-- Scopes Panel -->
  <g filter="url(#cardShadow2)">
    <rect x="40" y="360" width="130" height="80" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)"/>
    <text x="105" y="380" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10" font-weight="600">📋 Scopes</text>
    <text x="55" y="400" fill="#64748b" font-family="monospace" font-size="8">read:users</text>
    <text x="55" y="413" fill="#64748b" font-family="monospace" font-size="8">write:data</text>
    <text x="55" y="426" fill="#64748b" font-family="monospace" font-size="8">read:events</text>
  </g>

  <!-- Footer info -->
  <rect x="40" y="460" width="520" height="1" fill="rgba(255,255,255,0.1)"/>
  <text x="300" y="480" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">PKCE Support • Refresh Tokens • Auto-refresh • Revocation</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <defs>
    <linearGradient id="bgGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="purpleGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="greenGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="blueGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="redGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
    <linearGradient id="amberGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardShadow4">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="450" fill="url(#bgGrad4)"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="600" height="50" fill="rgba(255,255,255,0.03)"/>
  <rect x="0" y="49" width="600" height="1" fill="rgba(255,255,255,0.08)"/>

  <!-- Title -->
  <text x="20" y="32" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="18" font-weight="600">🧪 Connector SDK Testing</text>
  <rect x="480" y="15" width="100" height="24" rx="6" fill="url(#greenGrad4)" opacity="0.2"/>
  <text x="530" y="31" text-anchor="middle" fill="#34d399" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Run Tests</text>

  <!-- Left Panel: Test Files -->
  <g filter="url(#cardShadow4)">
    <rect x="15" y="60" width="180" height="320" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
    <text x="30" y="82" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11" font-weight="600">📁 Test Files</text>

    <!-- File items -->
    <g>
      <rect x="25" y="95" width="160" height="32" rx="6" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.3)"/>
      <text x="40" y="115" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="10">📄 oauth.test.ts</text>
      <circle cx="165" cy="111" r="6" fill="#10b981"/>
      <text x="165" y="115" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="7">✓</text>
    </g>

    <g>
      <rect x="25" y="135" width="160" height="32" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)"/>
      <text x="40" y="155" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">📄 events.test.ts</text>
      <circle cx="165" cy="151" r="6" fill="#10b981"/>
      <text x="165" y="155" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="7">✓</text>
    </g>

    <g>
      <rect x="25" y="175" width="160" height="32" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)"/>
      <text x="40" y="195" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">📄 sync.test.ts</text>
      <circle cx="165" cy="191" r="6" fill="#f59e0b"/>
      <text x="165" y="195" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="7">◐</text>
    </g>

    <g>
      <rect x="25" y="215" width="160" height="32" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)"/>
      <text x="40" y="235" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">📄 auth.test.ts</text>
      <circle cx="165" cy="231" r="6" fill="#ef4444"/>
      <text x="165" y="235" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="7">✗</text>
    </g>

    <g>
      <rect x="25" y="255" width="160" height="32" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)"/>
      <text x="40" y="275" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">📄 market.test.ts</text>
      <circle cx="165" cy="271" r="6" fill="#10b981"/>
      <text x="165" y="275" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="7">✓</text>
    </g>

    <!-- Summary at bottom -->
    <rect x="25" y="310" width="160" height="55" rx="8" fill="rgba(255,255,255,0.03)"/>
    <text x="40" y="332" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">Total: 42 tests</text>
    <text x="40" y="350" fill="#10b981" font-family="system-ui, sans-serif" font-size="10">✓ Passed: 38</text>
    <text x="40" y="358" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="9">◐ Skipped: 2</text>
    <text x="40" y="366" fill="#ef4444" font-family="system-ui, sans-serif" font-size="10">✗ Failed: 2</text>
  </g>

  <!-- Right Panel: Test Output -->
  <g filter="url(#cardShadow4)">
    <rect x="210" y="60" width="375" height="320" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
    <text x="225" y="82" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11" font-weight="600">📋 Test Output</text>

    <!-- Code block -->
    <rect x="225" y="95" width="345" height="280" rx="8" fill="rgba(0,0,0,0.3)" stroke="rgba(255,255,255,0.05)"/>

    <!-- Code content -->
    <text x="240" y="118" fill="#8b5cf6" font-family="monospace" font-size="11">describe('OAuth Manager', () =&gt; {</text>
    <text x="255" y="138" fill="#8b5cf6" font-family="monospace" font-size="11">it('should authorize user', async () =&gt; {</text>
    <text x="270" y="158" fill="#60a5fa" font-family="monospace" font-size="11">const result = await sdk.auth.authorize({</text>
    <text x="285" y="175" fill="#60a5fa" font-family="monospace" font-size="11">  clientId: 'test-client',</text>
    <text x="285" y="192" fill="#60a5fa" font-family="monospace" font-size="11">  scopes: ['read:data']</text>
    <text x="270" y="209" fill="#60a5fa" font-family="monospace" font-size="11">});</text>
    <text x="270" y="226" fill="#fbbf24" font-family="monospace" font-size="11">expect(result.token).toBeDefined();</text>
    <text x="255" y="243" fill="#94a3b8" font-family="monospace" font-size="11">});</text>

    <!-- Error section -->
    <rect x="240" y="260" width="315" height="60" rx="6" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.3)"/>
    <text x="255" y="282" fill="#ef4444" font-family="system-ui, sans-serif" font-size="10" font-weight="600">✗ FAILED: auth.test.ts:42</text>
    <text x="255" y="300" fill="#f87171" font-family="monospace" font-size="10">Expected token to be defined</text>
    <text x="255" y="314" fill="#f87171" font-family="monospace" font-size="10">Received: undefined</text>
  </g>

  <!-- Coverage Bar -->
  <g filter="url(#cardShadow4)">
    <rect x="15" y="395" width="570" height="45" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
    <text x="30" y="418" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11" font-weight="600">📊 Coverage</text>

    <!-- Coverage items -->
    <text x="120" y="418" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">Statements</text>
    <rect x="190" y="405" width="60" height="10" rx="3" fill="rgba(16,185,129,0.2)"/>
    <rect x="190" y="405" width="54" height="10" rx="3" fill="url(#greenGrad4)"/>
    <text x="260" y="414" fill="#10b981" font-family="system-ui, sans-serif" font-size="9">90%</text>

    <text x="290" y="418" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">Branches</text>
    <rect x="355" y="405" width="60" height="10" rx="3" fill="rgba(59,130,246,0.2)"/>
    <rect x="355" y="405" width="48" height="10" rx="3" fill="url(#blueGrad4)"/>
    <text x="425" y="414" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="9">80%</text>

    <text x="455" y="418" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">Functions</text>
    <rect x="525" y="405" width="60" height="10" rx="3" fill="rgba(139,92,246,0.2)"/>
    <rect x="525" y="405" width="57" height="10" rx="3" fill="url(#purpleGrad4)"/>
    <text x="565" y="414" fill="#8b5cf6" font-family="system-ui, sans-serif" font-size="9">95%</text>
  </g>
</svg>
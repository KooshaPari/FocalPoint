<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bgGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="purpleGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="greenGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="blueGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="orangeGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="pinkGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardShadow5">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad5)"/>

  <!-- Grid pattern -->
  <pattern id="grid5" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <rect width="800" height="400" fill="url(#grid5)" opacity="0.3"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="24" font-weight="600">🛒 Connector Marketplace</text>

  <!-- Stats Bar -->
  <g filter="url(#cardShadow5)">
    <rect x="40" y="55" width="720" height="50" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>

    <g>
      <text x="100" y="75" text-anchor="middle" fill="#8b5cf6" font-family="system-ui, sans-serif" font-size="20" font-weight="700">2,847</text>
      <text x="100" y="93" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">📦 Connectors</text>
    </g>

    <g>
      <text x="280" y="75" text-anchor="middle" fill="#10b981" font-family="system-ui, sans-serif" font-size="20" font-weight="700">156K</text>
      <text x="280" y="93" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">⬇️ Installs</text>
    </g>

    <g>
      <text x="460" y="75" text-anchor="middle" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="20" font-weight="700">48</text>
      <text x="460" y="93" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">⭐ Avg Rating</text>
    </g>

    <g>
      <text x="640" y="75" text-anchor="middle" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="20" font-weight="700">892</text>
      <text x="640" y="93" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">👨‍💻 Publishers</text>
    </g>
  </g>

  <!-- Featured Connector Card -->
  <g filter="url(#cardShadow5)">
    <rect x="40" y="120" width="350" height="180" rx="14" fill="rgba(255,255,255,0.08)" stroke="rgba(139,92,246,0.3)" stroke-width="2"/>
    <rect x="40" y="120" width="350" height="50" rx="14" fill="url(#purpleGrad5)" opacity="0.15"/>
    <rect x="40" y="154" width="350" height="16" fill="url(#purpleGrad5)" opacity="0.15"/>

    <!-- Badge -->
    <rect x="55" y="130" width="60" height="20" rx="4" fill="#8b5cf6"/>
    <text x="85" y="144" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="9" font-weight="600">⭐ FEATURED</text>

    <text x="60" y="178" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="16" font-weight="600">Stripe Payment Connector</text>
    <text x="60" y="198" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">Process payments, manage subscriptions, and handle webhooks with the official Stripe integration.</text>

    <!-- Tags -->
    <rect x="60" y="210" width="70" height="22" rx="4" fill="rgba(59,130,246,0.2)"/>
    <text x="95" y="224" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="9">💳 Payments</text>

    <rect x="140" y="210" width="60" height="22" rx="4" fill="rgba(16,185,129,0.2)"/>
    <text x="170" y="224" text-anchor="middle" fill="#34d399" font-family="system-ui, sans-serif" font-size="9">✓ Verified</text>

    <!-- Stats -->
    <text x="60" y="260" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="12">★★★★★</text>
    <text x="130" y="260" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">4.9 (2.3K reviews)</text>
    <text x="280" y="260" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">45K installs</text>

    <!-- Install button -->
    <rect x="290" y="280" width="85" height="30" rx="6" fill="url(#purpleGrad5)"/>
    <text x="332" y="299" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Install</text>
  </g>

  <!-- Popular Connectors -->
  <g filter="url(#cardShadow5)">
    <rect x="410" y="120" width="350" height="180" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)"/>
    <text x="425" y="145" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11" font-weight="600">🔥 Popular This Week</text>

    <!-- Item 1 -->
    <g>
      <rect x="425" y="155" width="320" height="40" rx="6" fill="rgba(255,255,255,0.03)"/>
      <text x="440" y="175" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="11">📊 Salesforce CRM</text>
      <text x="440" y="188" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">Sales • CRM • 28K installs</text>
      <text x="700" y="175" text-anchor="end" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="10">★★★★★</text>
      <text x="700" y="188" text-anchor="end" fill="#10b981" font-family="system-ui, sans-serif" font-size="9">↑ 12%</text>
    </g>

    <!-- Item 2 -->
    <g>
      <rect x="425" y="200" width="320" height="40" rx="6" fill="rgba(255,255,255,0.03)"/>
      <text x="440" y="220" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="11">📧 SendGrid Mail</text>
      <text x="440" y="233" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">Email • Marketing • 15K installs</text>
      <text x="700" y="220" text-anchor="end" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="10">★★★★☆</text>
      <text x="700" y="233" text-anchor="end" fill="#10b981" font-family="system-ui, sans-serif" font-size="9">↑ 8%</text>
    </g>

    <!-- Item 3 -->
    <g>
      <rect x="425" y="245" width="320" height="40" rx="6" fill="rgba(255,255,255,0.03)"/>
      <text x="440" y="265" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="11">💬 Slack Notifications</text>
      <text x="440" y="278" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">Messaging • Alerts • 42K installs</text>
      <text x="700" y="265" text-anchor="end" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="10">★★★★★</text>
      <text x="700" y="278" text-anchor="end" fill="#10b981" font-family="system-ui, sans-serif" font-size="9">↑ 5%</text>
    </g>
  </g>

  <!-- Bottom: Categories & Publish CTA -->
  <g filter="url(#cardShadow5)">
    <rect x="40" y="315" width="520" height="70" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
    <text x="55" y="338" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10" font-weight="600">📂 Categories</text>

    <!-- Category pills -->
    <rect x="55" y="350" width="70" height="26" rx="13" fill="rgba(59,130,246,0.2)"/>
    <text x="90" y="367" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="10">CRM</text>

    <rect x="135" y="350" width="80" height="26" rx="13" fill="rgba(16,185,129,0.2)"/>
    <text x="175" y="367" text-anchor="middle" fill="#34d399" font-family="system-ui, sans-serif" font-size="10">Payments</text>

    <rect x="225" y="350" width="70" height="26" rx="13" fill="rgba(245,158,11,0.2)"/>
    <text x="260" y="367" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="10">Analytics</text>

    <rect x="305" y="350" width="70" height="26" rx="13" fill="rgba(236,72,153,0.2)"/>
    <text x="340" y="367" text-anchor="middle" fill="#f472b6" font-family="system-ui, sans-serif" font-size="10">Marketing</text>

    <rect x="385" y="350" width="70" height="26" rx="13" fill="rgba(139,92,246,0.2)"/>
    <text x="420" y="367" text-anchor="middle" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="10">DevOps</text>

    <rect x="465" y="350" width="80" height="26" rx="13" fill="rgba(255,255,255,0.1)"/>
    <text x="505" y="367" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">+12 more</text>
  </g>

  <!-- Publish CTA -->
  <g filter="url(#cardShadow5)">
    <rect x="580" y="315" width="180" height="70" rx="10" fill="url(#purpleGrad5)" opacity="0.2" stroke="rgba(139,92,246,0.4)"/>
    <text x="670" y="340" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="12" font-weight="600">🚀 Publish Your SDK</text>
    <text x="670" y="360" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">Reach 156K+ developers</text>
    <rect x="605" y="368" width="130" height="26" rx="6" fill="url(#purpleGrad5)"/>
    <text x="670" y="385" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Start Building</text>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="700" height="400">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="purpleGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="greenGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="blueGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="redGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
    <linearGradient id="orangeGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardShadow3">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="400" fill="url(#bgGrad3)"/>

  <!-- Grid pattern -->
  <pattern id="grid3" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <rect width="700" height="400" fill="url(#grid3)" opacity="0.4"/>

  <!-- Title -->
  <text x="350" y="35" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="22" font-weight="600">📡 Event Emitter System</text>

  <!-- EventEmitter Core -->
  <g filter="url(#cardShadow3)">
    <rect x="260" y="60" width="180" height="100" rx="14" fill="rgba(255,255,255,0.1)" stroke="rgba(139,92,246,0.4)" stroke-width="2"/>
    <rect x="260" y="60" width="180" height="36" rx="14" fill="url(#purpleGrad3)" opacity="0.35"/>
    <rect x="260" y="84" width="180" height="12" fill="url(#purpleGrad3)" opacity="0.35"/>
    <text x="350" y="84" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">⚡ EventEmitter</text>
    <text x="350" y="115" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">Core Event Bus</text>
    <rect x="280" y="130" width="140" height="22" rx="6" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.3)"/>
    <text x="350" y="145" text-anchor="middle" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="9">on() • emit() • off()</text>
  </g>

  <!-- Event Types Row -->
  <!-- User Event -->
  <g filter="url(#cardShadow3)">
    <rect x="40" y="90" width="130" height="70" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(59,130,246,0.3)"/>
    <rect x="40" y="90" width="130" height="28" rx="10" fill="url(#blueGrad3)" opacity="0.2"/>
    <rect x="40" y="108" width="130" height="10" fill="url(#blueGrad3)" opacity="0.2"/>
    <text x="105" y="108" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="11" font-weight="600">👤 User</text>
    <text x="105" y="132" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">created</text>
    <text x="105" y="145" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">updated</text>
  </g>

  <!-- Data Event -->
  <g filter="url(#cardShadow3)">
    <rect x="40" y="180" width="130" height="70" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(16,185,129,0.3)"/>
    <rect x="40" y="180" width="130" height="28" rx="10" fill="url(#greenGrad3)" opacity="0.2"/>
    <rect x="40" y="198" width="130" height="10" fill="url(#greenGrad3)" opacity="0.2"/>
    <text x="105" y="198" text-anchor="middle" fill="#34d399" font-family="system-ui, sans-serif" font-size="11" font-weight="600">📊 Data</text>
    <text x="105" y="222" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">synced</text>
    <text x="105" y="235" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">changed</text>
  </g>

  <!-- Connection Event -->
  <g filter="url(#cardShadow3)">
    <rect x="530" y="90" width="130" height="70" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(245,158,11,0.3)"/>
    <rect x="530" y="90" width="130" height="28" rx="10" fill="url(#orangeGrad3)" opacity="0.2"/>
    <rect x="530" y="108" width="130" height="10" fill="url(#orangeGrad3)" opacity="0.2"/>
    <text x="595" y="108" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="11" font-weight="600">🔌 Conn</text>
    <text x="595" y="132" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">connected</text>
    <text x="595" y="145" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">disconnected</text>
  </g>

  <!-- Error Event -->
  <g filter="url(#cardShadow3)">
    <rect x="530" y="180" width="130" height="70" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(239,68,68,0.3)"/>
    <rect x="530" y="180" width="130" height="28" rx="10" fill="url(#redGrad3)" opacity="0.2"/>
    <rect x="530" y="198" width="130" height="10" fill="url(#redGrad3)" opacity="0.2"/>
    <text x="595" y="198" text-anchor="middle" fill="#f87171" font-family="system-ui, sans-serif" font-size="11" font-weight="600">⚠️ Error</text>
    <text x="595" y="222" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">failed</text>
    <text x="595" y="235" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">retry</text>
  </g>

  <!-- Connection Lines -->
  <g filter="url(#glow3)" opacity="0.7">
    <!-- Left to center -->
    <path d="M 170 125 Q 220 125 260 110" fill="none" stroke="url(#blueGrad3)" stroke-width="2" stroke-dasharray="4,4"/>
    <path d="M 170 215 Q 220 215 260 140" fill="none" stroke="url(#greenGrad3)" stroke-width="2" stroke-dasharray="4,4"/>
    <!-- Center to right -->
    <path d="M 440 110 Q 490 125 530 125" fill="none" stroke="url(#orangeGrad3)" stroke-width="2" stroke-dasharray="4,4"/>
    <path d="M 440 140 Q 490 215 530 215" fill="none" stroke="url(#redGrad3)" stroke-width="2" stroke-dasharray="4,4"/>
  </g>

  <!-- Sample Event Stream -->
  <g filter="url(#cardShadow3)">
    <rect x="40" y="280" width="620" height="100" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)"/>
    <text x="60" y="302" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11" font-weight="600">📜 Event Stream</text>

    <!-- Event items -->
    <rect x="60" y="315" width="80" height="20" rx="4" fill="rgba(59,130,246,0.2)"/>
    <text x="100" y="329" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="9">user.created</text>
    <text x="155" y="329" fill="#64748b" font-family="monospace" font-size="8">{"id": "u1", ...}</text>
    <text x="350" y="329" fill="#10b981" font-family="system-ui, sans-serif" font-size="8">✓ delivered</text>

    <rect x="60" y="342" width="80" height="20" rx="4" fill="rgba(16,185,129,0.2)"/>
    <text x="100" y="356" text-anchor="middle" fill="#34d399" font-family="system-ui, sans-serif" font-size="9">data.synced</text>
    <text x="155" y="356" fill="#64748b" font-family="monospace" font-size="8">{"records": 42}</text>
    <text x="350" y="356" fill="#10b981" font-family="system-ui, sans-serif" font-size="8">✓ delivered</text>

    <rect x="60" y="369" width="80" height="20" rx="4" fill="rgba(239,68,68,0.2)"/>
    <text x="100" y="383" text-anchor="middle" fill="#f87171" font-family="system-ui, sans-serif" font-size="9">error.failed</text>
    <text x="155" y="383" fill="#64748b" font-family="monospace" font-size="8">{"code": 500}</text>
    <text x="350" y="383" fill="#64748b" font-family="system-ui, sans-serif" font-size="8">⟳ retrying...</text>

    <!-- Live indicator -->
    <circle cx="640" cy="305" r="4" fill="#10b981" filter="url(#glow3)">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="620" y="309" text-anchor="end" fill="#10b981" font-family="system-ui, sans-serif" font-size="9">LIVE</text>
  </g>

  <!-- Filters Panel -->
  <g filter="url(#cardShadow3)">
    <rect x="500" y="270" width="160" height="60" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
    <text x="520" y="290" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9">🔍 Filters</text>
    <rect x="520" y="298" width="120" height="24" rx="4" fill="rgba(139,92,246,0.1)" stroke="rgba(139,92,246,0.2)"/>
    <text x="580" y="314" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="8">type:* • from:1h</text>
  </g>
</svg>
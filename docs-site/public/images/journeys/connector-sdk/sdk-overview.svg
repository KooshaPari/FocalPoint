<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <rect width="800" height="400" fill="url(#grid)" opacity="0.5"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="24" font-weight="600">🔌 Connector SDK Architecture</text>

  <!-- Center SDK Card -->
  <g filter="url(#cardShadow)">
    <rect x="300" y="80" width="200" height="140" rx="16" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <rect x="300" y="80" width="200" height="40" rx="16" fill="url(#purpleGrad)" opacity="0.3"/>
    <rect x="300" y="100" width="200" height="20" fill="url(#purpleGrad)" opacity="0.3"/>
    <text x="400" y="108" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="14" font-weight="600">📦 Connector SDK</text>
    <text x="400" y="140" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">Core Framework</text>
    <text x="400" y="160" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">• EventEmitter</text>
    <text x="400" y="176" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">• OAuth Manager</text>
    <text x="400" y="192" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">• Marketplace API</text>
  </g>

  <!-- Left: OAuth Card -->
  <g filter="url(#cardShadow)">
    <rect x="40" y="120" width="160" height="120" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <rect x="40" y="120" width="160" height="36" rx="12" fill="url(#blueGrad)" opacity="0.2"/>
    <rect x="40" y="144" width="160" height="12" fill="url(#blueGrad)" opacity="0.2"/>
    <text x="120" y="144" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="13" font-weight="600">🔐 OAuth 2.0</text>
    <text x="120" y="175" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">Authorization Flow</text>
    <text x="120" y="195" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">Token Management</text>
    <text x="120" y="215" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">Scope Handling</text>
  </g>

  <!-- Right: Events Card -->
  <g filter="url(#cardShadow)">
    <rect x="600" y="120" width="160" height="120" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <rect x="600" y="120" width="160" height="36" rx="12" fill="url(#greenGrad)" opacity="0.2"/>
    <rect x="600" y="144" width="160" height="12" fill="url(#greenGrad)" opacity="0.2"/>
    <text x="680" y="144" text-anchor="middle" fill="#34d399" font-family="system-ui, sans-serif" font-size="13" font-weight="600">📡 Events</text>
    <text x="680" y="175" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">Real-time Webhooks</text>
    <text x="680" y="195" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">Pub/Sub System</text>
    <text x="680" y="215" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">Event Filtering</text>
  </g>

  <!-- Bottom: Marketplace Card -->
  <g filter="url(#cardShadow)">
    <rect x="240" y="280" width="320" height="90" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <rect x="240" y="280" width="320" height="36" rx="12" fill="url(#orangeGrad)" opacity="0.2"/>
    <rect x="240" y="304" width="320" height="12" fill="url(#orangeGrad)" opacity="0.2"/>
    <text x="400" y="304" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="13" font-weight="600">🛒 Marketplace</text>
    <text x="300" y="340" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">Publish</text>
    <text x="400" y="340" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">Discover</text>
    <text x="500" y="340" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">Install</text>
    <text x="300" y="358" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">List Connectors</text>
    <text x="400" y="358" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">Browse SDKs</text>
    <text x="500" y="358" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">1-Click Setup</text>
  </g>

  <!-- Connection Lines with glow -->
  <g filter="url(#glow)" opacity="0.8">
    <!-- OAuth to SDK -->
    <path d="M 200 180 Q 250 150 300 150" fill="none" stroke="url(#blueGrad)" stroke-width="2" stroke-dasharray="4,4"/>
    <!-- SDK to Events -->
    <path d="M 500 150 Q 550 150 600 180" fill="none" stroke="url(#greenGrad)" stroke-width="2" stroke-dasharray="4,4"/>
    <!-- SDK to Marketplace -->
    <path d="M 400 220 L 400 280" fill="none" stroke="url(#orangeGrad)" stroke-width="2" stroke-dasharray="4,4"/>
  </g>

  <!-- Flow arrows -->
  <polygon points="295,148 305,150 295,152" fill="#60a5fa"/>
  <polygon points="605,178 595,180 605,182" fill="#34d399"/>
  <circle cx="400" cy="245" r="4" fill="#fbbf24"/>

  <!-- Bottom stats bar -->
  <rect x="40" y="370" width="720" height="1" fill="rgba(255,255,255,0.1)"/>
  <text x="80" y="388" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">v2.4.0</text>
  <text x="160" y="388" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">•</text>
  <text x="180" y="388" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">TypeScript</text>
  <text x="260" y="388" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">•</text>
  <text x="280" y="388" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">Node.js 18+</text>
  <text x="720" y="388" text-anchor="end" fill="#8b5cf6" font-family="system-ui, sans-serif" font-size="10">MIT License</text>
</svg>
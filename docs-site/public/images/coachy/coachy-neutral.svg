<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Coachy mascot - Neutral expression">
  <title>Coachy - Neutral</title>
  <desc>A warm, friendly coaching assistant mascot with a calm, welcoming expression</desc>

  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FF9500" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00C7BE" stop-opacity="0.05"/>
    </radialGradient>

    <!-- Body gradient - liquid glass effect -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFB84D"/>
      <stop offset="40%" stop-color="#FF9500"/>
      <stop offset="100%" stop-color="#FF6B00"/>
    </linearGradient>

    <!-- Glass highlight -->
    <linearGradient id="glassHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Teal accent gradient -->
    <linearGradient id="tealAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C7BE"/>
      <stop offset="100%" stop-color="#0A84FF"/>
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#FF6B00" flood-opacity="0.3"/>
    </filter>

    <!-- Inner glow -->
    <filter id="innerGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Eye gradient -->
    <radialGradient id="eyeGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#0055CC"/>
    </radialGradient>
  </defs>

  <!-- Background glow -->
  <ellipse cx="64" cy="68" rx="50" ry="45" fill="url(#bgGlow)"/>

  <!-- Main body - rounded blob shape -->
  <g filter="url(#softShadow)">
    <!-- Body base -->
    <path d="M64 20
             C90 20 108 35 108 58
             C108 85 90 105 64 105
             C38 105 20 85 20 58
             C20 35 38 20 64 20Z"
          fill="url(#bodyGrad)"/>

    <!-- Glass overlay -->
    <path d="M64 20
             C90 20 108 35 108 58
             C108 85 90 105 64 105
             C38 105 20 85 20 58
             C20 35 38 20 64 20Z"
          fill="url(#glassHighlight)"/>
  </g>

  <!-- Teal accent ring -->
  <ellipse cx="64" cy="60" rx="38" ry="35" fill="none" stroke="url(#tealAccent)" stroke-width="3" stroke-opacity="0.5"/>

  <!-- Eyes - calm, welcoming -->
  <g filter="url(#innerGlow)">
    <!-- Left eye -->
    <ellipse cx="48" cy="52" rx="8" ry="9" fill="url(#eyeGrad)"/>
    <ellipse cx="46" cy="50" rx="3" ry="3.5" fill="#FFFFFF" fill-opacity="0.8"/>

    <!-- Right eye -->
    <ellipse cx="80" cy="52" rx="8" ry="9" fill="url(#eyeGrad)"/>
    <ellipse cx="78" cy="50" rx="3" ry="3.5" fill="#FFFFFF" fill-opacity="0.8"/>
  </g>

  <!-- Eyebrows - neutral, relaxed -->
  <path d="M40 42 Q48 40 56 43" stroke="#CC5500" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M72 43 Q80 40 88 42" stroke="#CC5500" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Mouth - gentle smile -->
  <path d="M50 72 Q64 80 78 72" stroke="#CC5500" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Cheek blush -->
  <ellipse cx="36" cy="65" rx="8" ry="5" fill="#FF6B00" fill-opacity="0.3"/>
  <ellipse cx="92" cy="65" rx="8" ry="5" fill="#FF6B00" fill-opacity="0.3"/>

  <!-- Top highlight - glass reflection -->
  <path d="M40 28 Q64 22 88 30 Q70 25 50 28 Z" fill="#FFFFFF" fill-opacity="0.5"/>

  <!-- Small decorative elements -->
  <circle cx="30" cy="45" r="3" fill="#00C7BE" fill-opacity="0.4"/>
  <circle cx="98" cy="50" r="2" fill="#0A84FF" fill-opacity="0.4"/>
</svg>

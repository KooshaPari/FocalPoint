<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Coachy mascot - Celebrating expression">
  <title>Coachy - Celebrating</title>
  <desc>A warm, friendly coaching assistant mascot overjoyed and in party mode</desc>

  <defs>
    <!-- Background gradient - party atmosphere -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#FF9500" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#00C7BE" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0A84FF" stop-opacity="0.08"/>
    </radialGradient>

    <!-- Body gradient - vibrant celebration -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFBF60"/>
      <stop offset="35%" stop-color="#FF9500"/>
      <stop offset="100%" stop-color="#FF6B00"/>
    </linearGradient>

    <!-- Glass highlight - extra sparkle -->
    <linearGradient id="glassHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Teal accent gradient -->
    <linearGradient id="tealAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C7BE"/>
      <stop offset="100%" stop-color="#0A84FF"/>
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#FF6B00" flood-opacity="0.4"/>
    </filter>

    <!-- Eye gradient -->
    <radialGradient id="eyeGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#0055CC"/>
    </radialGradient>

    <!-- Confetti gradient -->
    <linearGradient id="confetti1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF9500"/>
      <stop offset="100%" stop-color="#FF6B00"/>
    </linearGradient>
  </defs>

  <!-- Background glow - larger for celebration -->
  <ellipse cx="64" cy="68" rx="55" ry="50" fill="url(#bgGlow)"/>

  <!-- Main body -->
  <g filter="url(#softShadow)">
    <path d="M64 16
             C94 16 112 33 112 58
             C112 88 94 109 64 109
             C34 109 16 88 16 58
             C16 33 34 16 64 16Z"
          fill="url(#bodyGrad)"/>
    <path d="M64 16
             C94 16 112 33 112 58
             C112 88 94 109 64 109
             C34 109 16 88 16 58
             C16 33 34 16 64 16Z"
          fill="url(#glassHighlight)"/>
  </g>

  <!-- Teal accent ring - animated feel -->
  <ellipse cx="64" cy="60" rx="42" ry="39" fill="none" stroke="url(#tealAccent)" stroke-width="3.5" stroke-opacity="0.7"/>

  <!-- Eyes - super happy, closed with joy -->
  <g>
    <!-- Left eye - happy arc -->
    <path d="M38 52 Q48 42 58 52" stroke="url(#eyeGrad)" stroke-width="6" stroke-linecap="round" fill="none"/>
    <ellipse cx="42" cy="50" rx="2.5" ry="2.5" fill="#FFFFFF" fill-opacity="0.9"/>

    <!-- Right eye - happy arc -->
    <path d="M70 52 Q80 42 90 52" stroke="url(#eyeGrad)" stroke-width="6" stroke-linecap="round" fill="none"/>
    <ellipse cx="86" cy="50" rx="2.5" ry="2.5" fill="#FFFFFF" fill-opacity="0.9"/>
  </g>

  <!-- Eyebrows - raised high with excitement -->
  <path d="M36 38 Q48 32 60 38" stroke="#CC5500" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M68 38 Q80 32 92 38" stroke="#CC5500" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Big open joyful smile -->
  <path d="M42 68 Q64 92 86 68" stroke="#CC5500" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M44 70 Q64 88 84 70" fill="#FFFFFF" fill-opacity="0.35"/>

  <!-- Rosy excited cheeks -->
  <ellipse cx="32" cy="62" rx="11" ry="7" fill="#FF6B00" fill-opacity="0.45"/>
  <ellipse cx="96" cy="62" rx="11" ry="7" fill="#FF6B00" fill-opacity="0.45"/>

  <!-- Top highlight - extra bright -->
  <path d="M36 24 Q64 14 92 26 Q70 18 48 24 Z" fill="#FFFFFF" fill-opacity="0.7"/>

  <!-- Party hat -->
  <g transform="translate(64, 8)">
    <polygon points="0,12 -12,22 12,22" fill="url(#tealAccent)"/>
    <circle cx="0" cy="8" r="4" fill="#FF9500"/>
    <line x1="-8" y1="17" x2="8" y2="17" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.5"/>
  </g>

  <!-- Confetti and sparkles -->
  <g>
    <!-- Orange confetti -->
    <rect x="18" y="28" width="6" height="6" rx="1" fill="#FF9500" transform="rotate(25 21 31)"/>
    <rect x="102" y="35" width="5" height="5" rx="1" fill="#FF6B00" transform="rotate(-15 104 37)"/>

    <!-- Teal confetti -->
    <rect x="28" y="15" width="5" height="5" rx="1" fill="#00C7BE" transform="rotate(40 30 17)"/>
    <rect x="95" y="22" width="4" height="4" rx="1" fill="#0A84FF" transform="rotate(-30 97 24)"/>

    <!-- Blue confetti -->
    <circle cx="15" cy="50" r="3" fill="#0A84FF" fill-opacity="0.7"/>
    <circle cx="110" cy="55" r="2.5" fill="#00C7BE" fill-opacity="0.7"/>

    <!-- Sparkles -->
    <path d="M25 42 L27 46 L31 46 L28 49 L29 53 L25 50 L21 53 L22 49 L19 46 L23 46 Z" fill="#FFFFFF" fill-opacity="0.6"/>
    <path d="M100 45 L102 48 L105 48 L103 50 L104 53 L100 51 L96 53 L97 50 L95 48 L98 48 Z" fill="#FFFFFF" fill-opacity="0.5"/>
    <circle cx="108" cy="30" r="2" fill="#FF9500" fill-opacity="0.7"/>
    <circle cx="20" cy="38" r="1.5" fill="#00C7BE" fill-opacity="0.6"/>

    <!-- Streamers -->
    <path d="M12 35 Q8 45 14 55" stroke="#FF9500" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M116 40 Q120 50 114 60" stroke="#00C7BE" stroke-width="2" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Small stars -->
  <g fill="#FFFFFF" fill-opacity="0.4">
    <polygon points="105,68 106.5,71 110,71 107.5,73 108.5,77 105,75 101.5,77 102.5,73 100,71 103.5,71"/>
    <polygon points="22,72 23.5,75 27,75 24.5,77 25.5,81 22,79 18.5,81 19.5,77 17,75 20.5,75"/>
  </g>
</svg>

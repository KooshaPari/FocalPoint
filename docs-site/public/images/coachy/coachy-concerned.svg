<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Coachy mascot - Concerned expression">
  <title>Coachy - Concerned</title>
  <desc>A warm, friendly coaching assistant mascot with a thoughtful, slightly worried expression</desc>

  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#00C7BE" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0A84FF" stop-opacity="0.08"/>
    </radialGradient>

    <!-- Body gradient - slightly cooler tone for concern -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFB84D"/>
      <stop offset="40%" stop-color="#FF9500"/>
      <stop offset="100%" stop-color="#E65C00"/>
    </linearGradient>

    <!-- Glass highlight -->
    <linearGradient id="glassHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Teal accent gradient -->
    <linearGradient id="tealAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C7BE"/>
      <stop offset="100%" stop-color="#0A84FF"/>
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#FF6B00" flood-opacity="0.25"/>
    </filter>

    <!-- Eye gradient -->
    <radialGradient id="eyeGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#0055CC"/>
    </radialGradient>
  </defs>

  <!-- Background glow - slightly cooler -->
  <ellipse cx="64" cy="68" rx="50" ry="45" fill="url(#bgGlow)"/>

  <!-- Main body -->
  <g filter="url(#softShadow)">
    <path d="M64 22
             C88 22 106 36 106 58
             C106 84 88 104 64 104
             C40 104 22 84 22 58
             C22 36 40 22 64 22Z"
          fill="url(#bodyGrad)"/>
    <path d="M64 22
             C88 22 106 36 106 58
             C106 84 88 104 64 104
             C40 104 22 84 22 58
             C22 36 40 22 64 22Z"
          fill="url(#glassHighlight)"/>
  </g>

  <!-- Teal accent ring -->
  <ellipse cx="64" cy="60" rx="38" ry="35" fill="none" stroke="url(#tealAccent)" stroke-width="3" stroke-opacity="0.5"/>

  <!-- Eyes - larger, looking up with worry -->
  <g>
    <!-- Left eye - wide, concerned -->
    <ellipse cx="48" cy="50" rx="9" ry="10" fill="url(#eyeGrad)"/>
    <ellipse cx="46" cy="47" rx="3.5" ry="4" fill="#FFFFFF" fill-opacity="0.85"/>
    <ellipse cx="48" cy="52" rx="2" ry="2" fill="#001133" fill-opacity="0.5"/>

    <!-- Right eye - wide, concerned -->
    <ellipse cx="80" cy="50" rx="9" ry="10" fill="url(#eyeGrad)"/>
    <ellipse cx="78" cy="47" rx="3.5" ry="4" fill="#FFFFFF" fill-opacity="0.85"/>
    <ellipse cx="80" cy="52" rx="2" ry="2" fill="#001133" fill-opacity="0.5"/>
  </g>

  <!-- Eyebrows - furrowed inward -->
  <path d="M38 38 Q48 42 58 40" stroke="#CC5500" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M70 40 Q80 42 90 38" stroke="#CC5500" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Mouth - slight frown, uncertain -->
  <path d="M48 76 Q56 72 64 74 Q72 72 80 76" stroke="#CC5500" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Sweat drop - subtle worry indicator -->
  <path d="M100 35 Q103 30 100 25 Q97 30 100 35" fill="#00C7BE" fill-opacity="0.6"/>

  <!-- Softer cheek blush -->
  <ellipse cx="34" cy="62" rx="8" ry="5" fill="#FF6B00" fill-opacity="0.2"/>
  <ellipse cx="94" cy="62" rx="8" ry="5" fill="#FF6B00" fill-opacity="0.2"/>

  <!-- Top highlight -->
  <path d="M40 30 Q64 24 88 32 Q70 26 50 30 Z" fill="#FFFFFF" fill-opacity="0.5"/>

  <!-- Thought bubble - small -->
  <circle cx="98" cy="25" r="4" fill="#FFFFFF" fill-opacity="0.4"/>
  <circle cx="105" cy="18" r="2.5" fill="#FFFFFF" fill-opacity="0.3"/>
</svg>

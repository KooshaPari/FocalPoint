<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Coachy mascot - Happy expression">
  <title>Coachy - Happy</title>
  <desc>A warm, friendly coaching assistant mascot with a big smile, excited expression</desc>

  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FF9500" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0.1"/>
    </radialGradient>

    <!-- Body gradient - liquid glass effect -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFB84D"/>
      <stop offset="40%" stop-color="#FF9500"/>
      <stop offset="100%" stop-color="#FF6B00"/>
    </linearGradient>

    <!-- Glass highlight -->
    <linearGradient id="glassHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Teal accent gradient -->
    <linearGradient id="tealAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C7BE"/>
      <stop offset="100%" stop-color="#0A84FF"/>
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#FF6B00" flood-opacity="0.35"/>
    </filter>

    <!-- Eye gradient -->
    <radialGradient id="eyeGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#0055CC"/>
    </radialGradient>
  </defs>

  <!-- Background glow -->
  <ellipse cx="64" cy="68" rx="52" ry="48" fill="url(#bgGlow)"/>

  <!-- Main body -->
  <g filter="url(#softShadow)">
    <path d="M64 18
             C92 18 110 34 110 58
             C110 87 92 107 64 107
             C36 107 18 87 18 58
             C18 34 36 18 64 18Z"
          fill="url(#bodyGrad)"/>
    <path d="M64 18
             C92 18 110 34 110 58
             C110 87 92 107 64 107
             C36 107 18 87 18 58
             C18 34 36 18 64 18Z"
          fill="url(#glassHighlight)"/>
  </g>

  <!-- Teal accent ring -->
  <ellipse cx="64" cy="60" rx="40" ry="37" fill="none" stroke="url(#tealAccent)" stroke-width="3" stroke-opacity="0.6"/>

  <!-- Eyes - squinted with joy -->
  <g>
    <!-- Left eye - happy squint -->
    <path d="M40 54 Q48 48 56 54" stroke="url(#eyeGrad)" stroke-width="5" stroke-linecap="round" fill="none"/>
    <ellipse cx="43" cy="52" rx="2" ry="2" fill="#FFFFFF" fill-opacity="0.9"/>

    <!-- Right eye - happy squint -->
    <path d="M72 54 Q80 48 88 54" stroke="url(#eyeGrad)" stroke-width="5" stroke-linecap="round" fill="none"/>
    <ellipse cx="85" cy="52" rx="2" ry="2" fill="#FFFFFF" fill-opacity="0.9"/>
  </g>

  <!-- Eyebrows - raised with excitement -->
  <path d="M38 40 Q48 36 58 40" stroke="#CC5500" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M70 40 Q80 36 90 40" stroke="#CC5500" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Big open smile -->
  <path d="M44 70 Q64 90 84 70" stroke="#CC5500" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M46 72 Q64 88 82 72" fill="#FFFFFF" fill-opacity="0.3"/>

  <!-- Rosy cheeks - more prominent -->
  <ellipse cx="34" cy="64" rx="10" ry="6" fill="#FF6B00" fill-opacity="0.4"/>
  <ellipse cx="94" cy="64" rx="10" ry="6" fill="#FF6B00" fill-opacity="0.4"/>

  <!-- Top highlight -->
  <path d="M38 26 Q64 18 90 28 Q70 22 48 26 Z" fill="#FFFFFF" fill-opacity="0.6"/>

  <!-- Sparkle effects -->
  <g fill="#FFFFFF">
    <path d="M25 35 L27 38 L25 41 L23 38 Z" fill-opacity="0.7"/>
    <path d="M103 40 L105 43 L103 46 L101 43 Z" fill-opacity="0.6"/>
    <circle cx="108" cy="28" r="2" fill-opacity="0.5"/>
    <circle cx="20" cy="55" r="1.5" fill-opacity="0.4"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Coachy mascot - Encouraging expression">
  <title>Coachy - Encouraging</title>
  <desc>A warm, friendly coaching assistant mascot with a determined, supportive expression</desc>

  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FF9500" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00C7BE" stop-opacity="0.1"/>
    </radialGradient>

    <!-- Body gradient - vibrant, energetic -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFB84D"/>
      <stop offset="35%" stop-color="#FF9500"/>
      <stop offset="100%" stop-color="#FF6B00"/>
    </linearGradient>

    <!-- Glass highlight -->
    <linearGradient id="glassHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.65"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Teal accent gradient -->
    <linearGradient id="tealAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C7BE"/>
      <stop offset="100%" stop-color="#0A84FF"/>
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#FF6B00" flood-opacity="0.35"/>
    </filter>

    <!-- Eye gradient -->
    <radialGradient id="eyeGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#0055CC"/>
    </radialGradient>

    <!-- Determined gradient for eyebrows -->
    <linearGradient id="browGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E65C00"/>
      <stop offset="100%" stop-color="#CC5500"/>
    </linearGradient>
  </defs>

  <!-- Background glow -->
  <ellipse cx="64" cy="68" rx="52" ry="48" fill="url(#bgGlow)"/>

  <!-- Main body -->
  <g filter="url(#softShadow)">
    <path d="M64 18
             C92 18 110 34 110 58
             C110 87 92 107 64 107
             C36 107 18 87 18 58
             C18 34 36 18 64 18Z"
          fill="url(#bodyGrad)"/>
    <path d="M64 18
             C92 18 110 34 110 58
             C110 87 92 107 64 107
             C36 107 18 87 18 58
             C18 34 36 18 64 18Z"
          fill="url(#glassHighlight)"/>
  </g>

  <!-- Teal accent ring -->
  <ellipse cx="64" cy="60" rx="40" ry="37" fill="none" stroke="url(#tealAccent)" stroke-width="3" stroke-opacity="0.6"/>

  <!-- Eyes - focused, determined -->
  <g>
    <!-- Left eye - slightly narrowed -->
    <ellipse cx="48" cy="52" rx="8" ry="8" fill="url(#eyeGrad)"/>
    <ellipse cx="46" cy="50" rx="3" ry="3" fill="#FFFFFF" fill-opacity="0.85"/>
    <path d="M42 55 L54 55" stroke="#001133" stroke-width="1.5" stroke-opacity="0.3"/>

    <!-- Right eye - slightly narrowed -->
    <ellipse cx="80" cy="52" rx="8" ry="8" fill="url(#eyeGrad)"/>
    <ellipse cx="78" cy="50" rx="3" ry="3" fill="#FFFFFF" fill-opacity="0.85"/>
    <path d="M74 55 L86 55" stroke="#001133" stroke-width="1.5" stroke-opacity="0.3"/>
  </g>

  <!-- Eyebrows - determined, angled up -->
  <path d="M36 40 L58 44" stroke="url(#browGrad)" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M70 44 L92 40" stroke="url(#browGrad)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Mouth - confident smile -->
  <path d="M46 70 Q64 84 82 70" stroke="#CC5500" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M50 72 Q64 80 78 72" fill="#FFFFFF" fill-opacity="0.25"/>

  <!-- Cheek blush - warm -->
  <ellipse cx="34" cy="62" rx="9" ry="6" fill="#FF6B00" fill-opacity="0.35"/>
  <ellipse cx="94" cy="62" rx="9" ry="6" fill="#FF6B00" fill-opacity="0.35"/>

  <!-- Top highlight -->
  <path d="M38 26 Q64 18 90 28 Q70 22 48 26 Z" fill="#FFFFFF" fill-opacity="0.6"/>

  <!-- Upward arrow - encouragement symbol -->
  <g transform="translate(15, 75)">
    <path d="M8 0 L8 12 M0 4 L8 0 L16 4" stroke="url(#tealAccent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Star sparkles - determination -->
  <g fill="#00C7BE">
    <path d="M105 30 L107 34 L111 34 L108 37 L109 41 L105 38 L101 41 L102 37 L99 34 L103 34 Z" fill-opacity="0.6"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <!-- Gradients -->
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B3D;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0A9396;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F5F5F5"/>
    </linearGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B3D"/>
      <stop offset="100%" style="stop-color:#E85A30"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A9396"/>
      <stop offset="100%" style="stop-color:#08858A"/>
    </linearGradient>

    <!-- Shadows -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#heroGradient)" rx="16"/>

  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="120" fill="#FF6B3D" fill-opacity="0.05"/>
  <circle cx="750" cy="350" r="150" fill="#0A9396" fill-opacity="0.08"/>
  <circle cx="700" cy="80" r="60" fill="#FF6B3D" fill-opacity="0.06"/>

  <!-- FocalPoint Logo/Icon (top left) -->
  <g transform="translate(40, 30)">
    <circle cx="24" cy="24" r="20" fill="url(#primaryGrad)"/>
    <circle cx="24" cy="24" r="12" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
    <circle cx="24" cy="24" r="5" fill="#FFFFFF"/>
    <text x="52" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#1A1A1A">FocalPoint</text>
    <text x="52" y="38" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#666666">Journeys</text>
  </g>

  <!-- Focus rings decoration (top right) -->
  <g transform="translate(680, 60)">
    <circle cx="0" cy="0" r="35" fill="none" stroke="#FF6B3D" stroke-width="1" stroke-opacity="0.3"/>
    <circle cx="0" cy="0" r="25" fill="none" stroke="#FF6B3D" stroke-width="1.5" stroke-opacity="0.5"/>
    <circle cx="0" cy="0" r="15" fill="none" stroke="#FF6B3D" stroke-width="2" stroke-opacity="0.7"/>
    <circle cx="0" cy="0" r="6" fill="#FF6B3D"/>
  </g>

  <!-- Three Personas Section (center) -->
  <g transform="translate(180, 140)">
    <!-- Alice Card -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="120" height="160" rx="12" fill="url(#cardGradient)" filter="url(#shadow)"/>
      <circle cx="60" cy="45" r="28" fill="#FFE4DE"/>
      <circle cx="60" cy="45" r="20" fill="#FF6B3D"/>
      <text x="60" y="52" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">A</text>
      <text x="60" y="90" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Alice</text>
      <text x="60" y="106" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#666666" text-anchor="middle">Early Bird</text>
      <rect x="20" y="118" width="80" height="6" rx="3" fill="#E0E0E0"/>
      <rect x="20" y="118" width="55" height="6" rx="3" fill="#FF6B3D"/>
      <text x="60" y="148" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#666666" text-anchor="middle">6:00 AM Focus</text>
    </g>

    <!-- Bob Card -->
    <g transform="translate(140, 0)">
      <rect x="0" y="0" width="120" height="160" rx="12" fill="url(#cardGradient)" filter="url(#shadow)"/>
      <circle cx="60" cy="45" r="28" fill="#D4F0F0"/>
      <circle cx="60" cy="45" r="20" fill="#0A9396"/>
      <text x="60" y="52" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">B</text>
      <text x="60" y="90" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Bob</text>
      <text x="60" y="106" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#666666" text-anchor="middle">Deep Worker</text>
      <rect x="20" y="118" width="80" height="6" rx="3" fill="#E0E0E0"/>
      <rect x="20" y="118" width="70" height="6" rx="3" fill="#0A9396"/>
      <text x="60" y="148" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#666666" text-anchor="middle">9:00 AM Sprint</text>
    </g>

    <!-- Carol Card -->
    <g transform="translate(280, 0)">
      <rect x="0" y="0" width="120" height="160" rx="12" fill="url(#cardGradient)" filter="url(#shadow)"/>
      <circle cx="60" cy="45" r="28" fill="#FDE8D8"/>
      <circle cx="60" cy="45" r="20" fill="#E8A87C"/>
      <text x="60" y="52" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">C</text>
      <text x="60" y="90" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Carol</text>
      <text x="60" y="106" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#666666" text-anchor="middle">Night Owl</text>
      <rect x="20" y="118" width="80" height="6" rx="3" fill="#E0E0E0"/>
      <rect x="20" y="118" width="40" height="6" rx="3" fill="#E8A87C"/>
      <text x="60" y="148" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#666666" text-anchor="middle">10:00 PM Flow</text>
    </g>
  </g>

  <!-- Connectors Section (bottom left) -->
  <g transform="translate(50, 320)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="500" fill="#666666">CONNECTORS</text>

    <!-- Canvas -->
    <g transform="translate(0, 15)">
      <rect x="0" y="0" width="44" height="44" rx="10" fill="#FFFFFF" filter="url(#shadow)"/>
      <rect x="10" y="10" width="24" height="24" rx="4" fill="#EA5F2A"/>
      <text x="22" y="27" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" font-weight="700" fill="#FFFFFF" text-anchor="middle">C</text>
    </g>

    <!-- GitHub -->
    <g transform="translate(54, 15)">
      <rect x="0" y="0" width="44" height="44" rx="10" fill="#FFFFFF" filter="url(#shadow)"/>
      <path d="M22 12c-5.5 0-10 4.5-10 10 0 4.4 2.9 8.2 6.8 9.5.5.1.7-.2.7-.5v-1.7c-2.8.6-3.4-1.4-3.4-1.4-.5-1.1-1.1-1.5-1.1-1.5-.9-.6.1-.6.1-.6 1 .1 1.5 1 1.5 1 .9 1.5 2.3 1.1 2.9.8.1-.6.3-1.1.6-1.3-2.2-.3-4.6-1.1-4.6-5 0-1.1.4-2 .9-2.7-.1-.2-.4-1.3.1-2.6 0 0 .8-.2 2.6.9.7-.2 1.5-.3 2.3-.3.8 0 1.6.1 2.3.3 1.8-1.1 2.6-.9 2.6-.9.5 1.3.2 2.4.1 2.6.6.7 1 1.6 1 2.7 0 3.9-2.3 4.7-4.6 5 .4.3.7 1 .7 2v2.9c0 .3.2.6.7.5 4-1.3 6.8-5.1 6.8-9.5 0-5.5-4.5-10-10-10z" fill="#24292E"/>
    </g>

    <!-- Todoist -->
    <g transform="translate(108, 15)">
      <rect x="0" y="0" width="44" height="44" rx="10" fill="#FFFFFF" filter="url(#shadow)"/>
      <circle cx="22" cy="22" r="12" fill="#E44332"/>
      <path d="M16 22l4 4 8-8" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  </g>

  <!-- Coachy Mascot (right side) -->
  <g transform="translate(580, 100)">
    <!-- Body -->
    <ellipse cx="80" cy="200" rx="60" ry="80" fill="url(#tealGrad)" opacity="0.1"/>

    <!-- Coachy character -->
    <g transform="translate(40, 80)">
      <!-- Face -->
      <circle cx="40" cy="50" r="45" fill="#0A9396"/>
      <circle cx="40" cy="50" r="40" fill="#FFFFFF"/>

      <!-- Eyes -->
      <ellipse cx="28" cy="42" rx="8" ry="10" fill="#1A1A1A"/>
      <ellipse cx="52" cy="42" rx="8" ry="10" fill="#1A1A1A"/>
      <circle cx="30" cy="40" r="3" fill="#FFFFFF"/>
      <circle cx="54" cy="40" r="3" fill="#FFFFFF"/>

      <!-- Cheeks -->
      <ellipse cx="15" cy="55" rx="6" ry="4" fill="#FF6B3D" fill-opacity="0.4"/>
      <ellipse cx="65" cy="55" rx="6" ry="4" fill="#FF6B3D" fill-opacity="0.4"/>

      <!-- Smile -->
      <path d="M25 62 Q40 75 55 62" stroke="#1A1A1A" stroke-width="3" stroke-linecap="round" fill="none"/>

      <!-- Body -->
      <ellipse cx="40" cy="130" rx="35" ry="40" fill="url(#tealGrad)"/>

      <!-- Graduation cap -->
      <rect x="15" y="5" width="50" height="8" rx="2" fill="#1A1A1A"/>
      <path d="M40 0 L60 10 L40 15 L20 10 Z" fill="#1A1A1A"/>
      <circle cx="40" cy="10" r="3" fill="#FF6B3D"/>

      <!-- Arms raised in celebration -->
      <path d="M5 100 Q-10 70 15 50" stroke="#0A9396" stroke-width="12" stroke-linecap="round" fill="none"/>
      <path d="M75 100 Q90 70 65 50" stroke="#0A9396" stroke-width="12" stroke-linecap="round" fill="none"/>
    </g>

    <!-- Speech bubble -->
    <g transform="translate(100, 20)">
      <path d="M0 20 Q0 0 20 0 L60 0 Q80 0 80 20 L80 40 Q80 60 60 60 L30 60 L15 75 L20 60 L20 60 Q0 60 0 40 Z" fill="#FFFFFF" filter="url(#shadow)"/>
      <text x="40" y="38" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Let's focus!</text>
    </g>
  </g>

  <!-- Focus productivity metaphor (bottom right) -->
  <g transform="translate(620, 320)">
    <rect x="0" y="0" width="150" height="50" rx="10" fill="#FFFFFF" filter="url(#shadow)"/>
    <circle cx="25" cy="25" r="15" fill="#FF6B3D"/>
    <path d="M19 25 L23 29 L31 21" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="50" y="22" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="600" fill="#1A1A1A">Productivity</text>
    <text x="50" y="36" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#666666">+40% this week</text>
  </g>
</svg>
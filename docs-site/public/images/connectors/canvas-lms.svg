<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="canvas-title canvas-desc">
  <title id="canvas-title">Canvas LMS</title>
  <desc id="canvas-desc">Canvas Learning Management System logo - stylized wave representing learning flow</desc>

  <defs>
    <!-- Primary gradient - coral to warm red -->
    <linearGradient id="canvasGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3B30"/>
      <stop offset="50%" stop-color="#FF5252"/>
      <stop offset="100%" stop-color="#FF6B6B"/>
    </linearGradient>

    <!-- Subtle highlight gradient -->
    <linearGradient id="canvasHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF5A5A"/>
      <stop offset="100%" stop-color="#E53232"/>
    </linearGradient>

    <!-- Soft shadow filter -->
    <filter id="canvasShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#FF3B30" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background circle (optional, subtle) -->
  <circle cx="32" cy="32" r="30" fill="#FFF5F5" opacity="0.5"/>

  <!-- Stylized wave representing the "C" for Canvas -->
  <g filter="url(#canvasShadow)">
    <!-- Main wave shape forming a stylized C -->
    <path d="M48 18
             C48 12, 42 8, 35 8
             C25 8, 16 14, 16 24
             C16 30, 18 35, 22 38
             C26 41, 31 43, 36 42
             C42 41, 47 37, 50 31
             C51 29, 51 27, 50 25
             L48 25
             C48 26, 47 27, 47 28
             C45 32, 41 35, 36 36
             C31 37, 27 35, 24 32
             C21 29, 20 25, 20 20
             C20 14, 24 10, 32 10
             C38 10, 43 13, 46 17
             L44 18
             C41 14, 37 12, 32 12
             C26 12, 23 15, 23 20
             C23 24, 25 27, 27 29
             C30 32, 34 33, 38 32
             C43 31, 47 27, 48 22
             L48 18Z"
          fill="url(#canvasGradient)"/>

    <!-- Wave continuation for depth -->
    <path d="M48 22
             C47 26, 43 30, 38 31
             C33 32, 29 30, 26 27
             C23 24, 22 20, 22 16
             L22 14
             C25 12, 29 10, 34 10
             C40 10, 46 14, 50 20
             L48 22Z"
          fill="url(#canvasHighlight)"
          opacity="0.6"/>

    <!-- Inner wave accent -->
    <path d="M40 16
             C38 14, 35 13, 31 13
             C27 13, 24 15, 24 19
             C24 22, 26 24, 29 25
             C32 26, 35 25, 37 23
             C39 21, 40 18, 40 16Z"
          fill="#FF7A7A"
          opacity="0.4"/>
  </g>

  <!-- Subtle dot accents representing connectivity -->
  <circle cx="14" cy="44" r="2" fill="#FF5252" opacity="0.3"/>
  <circle cx="18" cy="48" r="1.5" fill="#FF5252" opacity="0.25"/>
  <circle cx="10" cy="48" r="1" fill="#FF5252" opacity="0.2"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="apple-calendar-title apple-calendar-desc">
  <title id="apple-calendar-title">Apple Calendar</title>
  <desc id="apple-calendar-desc">Apple Calendar logo - stylized calendar grid with red accent</desc>

  <defs>
    <!-- Calendar body gradient -->
    <linearGradient id="calendarBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F5F7"/>
    </linearGradient>

    <!-- Header gradient (red) -->
    <linearGradient id="calendarHeader" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF3B30"/>
      <stop offset="50%" stop-color="#FF5252"/>
      <stop offset="100%" stop-color="#E53232"/>
    </linearGradient>

    <!-- Grid line gradient -->
    <linearGradient id="calendarGrid" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E5E5EA"/>
      <stop offset="100%" stop-color="#D1D1D6"/>
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="calendarShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.15"/>
    </filter>

    <!-- Inner highlight -->
    <filter id="calendarHighlight" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.5" result="blur"/>
      <feFlood flood-color="#FFFFFF" flood-opacity="0.8"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Subtle background -->
  <circle cx="32" cy="32" r="30" fill="#FFF5F5" opacity="0.4"/>

  <!-- Calendar body shadow -->
  <rect x="10" y="14" width="44" height="40" rx="6" ry="6"
        fill="#000000" opacity="0.1" transform="translate(1, 2)"/>

  <!-- Main calendar body -->
  <rect x="10" y="14" width="44" height="40" rx="6" ry="6"
        fill="url(#calendarBody)"
        filter="url(#calendarShadow)"
        stroke="#E5E5EA"
        stroke-width="0.5"/>

  <!-- Calendar header (red bar) -->
  <path d="M10 20
           C10 16.69, 12.69 14, 16 14
           L48 14
           C51.31 14, 54 16.69, 54 20
           L54 26
           L10 26
           L10 20Z"
        fill="url(#calendarHeader)"/>

  <!-- Header highlight -->
  <path d="M12 18
           C12 16, 14 15, 16 15
           L48 15
           C50 15, 52 16, 52 18
           L52 20
           C52 18, 50 17, 48 17
           L16 17
           C14 17, 12 18, 12 20
           Z"
        fill="#FFFFFF"
        opacity="0.2"/>

  <!-- Calendar rings/holes -->
  <g fill="#8E8E93">
    <ellipse cx="22" cy="14" rx="2.5" ry="1.5"/>
    <ellipse cx="32" cy="14" rx="2.5" ry="1.5"/>
    <ellipse cx="42" cy="14" rx="2.5" ry="1.5"/>
  </g>

  <!-- Ring highlights -->
  <g fill="#AEAEB2">
    <ellipse cx="22" cy="13.5" rx="1.5" ry="0.8"/>
    <ellipse cx="32" cy="13.5" rx="1.5" ry="0.8"/>
    <ellipse cx="42" cy="13.5" rx="1.5" ry="0.8"/>
  </g>

  <!-- Calendar grid lines -->
  <g stroke="url(#calendarGrid)" stroke-width="0.75" opacity="0.8">
    <!-- Horizontal lines -->
    <line x1="14" y1="34" x2="50" y2="34"/>
    <line x1="14" y1="42" x2="50" y2="42"/>
    <line x1="14" y1="50" x2="50" y2="50"/>

    <!-- Vertical lines -->
    <line x1="26" y1="30" x2="26" y2="50"/>
    <line x1="38" y1="30" x2="38" y2="50"/>
  </g>

  <!-- Highlight dots for grid cells (calendar feel) -->
  <g fill="#FF3B30" opacity="0.9">
    <!-- Today indicator - red dot -->
    <circle cx="44" cy="38" r="3" filter="url(#calendarHighlight)"/>
  </g>

  <!-- Other subtle dots -->
  <g fill="#C7C7CC">
    <circle cx="20" cy="38" r="2"/>
    <circle cx="32" cy="38" r="2"/>
    <circle cx="44" cy="46" r="2"/>
    <circle cx="20" cy="46" r="2"/>
    <circle cx="32" cy="46" r="2"/>
  </g>

  <!-- Header text placeholder lines -->
  <g fill="#FFFFFF" opacity="0.3">
    <rect x="16" y="18" width="8" height="4" rx="1"/>
    <rect x="40" y="18" width="8" height="4" rx="1"/>
  </g>

  <!-- Calendar corner accents -->
  <circle cx="54" cy="14" r="6" fill="#FF3B30" opacity="0.1"/>
</svg>

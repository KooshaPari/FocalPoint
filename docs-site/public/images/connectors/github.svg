<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="github-title github-desc">
  <title id="github-title">GitHub</title>
  <desc id="github-desc">GitHub logo - stylized Octocat cat silhouette</desc>

  <defs>
    <!-- GitHub dark gradient -->
    <linearGradient id="githubGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#24292F"/>
      <stop offset="100%" stop-color="#1B1F23"/>
    </linearGradient>

    <!-- Highlight gradient for depth -->
    <linearGradient id="githubHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3D444D"/>
      <stop offset="50%" stop-color="#24292F"/>
      <stop offset="100%" stop-color="#1B1F23"/>
    </linearGradient>

    <!-- Soft glow filter -->
    <filter id="githubGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>
      <feFlood flood-color="#24292F" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Subtle background circle -->
  <circle cx="32" cy="32" r="30" fill="#F6F8FA" opacity="0.8"/>

  <!-- Stylized Octocat silhouette -->
  <g filter="url(#githubGlow)" fill="url(#githubGradient)">
    <!-- Head -->
    <ellipse cx="32" cy="26" rx="14" ry="12"/>

    <!-- Left ear -->
    <path d="M20 22
             C18 18, 16 14, 18 10
             C20 12, 21 15, 22 18
             C22 19, 21 20, 20 22Z"/>

    <!-- Right ear -->
    <path d="M44 22
             C46 18, 48 14, 46 10
             C44 12, 43 15, 42 18
             C42 19, 43 20, 44 22Z"/>

    <!-- Face details - left eye -->
    <ellipse cx="27" cy="24" rx="2" ry="2.5" fill="#FFFFFF"/>

    <!-- Face details - right eye -->
    <ellipse cx="37" cy="24" rx="2" ry="2.5" fill="#FFFFFF"/>

    <!-- Inner ear left -->
    <path d="M19.5 19
             C19 16, 18 13, 19 11
             C20 13, 20.5 16, 21 18
             C20.5 18.5, 20 18.5, 19.5 19Z"
          fill="#6E7781" opacity="0.5"/>

    <!-- Inner ear right -->
    <path d="M44.5 19
             C45 16, 46 13, 45 11
             C44 13, 43.5 16, 43 18
             C43.5 18.5, 44 18.5, 44.5 19Z"
          fill="#6E7781" opacity="0.5"/>

    <!-- Body -->
    <ellipse cx="32" cy="46" rx="12" ry="10"/>

    <!-- Left arm -->
    <path d="M22 42
             C18 44, 14 46, 14 50
             C14 52, 16 52, 18 50
             C20 48, 22 46, 24 44
             C23 43, 22.5 42.5, 22 42Z"/>

    <!-- Right arm (waving) -->
    <path d="M42 40
             C46 38, 50 36, 52 38
             C52 40, 50 42, 48 42
             C46 42, 44 42, 42 42
             C42 41, 42 40.5, 42 40Z"/>

    <!-- Left leg -->
    <ellipse cx="26" cy="54" rx="4" ry="3" fill="url(#githubHighlight)"/>

    <!-- Right leg -->
    <ellipse cx="38" cy="54" rx="4" ry="3" fill="url(#githubHighlight)"/>

    <!-- Tail -->
    <path d="M44 48
             C48 50, 52 52, 52 48
             C52 46, 50 46, 50 48
             C50 50, 48 49, 46 48
             C45 47.5, 44.5 47.5, 44 48Z"/>
  </g>

  <!-- Face highlight -->
  <ellipse cx="32" cy="25" rx="8" ry="5" fill="#FFFFFF" opacity="0.15"/>
</svg>

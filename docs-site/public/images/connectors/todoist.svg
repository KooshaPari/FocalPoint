<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="todoist-title todoist-desc">
  <title id="todoist-title">Todoist</title>
  <desc id="todoist-desc">Todoist logo - green checkmark inside a circle</desc>

  <defs>
    <!-- Todoist signature green gradient -->
    <linearGradient id="todoistGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5E9B4C"/>
      <stop offset="50%" stop-color="#4A8B3C"/>
      <stop offset="100%" stop-color="#3D7A30"/>
    </linearGradient>

    <!-- Outer ring gradient -->
    <linearGradient id="todoistRing" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6AA94F"/>
      <stop offset="100%" stop-color="#4A8B3C"/>
    </linearGradient>

    <!-- Checkmark gradient -->
    <linearGradient id="todoistCheck" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8F5E3"/>
    </linearGradient>

    <!-- Soft shadow filter -->
    <filter id="todoistShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#4A8B3C" flood-opacity="0.3"/>
    </filter>

    <!-- Inner glow -->
    <filter id="todoistGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
      <feFlood flood-color="#FFFFFF" flood-opacity="0.5"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Subtle background -->
  <circle cx="32" cy="32" r="30" fill="#F0F7EC" opacity="0.6"/>

  <!-- Outer circle ring -->
  <circle cx="32" cy="32" r="26"
          fill="url(#todoistRing)"
          filter="url(#todoistShadow)"/>

  <!-- Inner circle (white background) -->
  <circle cx="32" cy="32" r="22" fill="#FFFFFF"/>

  <!-- Inner subtle green tint -->
  <circle cx="32" cy="32" r="22" fill="url(#todoistGradient)" opacity="0.08"/>

  <!-- Checkmark path -->
  <g filter="url(#todoistGlow)">
    <path d="M22 33
             L29 40
             L44 25
             L42 23
             L29 36
             L24 31
             L22 33Z"
          fill="url(#todoistGradient)"
          stroke="#4A8B3C"
          stroke-width="1"
          stroke-linejoin="round"/>
  </g>

  <!-- Checkmark highlight -->
  <path d="M23 33
           L29 39
           L38 28"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.6"/>

  <!-- Subtle accent dots -->
  <circle cx="14" cy="46" r="1.5" fill="#5E9B4C" opacity="0.25"/>
  <circle cx="10" cy="42" r="1" fill="#5E9B4C" opacity="0.2"/>
  <circle cx="50" cy="18" r="1.5" fill="#5E9B4C" opacity="0.25"/>
  <circle cx="54" cy="22" r="1" fill="#5E9B4C" opacity="0.2"/>
</svg>

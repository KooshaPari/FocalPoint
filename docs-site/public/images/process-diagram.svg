<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAFAFA"/>
      <stop offset="100%" style="stop-color:#F0F4F5"/>
    </linearGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B3D"/>
      <stop offset="100%" style="stop-color:#E85A30"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A9396"/>
      <stop offset="100%" style="stop-color:#08858A"/>
    </linearGradient>
    <linearGradient id="successGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D7D6B"/>
      <stop offset="100%" style="stop-color:#246B5A"/>
    </linearGradient>

    <!-- Shadows -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="300" y="45" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#1A1A1A" text-anchor="middle">Journey Recording Process</text>
  <text x="300" y="65" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#666666" text-anchor="middle">From raw screen capture to documented journey</text>

  <!-- Process Flow - Row 1: Record → Extract -->
  <g transform="translate(60, 110)">
    <!-- Step 1: Record -->
    <g>
      <rect x="0" y="0" width="140" height="120" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
      <rect x="0" y="0" width="140" height="40" rx="16" fill="url(#primaryGrad)"/>
      <rect x="0" y="20" width="140" height="20" fill="url(#primaryGrad)"/>
      <circle cx="70" cy="20" r="12" fill="#FFFFFF"/>
      <circle cx="70" cy="20" r="5" fill="#FF6B3D"/>

      <text x="70" y="65" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Record</text>

      <!-- XCTest icon -->
      <g transform="translate(45, 75)">
        <rect x="0" y="0" width="50" height="35" rx="4" fill="#F5F5F5"/>
        <rect x="5" y="5" width="40" height="8" rx="2" fill="#E0E0E0"/>
        <rect x="5" y="17" width="30" height="8" rx="2" fill="#E0E0E0"/>
        <circle cx="42" cy="21" r="3" fill="#FF6B3D"/>
      </g>

      <text x="70" y="118" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#999999" text-anchor="middle">XCTest / ScreenCaptureKit</text>
    </g>

    <!-- Arrow 1 -->
    <g transform="translate(150, 50)">
      <path d="M0 10 L30 10" stroke="#FF6B3D" stroke-width="3" stroke-linecap="round"/>
      <path d="M25 5 L35 10 L25 15" fill="none" stroke="#FF6B3D" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Step 2: Extract -->
    <g transform="translate(190, 0)">
      <rect x="0" y="0" width="140" height="120" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
      <rect x="0" y="0" width="140" height="40" rx="16" fill="url(#tealGrad)"/>
      <rect x="0" y="20" width="140" height="20" fill="url(#tealGrad)"/>
      <circle cx="70" cy="20" r="12" fill="#FFFFFF"/>
      <path d="M65 20 L75 20 M70 15 L70 25" stroke="#0A9396" stroke-width="2.5" stroke-linecap="round"/>

      <text x="70" y="65" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Extract Keyframes</text>

      <!-- ffmpeg icon -->
      <g transform="translate(45, 75)">
        <rect x="0" y="0" width="50" height="35" rx="4" fill="#F5F5F5"/>
        <polygon points="15,8 40,17.5 15,27" fill="#0A9396"/>
        <rect x="8" y="22" width="8" height="8" rx="1" fill="#0A9396"/>
        <rect x="20" y="22" width="8" height="8" rx="1" fill="#0A9396"/>
        <rect x="32" y="22" width="8" height="8" rx="1" fill="#0A9396"/>
      </g>

      <text x="70" y="118" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#999999" text-anchor="middle">ffmpeg extraction</text>
    </g>
  </g>

  <!-- Process Flow - Row 2: VLM Verify → Document -->
  <g transform="translate(60, 250)">
    <!-- Step 3: VLM Verify -->
    <g>
      <rect x="0" y="0" width="140" height="120" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
      <rect x="0" y="0" width="140" height="40" rx="16" fill="url(#successGrad)"/>
      <rect x="0" y="20" width="140" height="20" fill="url(#successGrad)"/>
      <circle cx="70" cy="20" r="12" fill="#FFFFFF"/>
      <path d="M63 20 L68 25 L77 16" stroke="#2D7D6B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

      <text x="70" y="65" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">VLM Verify</text>

      <!-- Claude icon (brain/AI) -->
      <g transform="translate(45, 75)">
        <circle cx="25" cy="17" r="14" fill="#F5F5F5"/>
        <ellipse cx="25" cy="17" rx="10" ry="10" fill="#2D7D6B" fill-opacity="0.2"/>
        <circle cx="20" cy="14" r="2" fill="#2D7D6B"/>
        <circle cx="30" cy="14" r="2" fill="#2D7D6B"/>
        <circle cx="25" cy="20" r="2" fill="#2D7D6B"/>
        <path d="M20 24 Q25 28 30 24" stroke="#2D7D6B" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <text x="48" y="20" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" font-weight="600" fill="#2D7D6B">Claude</text>
      </g>

      <text x="70" y="118" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#999999" text-anchor="middle">AI vision verification</text>
    </g>

    <!-- Arrow 3 -->
    <g transform="translate(150, 50)">
      <path d="M0 10 L30 10" stroke="#2D7D6B" stroke-width="3" stroke-linecap="round"/>
      <path d="M25 5 L35 10 L25 15" fill="none" stroke="#2D7D6B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Step 4: Document -->
    <g transform="translate(190, 0)">
      <rect x="0" y="0" width="140" height="120" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
      <rect x="0" y="0" width="140" height="40" rx="16" fill="#1A1A1A"/>
      <rect x="0" y="20" width="140" height="20" fill="#1A1A1A"/>
      <circle cx="70" cy="20" r="12" fill="#FFFFFF"/>
      <rect x="65" y="15" width="10" height="12" rx="1" fill="#1A1A1A"/>
      <path d="M67 18 L70 21 L73 18" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" fill="none"/>

      <text x="70" y="65" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Document</text>

      <!-- VitePress icon -->
      <g transform="translate(45, 75)">
        <rect x="0" y="0" width="50" height="35" rx="4" fill="#1A1A1A"/>
        <text x="25" y="24" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">V</text>
      </g>

      <text x="70" y="118" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#999999" text-anchor="middle">VitePress export</text>
    </g>
  </g>

  <!-- Curved connector arrows -->
  <g>
    <!-- Right connector (row 1 to row 2) -->
    <path d="M370 170 Q390 210 370 250" stroke="#FF6B3D" stroke-width="2" stroke-dasharray="6,4" fill="none"/>
    <circle cx="370" cy="250" r="4" fill="#FF6B3D"/>

    <!-- Left curved arrow -->
    <path d="M60 230 Q40 210 60 170" stroke="#0A9396" stroke-width="2" stroke-dasharray="6,4" fill="none"/>
    <circle cx="60" cy="170" r="4" fill="#0A9396"/>
  </g>

  <!-- Decorative elements -->
  <circle cx="30" cy="30" r="40" fill="#FF6B3D" fill-opacity="0.05"/>
  <circle cx="570" cy="370" r="50" fill="#0A9396" fill-opacity="0.08"/>

  <!-- Flow legend -->
  <g transform="translate(450, 320)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" font-weight="600" fill="#666666">DATA FLOW</text>
    <line x1="0" y1="15" x2="30" y2="15" stroke="#FF6B3D" stroke-width="2"/>
    <circle cx="35" cy="15" r="3" fill="#FF6B3D"/>
    <text x="50" y="18" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#999999">Key frames</text>

    <line x1="0" y1="35" x2="30" y2="35" stroke="#2D7D6B" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="50" y="38" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#999999">Verification</text>
  </g>
</svg>
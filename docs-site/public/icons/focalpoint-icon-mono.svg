<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Monochrome gradient -->
    <linearGradient id="monoBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>

    <linearGradient id="monoGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:0.05"/>
    </linearGradient>

    <radialGradient id="monoHighlight" cx="30%" cy="20%" r="60%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:0"/>
    </radialGradient>

    <!-- Clip path for squircle -->
    <clipPath id="squircleMono">
      <path d="M170,0 Q0,0 0,170 L0,854 Q0,1024 170,1024 L854,1024 Q1024,1024 1024,854 L1024,170 Q1024,0 854,0 Z"/>
    </clipPath>

    <filter id="monoShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="15" stdDeviation="25" flood-color="#64748b" flood-opacity="0.3"/>
    </filter>

    <filter id="monoCenterGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background squircle -->
  <g clip-path="url(#squircleMono)">
    <rect width="1024" height="1024" fill="url(#monoBg)"/>
    <rect width="1024" height="1024" fill="url(#monoHighlight)"/>

    <!-- Glass card -->
    <rect x="200" y="200" width="624" height="624" rx="80" ry="80"
          fill="url(#monoGlass)" filter="url(#monoShadow)"/>

    <!-- Target rings - slate gray -->
    <circle cx="512" cy="512" r="280" fill="none" stroke="#475569" stroke-width="12" opacity="0.6"/>
    <circle cx="512" cy="512" r="180" fill="none" stroke="#334155" stroke-width="8" opacity="0.8"/>
    <circle cx="512" cy="512" r="130" fill="none" stroke="#334155" stroke-width="6" opacity="0.6"/>
    <circle cx="512" cy="512" r="80" fill="none" stroke="#334155" stroke-width="4" opacity="0.5"/>

    <!-- Center dot -->
    <circle cx="512" cy="512" r="40" fill="#1e293b" filter="url(#monoCenterGlow)"/>

    <!-- Crosshairs -->
    <line x1="512" y1="280" x2="512" y2="380" stroke="#334155" stroke-width="6" stroke-linecap="round"/>
    <line x1="512" y1="644" x2="512" y2="744" stroke="#334155" stroke-width="6" stroke-linecap="round"/>
    <line x1="280" y1="512" x2="380" y2="512" stroke="#334155" stroke-width="6" stroke-linecap="round"/>
    <line x1="644" y1="512" x2="744" y2="512" stroke="#334155" stroke-width="6" stroke-linecap="round"/>

    <!-- Corner accents -->
    <circle cx="300" cy="300" r="12" fill="#64748b" opacity="0.5"/>
    <circle cx="724" cy="300" r="12" fill="#64748b" opacity="0.5"/>
    <circle cx="300" cy="724" r="12" fill="#64748b" opacity="0.5"/>
    <circle cx="724" cy="724" r="12" fill="#64748b" opacity="0.5"/>
  </g>

  <!-- Border -->
  <path d="M170,0 Q0,0 0,170 L0,854 Q0,1024 170,1024 L854,1024 Q1024,1024 1024,854 L1024,170 Q1024,0 854,0 Z"
        fill="none" stroke="#94a3b8" stroke-width="2" opacity="0.4"/>
</svg>

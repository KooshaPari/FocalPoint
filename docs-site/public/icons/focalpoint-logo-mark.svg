<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="markBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>

    <filter id="markGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="centerMarkGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#markBg)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#ffffff" stroke-width="12" opacity="0.9"/>

  <!-- Middle ring -->
  <circle cx="256" cy="256" r="130" fill="none" stroke="#ffffff" stroke-width="8" opacity="0.7"/>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="80" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.5"/>

  <!-- Center focal point with glow -->
  <circle cx="256" cy="256" r="35" fill="#fbbf24" filter="url(#centerMarkGlow)"/>

  <!-- Crosshairs -->
  <line x1="256" y1="50" x2="256" y2="120" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
  <line x1="256" y1="392" x2="256" y2="462" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
  <line x1="50" y1="256" x2="120" y2="256" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
  <line x1="392" y1="256" x2="462" y2="256" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.9"/>

  <!-- Corner accent dots -->
  <circle cx="120" cy="120" r="10" fill="#ffffff" opacity="0.6"/>
  <circle cx="392" cy="120" r="10" fill="#ffffff" opacity="0.6"/>
  <circle cx="120" cy="392" r="10" fill="#ffffff" opacity="0.6"/>
  <circle cx="392" cy="392" r="10" fill="#ffffff" opacity="0.6"/>
</svg>

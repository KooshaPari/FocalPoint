<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background gradient - deep purple to indigo -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>

    <!-- Liquid glass overlay gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.4"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.2"/>
    </linearGradient>

    <!-- Focus ring gradient -->
    <linearGradient id="focusRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>

    <!-- Inner glow filter -->
    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20" result="blur"/>
      <feOffset in="blur" dx="0" dy="10" result="offsetBlur"/>
      <feComposite in="SourceGraphic" in2="offsetBlur" operator="over"/>
    </filter>

    <!-- Drop shadow for glass -->
    <filter id="glassShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#4f46e5" flood-opacity="0.5"/>
    </filter>

    <!-- Clip path for rounded square (iOS style) -->
    <clipPath id="squircle">
      <path d="M170,0 Q0,0 0,170 L0,854 Q0,1024 170,1024 L854,1024 Q1024,1024 1024,854 L1024,170 Q1024,0 854,0 Z"/>
    </clipPath>

    <!-- Radial highlight for glass effect -->
    <radialGradient id="highlight" cx="30%" cy="20%" r="60%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.6"/>
      <stop offset="40%" style="stop-color:#ffffff;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>

    <!-- Target/reticle gradient -->
    <radialGradient id="targetGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="60%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </radialGradient>

    <!-- Glow for center -->
    <filter id="centerGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background squircle -->
  <g clip-path="url(#squircle)">
    <!-- Base gradient background -->
    <rect width="1024" height="1024" fill="url(#bgGrad)"/>

    <!-- Subtle noise texture simulation -->
    <rect width="1024" height="1024" fill="url(#highlight)" opacity="0.3"/>

    <!-- Focus ring outer -->
    <circle cx="512" cy="512" r="280" fill="none" stroke="url(#focusRing)" stroke-width="12" opacity="0.8"/>

    <!-- Glass card layer -->
    <rect x="200" y="200" width="624" height="624" rx="80" ry="80"
          fill="url(#glassGrad)" filter="url(#glassShadow)"/>

    <!-- Glass highlight -->
    <rect x="200" y="200" width="624" height="300" rx="80" ry="80"
          fill="url(#highlight)" opacity="0.5"/>

    <!-- Center target - outer ring -->
    <circle cx="512" cy="512" r="180" fill="none" stroke="#ffffff" stroke-width="8" opacity="0.9"/>

    <!-- Center target - middle ring -->
    <circle cx="512" cy="512" r="130" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.7"/>

    <!-- Center target - inner ring -->
    <circle cx="512" cy="512" r="80" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.5"/>

    <!-- Center dot with glow -->
    <circle cx="512" cy="512" r="40" fill="url(#targetGrad)" filter="url(#centerGlow)"/>

    <!-- Crosshair lines -->
    <line x1="512" y1="280" x2="512" y2="380" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
    <line x1="512" y1="644" x2="512" y2="744" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
    <line x1="280" y1="512" x2="380" y2="512" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
    <line x1="644" y1="512" x2="744" y2="512" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.8"/>

    <!-- Corner accents -->
    <circle cx="300" cy="300" r="15" fill="#ffffff" opacity="0.6"/>
    <circle cx="724" cy="300" r="15" fill="#ffffff" opacity="0.6"/>
    <circle cx="300" cy="724" r="15" fill="#ffffff" opacity="0.6"/>
    <circle cx="724" cy="724" r="15" fill="#ffffff" opacity="0.6"/>
  </g>

  <!-- Border highlight (glass edge) -->
  <path d="M170,0 Q0,0 0,170 L0,854 Q0,1024 170,1024 L854,1024 Q1024,1024 1024,854 L1024,170 Q1024,0 854,0 Z"
        fill="none" stroke="#ffffff" stroke-width="3" opacity="0.3"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Dark mode gradient -->
    <linearGradient id="darkBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>

    <linearGradient id="darkGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.03"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.06"/>
    </linearGradient>

    <radialGradient id="darkHighlight" cx="30%" cy="20%" r="60%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </radialGradient>

    <!-- Glow for accent -->
    <filter id="darkGlow">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="darkCenterGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="squircleDark">
      <path d="M170,0 Q0,0 0,170 L0,854 Q0,1024 170,1024 L854,1024 Q1024,1024 1024,854 L1024,170 Q1024,0 854,0 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <g clip-path="url(#squircleDark)">
    <rect width="1024" height="1024" fill="url(#darkBg)"/>

    <!-- Subtle purple glow in corner -->
    <rect width="1024" height="1024" fill="url(#darkHighlight)"/>

    <!-- Glass card with purple tint -->
    <rect x="200" y="200" width="624" height="624" rx="80" ry="80"
          fill="url(#darkGlass)"/>

    <!-- Outer glow ring -->
    <circle cx="512" cy="512" r="280" fill="none" stroke="#8b5cf6" stroke-width="8" opacity="0.4" filter="url(#darkGlow)"/>

    <!-- Target rings - white/light -->
    <circle cx="512" cy="512" r="280" fill="none" stroke="#e2e8f0" stroke-width="10" opacity="0.7"/>
    <circle cx="512" cy="512" r="180" fill="none" stroke="#cbd5e1" stroke-width="8" opacity="0.8"/>
    <circle cx="512" cy="512" r="130" fill="none" stroke="#94a3b8" stroke-width="6" opacity="0.6"/>
    <circle cx="512" cy="512" r="80" fill="none" stroke="#64748b" stroke-width="4" opacity="0.5"/>

    <!-- Center with purple glow -->
    <circle cx="512" cy="512" r="45" fill="#8b5cf6" filter="url(#darkCenterGlow)"/>
    <circle cx="512" cy="512" r="30" fill="#a78bfa"/>

    <!-- Crosshairs - bright for contrast -->
    <line x1="512" y1="280" x2="512" y2="380" stroke="#f8fafc" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
    <line x1="512" y1="644" x2="512" y2="744" stroke="#f8fafc" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
    <line x1="280" y1="512" x2="380" y2="512" stroke="#f8fafc" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
    <line x1="644" y1="512" x2="744" y2="512" stroke="#f8fafc" stroke-width="6" stroke-linecap="round" opacity="0.9"/>

    <!-- Corner accents with purple -->
    <circle cx="300" cy="300" r="12" fill="#8b5cf6" opacity="0.7"/>
    <circle cx="724" cy="300" r="12" fill="#8b5cf6" opacity="0.7"/>
    <circle cx="300" cy="724" r="12" fill="#8b5cf6" opacity="0.7"/>
    <circle cx="724" cy="724" r="12" fill="#8b5cf6" opacity="0.7"/>
  </g>

  <!-- Glass border -->
  <path d="M170,0 Q0,0 0,170 L0,854 Q0,1024 170,1024 L854,1024 Q1024,1024 1024,854 L1024,170 Q1024,0 854,0 Z"
        fill="none" stroke="#475569" stroke-width="2" opacity="0.5"/>
</svg>

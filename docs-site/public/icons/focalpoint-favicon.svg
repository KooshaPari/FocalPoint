<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="favBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>

    <clipPath id="favClip">
      <path d="M10,0 Q0,0 0,10 L0,54 Q0,64 10,64 L54,64 Q64,64 64,54 L64,10 Q64,0 54,0 Z"/>
    </clipPath>

    <filter id="favGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g clip-path="url(#favClip)">
    <rect width="64" height="64" fill="url(#favBg)"/>

    <!-- Outer ring -->
    <circle cx="32" cy="32" r="18" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.8"/>

    <!-- Middle ring -->
    <circle cx="32" cy="32" r="12" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>

    <!-- Inner ring -->
    <circle cx="32" cy="32" r="6" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.4"/>

    <!-- Center dot -->
    <circle cx="32" cy="32" r="3" fill="#fbbf24" filter="url(#favGlow)"/>

    <!-- Crosshairs -->
    <line x1="32" y1="8" x2="32" y2="14" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    <line x1="32" y1="50" x2="32" y2="56" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    <line x1="8" y1="32" x2="14" y2="32" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    <line x1="50" y1="32" x2="56" y2="32" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  </g>
</svg>

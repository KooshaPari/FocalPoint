<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="course-selection-title">
  <title id="course-selection-title">Course Selection Multi-Select List</title>
  <desc>Course selection screen with checkboxes for Canvas courses</desc>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0F1012" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7EBAB5"/>
      <stop offset="100%" stop-color="#0A9396"/>
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B3D"/>
      <stop offset="100%" stop-color="#F07B3F"/>
    </linearGradient>
  </defs>

  <!-- Phone frame -->
  <rect x="0" y="0" width="390" height="844" rx="44" fill="#0F1012"/>
  <rect x="1" y="1" width="388" height="842" rx="43" fill="#F6F5F5"/>

  <!-- Status bar -->
  <rect x="1" y="1" width="388" height="53" fill="#F6F5F5"/>
  <rect x="127" y="12" width="136" height="36" rx="18" fill="#0F1012"/>
  <text x="54" y="36" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600" fill="#0F1012">9:41</text>

  <!-- Navigation bar -->
  <rect x="1" y="54" width="388" height="56" fill="#F6F5F5"/>
  <text x="30" y="90" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" fill="#0A9396">Cancel</text>
  <text x="195" y="90" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600" fill="#0F1012" text-anchor="middle">Select Courses</text>
  <text x="360" y="90" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600" fill="url(#tealGradient)">Done</text>

  <!-- Progress indicator -->
  <rect x="40" y="120" width="310" height="4" rx="2" fill="#E8E7E7"/>
  <rect x="40" y="120" width="200" height="4" rx="2" fill="url(#tealGradient)"/>

  <!-- Courses list -->
  <g transform="translate(20, 145)">
    <!-- Header -->
    <text x="0" y="20" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" font-weight="600" fill="#666666">SPRING 2026 - SELECT ALL</text>

    <!-- Course 1 - Selected -->
    <g transform="translate(0, 40)">
      <rect x="0" y="0" width="350" height="70" rx="12" fill="white" filter="url(#shadow)"/>
      <rect x="12" y="17" width="36" height="36" rx="8" fill="url(#orangeGradient)"/>
      <text x="30" y="42" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">CS</text>
      <text x="60" y="28" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600" fill="#0F1012">CS 101</text>
      <text x="60" y="46" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#666666">Introduction to Computer Science</text>
      <circle cx="322" cy="35" r="14" fill="#0A9396"/>
      <path d="M315 35 L319 39 L329 29" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Course 2 - Selected -->
    <g transform="translate(0, 120)">
      <rect x="0" y="0" width="350" height="70" rx="12" fill="white" filter="url(#shadow)"/>
      <rect x="12" y="17" width="36" height="36" rx="8" fill="url(#tealGradient)"/>
      <text x="30" y="42" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">MA</text>
      <text x="60" y="28" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600" fill="#0F1012">MATH 201</text>
      <text x="60" y="46" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#666666">Calculus II</text>
      <circle cx="322" cy="35" r="14" fill="#0A9396"/>
      <path d="M315 35 L319 39 L329 29" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Course 3 - Not selected -->
    <g transform="translate(0, 200)">
      <rect x="0" y="0" width="350" height="70" rx="12" fill="white" filter="url(#shadow)"/>
      <rect x="12" y="17" width="36" height="36" rx="8" fill="#E8E7E7"/>
      <text x="30" y="42" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="16" font-weight="bold" fill="#666666" text-anchor="middle">PH</text>
      <text x="60" y="28" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600" fill="#0F1012">PHYS 150</text>
      <text x="60" y="46" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#666666">Physics for Engineers</text>
      <circle cx="322" cy="35" r="14" stroke="#E8E7E7" stroke-width="2" fill="none"/>
    </g>

    <!-- Course 4 - Selected -->
    <g transform="translate(0, 280)">
      <rect x="0" y="0" width="350" height="70" rx="12" fill="white" filter="url(#shadow)"/>
      <rect x="12" y="17" width="36" height="36" rx="8" fill="url(#orangeGradient)"/>
      <text x="30" y="42" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">WR</text>
      <text x="60" y="28" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600" fill="#0F1012">WRIT 110</text>
      <text x="60" y="46" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#666666">Academic Writing</text>
      <circle cx="322" cy="35" r="14" fill="#0A9396"/>
      <path d="M315 35 L319 39 L329 29" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Course 5 - Not selected -->
    <g transform="translate(0, 360)">
      <rect x="0" y="0" width="350" height="70" rx="12" fill="white" filter="url(#shadow)"/>
      <rect x="12" y="17" width="36" height="36" rx="8" fill="#E8E7E7"/>
      <text x="30" y="42" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="16" font-weight="bold" fill="#666666" text-anchor="middle">HST</text>
      <text x="60" y="28" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600" fill="#0F1012">HST 205</text>
      <text x="60" y="46" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#666666">World History</text>
      <circle cx="322" cy="35" r="14" stroke="#E8E7E7" stroke-width="2" fill="none"/>
    </g>

    <!-- Course 6 - Selected -->
    <g transform="translate(0, 440)">
      <rect x="0" y="0" width="350" height="70" rx="12" fill="white" filter="url(#shadow)"/>
      <rect x="12" y="17" width="36" height="36" rx="8" fill="url(#tealGradient)"/>
      <text x="30" y="42" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">ART</text>
      <text x="60" y="28" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600" fill="#0F1012">ART 101</text>
      <text x="60" y="46" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#666666">Digital Art Fundamentals</text>
      <circle cx="322" cy="35" r="14" fill="#0A9396"/>
      <path d="M315 35 L319 39 L329 29" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Selection counter -->
  <rect x="20" y="710" width="350" height="56" rx="14" fill="white" filter="url(#shadow)"/>
  <text x="40" y="743" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" fill="#666666">Selected</text>
  <text x="160" y="743" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="22" font-weight="700" fill="#0A9396">4</text>
  <text x="180" y="743" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" fill="#666666">of 6 courses</text>

  <!-- Home indicator -->
  <rect x="140" y="816" width="110" height="5" rx="2.5" fill="#0F1012" fill-opacity="0.2"/>
</svg>
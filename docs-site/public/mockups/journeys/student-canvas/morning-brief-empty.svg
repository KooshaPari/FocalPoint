<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="morning-brief-empty-title">
  <title id="morning-brief-empty-title">Morning Brief Empty State</title>
  <desc>Empty state morning briefing screen with CTA to connect Canvas</desc>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#0F1012" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7EBAB5"/>
      <stop offset="100%" stop-color="#0A9396"/>
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B3D"/>
      <stop offset="100%" stop-color="#F07B3F"/>
    </linearGradient>
  </defs>

  <!-- Phone frame -->
  <rect x="0" y="0" width="390" height="844" rx="44" fill="#0F1012"/>
  <rect x="1" y="1" width="388" height="842" rx="43" fill="#F6F5F5"/>

  <!-- Status bar -->
  <rect x="1" y="1" width="388" height="53" fill="#F6F5F5"/>
  <rect x="127" y="12" width="136" height="36" rx="18" fill="#0F1012"/>
  <text x="54" y="36" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600" fill="#0F1012">9:41</text>

  <!-- Navigation bar -->
  <rect x="1" y="54" width="388" height="56" fill="#F6F5F5"/>
  <text x="195" y="90" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600" fill="#0F1012" text-anchor="middle">Morning Brief</text>

  <!-- Greeting section -->
  <rect x="20" y="130" width="350" height="100" rx="16" fill="white" filter="url(#shadow)"/>
  <text x="40" y="165" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="28" font-weight="700" fill="#0F1012">Good morning, Alice!</text>
  <text x="40" y="195" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" fill="#666666">Tuesday, April 30</text>

  <!-- Empty state illustration -->
  <g transform="translate(155, 290)">
    <!-- Calendar icon -->
    <rect x="0" y="20" width="80" height="70" rx="8" fill="#E8E7E7" stroke="#7EBAB5" stroke-width="2"/>
    <rect x="0" y="20" width="80" height="20" rx="8" fill="url(#tealGradient)"/>
    <rect x="0" y="32" width="80" height="8" fill="url(#tealGradient)"/>
    <circle cx="20" cy="14" r="4" fill="#7EBAB5"/>
    <circle cx="60" cy="14" r="4" fill="#7EBAB5"/>
    <text x="40" y="68" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="24" font-weight="bold" fill="#0A9396" text-anchor="middle">30</text>
    <!-- Dotted lines suggesting connection -->
    <path d="M-30 55 Q-15 55 0 55" stroke="#FF6B3D" stroke-width="2" stroke-dasharray="4,4" fill="none"/>
    <path d="M80 55 Q95 55 110 55" stroke="#FF6B3D" stroke-width="2" stroke-dasharray="4,4" fill="none"/>
  </g>

  <!-- Empty state text -->
  <text x="195" y="410" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="20" font-weight="600" fill="#0F1012" text-anchor="middle">No Classes Yet</text>
  <text x="195" y="435" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" fill="#666666" text-anchor="middle">Connect your Canvas account to see</text>
  <text x="195" y="455" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" fill="#666666" text-anchor="middle">your daily schedule and assignments</text>

  <!-- CTA Button -->
  <g filter="url(#shadow)">
    <rect x="40" y="500" width="310" height="56" rx="14" fill="url(#orangeGradient)"/>
    <!-- Canvas logo -->
    <rect x="60" y="518" width="20" height="20" rx="4" fill="white"/>
    <text x="70" y="533" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="10" font-weight="bold" fill="#FF6B3D" text-anchor="middle">C</text>
    <text x="195" y="538" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600" fill="white" text-anchor="middle">Connect Canvas LMS</text>
  </g>

  <!-- Benefits cards -->
  <rect x="20" y="580" width="165" height="80" rx="12" fill="white" filter="url(#shadow)"/>
  <circle cx="50" cy="610" r="16" fill="#E8E7E7"/>
  <path d="M44 610 L48 614 L56 606" stroke="#7EBAB5" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="75" y="605" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" font-weight="600" fill="#0F1012">Daily Schedule</text>
  <text x="75" y="622" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" fill="#666666">View your classes</text>

  <rect x="205" y="580" width="165" height="80" rx="12" fill="white" filter="url(#shadow)"/>
  <circle cx="235" cy="610" r="16" fill="#E8E7E7"/>
  <rect x="229" y="604" width="12" height="12" rx="2" fill="url(#tealGradient)"/>
  <text x="260" y="605" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" font-weight="600" fill="#0F1012">Assignments</text>
  <text x="260" y="622" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" fill="#666666">Track due dates</text>

  <rect x="20" y="675" width="165" height="80" rx="12" fill="white" filter="url(#shadow)"/>
  <circle cx="50" cy="705" r="16" fill="#E8E7E7"/>
  <circle cx="50" cy="701" r="6" fill="#FF6B3D"/>
  <rect x="44" y="709" width="12" height="8" rx="2" fill="#FF6B3D"/>
  <text x="75" y="700" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" font-weight="600" fill="#0F1012">Focus Time</text>
  <text x="75" y="717" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" fill="#666666">Block distractions</text>

  <rect x="205" y="675" width="165" height="80" rx="12" fill="white" filter="url(#shadow)"/>
  <circle cx="235" cy="705" r="16" fill="#E8E7E7"/>
  <path d="M229 705 L235 699 L241 705 L235 711 Z" fill="#F07B3F"/>
  <text x="260" y="700" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" font-weight="600" fill="#0F1012">Streaks</text>
  <text x="260" y="717" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" fill="#666666">Build habits</text>

  <!-- Home indicator -->
  <rect x="140" y="816" width="110" height="5" rx="2.5" fill="#0F1012" fill-opacity="0.2"/>
</svg>
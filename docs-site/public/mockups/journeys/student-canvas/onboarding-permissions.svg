<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="onboarding-permissions-title">
  <title id="onboarding-permissions-title">Family Controls Permission Dialog</title>
  <desc>iOS Family Sharing permission dialog for FocalPoint app</desc>

  <defs>
    <!-- iOS-style drop shadow -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#0F1012" flood-opacity="0.15"/>
    </filter>
    <filter id="modalShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-color="#0F1012" flood-opacity="0.25"/>
    </filter>

    <!-- Brand gradients -->
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7EBAB5"/>
      <stop offset="100%" stop-color="#0A9396"/>
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B3D"/>
      <stop offset="100%" stop-color="#F07B3F"/>
    </linearGradient>
  </defs>

  <!-- Phone frame -->
  <rect x="0" y="0" width="390" height="844" rx="44" fill="#0F1012"/>

  <!-- Screen background -->
  <rect x="1" y="1" width="388" height="842" rx="43" fill="#F6F5F5"/>

  <!-- Status bar -->
  <rect x="1" y="1" width="388" height="54" rx="43" fill="#F6F5F5"/>
  <rect x="1" y="1" width="388" height="53" fill="#F6F5F5"/>
  <!-- Dynamic Island -->
  <rect x="127" y="12" width="136" height="36" rx="18" fill="#0F1012"/>
  <!-- Time -->
  <text x="54" y="36" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600" fill="#0F1012">9:41</text>
  <!-- Signal bars -->
  <rect x="310" y="24" width="3" height="5" rx="1" fill="#0F1012"/>
  <rect x="315" y="22" width="3" height="7" rx="1" fill="#0F1012"/>
  <rect x="320" y="20" width="3" height="9" rx="1" fill="#0F1012"/>
  <rect x="325" y="18" width="3" height="11" rx="1" fill="#0F1012"/>
  <!-- WiFi -->
  <path d="M345 22 Q352 15 360 22" stroke="#0F1012" stroke-width="2" fill="none"/>
  <path d="M347 26 Q352 21 358 26" stroke="#0F1012" stroke-width="2" fill="none"/>
  <circle cx="352" cy="29" r="2" fill="#0F1012"/>
  <!-- Battery -->
  <rect x="365" y="22" width="18" height="9" rx="2" stroke="#0F1012" stroke-width="1.5" fill="none"/>
  <rect x="383" y="25" width="2" height="3" rx="1" fill="#0F1012"/>

  <!-- Modal overlay background -->
  <rect x="1" y="1" width="388" height="842" rx="43" fill="#0F1012" fill-opacity="0.4"/>

  <!-- Permission dialog card -->
  <g filter="url(#modalShadow)">
    <rect x="32" y="280" width="326" height="284" rx="20" fill="#FFFFFF"/>

    <!-- App icon circle -->
    <circle cx="195" cy="320" r="44" fill="url(#tealGradient)"/>
    <text x="195" y="330" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">F</text>

    <!-- App name and title -->
    <text x="195" y="390" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600" fill="#0F1012" text-anchor="middle">FocalPoint</text>
    <text x="195" y="412" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" fill="#666666" text-anchor="middle">Would Like to Access Your</text>
    <text x="195" y="430" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" font-weight="600" fill="#0F1012" text-anchor="middle">Family Controls</text>

    <!-- Family Sharing icon -->
    <g transform="translate(140, 448)">
      <circle cx="15" cy="8" r="8" fill="#E8E7E7"/>
      <circle cx="15" cy="8" r="4" fill="#7EBAB5"/>
      <path d="M0 28 Q15 18 30 28" stroke="#E8E7E7" stroke-width="3" fill="none"/>
      <circle cx="35" cy="12" r="6" fill="#E8E7E7"/>
      <circle cx="35" cy="12" r="3" fill="#FF6B3D"/>
    </g>

    <!-- Buttons -->
    <rect x="52" y="498" width="136" height="44" rx="10" fill="url(#tealGradient)"/>
    <text x="120" y="526" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600" fill="white" text-anchor="middle">Allow</text>

    <rect x="202" y="498" width="136" height="44" rx="10" stroke="#0A9396" stroke-width="1.5" fill="none"/>
    <text x="270" y="526" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="400" fill="#0A9396" text-anchor="middle">Don't Allow</text>
  </g>

  <!-- Home indicator -->
  <rect x="140" y="816" width="110" height="5" rx="2.5" fill="#0F1012" fill-opacity="0.2"/>
</svg>
      <rect x="0" y="0" width="76" height="28" rx="14" fill="url(#tealGradient)"/>
      <text x="38" y="19" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">Due Soon</text>
    </g>
    <g transform="translate(86, 0)">
      <text x="38" y="19" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" font-weight="500" fill="#666666" text-anchor="middle">All</text>

      <rect x="12" y="16" width="44" height="44" rx="10" fill="url(#tealGradient)"/>
      <text x="34" y="40" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">AR</text>
      <text x="68" y="26" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600" fill="#0F1012">Portfolio Project</text>

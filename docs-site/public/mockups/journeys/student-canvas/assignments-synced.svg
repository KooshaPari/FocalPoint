    <circle cx="8" cy="8" r="4" fill="#7EBAB5"/>
    <text x="20" y="12" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" fill="#666666">Synced with Canvas 5 min ago</text>

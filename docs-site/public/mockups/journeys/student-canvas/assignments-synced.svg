      <rect x="12" y="56" width="48" height="16" rx="4" fill="#E8F5F4"/>
      <text x="36" y="67" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="10" font-weight="600" fill="#0A9396" text-anchor="middle">May 4</text>

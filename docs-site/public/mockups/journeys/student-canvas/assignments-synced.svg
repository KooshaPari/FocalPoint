      <rect x="12" y="16" width="44" height="44" rx="10" fill="url(#orangeGradient)"/>
      <text x="34" y="40" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">WR</text>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="assignments-synced-title">
  <title id="assignments-synced-title">Assignments List Populated</title>
  <desc>Assignment list screen with synced Canvas LMS assignments</desc>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">

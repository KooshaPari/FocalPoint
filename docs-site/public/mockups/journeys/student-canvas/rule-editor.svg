<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="rule-editor-title">
  <title id="rule-editor-title">Rule Editor with Trigger and Action Blocks</title>
  <desc>Automation rule editor showing trigger/action block interface</desc>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#0F1012" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7EBAB5"/>
      <stop offset="100%" stop-color="#0A9396"/>
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B3D"/>
      <stop offset="100%" stop-color="#F07B3F"/>
    </linearGradient>
    <linearGradient id="triggerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B3D"/>
      <stop offset="100%" stop-color="#E05A26"/>
    </linearGradient>
    <linearGradient id="actionGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7EBAB5"/>
      <stop offset="100%" stop-color="#0A9396"/>
    </linearGradient>
  </defs>

  <!-- Phone frame -->
  <rect x="0" y="0" width="390" height="844" rx="44" fill="#0F1012"/>
  <rect x="1" y="1" width="388" height="842" rx="43" fill="#F6F5F5"/>

  <!-- Status bar -->
  <rect x="1" y="1" width="388" height="53" fill="#F6F5F5"/>
  <rect x="127" y="12" width="136" height="36" rx="18" fill="#0F1012"/>
  <text x="54" y="36" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600" fill="#0F1012">9:41</text>

  <!-- Navigation bar -->
  <rect x="1" y="54" width="388" height="56" fill="#F6F5F5"/>
  <text x="30" y="90" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" fill="#0A9396">Cancel</text>
  <text x="195" y="90" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600" fill="#0F1012" text-anchor="middle">Edit Rule</text>
  <text x="360" y="90" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600" fill="url(#tealGradient)">Save</text>

  <!-- Rule name -->
  <rect x="20" y="120" width="350" height="50" rx="12" fill="white" filter="url(#shadow)"/>
  <text x="35" y="150" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="500" fill="#0F1012">Study Focus Mode</text>

  <!-- Rule blocks container -->
  <g transform="translate(20, 190)">
    <!-- Trigger block -->
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="350" height="90" rx="14" fill="white"/>
      <!-- Trigger indicator bar -->
      <rect x="0" y="0" width="6" height="90" rx="3" fill="url(#triggerGradient)"/>
      <!-- Icon -->
      <circle cx="40" cy="45" r="20" fill="#FFF3ED"/>
      <path d="M34 45 L40 39 L46 45 M40 39 V51" stroke="#FF6B3D" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Text -->
      <text x="72" y="35" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#666666">TRIGGER</text>
      <text x="72" y="55" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600" fill="#0F1012">Assignment Due Soon</text>
      <text x="72" y="72" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#666666">Within 24 hours from CS 101</text>
      <!-- Edit button -->
      <rect x="290" y="35" width="44" height="24" rx="6" fill="#FFF3ED"/>
      <text x="312" y="51" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" font-weight="500" fill="#FF6B3D" text-anchor="middle">Edit</text>
    </g>

    <!-- Connector line -->
    <g transform="translate(0, 100)">
      <line x1="175" y1="0" x2="175" y2="30" stroke="#E8E7E7" stroke-width="3"/>
      <polygon points="175,40 168,30 182,30" fill="#E8E7E7"/>
    </g>

    <!-- Action block 1 -->
    <g transform="translate(0, 150)" filter="url(#shadow)">
      <rect x="0" y="0" width="350" height="90" rx="14" fill="white"/>
      <!-- Action indicator bar -->
      <rect x="0" y="0" width="6" height="90" rx="3" fill="url(#actionGradient)"/>
      <!-- Icon -->
      <circle cx="40" cy="45" r="20" fill="#E8F5F4"/>
      <circle cx="40" cy="45" r="8" fill="#0A9396"/>
      <!-- Text -->
      <text x="72" y="35" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#666666">ACTION</text>
      <text x="72" y="55" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600" fill="#0F1012">Enable Focus Mode</text>
      <text x="72" y="72" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#666666">Block social apps for 2 hours</text>
      <!-- Edit button -->
      <rect x="290" y="35" width="44" height="24" rx="6" fill="#E8F5F4"/>
      <text x="312" y="51" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" font-weight="500" fill="#0A9396" text-anchor="middle">Edit</text>
    </g>

    <!-- Connector line -->
    <g transform="translate(0, 250)">
      <line x1="175" y1="0" x2="175" y2="30" stroke="#E8E7E7" stroke-width="3"/>
      <polygon points="175,40 168,30 182,30" fill="#E8E7E7"/>
    </g>

    <!-- Action block 2 -->
    <g transform="translate(0, 300)" filter="url(#shadow)">
      <rect x="0" y="0" width="350" height="90" rx="14" fill="white"/>
      <!-- Action indicator bar -->
      <rect x="0" y="0" width="6" height="90" rx="3" fill="url(#actionGradient)"/>
      <!-- Icon -->
      <circle cx="40" cy="45" r="20" fill="#E8F5F4"/>
      <rect x="32" y="37" width="16" height="16" rx="3" fill="#0A9396"/>
      <!-- Text -->
      <text x="72" y="35" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#666666">ACTION</text>
      <text x="72" y="55" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600" fill="#0F1012">Send Reminder</text>
      <text x="72" y="72" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#666666">Push notification: "Assignment due!"</text>
      <!-- Edit button -->
      <rect x="290" y="35" width="44" height="24" rx="6" fill="#E8F5F4"/>
      <text x="312" y="51" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" font-weight="500" fill="#0A9396" text-anchor="middle">Edit</text>
    </g>

    <!-- Add action button -->
    <g transform="translate(0, 410)">
      <rect x="0" y="0" width="350" height="50" rx="12" stroke="#E8E7E7" stroke-width="2" stroke-dasharray="8,4" fill="none"/>
      <circle cx="175" cy="25" r="16" fill="#E8E7E7"/>
      <path d="M175 19 V31 M169 25 H181" stroke="#666666" stroke-width="2" stroke-linecap="round"/>
      <text x="195" y="30" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" fill="#666666">Add Action</text>
    </g>
  </g>

  <!-- Rule status toggle -->
  <rect x="20" y="730" width="350" height="56" rx="14" fill="white" filter="url(#shadow)"/>
  <text x="40" y="762" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="500" fill="#0F1012">Rule Enabled</text>
  <rect x="310" y="748" width="48" height="28" rx="14" fill="url(#tealGradient)"/>
  <circle cx="344" cy="762" r="10" fill="white"/>

  <!-- Home indicator -->
  <rect x="140" y="816" width="110" height="5" rx="2.5" fill="#0F1012" fill-opacity="0.2"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="oauth-flow-title">
  <title id="oauth-flow-title">Canvas OAuth Authorization Flow</title>
  <desc>OAuth webview authorization screen for Canvas LMS connection</desc>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#0F1012" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7EBAB5"/>
      <stop offset="100%" stop-color="#0A9396"/>
    </linearGradient>
    <linearGradient id="canvasGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B3D"/>
      <stop offset="100%" stop-color="#E05A26"/>
    </linearGradient>
  </defs>

  <!-- Phone frame -->
  <rect x="0" y="0" width="390" height="844" rx="44" fill="#0F1012"/>
  <rect x="1" y="1" width="388" height="842" rx="43" fill="#F6F5F5"/>

  <!-- Status bar -->
  <rect x="1" y="1" width="388" height="53" fill="#F6F5F5"/>
  <rect x="127" y="12" width="136" height="36" rx="18" fill="#0F1012"/>
  <text x="54" y="36" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600" fill="#0F1012">9:41</text>

  <!-- Navigation bar -->
  <rect x="1" y="54" width="388" height="56" fill="#F6F5F5"/>
  <!-- Back button -->
  <path d="M50 82 L36 68 L36 96 Z" fill="url(#tealGradient)"/>
  <text x="195" y="90" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600" fill="#0F1012" text-anchor="middle">canvas.instructure.com</text>

  <!-- Webview container -->
  <g filter="url(#shadow)">
    <rect x="1" y="110" width="388" height="734" fill="white"/>

    <!-- Webview URL bar -->
    <rect x="1" y="110" width="388" height="48" fill="#E8E7E7"/>
    <rect x="20" y="124" width="260" height="24" rx="6" fill="white"/>
    <text x="35" y="141" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#666666">https://canvas.instructure.com/login/oauth2/auth</text>

    <!-- Security indicator -->
    <circle cx="350" y="136" r="8" fill="url(#tealGradient)"/>
    <path d="M347 136 L349 138 L353 134" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- OAuth page content -->
    <!-- Header area -->
    <rect x="40" y="180" width="310" height="80" rx="12" fill="#F6F5F5"/>
    <circle cx="80" cy="220" r="28" fill="url(#canvasGradient)"/>
    <text x="80" y="232" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">C</text>
    <text x="120" y="210" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="16" font-weight="600" fill="#0F1012">Canvas LMS</text>
    <text x="120" y="230" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" fill="#666666">wants to access your account</text>

    <!-- Permission request -->
    <text x="195" y="295" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="18" font-weight="600" fill="#0F1012" text-anchor="middle">Authorize Access</text>

    <!-- Permissions list -->
    <g transform="translate(50, 330)">
      <!-- Permission item 1 -->
      <rect x="0" y="0" width="290" height="56" rx="10" fill="#F6F5F5"/>
      <circle cx="28" cy="28" r="14" fill="#E8E7E7"/>
      <path d="M22 28 L26 32 L34 24" stroke="#7EBAB5" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="54" y="24" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" font-weight="500" fill="#0F1012">View your courses</text>
      <text x="54" y="42" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" fill="#666666">Read course enrollments</text>

      <!-- Permission item 2 -->
      <rect x="0" y="66" width="290" height="56" rx="10" fill="#F6F5F5"/>
      <circle cx="28" cy="94" r="14" fill="#E8E7E7"/>
      <path d="M22 94 L26 98 L34 90" stroke="#7EBAB5" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="54" y="90" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" font-weight="500" fill="#0F1012">Read assignments</text>
      <text x="54" y="108" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" fill="#666666">View homework and due dates</text>

      <!-- Permission item 3 -->
      <rect x="0" y="132" width="290" height="56" rx="10" fill="#F6F5F5"/>
      <circle cx="28" cy="160" r="14" fill="#E8E7E7"/>
      <path d="M22 160 L26 164 L34 156" stroke="#7EBAB5" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="54" y="156" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" font-weight="500" fill="#0F1012">View grades</text>
      <text x="54" y="174" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" fill="#666666">Access your coursework grades</text>

      <!-- Permission item 4 -->
      <rect x="0" y="198" width="290" height="56" rx="10" fill="#F6F5F5"/>
      <circle cx="28" cy="226" r="14" fill="#E8E7E7"/>
      <path d="M22 226 L26 230 L34 222" stroke="#7EBAB5" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="54" y="222" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" font-weight="500" fill="#0F1012">Read announcements</text>
      <text x="54" y="240" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" fill="#666666">View course announcements</text>
    </g>

    <!-- Privacy note -->
    <text x="195" y="650" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" fill="#666666" text-anchor="middle">By authorizing, you allow Canvas to share</text>
    <text x="195" y="665" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" fill="#666666" text-anchor="middle">data with FocalPoint according to their privacy policy.</text>

    <!-- Authorize button -->
    <rect x="40" y="700" width="310" height="50" rx="12" fill="url(#canvasGradient)"/>
    <text x="195" y="732" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600" fill="white" text-anchor="middle">Authorize</text>

    <!-- Cancel link -->
    <text x="195" y="780" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" fill="#0A9396" text-anchor="middle">Cancel</text>
  </g>

  <!-- Home indicator -->
  <rect x="140" y="816" width="110" height="5" rx="2.5" fill="#0F1012" fill-opacity="0.2"/>
</svg>
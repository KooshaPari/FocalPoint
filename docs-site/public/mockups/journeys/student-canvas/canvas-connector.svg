<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="canvas-connector-title">
  <title id="canvas-connector-title">Canvas LMS Connector Card</title>
  <desc>Canvas LMS connector installation card with features</desc>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#0F1012" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="canvasGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B3D"/>
      <stop offset="100%" stop-color="#E05A26"/>
    </linearGradient>
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7EBAB5"/>
      <stop offset="100%" stop-color="#0A9396"/>
    </linearGradient>
  </defs>

  <!-- Phone frame -->
  <rect x="0" y="0" width="390" height="844" rx="44" fill="#0F1012"/>
  <rect x="1" y="1" width="388" height="842" rx="43" fill="#F6F5F5"/>

  <!-- Status bar -->
  <rect x="1" y="1" width="388" height="53" fill="#F6F5F5"/>
  <rect x="127" y="12" width="136" height="36" rx="18" fill="#0F1012"/>
  <text x="54" y="36" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600" fill="#0F1012">9:41</text>

  <!-- Header -->
  <rect x="1" y="54" width="388" height="56" fill="#F6F5F5"/>
  <text x="195" y="90" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600" fill="#0F1012" text-anchor="middle">Add Connector</text>

  <!-- Connector card -->
  <g filter="url(#shadow)">
    <rect x="24" y="140" width="342" height="420" rx="20" fill="white"/>

    <!-- Canvas header banner -->
    <rect x="24" y="140" width="342" height="120" rx="20" fill="url(#canvasGradient)"/>
    <rect x="24" y="220" width="342" height="40" fill="url(#canvasGradient)"/>

    <!-- Canvas logo -->
    <circle cx="72" cy="195" r="32" fill="white"/>
    <text x="72" y="207" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="28" font-weight="bold" fill="#FF6B3D" text-anchor="middle">C</text>

    <!-- Connector name and description -->
    <text x="120" y="185" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="22" font-weight="700" fill="white">Canvas LMS</text>
    <text x="120" y="208" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" fill="white" fill-opacity="0.9">Learning Management System</text>

    <!-- Status badge -->
    <rect x="280" y="175" width="66" height="28" rx="14" fill="white" fill-opacity="0.2"/>
    <text x="313" y="194" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">POPULAR</text>

    <!-- Features list -->
    <g transform="translate(40, 280)">
      <!-- Feature 1 -->
      <circle cx="12" cy="12" r="12" fill="#E8E7E7"/>
      <path d="M6 12 L10 16 L18 8" stroke="#0A9396" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="36" y="12" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="500" fill="#0F1012">Sync course enrollments</text>
      <text x="36" y="30" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#666666">Automatically track your classes</text>

      <!-- Feature 2 -->
      <circle cx="12" cy="72" r="12" fill="#E8E7E7"/>
      <path d="M6 72 L10 76 L18 68" stroke="#0A9396" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="36" y="72" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="500" fill="#0F1012">Import assignments</text>
      <text x="36" y="90" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#666666">Due dates sync to your calendar</text>

      <!-- Feature 3 -->
      <circle cx="12" cy="132" r="12" fill="#E8E7E7"/>
      <path d="M6 132 L10 136 L18 128" stroke="#0A9396" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="36" y="132" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="500" fill="#0F1012">Grade notifications</text>
      <text x="36" y="150" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#666666">Know when new grades post</text>

      <!-- Feature 4 -->
      <circle cx="12" cy="192" r="12" fill="#E8E7E7"/>
      <path d="M6 192 L10 196 L18 188" stroke="#0A9396" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="36" y="192" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="500" fill="#0F1012">Announcements feed</text>
      <text x="36" y="210" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#666666">Stay updated on course news</text>
    </g>

    <!-- Install button -->
    <rect x="40" y="510" width="290" height="50" rx="12" fill="url(#tealGradient)"/>
    <text x="185" y="542" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600" fill="white" text-anchor="middle">Install Connector</text>
  </g>

  <!-- Supported institutions hint -->
  <text x="195" y="610" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#666666" text-anchor="middle">Works with Canvas Cloud and self-hosted instances</text>

  <!-- Bottom info cards -->
  <rect x="24" y="640" width="155" height="60" rx="12" fill="white" filter="url(#shadow)"/>
  <text x="40" y="668" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" font-weight="600" fill="#0F1012">Last synced</text>
  <text x="40" y="686" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#666666">Not connected</text>

  <rect x="189" y="640" width="155" height="60" rx="12" fill="white" filter="url(#shadow)"/>
  <text x="205" y="668" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" font-weight="600" fill="#0F1012">Permissions</text>
  <text x="205" y="686" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#666666">Read-only access</text>

  <!-- Home indicator -->
  <rect x="140" y="816" width="110" height="5" rx="2.5" fill="#0F1012" fill-opacity="0.2"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="streak-celebration-title">
  <title id="streak-celebration-title">Streak Achievement Celebration</title>
  <desc>Celebration screen for completing a study streak milestone</desc>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="20" flood-color="#0F1012" flood-opacity="0.2"/>
    </filter>
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7EBAB5"/>
      <stop offset="100%" stop-color="#0A9396"/>
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B3D"/>
      <stop offset="100%" stop-color="#F07B3F"/>
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9C86A"/>
      <stop offset="100%" stop-color="#E8A87C"/>
    </linearGradient>
    <radialGradient id="celebrationGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#F9C86A" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#FF6B3D" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF6B3D" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Phone frame -->
  <rect x="0" y="0" width="390" height="844" rx="44" fill="#0F1012"/>
  <rect x="1" y="1" width="388" height="842" rx="43" fill="#F6F5F5"/>

  <!-- Celebration background glow -->
  <ellipse cx="195" cy="350" rx="250" ry="300" fill="url(#celebrationGlow)"/>

  <!-- Confetti particles -->
  <g opacity="0.8">
    <rect x="40" y="100" width="8" height="8" rx="2" fill="#FF6B3D" transform="rotate(30 44 104)"/>
    <rect x="100" y="80" width="6" height="6" rx="1" fill="#7EBAB5" transform="rotate(-20 103 83)"/>
    <rect x="320" y="120" width="10" height="10" rx="2" fill="#F9C86A" transform="rotate(45 325 125)"/>
    <rect x="60" y="200" width="7" height="7" rx="1" fill="#0A9396" transform="rotate(-15 63 203)"/>
    <rect x="340" y="180" width="8" height="8" rx="2" fill="#F07B3F" transform="rotate(60 344 184)"/>
    <rect x="80" y="350" width="6" height="6" rx="1" fill="#FF6B3D" transform="rotate(-30 83 353)"/>
    <rect x="300" y="320" width="9" height="9" rx="2" fill="#7EBAB5" transform="rotate(20 304 324)"/>
    <rect x="50" y="500" width="7" height="7" rx="1" fill="#F9C86A" transform="rotate(40 53 503)"/>
    <rect x="330" y="480" width="8" height="8" rx="2" fill="#E05A26" transform="rotate(-50 334 484)"/>
    <circle cx="70" cy="280" r="4" fill="#F9C86A"/>
    <circle cx="350" cy="260" r="5" fill="#FF6B3D"/>
    <circle cx="30" cy="420" r="3" fill="#7EBAB5"/>
    <circle cx="360" cy="400" r="4" fill="#F07B3F"/>
  </g>

  <!-- Status bar -->
  <rect x="1" y="1" width="388" height="53" fill="#F6F5F5"/>
  <rect x="127" y="12" width="136" height="36" rx="18" fill="#0F1012"/>
  <text x="54" y="36" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600" fill="#0F1012">9:41</text>

  <!-- Trophy/streak badge -->
  <g transform="translate(195, 200)" filter="url(#shadow)">
    <!-- Badge circle -->
    <circle cx="0" cy="0" r="80" fill="url(#goldGradient)"/>
    <circle cx="0" cy="0" r="68" fill="none" stroke="white" stroke-width="4" stroke-opacity="0.4"/>

    <!-- Trophy icon -->
    <g transform="translate(-30, -45)">
      <path d="M20 10 L20 30 Q20 45 35 45 Q50 45 50 30 L50 10 Z" fill="white" fill-opacity="0.95"/>
      <rect x="25" y="45" width="20" height="8" fill="white" fill-opacity="0.95"/>
      <rect x="20" y="53" width="30" height="6" rx="2" fill="white" fill-opacity="0.95"/>
      <path d="M20 15 Q5 15 5 25 Q5 35 15 38 L20 30" fill="white" fill-opacity="0.95"/>
      <path d="M50 15 Q65 15 65 25 Q65 35 55 38 L50 30" fill="white" fill-opacity="0.95"/>
    </g>

    <!-- Star decorations -->
    <g fill="white" fill-opacity="0.6">
      <polygon points="-50,-60 -48,-54 -42,-54 -47,-50 -45,-44 -50,-48 -55,-44 -53,-50 -58,-54 -52,-54" transform="scale(0.5)"/>
      <polygon points="100,-120 102,-114 108,-114 103,-110 105,-104 100,-108 95,-104 97,-110 92,-114 98,-114" transform="scale(0.5)"/>
    </g>
  </g>

  <!-- Achievement text -->
  <text x="195" y="330" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="32" font-weight="800" fill="#0F1012" text-anchor="middle">7-Day Streak!</text>
  <text x="195" y="360" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" fill="#666666" text-anchor="middle">You've completed a full week of focus sessions</text>

  <!-- Stats cards -->
  <g transform="translate(20, 400)">
    <!-- Hours focused -->
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="105" height="100" rx="14" fill="white"/>
      <text x="52" y="45" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="28" font-weight="700" fill="#0A9396" text-anchor="middle">14.5</text>
      <text x="52" y="65" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#666666" text-anchor="middle">Hours Focused</text>
    </g>

    <!-- Sessions -->
    <g transform="translate(120, 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="105" height="100" rx="14" fill="white"/>
      <text x="52" y="45" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="28" font-weight="700" fill="#FF6B3D" text-anchor="middle">12</text>
      <text x="52" y="65" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#666666" text-anchor="middle">Sessions</text>
    </g>

    <!-- Assignments -->
    <g transform="translate(245, 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="105" height="100" rx="14" fill="white"/>
      <text x="52" y="45" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="28" font-weight="700" fill="#F9C86A" text-anchor="middle">8</text>
      <text x="52" y="65" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#666666" text-anchor="middle">Completed</text>
    </g>
  </g>

  <!-- Motivational message -->
  <rect x="20" y="520" width="350" height="80" rx="16" fill="white" filter="url(#shadow)"/>
  <g transform="translate(40, 545)">
    <circle cx="20" cy="15" r="18" fill="url(#orangeGradient)"/>
    <text x="20" y="21" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">C</text>
    <text x="50" y="10" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" font-weight="600" fill="#0F1012">Coachy says</text>
    <text x="50" y="30" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" fill="#666666">"Amazing consistency! You're building</text>
    <text x="50" y="47" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" fill="#666666">real study habits. Keep it up!"</text>
  </g>

  <!-- Reward badge info -->
  <g transform="translate(20, 620)" filter="url(#shadow)">
    <rect x="0" y="0" width="350" height="70" rx="14" fill="linear-gradient(#FFF9E6, #FFFFFF)"/>
    <rect x="12" y="12" width="46" height="46" rx="10" fill="url(#goldGradient)"/>
    <path d="M35 24 L35 44 Q35 50 42 50 Q49 50 49 44 L49 24 Z" fill="white" fill-opacity="0.9"/>
    <rect x="38" y="50" width="8" height="4" fill="white" fill-opacity="0.9"/>
    <rect x="35" y="54" width="14" height="4" rx="1" fill="white" fill-opacity="0.9"/>
    <text x="72" y="35" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" font-weight="600" fill="#0F1012">Weekly Champion Badge</text>
    <text x="72" y="52" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#666666">+50 bonus points earned</text>
  </g>

  <!-- Share button -->
  <g transform="translate(20, 710)" filter="url(#shadow)">
    <rect x="0" y="0" width="350" height="54" rx="14" fill="url(#tealGradient)"/>
    <path d="M175 22 L175 34 M170 27 L175 22 L180 27" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="195" y="36" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">Share Achievement</text>
  </g>

  <!-- Home indicator -->
  <rect x="140" y="816" width="110" height="5" rx="2.5" fill="#0F1012" fill-opacity="0.2"/>
</svg>
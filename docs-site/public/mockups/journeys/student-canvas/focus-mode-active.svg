<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="focus-mode-active-title">
  <title id="focus-mode-active-title">Focus Mode Active Screen</title>
  <desc>Focus mode screen showing blocked apps and timer</desc>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="#0F1012" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7EBAB5"/>
      <stop offset="100%" stop-color="#0A9396"/>
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B3D"/>
      <stop offset="100%" stop-color="#F07B3F"/>
    </linearGradient>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7EBAB5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7EBAB5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Phone frame -->
  <rect x="0" y="0" width="390" height="844" rx="44" fill="#0F1012"/>
  <rect x="1" y="1" width="388" height="842" rx="43" fill="#0F1012"/>

  <!-- Dimmed background app icons -->
  <g opacity="0.15">
    <rect x="50" y="150" width="60" height="60" rx="14" fill="#E8E7E7"/>
    <rect x="150" y="180" width="60" height="60" rx="14" fill="#E8E7E7"/>
    <rect x="280" y="120" width="60" height="60" rx="14" fill="#E8E7E7"/>
    <rect x="80" y="400" width="60" height="60" rx="14" fill="#E8E7E7"/>
    <rect x="250" y="350" width="60" height="60" rx="14" fill="#E8E7E7"/>
    <rect x="20" y="600" width="60" height="60" rx="14" fill="#E8E7E7"/>
    <rect x="300" y="550" width="60" height="60" rx="14" fill="#E8E7E7"/>
  </g>

  <!-- Status bar -->
  <rect x="1" y="1" width="388" height="53" fill="#0F1012"/>
  <rect x="127" y="12" width="136" height="36" rx="18" fill="#0F1012"/>
  <text x="54" y="36" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600" fill="#F6F5F5">9:41</text>

  <!-- Focus mode active indicator -->
  <rect x="120" y="60" width="150" height="28" rx="14" fill="url(#tealGradient)"/>
  <circle cx="138" cy="74" r="6" fill="white" fill-opacity="0.9"/>
  <text x="195" y="79" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">FOCUS MODE</text>

  <!-- Central timer display -->
  <g transform="translate(195, 240)">
    <!-- Glow effect -->
    <circle cx="0" cy="0" r="120" fill="url(#glowGradient)"/>

    <!-- Timer ring -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="#353A40" stroke-width="8"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="url(#tealGradient)" stroke-width="8"
            stroke-dasharray="565" stroke-dashoffset="141" stroke-linecap="round"
            transform="rotate(-90)"/>

    <!-- Timer text -->
    <text x="0" y="15" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="64" font-weight="700" fill="#F6F5F5" text-anchor="middle" font-variant-numeric="tabular-nums">1:45:32</text>
    <text x="0" y="45" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" fill="#7EBAB5" text-anchor="middle">remaining</text>
  </g>

  <!-- Session info -->
  <text x="195" y="400" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="18" font-weight="600" fill="#F6F5F5" text-anchor="middle">Study Session</text>
  <text x="195" y="425" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" fill="#7EBAB5" text-anchor="middle">CS 101 - Programming Assignment 3</text>

  <!-- Blocked apps section -->
  <g transform="translate(20, 470)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" font-weight="600" fill="#666666">BLOCKED APPS</text>

    <!-- App row 1 -->
    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="350" height="56" rx="12" fill="#1A1A1A"/>
      <rect x="12" y="10" width="36" height="36" rx="8" fill="#FF3B30"/>
      <path d="M22 28 L30 20 M30 28 L22 20" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <text x="60" y="27" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" font-weight="500" fill="#F6F5F5">TikTok</text>
      <text x="60" y="43" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" fill="#666666">Social</text>
      <circle cx="320" cy="28" r="14" fill="#FF3B30" fill-opacity="0.3"/>
      <path d="M314 28 L326 28" stroke="#FF3B30" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- App row 2 -->
    <g transform="translate(0, 76)">
      <rect x="0" y="0" width="350" height="56" rx="12" fill="#1A1A1A"/>
      <rect x="12" y="10" width="36" height="36" rx="8" fill="#5856D6"/>
      <path d="M30 22 L22 30 M22 22 L30 30" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <text x="60" y="27" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" font-weight="500" fill="#F6F5F5">Instagram</text>
      <text x="60" y="43" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" fill="#666666">Social</text>
      <circle cx="320" cy="28" r="14" fill="#5856D6" fill-opacity="0.3"/>
      <path d="M314 28 L326 28" stroke="#5856D6" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- App row 3 -->
    <g transform="translate(0, 132)">
      <rect x="0" y="0" width="350" height="56" rx="12" fill="#1A1A1A"/>
      <rect x="12" y="10" width="36" height="36" rx="8" fill="#007AFF"/>
      <path d="M22 28 L30 28 M26 24 L30 28 L26 32" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="60" y="27" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" font-weight="500" fill="#F6F5F5">Messages</text>
      <text x="60" y="43" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" fill="#666666">Communication</text>
      <circle cx="320" cy="28" r="14" fill="#007AFF" fill-opacity="0.3"/>
      <path d="M314 28 L326 28" stroke="#007AFF" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>

  <!-- End session button -->
  <g filter="url(#shadow)">
    <rect x="40" y="720" width="310" height="50" rx="12" fill="#1A1A1A" stroke="#353A40" stroke-width="1"/>
    <text x="195" y="750" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="500" fill="#FF6B3D" text-anchor="middle">End Session Early</text>
  </g>

  <!-- Home indicator -->
  <rect x="140" y="816" width="110" height="5" rx="2.5" fill="#353A40"/>
</svg>
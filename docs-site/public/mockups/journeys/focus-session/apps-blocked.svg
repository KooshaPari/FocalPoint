<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="apps-blocked-title">
  <title id="apps-blocked-title">Blocked Apps List</title>
  <desc>List of apps currently blocked during a focus session</desc>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="#0F1012" flood-opacity="0.15"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7EBAB5"/>
      <stop offset="100%" stop-color="#0A9396"/>
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B3D"/>
      <stop offset="100%" stop-color="#F07B3F"/>
    </linearGradient>
  </defs>

  <!-- Phone frame -->
  <rect x="0" y="0" width="390" height="844" rx="44" fill="#0F1012"/>
  <rect x="1" y="1" width="388" height="842" rx="43" fill="#0F1012"/>

  <!-- Status bar -->
  <rect x="1" y="1" width="388" height="53" rx="43" fill="#0F1012"/>
  <text x="54" y="36" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600" fill="#F6F5F5">9:41</text>

  <!-- Focus mode indicator -->
  <rect x="120" y="60" width="150" height="28" rx="14" fill="url(#tealGradient)"/>
  <circle cx="138" cy="74" r="6" fill="white" fill-opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.5;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="195" y="79" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">FOCUS MODE</text>

  <!-- Timer display -->
  <g transform="translate(195, 140)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="48" font-weight="700" fill="#F6F5F5" text-anchor="middle" font-variant-numeric="tabular-nums">1:32:15</text>
    <text x="0" y="22" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" fill="#7EBAB5" text-anchor="middle">remaining</text>
  </g>

  <!-- Session info -->
  <text x="195" y="200" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="16" font-weight="600" fill="#F6F5F5" text-anchor="middle">PR Review Session</text>

  <!-- Blocked apps header -->
  <rect x="16" y="230" width="358" height="44" rx="12" fill="#1A1A1A"/>
  <text x="36" y="258" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" font-weight="600" fill="#FF6B3D">5 Apps Blocked</text>

  <!-- App list -->
  <g transform="translate(16, 290)">

    <!-- TikTok -->
    <g filter="url(#cardShadow)">
      <rect x="0" y="0" width="358" height="72" rx="14" fill="#1E1E1E"/>
    </g>
    <rect x="16" y="14" width="44" height="44" rx="12" fill="#FE2C55"/>
    <path d="M38 26 L32 42 L44 42 M38 26 L38 38" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="76" y="36" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600" fill="#F6F5F5">TikTok</text>
    <text x="76" y="54" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#666666">Social Media</text>
    <rect x="290" y="26" width="68" height="28" rx="8" fill="#FF3B30" fill-opacity="0.2"/>
    <text x="324" y="45" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" font-weight="600" fill="#FF3B30" text-anchor="middle">BLOCKED</text>

    <!-- Instagram -->
    <g filter="url(#cardShadow)">
      <rect x="0" y="84" width="358" height="72" rx="14" fill="#1E1E1E"/>
    </g>
    <rect x="16" y="98" width="44" height="44" rx="12" fill="#E4405F"/>
    <rect x="27" y="109" width="22" height="22" rx="11" stroke="#FFFFFF" stroke-width="2" fill="none"/>
    <circle cx="38" cy="117" r="5" fill="#FFFFFF"/>
    <text x="76" y="120" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600" fill="#F6F5F5">Instagram</text>
    <text x="76" y="138" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#666666">Social Media</text>
    <rect x="290" y="110" width="68" height="28" rx="8" fill="#FF3B30" fill-opacity="0.2"/>
    <text x="324" y="129" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" font-weight="600" fill="#FF3B30" text-anchor="middle">BLOCKED</text>

    <!-- Twitter/X -->
    <g filter="url(#cardShadow)">
      <rect x="0" y="168" width="358" height="72" rx="14" fill="#1E1E1E"/>
    </g>
    <rect x="16" y="182" width="44" height="44" rx="12" fill="#1DA1F2"/>
    <path d="M38 198 L54 182 M54 198 L38 182 M42 194 L50 186" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="76" y="204" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600" fill="#F6F5F5">Twitter/X</text>
    <text x="76" y="222" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#666666">Social Media</text>
    <rect x="290" y="194" width="68" height="28" rx="8" fill="#FF3B30" fill-opacity="0.2"/>
    <text x="324" y="213" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" font-weight="600" fill="#FF3B30" text-anchor="middle">BLOCKED</text>

    <!-- YouTube -->
    <g filter="url(#cardShadow)">
      <rect x="0" y="252" width="358" height="72" rx="14" fill="#1E1E1E"/>
    </g>
    <rect x="16" y="266" width="44" height="44" rx="12" fill="#FF0000"/>
    <rect x="29" y="280" width="18" height="14" rx="3" fill="#FFFFFF"/>
    <text x="76" y="288" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600" fill="#F6F5F5">YouTube</text>
    <text x="76" y="306" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#666666">Entertainment</text>
    <rect x="290" y="278" width="68" height="28" rx="8" fill="#FF3B30" fill-opacity="0.2"/>
    <text x="324" y="297" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" font-weight="600" fill="#FF3B30" text-anchor="middle">BLOCKED</text>

    <!-- Reddit -->
    <g filter="url(#cardShadow)">
      <rect x="0" y="336" width="358" height="72" rx="14" fill="#1E1E1E"/>
    </g>
    <rect x="16" y="350" width="44" height="44" rx="12" fill="#FF4500"/>
    <circle cx="38" cy="372" r="12" fill="#FFFFFF"/>
    <text x="38" y="377" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" font-weight="700" fill="#FF4500" text-anchor="middle">r/</text>
    <text x="76" y="372" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600" fill="#F6F5F5">Reddit</text>
    <text x="76" y="390" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#666666">Social Media</text>
    <rect x="290" y="362" width="68" height="28" rx="8" fill="#FF3B30" fill-opacity="0.2"/>
    <text x="324" y="381" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" font-weight="600" fill="#FF3B30" text-anchor="middle">BLOCKED</text>
  </g>

  <!-- End session button -->
  <g filter="url(#shadow)">
    <rect x="40" y="750" width="310" height="50" rx="12" fill="#1A1A1A" stroke="#353A40" stroke-width="1"/>
    <text x="195" y="780" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="500" fill="#FF6B3D" text-anchor="middle">End Session Early</text>
  </g>

  <!-- Home indicator -->
  <rect x="140" y="816" width="110" height="5" rx="2.5" fill="#353A40"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="break-suggestion-title">
  <title id="break-suggestion-title">90-Minute Break Suggestion</title>
  <desc>Coachy suggesting a 90-minute break after completing a focus session</desc>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="#0F1012" flood-opacity="0.15"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#000" stroke-opacity="0.12"/>
    </filter>
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7EBAB5"/>
      <stop offset="100%" stop-color="#0A9396"/>
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B3D"/>
      <stop offset="100%" stop-color="#F07B3F"/>
    </linearGradient>
    <linearGradient id="modalGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E1E1E"/>
      <stop offset="100%" stop-color="#151515"/>
    </linearGradient>
    <radialGradient id="glowGradient" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FF6B3D" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF6B3D" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Phone frame -->
  <rect x="0" y="0" width="390" height="844" rx="44" fill="#0F1012"/>
  <rect x="1" y="1" width="388" height="842" rx="43" fill="#0F1012"/>

  <!-- Dimmed background -->
  <rect x="0" y="0" width="390" height="844" rx="44" fill="#000000" fill-opacity="0.6"/>

  <!-- Background glow -->
  <ellipse cx="195" cy="380" rx="250" ry="200" fill="url(#glowGradient)"/>

  <!-- Modal card -->
  <g filter="url(#shadow)">
    <rect x="24" y="220" width="342" height="420" rx="24" fill="url(#modalGradient)"/>
  </g>

  <!-- Close button -->
  <g transform="translate(330, 235)">
    <circle cx="14" cy="14" r="14" fill="#2A2A2A"/>
    <path d="M9 9 L19 19 M19 9 L9 19" stroke="#666666" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Coachy suggesting -->
  <g transform="translate(195, 290)">
    <!-- Pulse ring -->
    <circle cx="0" cy="0" r="55" fill="none" stroke="#FF6B3D" stroke-width="2" stroke-opacity="0.3">
      <animate attributeName="r" values="45;65;45" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.3;0.1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Body -->
    <circle cx="0" cy="0" r="40" fill="url(#tealGradient)"/>

    <!-- Face -->
    <ellipse cx="-12" cy="-4" rx="5" ry="5" fill="#FFFFFF"/>
    <ellipse cx="-14" cy="-6" rx="2" ry="2" fill="#001133"/>

    <ellipse cx="12" cy="-4" rx="5" ry="5" fill="#FFFFFF"/>
    <ellipse cx="10" cy="-6" rx="2" ry="2" fill="#001133"/>

    <!-- Suggestive eyebrows -->
    <path d="M-20 -14 L-6 -12" stroke="#008B85" stroke-width="2" stroke-linecap="round"/>
    <path d="M6 -12 L20 -14" stroke="#008B85" stroke-width="2" stroke-linecap="round"/>

    <!-- Thoughtful smile -->
    <path d="M-8 10 Q0 16 8 10" stroke="#008B85" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Thought bubble -->
  <g transform="translate(240, 220)">
    <ellipse cx="20" cy="20" rx="28" ry="20" fill="#1E1E1E" stroke="#2A2A2A" stroke-width="1"/>
    <text x="20" y="25" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="16" fill="#7EBAB5" text-anchor="middle">90m</text>
  </g>

  <!-- Title -->
  <text x="195" y="380" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="22" font-weight="700" fill="#F6F5F5" text-anchor="middle">Time for a Break</text>
  <text x="195" y="406" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" fill="#7EBAB5" text-anchor="middle">You've earned 90 minutes to recharge</text>

  <!-- Break activity suggestions -->
  <g transform="translate(50, 430)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" font-weight="600" fill="#666666">SUGGESTED ACTIVITIES</text>

    <!-- Walk -->
    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="290" height="56" rx="12" fill="#2A2A2A"/>
      <circle cx="28" cy="28" r="18" fill="#34C759" fill-opacity="0.2"/>
      <path d="M28 20 L28 32 M22 26 L28 20 L34 26" stroke="#34C759" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <text x="58" y="24" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" font-weight="500" fill="#F6F5F5">Take a walk outside</text>
      <text x="58" y="40" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#34C759">Boosts creativity</text>
    </g>

    <!-- Snack -->
    <g transform="translate(0, 84)">
      <rect x="0" y="0" width="290" height="56" rx="12" fill="#2A2A2A"/>
      <circle cx="28" cy="28" r="18" fill="#FF6B3D" fill-opacity="0.2"/>
      <path d="M28 20 C32 20 36 24 36 28 C36 32 32 36 28 36 C24 36 20 32 20 28 C20 24 24 20 28 20" stroke="#FF6B3D" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <text x="58" y="24" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" font-weight="500" fill="#F6F5F5">Grab a healthy snack</text>
      <text x="58" y="40" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#FF6B3D">Fuel your brain</text>
    </g>

    <!-- Stretch -->
    <g transform="translate(0, 148)">
      <rect x="0" y="0" width="290" height="56" rx="12" fill="#2A2A2A"/>
      <circle cx="28" cy="28" r="18" fill="#AF52DE" fill-opacity="0.2"/>
      <path d="M22 34 L28 22 L34 34 M24 30 L32 30" stroke="#AF52DE" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <text x="58" y="24" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" font-weight="500" fill="#F6F5F5">Quick stretch routine</text>
      <text x="58" y="40" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#AF52DE">Release tension</text>
    </g>
  </g>

  <!-- Start break button -->
  <rect x="40" y="680" width="310" height="52" rx="14" fill="url(#orangeGradient)"/>
  <text x="195" y="712" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600" fill="#FFFFFF" text-anchor="middle">Start 90-Min Break</text>

  <!-- Skip link -->
  <text x="195" y="750" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" fill="#666666" text-anchor="middle">Skip break</text>

  <!-- Home indicator -->
  <rect x="140" y="816" width="110" height="5" rx="2.5" fill="#353A40"/>
</svg>
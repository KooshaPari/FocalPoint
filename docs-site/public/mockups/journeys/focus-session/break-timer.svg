<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="break-timer-title">
  <title id="break-timer-title">Break Countdown Timer</title>
  <desc>Active break timer showing countdown with activity suggestions</desc>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="#0F1012" flood-opacity="0.15"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#000" stroke-opacity="0.12"/>
    </filter>
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7EBAB5"/>
      <stop offset="100%" stop-color="#0A9396"/>
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B3D"/>
      <stop offset="100%" stop-color="#F07B3F"/>
    </linearGradient>
    <linearGradient id="breakBgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A2F2D"/>
      <stop offset="100%" stop-color="#0F1A18"/>
    </linearGradient>
    <radialGradient id="timerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7EBAB5" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7EBAB5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Phone frame -->
  <rect x="0" y="0" width="390" height="844" rx="44" fill="#0F1012"/>
  <rect x="1" y="1" width="388" height="842" rx="43" fill="#0F1012"/>

  <!-- Background gradient -->
  <rect x="0" y="0" width="390" height="844" rx="44" fill="url(#breakBgGradient)"/>

  <!-- Decorative circles -->
  <circle cx="50" cy="150" r="80" fill="#7EBAB5" fill-opacity="0.05"/>
  <circle cx="340" cy="700" r="120" fill="#FF6B3D" fill-opacity="0.05"/>

  <!-- Status bar -->
  <rect x="1" y="1" width="388" height="53" rx="43" fill="transparent"/>
  <text x="54" y="36" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600" fill="#F6F5F5">9:41</text>

  <!-- Break mode indicator -->
  <rect x="120" y="60" width="150" height="28" rx="14" fill="url(#tealGradient)"/>
  <circle cx="138" cy="74" r="6" fill="white" fill-opacity="0.9"/>
  <text x="195" y="79" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">BREAK TIME</text>

  <!-- Timer display -->
  <g transform="translate(195, 240)">
    <!-- Glow effect -->
    <circle cx="0" cy="0" r="140" fill="url(#timerGlow)"/>

    <!-- Outer ring -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="#2A4A47" stroke-width="8"/>

    <!-- Progress ring (90min = 5400s, showing ~45min remaining) -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="url(#tealGradient)" stroke-width="8"
            stroke-dasharray="628" stroke-dashoffset="157" stroke-linecap="round"
            transform="rotate(-90)">
      <animate attributeName="stroke-dashoffset" values="157;0" dur="2700s" repeatCount="indefinite"/>
    </circle>

    <!-- Timer text -->
    <text x="0" y="10" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="56" font-weight="700" fill="#F6F5F5" text-anchor="middle" font-variant-numeric="tabular-nums">45:23</text>
    <text x="0" y="38" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" fill="#7EBAB5" text-anchor="middle">remaining</text>
  </g>

  <!-- Current activity card -->
  <g filter="url(#cardShadow)">
    <rect x="24" y="380" width="342" height="80" rx="16" fill="#1E1E1E"/>
  </g>

  <g transform="translate(44, 400)">
    <circle cx="20" cy="20" r="20" fill="#34C759" fill-opacity="0.2"/>
    <path d="M20 10 L20 26 M12 18 L20 10 L28 18" stroke="#34C759" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <text x="52" y="18" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600" fill="#F6F5F5">Taking a walk</text>
    <text x="52" y="36" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#7EBAB5">Started 44 minutes ago</text>

    <!-- Pause button -->
    <g transform="translate(270, 4)">
      <rect x="0" y="0" width="52" height="32" rx="10" fill="#2A2A2A"/>
      <rect x="14" y="8" width="4" height="16" rx="2" fill="#F6F5F5"/>
      <rect x="24" y="8" width="4" height="16" rx="2" fill="#F6F5F5"/>
    </g>
  </g>

  <!-- Quick actions -->
  <text x="24" y="490" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" font-weight="600" fill="#666666">QUICK ACTIONS</text>

  <g transform="translate(24, 510)">
    <!-- Add time -->
    <g filter="url(#cardShadow)">
      <rect x="0" y="0" width="108" height="90" rx="14" fill="#1E1E1E"/>
    </g>
    <circle cx="54" cy="35" r="20" fill="#FF6B3D" fill-opacity="0.2"/>
    <text x="54" y="40" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="20" fill="#FF6B3D" text-anchor="middle">+15m</text>
    <text x="54" y="72" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#F6F5F5" text-anchor="middle">Add Time</text>

    <!-- End break -->
    <g transform="translate(120, 0)">
      <g filter="url(#cardShadow)">
        <rect x="0" y="0" width="108" height="90" rx="14" fill="#1E1E1E"/>
      </g>
      <circle cx="54" cy="35" r="20" fill="#34C759" fill-opacity="0.2"/>
      <path d="M44 35 L50 41 L64 27" stroke="#34C759" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <text x="54" y="72" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#F6F5F5" text-anchor="middle">End Break</text>
    </g>

    <!-- Music -->
    <g transform="translate(240, 0)">
      <g filter="url(#cardShadow)">
        <rect x="0" y="0" width="108" height="90" rx="14" fill="#1E1E1E"/>
      </g>
      <circle cx="54" cy="35" r="20" fill="#AF52DE" fill-opacity="0.2"/>
      <path d="M42 30 L42 40 C42 43 44 45 47 45 C50 45 52 43 52 40 L52 30" stroke="#AF52DE" stroke-width="2" fill="none"/>
      <path d="M52 30 L60 26 L60 44 L52 40" stroke="#AF52DE" stroke-width="2" fill="none"/>
      <text x="54" y="72" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#F6F5F5" text-anchor="middle">Music</text>
    </g>
  </g>

  <!-- Progress bar -->
  <g transform="translate(24, 630)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" fill="#666666">Break Progress</text>

    <g transform="translate(0, 14)">
      <rect x="0" y="0" width="342" height="8" rx="4" fill="#2A4A47"/>
      <rect x="0" y="0" width="285" height="8" rx="4" fill="url(#tealGradient)">
        <animate attributeName="width" values="285;285" dur="2700s" repeatCount="indefinite"/>
      </rect>
    </g>

    <text x="342" y="0" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" fill="#7EBAB5" text-anchor="end">44:37 / 90:00</text>
  </g>

  <!-- Motivational quote -->
  <g filter="url(#cardShadow)">
    <rect x="24" y="680" width="342" height="70" rx="14" fill="#1E1E1E"/>
  </g>
  <g transform="translate(44, 700)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" fill="#7EBAB5">"The time to relax is when you don't have time for it."</text>
    <text x="0" y="20" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" fill="#666666">- Sydney J. Harris</text>
  </g>

  <!-- Home indicator -->
  <rect x="140" y="816" width="110" height="5" rx="2.5" fill="#353A40"/>
</svg>
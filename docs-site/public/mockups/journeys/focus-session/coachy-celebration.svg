<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="coachy-celebration-title">
  <title id="coachy-celebration-title">Focus Session Complete Celebration</title>
  <desc>Coachy celebrating completion of a focus session with confetti and achievements</desc>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="#0F1012" flood-opacity="0.15"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#000" stroke-opacity="0.12"/>
    </filter>
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7EBAB5"/>
      <stop offset="100%" stop-color="#0A9396"/>
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B3D"/>
      <stop offset="100%" stop-color="#F07B3F"/>
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>
    <radialGradient id="successGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34C759" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#34C759" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="confettiGrad1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B3D"/>
      <stop offset="100%" stop-color="#FF8B65"/>
    </radialGradient>
    <radialGradient id="confettiGrad2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7EBAB5"/>
      <stop offset="100%" stop-color="#0A9396"/>
    </radialGradient>
    <radialGradient id="confettiGrad3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </radialGradient>
    <radialGradient id="confettiGrad4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#AF52DE"/>
      <stop offset="100%" stop-color="#8B3FD9"/>
    </radialGradient>
  </defs>

  <!-- Phone frame -->
  <rect x="0" y="0" width="390" height="844" rx="44" fill="#0F1012"/>
  <rect x="1" y="1" width="388" height="842" rx="43" fill="#0F1012"/>

  <!-- Background glow -->
  <ellipse cx="195" cy="300" rx="250" ry="200" fill="url(#successGlow)"/>

  <!-- Confetti pieces -->
  <g opacity="0.9">
    <!-- Orange confetti -->
    <rect x="40" y="80" width="12" height="12" rx="2" fill="url(#confettiGrad1)" transform="rotate(25 46 86)">
      <animate attributeName="y" values="80;750;80" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="120" y="120" width="10" height="10" rx="2" fill="url(#confettiGrad1)" transform="rotate(-15 125 125)">
      <animate attributeName="y" values="120;700;120" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="280" y="60" width="14" height="14" rx="2" fill="url(#confettiGrad1)" transform="rotate(40 287 67)">
      <animate attributeName="y" values="60;760;60" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="350" y="150" width="10" height="10" rx="2" fill="url(#confettiGrad1)" transform="rotate(-30 355 155)">
      <animate attributeName="y" values="150;720;150" dur="3.8s" repeatCount="indefinite"/>
    </rect>

    <!-- Teal confetti -->
    <circle cx="80" cy="100" r="8" fill="url(#confettiGrad2)">
      <animate attributeName="cy" values="100;780;100" dur="4.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="50" r="6" fill="url(#confettiGrad2)">
      <animate attributeName="cy" values="50;740;50" dur="3.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="320" cy="90" r="7" fill="url(#confettiGrad2)">
      <animate attributeName="cy" values="90;760;90" dur="4.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="200" r="5" fill="url(#confettiGrad2)">
      <animate attributeName="cy" values="200;720;200" dur="3.9s" repeatCount="indefinite"/>
    </circle>

    <!-- Gold confetti -->
    <rect x="160" y="70" width="8" height="16" rx="2" fill="url(#confettiGrad3)" transform="rotate(15 164 78)">
      <animate attributeName="y" values="70;750;70" dur="4.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="240" y="110" width="8" height="16" rx="2" fill="url(#confettiGrad3)" transform="rotate(-25 244 118)">
      <animate attributeName="y" values="110;710;110" dur="3.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="380" y="80" width="8" height="16" rx="2" fill="url(#confettiGrad3)" transform="rotate(35 384 88)">
      <animate attributeName="y" values="80;770;80" dur="4s" repeatCount="indefinite"/>
    </rect>

    <!-- Purple confetti -->
    <polygon points="100,0 108,16 92,16" fill="url(#confettiGrad4)" transform="rotate(20 100 8)">
      <animate attributeName="points" values="100,0 108,16 92,16;100,750 108,766 92,766;100,0 108,16 92,16" dur="4.4s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="300,0 308,16 292,16" fill="url(#confettiGrad4)" transform="rotate(-20 300 8)">
      <animate attributeName="points" values="300,0 308,16 292,16;300,760 308,776 292,776;300,0 308,16 292,16" dur="3.4s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- Status bar -->
  <rect x="1" y="1" width="388" height="53" rx="43" fill="#0F1012"/>
  <text x="54" y="36" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600" fill="#F6F5F5">9:41</text>

  <!-- Main celebration card -->
  <g filter="url(#shadow)">
    <rect x="24" y="80" width="342" height="440" rx="24" fill="#1E1E1E"/>
  </g>

  <!-- Success checkmark badge -->
  <g transform="translate(175, 110)">
    <circle cx="20" cy="20" r="24" fill="#34C759"/>
    <path d="M10 20 L17 27 L30 14" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Celebration text -->
  <text x="195" y="185" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="24" font-weight="700" fill="#F6F5F5" text-anchor="middle">Session Complete!</text>
  <text x="195" y="210" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" fill="#7EBAB5" text-anchor="middle">Great work staying focused</text>

  <!-- Stats row -->
  <g transform="translate(50, 240)">
    <!-- Duration stat -->
    <g>
      <rect x="0" y="0" width="85" height="70" rx="12" fill="#2A2A2A"/>
      <text x="42" y="30" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="24" font-weight="700" fill="#FF6B3D" text-anchor="middle">1h 32m</text>
      <text x="42" y="50" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" fill="#666666" text-anchor="middle">Duration</text>
    </g>

    <!-- PRs reviewed -->
    <g transform="translate(95, 0)">
      <rect x="0" y="0" width="85" height="70" rx="12" fill="#2A2A2A"/>
      <text x="42" y="30" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="24" font-weight="700" fill="#7EBAB5" text-anchor="middle">3</text>
      <text x="42" y="50" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" fill="#666666" text-anchor="middle">PRs Reviewed</text>
    </g>

    <!-- Comments -->
    <g transform="translate(190, 0)">
      <rect x="0" y="0" width="85" height="70" rx="12" fill="#2A2A2A"/>
      <text x="42" y="30" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="24" font-weight="700" fill="#FFD700" text-anchor="middle">8</text>
      <text x="42" y="50" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" fill="#666666" text-anchor="middle">Comments</text>
    </g>
  </g>

  <!-- Streak badge -->
  <g transform="translate(50, 325)">
    <rect x="0" y="0" width="290" height="50" rx="12" fill="url(#goldGradient)" fill-opacity="0.15"/>
    <rect x="0" y="0" width="4" height="50" rx="2" fill="url(#goldGradient)"/>
    <text x="20" y="22" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" font-weight="600" fill="#FFD700">5-Day Streak!</text>
    <text x="20" y="40" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#F6F5F5">Keep it up for your weekly goal</text>
    <g transform="translate(240, 10)">
      <circle cx="15" cy="15" r="15" fill="url(#goldGradient)"/>
      <text x="15" y="20" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">5</text>
    </g>
  </g>

  <!-- Achievements -->
  <text x="50" y="400" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" font-weight="600" fill="#666666">ACHIEVEMENTS UNLOCKED</text>

  <g transform="translate(50, 415)">
    <rect x="0" y="0" width="290" height="48" rx="12" fill="#2A2A2A"/>
    <circle cx="24" cy="24" r="16" fill="#34C759"/>
    <path d="M18 24 L22 28 L30 20" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="52" y="22" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" font-weight="600" fill="#F6F5F5">Deep Diver</text>
    <text x="52" y="38" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" fill="#34C759">First 90+ minute session</text>
  </g>

  <!-- Coachy celebration mascot -->
  <g transform="translate(145, 480)">
    <!-- Body -->
    <ellipse cx="50" cy="50" r="40" fill="url(#tealGradient)"/>

    <!-- Face -->
    <ellipse cx="38" cy="44" rx="6" ry="6" fill="#FFFFFF"/>
    <ellipse cx="36" cy="42" rx="2.5" ry="2.5" fill="#001133"/>

    <ellipse cx="62" cy="44" rx="6" ry="6" fill="#FFFFFF"/>
    <ellipse cx="60" cy="42" rx="2.5" ry="2.5" fill="#001133"/>

    <!-- Happy eyebrows -->
    <path d="M30 36 L44 32" stroke="#008B85" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M56 32 L70 36" stroke="#008B85" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Big smile -->
    <path d="M35 58 Q50 72 65 58" stroke="#008B85" stroke-width="3" stroke-linecap="round" fill="none"/>

    <!-- Star eyes sparkles -->
    <g transform="translate(10, 10)">
      <path d="M0 -6 L0 6 M-6 0 L6 0" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
    </g>
    <g transform="translate(90, 10)">
      <path d="M0 -6 L0 6 M-6 0 L6 0" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- Raised arms -->
    <path d="M20 45 Q5 25 15 15" stroke="#0A9396" stroke-width="8" stroke-linecap="round" fill="none"/>
    <path d="M80 45 Q95 25 85 15" stroke="#0A9396" stroke-width="8" stroke-linecap="round" fill="none"/>

    <!-- Thumbs up -->
    <circle cx="12" cy="12" r="8" fill="#008B85"/>
    <path d="M8 12 L12 8 L14 14" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <circle cx="88" cy="12" r="8" fill="#008B85"/>
    <path d="M84 12 L88 8 L90 14" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Action buttons -->
  <rect x="40" y="720" width="310" height="52" rx="14" fill="url(#orangeGradient)"/>
  <text x="195" y="752" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600" fill="#FFFFFF" text-anchor="middle">Continue to Break</text>

  <!-- Home indicator -->
  <rect x="140" y="816" width="110" height="5" rx="2.5" fill="#353A40"/>
</svg>
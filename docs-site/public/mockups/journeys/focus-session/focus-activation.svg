<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="focus-activation-title">
  <title id="focus-activation-title">Focus Mode Activation</title>
  <desc>Screen showing Focus mode being activated with countdown and app blocking confirmation</desc>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="#0F1012" flood-opacity="0.15"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7EBAB5"/>
      <stop offset="100%" stop-color="#0A9396"/>
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B3D"/>
      <stop offset="100%" stop-color="#F07B3F"/>
    </linearGradient>
    <radialGradient id="pulseGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B3D" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF6B3D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="successGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34C759" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#34C759" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Phone frame -->
  <rect x="0" y="0" width="390" height="844" rx="44" fill="#0F1012"/>
  <rect x="1" y="1" width="388" height="842" rx="43" fill="#0F1012"/>

  <!-- Status bar -->
  <rect x="1" y="1" width="388" height="53" rx="43" fill="#0F1012"/>
  <text x="54" y="36" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600" fill="#F6F5F5">9:41</text>

  <!-- App header -->
  <rect x="0" y="54" width="390" height="56" fill="#1A1A1A"/>
  <text x="195" y="89" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600" fill="#F6F5F5" text-anchor="middle">Focus Session</text>

  <!-- Central activation animation -->
  <g transform="translate(195, 280)">
    <!-- Outer pulse ring -->
    <circle cx="0" cy="0" r="140" fill="url(#pulseGlow)">
      <animate attributeName="r" values="120;140;120" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Focus circle -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="#FF6B3D" stroke-width="4"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="url(#orangeGradient)" stroke-width="4"
            stroke-dasharray="628" stroke-dashoffset="157" stroke-linecap="round"
            transform="rotate(-90)"/>

    <!-- Countdown number -->
    <text x="0" y="20" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="72" font-weight="700" fill="#F6F5F5" text-anchor="middle" font-variant-numeric="tabular-nums">3</text>
    <text x="0" y="50" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" fill="#FF6B3D" text-anchor="middle">starting focus...</text>
  </g>

  <!-- Session info card -->
  <g filter="url(#cardShadow)">
    <rect x="24" y="440" width="342" height="120" rx="16" fill="#1E1E1E"/>
  </g>

  <!-- Session details -->
  <g transform="translate(44, 460)">
    <rect x="0" y="0" width="36" height="36" rx="8" fill="#24292F"/>
    <path d="M10 18 L18 10 L26 18 M18 10 V26" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <text x="48" y="15" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="16" font-weight="600" fill="#F6F5F5">PR Review Session</text>
    <text x="48" y="33" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" fill="#7EBAB5">focalpoint/core #247</text>

    <rect x="0" y="50" width="302" height="1" fill="#2A2A2A"/>

    <g transform="translate(0, 62)">
      <circle cx="8" cy="8" r="8" fill="#FF6B3D"/>
      <path d="M4 8 L8 12 L16 4" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <text x="24" y="12" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" fill="#F6F5F5">5 apps will be blocked</text>
    </g>
  </g>

  <!-- Apps being blocked -->
  <text x="24" y="585" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" font-weight="600" fill="#666666">BLOCKING</text>

  <g transform="translate(24, 600)">
    <!-- TikTok -->
    <rect x="0" y="0" width="170" height="48" rx="12" fill="#1A1A1A"/>
    <rect x="8" y="8" width="32" height="32" rx="8" fill="#FE2C55"/>
    <path d="M24 16 L20 28 L28 28 M24 16 L24 24" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="50" y="22" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" fill="#F6F5F5">TikTok</text>
    <text x="50" y="36" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="10" fill="#666666">Social</text>

    <!-- Instagram -->
    <rect x="186" y="0" width="170" height="48" rx="12" fill="#1A1A1A"/>
    <rect x="194" y="8" width="32" height="32" rx="8" fill="#E4405F"/>
    <rect x="201" y="16" width="18" height="18" rx="9" stroke="#FFFFFF" stroke-width="2" fill="none"/>
    <circle cx="210" cy="22" r="4" fill="#FFFFFF"/>
    <text x="236" y="22" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" fill="#F6F5F5">Instagram</text>
    <text x="236" y="36" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="10" fill="#666666">Social</text>

    <!-- Twitter/X -->
    <rect x="0" y="56" width="170" height="48" rx="12" fill="#1A1A1A"/>
    <rect x="8" y="64" width="32" height="32" rx="8" fill="#1DA1F2"/>
    <path d="M20 80 L32 68 M32 80 L20 68 M24 76 L28 72" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="50" y="78" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" fill="#F6F5F5">Twitter/X</text>
    <text x="50" y="92" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="10" fill="#666666">Social</text>

    <!-- YouTube -->
    <rect x="186" y="56" width="170" height="48" rx="12" fill="#1A1A1A"/>
    <rect x="194" y="64" width="32" height="32" rx="8" fill="#FF0000"/>
    <rect x="203" y="74" width="14" height="10" rx="2" fill="#FFFFFF"/>
    <text x="236" y="78" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" fill="#F6F5F5">YouTube</text>
    <text x="236" y="92" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="10" fill="#666666">Entertainment</text>
  </g>

  <!-- Cancel button -->
  <text x="195" y="790" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" fill="#FF3B30" text-anchor="middle">Cancel</text>

  <!-- Home indicator -->
  <rect x="140" y="816" width="110" height="5" rx="2.5" fill="#353A40"/>
</svg>
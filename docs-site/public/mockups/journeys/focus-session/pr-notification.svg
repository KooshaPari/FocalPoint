<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="pr-notification-title">
  <title id="pr-notification-title">Pull Request Ready Notification</title>
  <desc>Notification showing a pull request is ready for review with focus session option</desc>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="#0F1012" flood-opacity="0.15"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7EBAB5"/>
      <stop offset="100%" stop-color="#0A9396"/>
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B3D"/>
      <stop offset="100%" stop-color="#F07B3F"/>
    </linearGradient>
    <linearGradient id="successGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34C759"/>
      <stop offset="100%" stop-color="#2D9D50"/>
    </linearGradient>
  </defs>

  <!-- Phone frame -->
  <rect x="0" y="0" width="390" height="844" rx="44" fill="#0F1012"/>
  <rect x="1" y="1" width="388" height="842" rx="43" fill="#0F1012"/>

  <!-- Status bar -->
  <rect x="1" y="1" width="388" height="53" rx="43" fill="#0F1012"/>
  <text x="54" y="36" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600" fill="#F6F5F5">9:41</text>

  <!-- App header -->
  <rect x="0" y="54" width="390" height="56" fill="#1A1A1A"/>
  <text x="195" y="89" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600" fill="#F6F5F5" text-anchor="middle">Notifications</text>

  <!-- Notification card -->
  <g filter="url(#cardShadow)">
    <rect x="16" y="130" width="358" height="160" rx="16" fill="#1E1E1E"/>
  </g>

  <!-- GitHub icon -->
  <g transform="translate(36, 150)">
    <circle cx="20" cy="20" r="20" fill="#24292F"/>
    <path d="M20 8 C12.5 8 8 12.5 8 20 C8 26.1 12 30.8 16.8 32.6 C17.3 32.7 17.5 32.4 17.5 32.1 V29.4 C12.6 30.3 11.5 27.3 11.5 27.3 C10.5 25.5 9.2 25 9.2 25 C7.3 23.7 9.3 23.8 9.3 23.8 C11.4 24 12.5 25.6 12.5 25.6 C14 27.6 16 27 17 26.6 C17.1 25.6 17.4 24.9 17.7 24.5 C13.8 24.1 9.7 22.8 9.7 16.9 C9.7 15.3 10.3 14 11.4 12.9 C11.2 12.5 10.6 10.9 11.5 8.8 C11.5 8.8 13 8.3 17.5 10.6 C18.8 10.3 20.2 10.1 21.6 10.1 C23 10.1 24.4 10.3 25.7 10.6 C30.2 8.3 31.7 8.8 31.7 8.8 C32.6 10.9 32 12.5 31.8 12.9 C32.9 14 33.5 15.3 33.5 16.9 C33.5 22.8 29.4 24.1 25.5 24.5 C25.9 25 26.2 26 26.2 27.5 V32.1 C26.2 32.4 26.4 32.7 26.9 32.6 C31.7 30.8 35.7 26.1 35.7 20 C35.7 12.5 31.2 8 23.7 8" fill="#FFFFFF"/>
  </g>

  <!-- PR ready badge -->
  <rect x="84" y="152" width="72" height="24" rx="12" fill="#34C759"/>
  <text x="120" y="169" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">READY</text>

  <!-- PR title -->
  <text x="36" y="200" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600" fill="#F6F5F5">feat: Add focus session analytics</text>
  <text x="36" y="222" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" fill="#7EBAB5">focalpoint/core #247</text>
  <text x="36" y="242" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#666666">Author: sarah.chen · 3 hours ago</text>

  <!-- Checks passed -->
  <g transform="translate(36, 255)">
    <circle cx="6" cy="6" r="6" fill="#34C759"/>
    <path d="M3 6 L5 8 L9 4" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="18" y="10" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#34C759">All checks passed</text>

    <circle cx="116" cy="6" r="6" fill="#34C759"/>
    <path d="M113 6 L115 8 L119 4" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="128" y="10" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#34C759">2 approvals</text>
  </g>

  <!-- Focus session suggestion card -->
  <g filter="url(#shadow)">
    <rect x="16" y="320" width="358" height="180" rx="20" fill="#1E1E1E" stroke="#2A2A2A" stroke-width="1"/>
  </g>

  <!-- Coachy mascot - pointing -->
  <g transform="translate(45, 365)">
    <circle cx="30" cy="30" r="30" fill="url(#tealGradient)"/>

    <!-- Face -->
    <ellipse cx="22" cy="27" rx="5" ry="5" fill="#FFFFFF"/>
    <ellipse cx="21" cy="26" rx="2" ry="2" fill="#001133"/>

    <ellipse cx="38" cy="27" rx="5" ry="5" fill="#FFFFFF"/>
    <ellipse cx="37" cy="26" rx="2" ry="2" fill="#001133"/>

    <!-- Eyebrows -->
    <path d="M17 22 L27 20" stroke="#008B85" stroke-width="2" stroke-linecap="round"/>
    <path d="M33 20 L43 22" stroke="#008B85" stroke-width="2" stroke-linecap="round"/>

    <!-- Smile pointing gesture -->
    <path d="M22 38 Q30 44 38 38" stroke="#008B85" stroke-width="2" stroke-linecap="round" fill="none"/>

    <!-- Arm pointing right -->
    <path d="M48 35 L65 30" stroke="#008B85" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Suggestion text -->
  <text x="155" y="365" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="16" font-weight="600" fill="#F6F5F5">Start a Focus Review</text>
  <text x="155" y="388" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" fill="#7EBAB5">Review this PR without distractions.</text>
  <text x="155" y="408" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" fill="#666666">I'll block social apps and keep</text>
  <text x="155" y="426" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" fill="#666666">you in deep work mode.</text>

  <!-- Focus button -->
  <rect x="155" y="448" width="180" height="40" rx="12" fill="url(#orangeGradient)"/>
  <text x="245" y="475" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle">Start Focus Session</text>

  <!-- Dismiss -->
  <text x="195" y="535" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" fill="#666666" text-anchor="middle">Not now</text>

  <!-- Home indicator -->
  <rect x="140" y="816" width="110" height="5" rx="2.5" fill="#353A40"/>
</svg>
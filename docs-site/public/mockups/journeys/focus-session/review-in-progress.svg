<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="review-in-progress-title">
  <title id="review-in-progress-title">Review in Progress</title>
  <desc>Code review screen with draft comments during focus session</desc>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">

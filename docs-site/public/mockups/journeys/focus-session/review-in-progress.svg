      <text x="12" y="18" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#6E7681"> 4</text>
      <text x="32" y="18" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#F6F5F5">    session_id: String,</text>

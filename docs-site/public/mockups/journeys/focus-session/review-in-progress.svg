    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B3D"/>
      <stop offset="100%" stop-color="#F07B3F"/>
    </linearGradient>
    <linearGradient id="draftGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF6B3D" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF6B3D" stop-opacity="0.05"/>

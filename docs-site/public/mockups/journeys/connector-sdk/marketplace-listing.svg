<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="marketplace-listing-title">
  <title id="marketplace-listing-title">Connector Marketplace Listing</title>
  <desc>A published GitHub connector shown in the FocalPoint connector marketplace</desc>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="#0F1012" flood-opacity="0.15"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#000" stroke-opacity="0.12"/>
    </filter>
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7EBAB5"/>
      <stop offset="100%" stop-color="#0A9396"/>
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B3D"/>
      <stop offset="100%" stop-color="#F07B3F"/>
    </linearGradient>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#24292F"/>
      <stop offset="100%" stop-color="#1A1F24"/>
    </linearGradient>
  </defs>

  <!-- Phone frame -->
  <rect x="0" y="0" width="390" height="844" rx="44" fill="#0F1012"/>
  <rect x="1" y="1" width="388" height="842" rx="43" fill="#0F1012"/>

  <!-- Status bar -->
  <rect x="1" y="1" width="388" height="53" rx="43" fill="#0F1012"/>
  <text x="54" y="36" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600" fill="#F6F5F5">9:41</text>

  <!-- Header -->
  <rect x="0" y="54" width="390" height="56" fill="#1A1A1A"/>
  <text x="36" y="89" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600" fill="#F6F5F5">Marketplace</text>
  <text x="354" y="89" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" fill="#7EBAB5" text-anchor="end">Browse</text>

  <!-- Search bar -->
  <g transform="translate(16, 120)">
    <rect x="0" y="0" width="358" height="44" rx="12" fill="#1E1E1E"/>
    <circle cx="24" cy="22" r="8" stroke="#666666" stroke-width="2" fill="none"/>
    <path d="M30 28 L36 34" stroke="#666666" stroke-width="2" stroke-linecap="round"/>
    <text x="48" y="27" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" fill="#666666">Search connectors...</text>
  </g>

  <!-- Category pills -->
  <g transform="translate(16, 180)">
    <rect x="0" y="0" width="80" height="32" rx="16" fill="url(#tealGradient)"/>
    <text x="40" y="21" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">All</text>

    <rect x="90" y="0" width="90" height="32" rx="16" fill="#2A2A2A"/>
    <text x="135" y="21" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#F6F5F5" text-anchor="middle">Version Control</text>

    <rect x="190" y="0" width="80" height="32" rx="16" fill="#2A2A2A"/>
    <text x="230" y="21" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#F6F5F5" text-anchor="middle">Communication</text>

    <rect x="280" y="0" width="70" height="32" rx="16" fill="#2A2A2A"/>
    <text x="315" y="21" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#F6F5F5" text-anchor="middle">Project Mgmt</text>
  </g>

  <!-- Featured connector card -->
  <g transform="translate(16, 230)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="358" height="160" rx="16" fill="#1E1E1E"/>
    </g>

    <!-- Featured badge -->
    <rect x="16" y="12" width="72" height="22" rx="11" fill="url(#orangeGradient)"/>
    <text x="52" y="27" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="10" font-weight="600" fill="#FFFFFF" text-anchor="middle">FEATURED</text>

    <!-- Connector icon -->
    <g transform="translate(16, 48)">
      <rect x="0" y="0" width="56" height="56" rx="14" fill="url(#headerGradient)"/>
      <path d="M28 12 C18 12 12 18 12 28 C12 36.4 18 41.8 25.6 43.8 C26.4 44 26.8 43.6 26.8 43.2 V40.6 C22.8 41.4 21.2 38.8 21.2 38.8 C20.4 37.4 19.4 37 19.4 37 C18 36 19 37.2 19 37.2 C20 38 21.2 38.8 22.4 38.8 C26.4 38.8 28 36.4 28 36.4 C28 36.4 30 40 33.6 40.8 C33.6 40.8 34 40.8 34 40.8 C34 40.8 35.2 37.4 34 36 L35.6 36 C40.4 36 44 30.8 44 28 C44 18 35.2 12 28 12" fill="#FFFFFF" transform="scale(1.2) translate(-5, -5)"/>
    </g>

    <!-- Connector info -->
    <g transform="translate(84, 48)">
      <text x="0" y="18" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="18" font-weight="700" fill="#F6F5F5">GitHub</text>
      <text x="0" y="38" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#7EBAB5">by FocalPoint</text>

      <!-- Rating -->
      <g transform="translate(0, 50)">
        <path d="M0 0 L4 -4 L8 0 L4 4 Z" fill="#FFD700"/>
        <path d="M10 0 L14 -4 L18 0 L14 4 Z" fill="#FFD700"/>
        <path d="M20 0 L24 -4 L28 0 L24 4 Z" fill="#FFD700"/>
        <path d="M30 0 L34 -4 L38 0 L34 4 Z" fill="#FFD700"/>
        <path d="M40 0 L44 -4 L48 0 L44 4 Z" fill="#FFD700"/>
        <text x="56" y="4" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" fill="#666666">4.9 (2.1k)</text>
      </g>
    </g>

    <!-- Install button -->
    <g transform="translate(260, 60)">
      <rect x="0" y="0" width="82" height="36" rx="10" fill="url(#tealGradient)"/>
      <text x="41" y="24" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">Install</text>
    </g>

    <!-- Stats row -->
    <g transform="translate(16, 120)">
      <g>
        <circle cx="6" cy="6" r="4" fill="#34C759"/>
        <text x="14" y="10" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="10" fill="#34C759">v1.0.0</text>
      </g>

      <g transform="translate(60, 0)">
        <circle cx="6" cy="6" r="4" fill="#7EBAB5"/>
        <text x="14" y="10" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="10" fill="#7EBAB5">12k installs</text>
      </g>

      <g transform="translate(130, 0)">
        <circle cx="6" cy="6" r="4" fill="#AF52DE"/>
        <text x="14" y="10" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="10" fill="#AF52DE">OAuth2</text>
      </g>

      <g transform="translate(180, 0)">
        <circle cx="6" cy="6" r="4" fill="#FF6B3D"/>
        <text x="14" y="10" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="10" fill="#FF6B3D">3 triggers</text>
      </g>
    </g>
  </g>

  <!-- Capabilities -->
  <g transform="translate(16, 410)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" font-weight="600" fill="#666666">CAPABILITIES</text>

    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="170" height="60" rx="12" fill="#1E1E1E"/>
      <g transform="translate(12, 12)">
        <circle cx="12" cy="12" r="12" fill="#34C759" fill-opacity="0.2"/>
        <path d="M8 12 L11 15 L16 9" stroke="#34C759" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </g>
      <text x="44" y="22" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" font-weight="600" fill="#F6F5F5">Pull Requests</text>
      <text x="44" y="38" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="10" fill="#666666">Track & review PRs</text>
    </g>

    <g transform="translate(182, 20)">
      <rect x="0" y="0" width="170" height="60" rx="12" fill="#1E1E1E"/>
      <g transform="translate(12, 12)">
        <circle cx="12" cy="12" r="12" fill="#34C759" fill-opacity="0.2"/>
        <path d="M8 12 L11 15 L16 9" stroke="#34C759" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </g>
      <text x="44" y="22" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" font-weight="600" fill="#F6F5F5">Issues</text>
      <text x="44" y="38" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="10" fill="#666666">Sync issue updates</text>
    </g>

    <g transform="translate(0, 90)">
      <rect x="0" y="0" width="170" height="60" rx="12" fill="#1E1E1E"/>
      <g transform="translate(12, 12)">
        <circle cx="12" cy="12" r="12" fill="#34C759" fill-opacity="0.2"/>
        <path d="M8 12 L11 15 L16 9" stroke="#34C759" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </g>
      <text x="44" y="22" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" font-weight="600" fill="#F6F5F5">Workflows</text>
      <text x="44" y="38" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="10" fill="#666666">CI/CD monitoring</text>
    </g>

    <g transform="translate(182, 90)">
      <rect x="0" y="0" width="170" height="60" rx="12" fill="#1E1E1E"/>
      <g transform="translate(12, 12)">
        <circle cx="12" cy="12" r="12" fill="#34C759" fill-opacity="0.2"/>
        <path d="M8 12 L11 15 L16 9" stroke="#34C759" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </g>
      <text x="44" y="22" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" font-weight="600" fill="#F6F5F5">Focus Mode</text>
      <text x="44" y="38" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="10" fill="#666666">Deep work sessions</text>
    </g>
  </g>

  <!-- Other connectors section -->
  <g transform="translate(16, 580)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" font-weight="600" fill="#666666">OTHER POPULAR</text>

    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="358" height="72" rx="14" fill="#1E1E1E"/>
      <rect x="12" y="12" width="48" height="48" rx="12" fill="#007AFF"/>
      <path d="M36 24 L28 40 L44 40 M36 24 L36 32" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <text x="76" y="32" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" font-weight="600" fill="#F6F5F5">Slack</text>
      <text x="76" y="50" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" fill="#666666">8.3k installs</text>
      <rect x="300" y="26" width="56" height="28" rx="8" fill="#2A2A2A"/>
      <text x="328" y="45" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#F6F5F5" text-anchor="middle">Install</text>
    </g>

    <g transform="translate(0, 100)">
      <rect x="0" y="0" width="358" height="72" rx="14" fill="#1E1E1E"/>
      <rect x="12" y="12" width="48" height="48" rx="12" fill="#4A154B"/>
      <text x="36" y="40" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">Z</text>
      <text x="76" y="32" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" font-weight="600" fill="#F6F5F5">Zoom</text>
      <text x="76" y="50" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" fill="#666666">4.2k installs</text>
      <rect x="300" y="26" width="56" height="28" rx="8" fill="#2A2A2A"/>
      <text x="328" y="45" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#F6F5F5" text-anchor="middle">Install</text>
    </g>
  </g>

  <!-- Home indicator -->
  <rect x="140" y="816" width="110" height="5" rx="2.5" fill="#353A40"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="test-results-title">
  <title id="test-results-title">Cargo Test Output</title>
  <desc>Terminal showing successful cargo test output for a connector</desc>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="#0F1012" flood-opacity="0.15"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#000" stroke-opacity="0.12"/>
    </filter>
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7EBAB5"/>
      <stop offset="100%" stop-color="#0A9396"/>
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B3D"/>
      <stop offset="100%" stop-color="#F07B3F"/>
    </linearGradient>
    <linearGradient id="terminalBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#0F0F1A"/>
    </linearGradient>
  </defs>

  <!-- Phone frame -->
  <rect x="0" y="0" width="390" height="844" rx="44" fill="#0F1012"/>
  <rect x="1" y="1" width="388" height="842" rx="43" fill="#0F1012"/>

  <!-- Status bar -->
  <rect x="1" y="1" width="388" height="53" rx="43" fill="#0F1012"/>
  <text x="54" y="36" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600" fill="#F6F5F5">9:41</text>

  <!-- Terminal header -->
  <rect x="0" y="54" width="390" height="48" fill="#1A1A1A"/>

  <!-- Traffic lights -->
  <circle cx="30" cy="78" r="6" fill="#FF5F56"/>
  <circle cx="50" cy="78" r="6" fill="#FFBD2E"/>
  <circle cx="70" cy="78" r="6" fill="#27CA40"/>

  <text x="195" y="82" font-family="SF Mono, Menlo, monospace" font-size="14" fill="#F6F5F5" text-anchor="middle">Terminal</text>

  <!-- Terminal window -->
  <g transform="translate(16, 115)">
    <rect x="0" y="0" width="358" height="560" rx="12" fill="url(#terminalBg)"/>

    <!-- Terminal content -->
    <g transform="translate(16, 24)">
      <!-- Command prompt -->
      <text x="0" y="0" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#7EBAB5">$</text>
      <text x="12" y="0" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#F6F5F5"> cargo test --package github-connector</text>

      <!-- Test output -->
      <text x="0" y="24" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#6E7681">   Compiling github-connector v1.0.0</text>

      <text x="0" y="44" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#6E7681">    Finished test [unoptimized + debuginfo]</text>

      <text x="0" y="64" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#6E7681">      Target</text>
      <text x="50" y="64" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#6E7681">x86_64-apple-darwin</text>

      <text x="0" y="84" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#6E7681">     Doc-tests github-connector</text>

      <text x="0" y="110" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#6E7681">running 0 tests</text>

      <!-- Test results header -->
      <text x="0" y="140" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#6E7681">     Running</text>
      <text x="60" y="140" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#F6F5F5">tests/auth_test.rs</text>

      <!-- Test output lines -->
      <text x="0" y="166" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#6E7681">running 3 tests</text>

      <text x="0" y="192" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#7EBAB5">test auth::test_token_refresh ... ok</text>

      <text x="0" y="214" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#7EBAB5">test auth::test_oauth_flow ... ok</text>

      <text x="0" y="236" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#7EBAB5">test auth::test_scope_validation ... ok</text>

      <!-- Running next file -->
      <text x="0" y="268" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#6E7681">     Running</text>
      <text x="60" y="268" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#F6F5F5">tests/client_test.rs</text>

      <text x="0" y="294" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#6E7681">running 5 tests</text>

      <text x="0" y="316" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#7EBAB5">test client::test_list_repos ... ok</text>

      <text x="0" y="338" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#7EBAB5">test client::test_get_pr ... ok</text>

      <text x="0" y="360" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#7EBAB5">test client::test_create_issue ... ok</text>

      <text x="0" y="382" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#7EBAB5">test client::test_webhook_parse ... ok</text>

      <text x="0" y="404" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#7EBAB5">test client::test_rate_limit ... ok</text>

      <!-- Integration tests -->
      <text x="0" y="436" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#6E7681">     Running</text>
      <text x="60" y="436" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#F6F5F5">tests/integration_test.rs</text>

      <text x="0" y="462" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#6E7681">running 2 tests</text>

      <text x="0" y="484" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#7EBAB5">test integration::test_full_oauth ... ok</text>

      <text x="0" y="506" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#7EBAB5">test integration::test_webhook_flow ... ok</text>

      <!-- Success summary -->
      <rect x="-8" y="524" width="340" height="28" rx="4" fill="#34C759" fill-opacity="0.15"/>

      <text x="0" y="542" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#34C759">test result: ok. 10 passed; 0 failed; 0 ignored; 0 filtered out</text>

      <text x="0" y="560" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#34C759">   0 warnings emitted</text>
    </g>
  </g>

  <!-- Success banner -->
  <g filter="url(#cardShadow)">
    <rect x="16" y="690" width="358" height="60" rx="12" fill="#1E1E1E"/>
  </g>

  <g transform="translate(36, 708)">
    <circle cx="14" cy="14" r="14" fill="#34C759"/>
    <path d="M8 14 L12 18 L20 10" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <text x="40" y="12" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" font-weight="600" fill="#F6F5F5">All tests passed!</text>
    <text x="40" y="30" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#7EBAB5">10 tests in 3 test files</text>

    <g transform="translate(280, 4)">
      <rect x="0" y="0" width="64" height="28" rx="8" fill="url(#tealGradient)"/>
      <text x="32" y="18" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">Deploy</text>
    </g>
  </g>

  <!-- Home indicator -->
  <rect x="140" y="816" width="110" height="5" rx="2.5" fill="#353A40"/>
</svg>
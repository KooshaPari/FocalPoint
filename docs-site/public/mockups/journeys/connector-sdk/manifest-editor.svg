<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="manifest-editor-title">
  <title id="manifest-editor-title">Connector TOML Editor</title>
  <desc>Code editor showing a connector.toml manifest file with syntax highlighting</desc>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="#0F1012" flood-opacity="0.15"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#000" stroke-opacity="0.12"/>
    </filter>
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7EBAB5"/>
      <stop offset="100%" stop-color="#0A9396"/>
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B3D"/>
      <stop offset="100%" stop-color="#F07B3F"/>
    </linearGradient>
  </defs>

  <!-- Phone frame -->
  <rect x="0" y="0" width="390" height="844" rx="44" fill="#0F1012"/>
  <rect x="1" y="1" width="388" height="842" rx="43" fill="#0F1012"/>

  <!-- Status bar -->
  <rect x="1" y="1" width="388" height="53" rx="43" fill="#0F1012"/>
  <text x="54" y="36" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600" fill="#F6F5F5">9:41</text>

  <!-- Editor header -->
  <rect x="0" y="54" width="390" height="56" fill="#1A1A1A"/>
  <text x="36" y="89" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600" fill="#F6F5F5">connector.toml</text>
  <circle cx="354" cy="82" r="6" fill="#34C759"/>

  <!-- Toolbar -->
  <g transform="translate(16, 125)">
    <rect x="0" y="0" width="358" height="36" rx="8" fill="#1E1E1E"/>

    <!-- Format button -->
    <g transform="translate(8, 4)">
      <rect x="0" y="0" width="64" height="28" rx="6" fill="#2A2A2A"/>
      <text x="32" y="18" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#F6F5F5" text-anchor="middle">Format</text>
    </g>

    <!-- Validate button -->
    <g transform="translate(80, 4)">
      <rect x="0" y="0" width="72" height="28" rx="6" fill="url(#tealGradient)"/>
      <text x="36" y="18" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">Validate</text>
    </g>

    <!-- Save button -->
    <g transform="translate(160, 4)">
      <rect x="0" y="0" width="56" height="28" rx="6" fill="#2A2A2A"/>
      <text x="28" y="18" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#F6F5F5" text-anchor="middle">Save</text>
    </g>

    <!-- Deploy button -->
    <g transform="translate(224, 4)">
      <rect x="0" y="0" width="64" height="28" rx="6" fill="url(#orangeGradient)"/>
      <text x="32" y="18" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">Deploy</text>
    </g>
  </g>

  <!-- Code editor area -->
  <g transform="translate(16, 175)">
    <rect x="0" y="0" width="358" height="520" rx="12" fill="#1E1E1E"/>

    <!-- Line numbers -->
    <g transform="translate(8, 16)">
      <text x="0" y="0" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#4A4A4A"> 1</text>
      <text x="0" y="22" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#4A4A4A"> 2</text>
      <text x="0" y="44" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#4A4A4A"> 3</text>
      <text x="0" y="66" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#4A4A4A"> 4</text>
      <text x="0" y="88" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#4A4A4A"> 5</text>
      <text x="0" y="110" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#4A4A4A"> 6</text>
      <text x="0" y="132" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#4A4A4A"> 7</text>
      <text x="0" y="154" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#4A4A4A"> 8</text>
      <text x="0" y="176" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#4A4A4A"> 9</text>
      <text x="0" y="198" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#4A4A4A">10</text>
      <text x="0" y="220" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#4A4A4A">11</text>
      <text x="0" y="242" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#4A4A4A">12</text>
      <text x="0" y="264" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#4A4A4A">13</text>
      <text x="0" y="286" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#4A4A4A">14</text>
      <text x="0" y="308" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#4A4A4A">15</text>
      <text x="0" y="330" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#4A4A4A">16</text>
      <text x="0" y="352" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#4A4A4A">17</text>
      <text x="0" y="374" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#4A4A4A">18</text>
      <text x="0" y="396" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#4A4A4A">19</text>
      <text x="0" y="418" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#4A4A4A">20</text>
      <text x="0" y="440" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#4A4A4A">21</text>
      <text x="0" y="462" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#4A4A4A">22</text>
      <text x="0" y="484" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#4A4A4A">23</text>
    </g>

    <!-- Code content -->
    <g transform="translate(36, 16)">
      <!-- Line 1: Comment -->
      <text x="0" y="0" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#6E7681"># Connector Manifest</text>

      <!-- Line 2: Empty -->
      <text x="0" y="22" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#F6F5F5"></text>

      <!-- Line 3: Basic section -->
      <text x="0" y="44" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#FF6B3D">[connector]</text>

      <!-- Line 4: name -->
      <text x="0" y="66" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#7EBAB5">name</text>
      <text x="45" y="66" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#F6F5F5"> = </text>
      <text x="60" y="66" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#A5D6A7">"github-enterprise"</text>

      <!-- Line 5: version -->
      <text x="0" y="88" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#7EBAB5">version</text>
      <text x="70" y="88" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#F6F5F5"> = </text>
      <text x="85" y="88" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#A5D6A7">"1.0.0"</text>

      <!-- Line 6: Empty -->
      <text x="0" y="110" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#F6F5F5"></text>

      <!-- Line 7: auth section -->
      <text x="0" y="132" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#FF6B3D">[auth]</text>

      <!-- Line 8: type -->
      <text x="0" y="154" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#7EBAB5">type</text>
      <text x="45" y="154" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#F6F5F5"> = </text>
      <text x="60" y="154" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#A5D6A7">"oauth2"</text>

      <!-- Line 9: Empty -->
      <text x="0" y="176" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#F6F5F5"></text>

      <!-- Line 10: scopes -->
      <text x="0" y="198" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#7EBAB5">scopes</text>
      <text x="60" y="198" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#F6F5F5"> = [</text>

      <!-- Line 11: scope 1 -->
      <text x="16" y="220" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#A5D6A7">"repo"</text>

      <!-- Line 12: scope 2 -->
      <text x="16" y="242" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#A5D6A7">"workflow"</text>

      <!-- Line 13: scope 3 -->
      <text x="16" y="264" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#A5D6A7">"read:user"</text>

      <!-- Line 14: Empty -->
      <text x="0" y="286" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#F6F5F5"></text>

      <!-- Line 15: close bracket -->
      <text x="0" y="308" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#F6F5F5">]</text>

      <!-- Line 16: Empty -->
      <text x="0" y="330" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#F6F5F5"></text>

      <!-- Line 17: triggers -->
      <text x="0" y="352" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#FF6B3D">[triggers]</text>

      <!-- Line 18 -->
      <text x="0" y="374" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#7EBAB5">pull_requests</text>
      <text x="110" y="374" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#F6F5F5"> = </text>
      <text x="125" y="374" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#A5D6A7">true</text>

      <!-- Line 19 -->
      <text x="0" y="396" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#7EBAB5">issues</text>
      <text x="110" y="396" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#F6F5F5"> = </text>
      <text x="125" y="396" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#A5D6A7">true</text>

      <!-- Line 20 -->
      <text x="0" y="418" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#7EBAB5">workflow_runs</text>
      <text x="110" y="418" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#F6F5F5"> = </text>
      <text x="125" y="418" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#A5D6A7">true</text>

      <!-- Line 21: Empty -->
      <text x="0" y="440" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#F6F5F5"></text>

      <!-- Line 22: endpoints -->
      <text x="0" y="462" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#FF6B3D">[endpoints]</text>

      <!-- Line 23: base_url -->
      <text x="0" y="484" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#7EBAB5">base_url</text>
      <text x="80" y="484" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#F6F5F5"> = </text>
      <text x="95" y="484" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#A5D6A7">"https://api.github.com"</text>
    </g>
  </g>

  <!-- Validation status -->
  <g filter="url(#cardShadow)">
    <rect x="16" y="710" width="358" height="50" rx="12" fill="#1E1E1E"/>
  </g>
  <g transform="translate(36, 728)">
    <circle cx="8" cy="8" r="8" fill="#34C759"/>
    <path d="M4 8 L7 11 L12 5" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="24" y="12" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" fill="#34C759">Manifest is valid</text>
    <text x="342" y="12" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" fill="#666666" text-anchor="end">Ready to deploy</text>
  </g>

  <!-- Home indicator -->
  <rect x="140" y="816" width="110" height="5" rx="2.5" fill="#353A40"/>
</svg>
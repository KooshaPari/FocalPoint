<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="pr-review-rule-title pr-review-rule-desc">
  <title id="pr-review-rule-title">PR Review Rule Editor</title>
  <desc id="pr-review-rule-desc">Rule configuration screen for PR review focus automation and notifications</desc>

  <defs>
    <!-- iOS-style gradient background -->
    <linearGradient id="iosBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F2F2F7"/>
      <stop offset="100%" stop-color="#E5E5EA"/>
    </linearGradient>

    <!-- Card shadow -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.1"/>
    </filter>

    <!-- Subtle shadow for toggles -->
    <filter id="toggleShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>

    <!-- Focal orange -->
    <linearGradient id="focalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B3D"/>
      <stop offset="100%" stop-color="#FF8B65"/>
    </linearGradient>

    <!-- Teal accent -->
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C7BE"/>
      <stop offset="100%" stop-color="#7EBAB5"/>
    </linearGradient>

    <!-- Purple for rules -->
    <linearGradient id="ruleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#AF52DE"/>
      <stop offset="100%" stop-color="#BF5AF2"/>
    </linearGradient>

    <!-- Toggle on gradient -->
    <linearGradient id="toggleOnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C7BE"/>
      <stop offset="100%" stop-color="#34C759"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="url(#iosBg)"/>

  <!-- Navigation bar -->
  <rect x="0" y="54" width="390" height="56" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <circle cx="44" cy="82" r="16" fill="#F2F2F7"/>
  <path d="M38 82 L50 82 M44 76 L44 88" stroke="#8E8E93" stroke-width="2" stroke-linecap="round"/>
  <text x="195" y="89" text-anchor="middle" fill="#000000" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600">PR Review Rules</text>

  <!-- Header description -->
  <text x="24" y="136" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14">Configure when to focus on PR reviews</text>

  <!-- Main rule card -->
  <rect x="24" y="152" width="342" height="280" rx="16" fill="#FFFFFF" filter="url(#cardShadow)"/>

  <!-- Rule: Focus on Own PRs -->
  <g transform="translate(40, 172)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#FF6B3D" fill-opacity="0.12"/>
    <path d="M12 20 L20 28 L28 12" stroke="#FF6B3D" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="56" y="16" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="16" font-weight="500">Focus on Own PRs</text>
    <text x="56" y="34" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13">Auto-focus when you submit a PR</text>
    <!-- Toggle -->
    <rect x="268" y="4" width="50" height="30" rx="15" fill="url(#toggleOnGrad)" filter="url(#toggleShadow)"/>
    <circle cx="305" cy="19" r="12" fill="#FFFFFF"/>
  </g>

  <!-- Divider -->
  <line x1="40" y1="230" x2="350" y2="230" stroke="#F2F2F7" stroke-width="1"/>

  <!-- Rule: Review Requests -->
  <g transform="translate(40, 246)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#7EBAB5" fill-opacity="0.2"/>
    <circle cx="20" cy="20" r="10" stroke="#00C7BE" stroke-width="2" fill="none"/>
    <text x="20" y="24" text-anchor="middle" fill="#00C7BE" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="10" font-weight="600">R</text>
    <text x="56" y="16" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="16" font-weight="500">Review Requests</text>
    <text x="56" y="34" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13">Notify when assigned as reviewer</text>
    <!-- Toggle -->
    <rect x="268" y="4" width="50" height="30" rx="15" fill="url(#toggleOnGrad)" filter="url(#toggleShadow)"/>
    <circle cx="305" cy="19" r="12" fill="#FFFFFF"/>
  </g>

  <!-- Divider -->
  <line x1="40" y1="304" x2="350" y2="304" stroke="#F2F2F7" stroke-width="1"/>

  <!-- Rule: Code Owner -->
  <g transform="translate(40, 320)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#AF52DE" fill-opacity="0.12"/>
    <rect x="12" y="12" width="16" height="16" rx="4" stroke="#AF52DE" stroke-width="2" fill="none"/>
    <text x="56" y="16" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="16" font-weight="500">Code Owner Files</text>
    <text x="56" y="34" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13">Focus when changes affect your files</text>
    <!-- Toggle -->
    <rect x="268" y="4" width="50" height="30" rx="15" fill="#E5E5EA" filter="url(#toggleShadow)"/>
    <circle cx="283" cy="19" r="12" fill="#FFFFFF"/>
  </g>

  <!-- Divider -->
  <line x1="40" y1="378" x2="350" y2="378" stroke="#F2F2F7" stroke-width="1"/>

  <!-- Rule: Urgent PRs -->
  <g transform="translate(40, 394)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#FF3B30" fill-opacity="0.12"/>
    <path d="M20 12 L28 28 L12 28 Z" stroke="#FF3B30" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="56" y="16" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="16" font-weight="500">Urgent PRs</text>
    <text x="56" y="34" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13">Always focus on hotfix branches</text>
    <!-- Toggle -->
    <rect x="268" y="4" width="50" height="30" rx="15" fill="url(#toggleOnGrad)" filter="url(#toggleShadow)"/>
    <circle cx="305" cy="19" r="12" fill="#FFFFFF"/>
  </g>

  <!-- Time-based rules section -->
  <text x="24" y="464" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600">Time-Based Rules</text>

  <rect x="24" y="480" width="342" height="140" rx="16" fill="#FFFFFF" filter="url(#cardShadow)"/>

  <!-- Batch reviews setting -->
  <g transform="translate(40, 500)">
    <text x="0" y="16" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="16" font-weight="500">Batch Reviews</text>
    <text x="0" y="34" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13">Group PR notifications</text>
    <rect x="268" y="0" width="50" height="30" rx="15" fill="url(#toggleOnGrad)" filter="url(#toggleShadow)"/>
    <circle cx="305" cy="15" r="12" fill="#FFFFFF"/>
  </g>

  <!-- Batch time picker -->
  <g transform="translate(40, 556)">
    <text x="0" y="16" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="16" font-weight="500">Batch Time</text>
    <rect x="268" y="-8" width="80" height="32" rx="8" fill="#F2F2F7"/>
    <text x="308" y="14" text-anchor="middle" fill="#FF6B3D" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" font-weight="600">2:00 PM</text>
    <path d="M332 6 L336 10 L332 14 M336 10 L328 10" stroke="#FF6B3D" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Focus duration section -->
  <text x="24" y="652" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600">Focus Duration</text>

  <rect x="24" y="668" width="342" height="80" rx="16" fill="#FFFFFF" filter="url(#cardShadow)"/>

  <!-- Duration selector -->
  <g transform="translate(40, 688)">
    <!-- Selected option -->
    <rect x="0" y="0" width="70" height="40" rx="10" fill="url(#tealGrad)"/>
    <text x="35" y="26" text-anchor="middle" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" font-weight="600">30m</text>

    <!-- Unselected options -->
    <rect x="80" y="0" width="70" height="40" rx="10" fill="#F2F2F7"/>
    <text x="115" y="26" text-anchor="middle" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" font-weight="500">1h</text>

    <rect x="160" y="0" width="70" height="40" rx="10" fill="#F2F2F7"/>
    <text x="195" y="26" text-anchor="middle" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" font-weight="500">2h</text>

    <rect x="240" y="0" width="70" height="40" rx="10" fill="#F2F2F7"/>
    <text x="275" y="26" text-anchor="middle" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" font-weight="500">4h</text>
  </g>

  <!-- Save button -->
  <rect x="24" y="776" width="342" height="52" rx="14" fill="url(#focalGrad)" filter="url(#cardShadow)"/>
  <text x="195" y="808" text-anchor="middle" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600">Save Rules</text>

  <!-- Home indicator -->
  <rect x="140" y="820" width="110" height="5" rx="2.5" fill="#000000" fill-opacity="0.3"/>
</svg>

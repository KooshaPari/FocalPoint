<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="milestone-celebration-title milestone-celebration-desc">
  <title id="milestone-celebration-title">Milestone Shipped Celebration</title>
  <desc id="milestone-celebration-desc">Celebration screen showing milestone completion with confetti and achievements</desc>

  <defs>
    <!-- Celebration gradient background -->
    <linearGradient id="celebrationBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF8F5"/>
      <stop offset="100%" stop-color="#FFE4D6"/>
    </linearGradient>

    <!-- Card shadow -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.1"/>
    </filter>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Focal orange gradient -->
    <linearGradient id="focalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B3D"/>
      <stop offset="100%" stop-color="#FF8B65"/>
    </linearGradient>

    <!-- Teal accent -->
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C7BE"/>
      <stop offset="100%" stop-color="#7EBAB5"/>
    </linearGradient>

    <!-- Gold gradient for trophy -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>

    <!-- Confetti colors -->
    <linearGradient id="confettiOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B3D"/>
      <stop offset="100%" stop-color="#FF8B65"/>
    </linearGradient>

    <!-- Star gradient -->
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="url(#celebrationBg)"/>

  <!-- Confetti particles -->
  <g opacity="0.9">
    <!-- Orange confetti -->
    <rect x="40" y="60" width="12" height="8" rx="2" fill="#FF6B3D" transform="rotate(25 46 64)"/>
    <rect x="80" y="120" width="10" height="6" rx="2" fill="#FF8B65" transform="rotate(-15 85 123)"/>
    <rect x="320" y="80" width="12" height="8" rx="2" fill="#FF6B3D" transform="rotate(40 326 84)"/>
    <rect x="350" y="180" width="10" height="6" rx="2" fill="#FF8B65" transform="rotate(-30 355 183)"/>
    <rect x="60" y="300" width="8" height="5" rx="2" fill="#FF6B3D" transform="rotate(60 64 302)"/>
    <rect x="340" y="340" width="10" height="6" rx="2" fill="#FF8B65" transform="rotate(-45 345 343)"/>

    <!-- Teal confetti -->
    <rect x="120" y="50" width="10" height="6" rx="2" fill="#00C7BE" transform="rotate(-20 125 53)"/>
    <rect x="280" y="140" width="12" height="8" rx="2" fill="#7EBAB5" transform="rotate(35 286 144)"/>
    <rect x="30" y="220" width="8" height="5" rx="2" fill="#00C7BE" transform="rotate(50 34 222)"/>
    <rect x="360" y="260" width="10" height="6" rx="2" fill="#7EBAB5" transform="rotate(-25 365 263)"/>

    <!-- Gold confetti -->
    <rect x="160" y="40" width="8" height="5" rx="2" fill="#FFD700" transform="rotate(15 164 42)"/>
    <rect x="240" y="100" width="10" height="6" rx="2" fill="#FFA500" transform="rotate(-35 245 103)"/>
    <rect x="100" y="380" width="12" height="8" rx="2" fill="#FFD700" transform="rotate(45 106 384)"/>
    <rect x="300" y="420" width="8" height="5" rx="2" fill="#FFA500" transform="rotate(-55 304 422)"/>
  </g>

  <!-- Stars -->
  <g fill="#FFD700" filter="url(#glow)">
    <path transform="translate(50, 100) scale(0.8)" d="M12 2 L15 9 L22 9 L16 14 L18 21 L12 17 L6 21 L8 14 L2 9 L9 9 Z"/>
    <path transform="translate(340, 60) scale(0.6)" d="M12 2 L15 9 L22 9 L16 14 L18 21 L12 17 L6 21 L8 14 L2 9 L9 9 Z"/>
    <path transform="translate(80, 380) scale(0.7)" d="M12 2 L15 9 L22 9 L16 14 L18 21 L12 17 L6 21 L8 14 L2 9 L9 9 Z"/>
    <path transform="translate(310, 320) scale(0.9)" d="M12 2 L15 9 L22 9 L16 14 L18 21 L12 17 L6 21 L8 14 L2 9 L9 9 Z"/>
  </g>

  <!-- Trophy icon -->
  <g transform="translate(195, 140)">
    <!-- Glow effect -->
    <ellipse cx="0" cy="30" rx="60" ry="50" fill="#FFD700" fill-opacity="0.2" filter="url(#glow)"/>

    <!-- Trophy cup -->
    <path d="M-30 -20 L30 -20 L25 20 Q25 40 0 50 Q-25 40 -25 20 Z" fill="url(#goldGrad)" stroke="#CC8800" stroke-width="2"/>

    <!-- Trophy handles -->
    <path d="M-30 -15 Q-50 -15 -50 10 Q-50 25 -30 20" fill="none" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round"/>
    <path d="M30 -15 Q50 -15 50 10 Q50 25 30 20" fill="none" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round"/>

    <!-- Trophy base -->
    <rect x="-20" y="48" width="40" height="12" rx="3" fill="url(#goldGrad)"/>
    <rect x="-28" y="58" width="56" height="8" rx="2" fill="#CC8800"/>
  </g>

  <!-- Celebration text -->
  <text x="195" y="280" text-anchor="middle" fill="#FF6B3D" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="28" font-weight="800">Milestone Shipped!</text>

  <text x="195" y="316" text-anchor="middle" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="18" font-weight="600">v2.5.0 Release</text>

  <text x="195" y="344" text-anchor="middle" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15">Authentication Overhaul Complete</text>

  <!-- Achievement card -->
  <rect x="24" y="370" width="342" height="180" rx="20" fill="#FFFFFF" filter="url(#cardShadow)"/>

  <g transform="translate(44, 392)">
    <text fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600">Your Contributions</text>

    <!-- Stats row -->
    <g transform="translate(0, 30)">
      <!-- Commits -->
      <g>
        <circle cx="30" cy="24" r="24" fill="#FF6B3D" fill-opacity="0.12"/>
        <path d="M24 24 L30 30 L36 18" stroke="#FF6B3D" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="30" y="70" text-anchor="middle" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="20" font-weight="700">47</text>
        <text x="30" y="86" text-anchor="middle" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11">commits</text>
      </g>

      <!-- PRs -->
      <g transform="translate(105, 0)">
        <circle cx="30" cy="24" r="24" fill="#7EBAB5" fill-opacity="0.2"/>
        <rect x="24" y="18" width="12" height="12" rx="2" stroke="#00C7BE" stroke-width="2" fill="none"/>
        <text x="30" y="70" text-anchor="middle" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="20" font-weight="700">12</text>
        <text x="30" y="86" text-anchor="middle" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11">PRs merged</text>
      </g>

      <!-- Hours -->
      <g transform="translate(210, 0)">
        <circle cx="30" cy="24" r="24" fill="#FFD700" fill-opacity="0.2"/>
        <circle cx="30" cy="24" r="10" stroke="#FFA500" stroke-width="2.5" fill="none"/>
        <path d="M30 16 L30 24 L36 24" stroke="#FFA500" stroke-width="2" stroke-linecap="round"/>
        <text x="30" y="70" text-anchor="middle" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="20" font-weight="700">18h</text>
        <text x="30" y="86" text-anchor="middle" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11">focus time</text>
      </g>
    </g>
  </g>

  <!-- Badges earned -->
  <text x="24" y="578" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600">Badges Earned</text>

  <g transform="translate(24, 596)">
    <!-- Badge 1 - Ship it -->
    <rect x="0" y="0" width="110" height="80" rx="14" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <circle cx="55" cy="28" r="20" fill="#34C759" fill-opacity="0.15"/>
    <path d="M47 28 L53 34 L63 22" stroke="#34C759" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="55" y="64" text-anchor="middle" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" font-weight="600">Ship It</text>

    <!-- Badge 2 - Code Master -->
    <rect x="122" y="0" width="110" height="80" rx="14" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <circle cx="177" cy="28" r="20" fill="#FF6B3D" fill-opacity="0.15"/>
    <path d="M169 28 L177 20 L185 28 L177 36 Z" stroke="#FF6B3D" stroke-width="2" fill="none"/>
    <text x="177" y="64" text-anchor="middle" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" font-weight="600">Code Master</text>

    <!-- Badge 3 - Team Player (locked/future) -->
    <rect x="244" y="0" width="110" height="80" rx="14" fill="#F2F2F7"/>
    <circle cx="299" cy="28" r="20" fill="#E5E5EA"/>
    <path d="M293 28 L299 22 L305 28 L299 34 Z" stroke="#C7C7CC" stroke-width="2" fill="none"/>
    <text x="299" y="64" text-anchor="middle" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" font-weight="600">5 reviewers</text>
  </g>

  <!-- Share button -->
  <rect x="24" y="700" width="342" height="56" rx="14" fill="url(#focalGrad)" filter="url(#cardShadow)"/>
  <circle cx="60" cy="728" r="14" fill="#FFFFFF" fill-opacity="0.3"/>
  <path d="M56 728 L64 728 M60 724 L60 732 M60 732 L56 728 M60 732 L64 728" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  <text x="195" y="736" text-anchor="middle" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600">Share Achievement</text>

  <!-- Continue button -->
  <text x="195" y="786" text-anchor="middle" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15">Continue to dashboard</text>

  <!-- Home indicator -->
  <rect x="140" y="820" width="110" height="5" rx="2.5" fill="#000000" fill-opacity="0.2"/>
</svg>

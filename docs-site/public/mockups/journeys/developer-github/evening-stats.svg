<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="evening-stats-title evening-stats-desc">
  <title id="evening-stats-title">Evening Shutdown - Code Activity</title>
  <desc id="evening-stats-desc">Evening summary showing code activity, focus time, and shutdown recommendations</desc>

  <defs>
    <!-- Evening gradient (warm sunset tones) -->
    <linearGradient id="eveningBgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF5EE"/>
      <stop offset="50%" stop-color="#FFE4D6"/>
      <stop offset="100%" stop-color="#FFD9C7"/>
    </linearGradient>

    <!-- Card shadow -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.08"/>
    </filter>

    <!-- Focal orange gradient -->
    <linearGradient id="focalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B3D"/>
      <stop offset="100%" stop-color="#FF8B65"/>
    </linearGradient>

    <!-- Teal accent -->
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C7BE"/>
      <stop offset="100%" stop-color="#7EBAB5"/>
    </linearGradient>

    <!-- Sunset gradient for header -->
    <linearGradient id="sunsetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8B65"/>
      <stop offset="50%" stop-color="#FF6B3D"/>
      <stop offset="100%" stop-color="#C94A21"/>
    </linearGradient>

    <!-- Moon gradient -->
    <linearGradient id="moonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8E8ED"/>
      <stop offset="100%" stop-color="#C7C7CC"/>
    </linearGradient>

    <!-- Stats card gradient -->
    <linearGradient id="statCardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FDFCFB"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="url(#eveningBgGrad)"/>

  <!-- Header with sunset -->
  <rect x="0" y="0" width="390" height="180" fill="url(#sunsetGrad)"/>

  <!-- Sun/Moon icon -->
  <g transform="translate(320, 60)">
    <circle cx="0" cy="0" r="30" fill="#FFD93D" fill-opacity="0.9"/>
    <circle cx="-8" cy="-8" r="25" fill="#FFE4D6"/>
    <text x="0" y="6" text-anchor="middle" fill="#FF8B65" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" font-weight="600">6:42</text>
  </g>

  <!-- Time display -->
  <text x="24" y="80" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="42" font-weight="200">6:42 PM</text>
  <text x="24" y="108" fill="#FFFFFF" fill-opacity="0.9" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="16">Evening shutdown time</text>

  <!-- Greeting -->
  <text x="24" y="148" fill="#FFFFFF" fill-opacity="0.8" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14">Great coding day, Bob!</text>

  <!-- Summary card -->
  <rect x="24" y="200" width="342" height="120" rx="20" fill="#FFFFFF" filter="url(#cardShadow)"/>

  <g transform="translate(40, 220)">
    <!-- Productivity score -->
    <circle cx="40" cy="40" r="36" fill="none" stroke="#E5E5EA" stroke-width="8"/>
    <circle cx="40" cy="40" r="36" fill="none" stroke="url(#tealGrad)" stroke-width="8"
            stroke-dasharray="180 226" transform="rotate(-90 40 40)"/>
    <text x="40" y="46" text-anchor="middle" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="22" font-weight="700">87</text>
    <text x="40" y="92" text-anchor="middle" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11">score</text>
  </g>

  <g transform="translate(130, 228)">
    <text fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="16" font-weight="600">Daily Summary</text>
    <text y="22" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13">4h 23m of focused coding</text>
    <text y="42" fill="#34C759" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" font-weight="500">Above your weekly average</text>
  </g>

  <!-- Code activity section -->
  <text x="24" y="352" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="18" font-weight="600">Code Activity</text>

  <!-- Activity stats row -->
  <g transform="translate(24, 370)">
    <!-- Commits -->
    <rect x="0" y="0" width="108" height="90" rx="14" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <circle cx="54" cy="28" r="18" fill="#34C759" fill-opacity="0.15"/>
    <path d="M50 28 L54 32 L58 24" stroke="#34C759" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="54" y="70" text-anchor="middle" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="24" font-weight="700">18</text>
    <text x="54" y="84" text-anchor="middle" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11">commits</text>

    <!-- PRs merged -->
    <rect x="120" y="0" width="108" height="90" rx="14" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <circle cx="174" cy="28" r="18" fill="#FF6B3D" fill-opacity="0.15"/>
    <path d="M170 24 L178 24 L178 32 L170 32 Z M172 28 L176 28" stroke="#FF6B3D" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="174" y="70" text-anchor="middle" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="24" font-weight="700">5</text>
    <text x="174" y="84" text-anchor="middle" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11">PRs merged</text>

    <!-- Lines changed -->
    <rect x="240" y="0" width="108" height="90" rx="14" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <circle cx="294" cy="28" r="18" fill="#7EBAB5" fill-opacity="0.2"/>
    <path d="M290 28 L294 24 L298 28 M294 24 L294 32" stroke="#00C7BE" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="294" y="70" text-anchor="middle" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="24" font-weight="700">847</text>
    <text x="294" y="84" text-anchor="middle" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11">lines changed</text>
  </g>

  <!-- Repository breakdown -->
  <text x="24" y="492" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600">By Repository</text>

  <rect x="24" y="510" width="342" height="150" rx="16" fill="#FFFFFF" filter="url(#cardShadow)"/>

  <!-- Repo bar charts -->
  <g transform="translate(40, 530)">
    <!-- focalpoint/core -->
    <text y="12" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" font-weight="500">focalpoint/core</text>
    <rect x="0" y="20" width="290" height="10" rx="5" fill="#F2F2F7"/>
    <rect x="0" y="20" width="220" height="10" rx="5" fill="url(#focalGrad)"/>
    <text x="296" y="30" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11">2h 15m</text>

    <!-- ai-assistant/plugin -->
    <text y="58" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" font-weight="500">ai-assistant/plugin</text>
    <rect x="0" y="66" width="290" height="10" rx="5" fill="#F2F2F7"/>
    <rect x="0" y="66" width="145" height="10" rx="5" fill="#7EBAB5"/>
    <text x="296" y="76" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11">1h 12m</text>

    <!-- api-gateway/server -->
    <text y="104" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" font-weight="500">api-gateway/server</text>
    <rect x="0" y="112" width="290" height="10" rx="5" fill="#F2F2F7"/>
    <rect x="0" y="112" width="72" height="10" rx="5" fill="#AF52DE" fill-opacity="0.7"/>
    <text x="296" y="122" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11">45m</text>
  </g>

  <!-- Shutdown recommendation -->
  <rect x="24" y="684" width="342" height="80" rx="16" fill="url(#tealGrad)" filter="url(#cardShadow)"/>

  <g transform="translate(44, 706)">
    <!-- Moon icon -->
    <circle cx="16" cy="16" r="16" fill="#FFFFFF" fill-opacity="0.2"/>
    <path d="M20 10 C14 10 10 16 10 22 C12 20 16 18 20 18 C14 18 10 22 10 28 C14 28 20 24 20 18 Z" fill="#FFFFFF" fill-opacity="0.8"/>

    <text x="48" y="14" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600">Time to wind down</text>
    <text x="48" y="32" fill="#FFFFFF" fill-opacity="0.9" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13">Commit pending changes and end your day</text>
  </g>

  <!-- Action buttons -->
  <g transform="translate(24, 784)">
    <rect x="0" y="0" width="170" height="48" rx="12" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="85" y="30" text-anchor="middle" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="500">View Details</text>

    <rect x="184" y="0" width="170" height="48" rx="12" fill="url(#focalGrad)" filter="url(#cardShadow)"/>
    <text x="269" y="30" text-anchor="middle" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600">Shutdown</text>
  </g>

  <!-- Home indicator -->
  <rect x="140" y="820" width="110" height="5" rx="2.5" fill="#000000" fill-opacity="0.2"/>
</svg>

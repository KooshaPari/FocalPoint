<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="github-oauth-title github-oauth-desc">
  <title id="github-oauth-title">GitHub OAuth Authorization</title>
  <desc id="github-oauth-desc">GitHub OAuth authorization screen showing FocalPoint app requesting access to GitHub repositories</desc>

  <defs>
    <!-- iOS-style gradient background -->
    <linearGradient id="iosBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F2F2F7"/>
      <stop offset="100%" stop-color="#E5E5EA"/>
    </linearGradient>

    <!-- Card shadow -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.15"/>
    </filter>

    <!-- Button shadow -->
    <filter id="btnShadow" x="-5%" y="-10%" width="110%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.2"/>
    </filter>

    <!-- GitHub mark gradient -->
    <linearGradient id="githubGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B3D"/>
      <stop offset="100%" stop-color="#FF8B65"/>
    </linearGradient>

    <!-- Teal accent -->
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C7BE"/>
      <stop offset="100%" stop-color="#7EBAB5"/>
    </linearGradient>

    <!-- Status bar gradient -->
    <linearGradient id="statusBarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1C1C1E"/>
      <stop offset="100%" stop-color="#2C2C2E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="url(#iosBg)"/>

  <!-- Status bar -->
  <rect x="0" y="0" width="390" height="54" fill="url(#statusBarGrad)"/>
  <text x="195" y="34" text-anchor="middle" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600">9:41</text>
  <!-- Status icons -->
  <g fill="#FFFFFF">
    <path d="M338 24 L342 28 L346 20" stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="348" y="21" width="3" height="9" rx="1.5"/>
    <rect x="353" y="24" width="3" height="6" rx="1.5"/>
    <rect x="358" y="27" width="3" height="3" rx="1.5"/>
  </g>

  <!-- Navigation bar -->
  <rect x="0" y="54" width="390" height="56" fill="#FFFFFF"/>
  <text x="195" y="89" text-anchor="middle" fill="#000000" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600">Authorize GitHub</text>
  <circle cx="44" cy="82" r="18" fill="#F2F2F7"/>
  <path d="M38 82 L44 88 L50 76" stroke="#FF6B3D" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Main card -->
  <rect x="24" y="134" width="342" height="560" rx="20" fill="#FFFFFF" filter="url(#cardShadow)"/>

  <!-- App icon area -->
  <rect x="155" y="164" width="80" height="80" rx="18" fill="url(#githubGrad)"/>
  <text x="195" y="218" text-anchor="middle" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="32" font-weight="700">F</text>

  <!-- App name -->
  <text x="195" y="276" text-anchor="middle" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="22" font-weight="700">FocalPoint</text>
  <text x="195" y="298" text-anchor="middle" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14">wants to access your GitHub account</text>

  <!-- Divider -->
  <line x1="44" y1="334" x2="346" y2="334" stroke="#E5E5EA" stroke-width="1"/>

  <!-- Permissions section -->
  <text x="44" y="368" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" font-weight="600">PERMISSIONS REQUESTED</text>

  <!-- Permission items -->
  <g transform="translate(44, 390)">
    <!-- Repo access -->
    <circle cx="16" cy="16" r="16" fill="#34C759" fill-opacity="0.15"/>
    <path d="M10 16 L14 20 L22 12" stroke="#34C759" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="44" y="14" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="16" font-weight="500">Read repository access</text>
    <text x="44" y="32" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13">View and select repositories to track</text>
  </g>

  <g transform="translate(44, 460)">
    <!-- Pull requests -->
    <circle cx="16" cy="16" r="16" fill="#34C759" fill-opacity="0.15"/>
    <path d="M10 16 L14 20 L22 12" stroke="#34C759" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="44" y="14" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="16" font-weight="500">Pull request notifications</text>
    <text x="44" y="32" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13">Get updates on PR reviews and merges</text>
  </g>

  <g transform="translate(44, 530)">
    <!-- Commit activity -->
    <circle cx="16" cy="16" r="16" fill="#34C759" fill-opacity="0.15"/>
    <path d="M10 16 L14 20 L22 12" stroke="#34C759" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="44" y="14" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="16" font-weight="500">Commit activity</text>
    <text x="44" y="32" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13">Track coding patterns and streaks</text>
  </g>

  <!-- Authorize button -->
  <rect x="24" y="616" width="342" height="56" rx="14" fill="url(#tealGrad)" filter="url(#btnShadow)"/>
  <text x="195" y="650" text-anchor="middle" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600">Authorize with GitHub</text>

  <!-- GitHub branding -->
  <g transform="translate(170, 690)">
    <path fill="#24292F" d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
  </g>

  <!-- Footer note -->
  <text x="195" y="730" text-anchor="middle" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12">By authorizing, you agree to GitHub's</text>
  <text x="195" y="748" text-anchor="middle" fill="#FF6B3D" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12">Terms of Service</text>

  <!-- Home indicator -->
  <rect x="140" y="820" width="110" height="5" rx="2.5" fill="#000000" fill-opacity="0.3"/>
</svg>

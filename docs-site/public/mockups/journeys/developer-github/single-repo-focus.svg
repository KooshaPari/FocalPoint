<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="single-repo-focus-title single-repo-focus-desc">
  <title id="single-repo-focus-title">Single Repository Focus</title>
  <desc id="single-repo-focus-desc">Coachy suggesting to focus on a single repository for better deep work</desc>

  <defs>
    <!-- iOS-style gradient background -->
    <linearGradient id="iosBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F2F2F7"/>
      <stop offset="100%" stop-color="#E5E5EA"/>
    </linearGradient>

    <!-- Card shadow -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.12"/>
    </filter>

    <!-- Teal accent gradient -->
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C7BE"/>
      <stop offset="100%" stop-color="#7EBAB5"/>
    </linearGradient>

    <!-- Focal orange -->
    <linearGradient id="focalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B3D"/>
      <stop offset="100%" stop-color="#FF8B65"/>
    </linearGradient>

    <!-- Suggestion card gradient -->
    <linearGradient id="suggestionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8F8F7"/>
      <stop offset="100%" stop-color="#D4F0ED"/>
    </linearGradient>

    <!-- Focus ring glow -->
    <filter id="focusGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Pulse animation circle -->
    <radialGradient id="pulseGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00C7BE" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00C7BE" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="url(#iosBg)"/>

  <!-- Header -->
  <rect x="0" y="54" width="390" height="56" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <circle cx="44" cy="82" r="16" fill="#F2F2F7"/>
  <path d="M38 82 L50 82 M44 76 L44 88" stroke="#8E8E93" stroke-width="2" stroke-linecap="round"/>
  <text x="195" y="89" text-anchor="middle" fill="#000000" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600">Focus Suggestions</text>

  <!-- Coachy suggestion card -->
  <rect x="24" y="134" width="342" height="200" rx="20" fill="url(#suggestionGrad)" filter="url(#cardShadow)"/>

  <!-- Coachy mascot - encouraging -->
  <g transform="translate(80, 220)">
    <!-- Pulse rings -->
    <circle cx="0" cy="0" r="48" fill="url(#pulseGrad)"/>
    <circle cx="0" cy="0" r="38" fill="url(#tealGrad)"/>

    <!-- Face -->
    <ellipse cx="-10" cy="-4" rx="6" ry="6" fill="#FFFFFF"/>
    <ellipse cx="-12" cy="-6" rx="2.5" ry="2.5" fill="#001133"/>

    <ellipse cx="10" cy="-4" rx="6" ry="6" fill="#FFFFFF"/>
    <ellipse cx="8" cy="-6" rx="2.5" ry="2.5" fill="#001133"/>

    <!-- Happy eyebrows -->
    <path d="M-18 -14 L-4 -12" stroke="#008B85" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M4 -12 L18 -14" stroke="#008B85" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Smile -->
    <path d="M-10 10 Q0 18 10 10" stroke="#008B85" stroke-width="2.5" stroke-linecap="round" fill="none"/>

    <!-- Sparkle -->
    <g transform="translate(-30, -20)">
      <path d="M0 -6 L0 6 M-6 0 L6 0" stroke="#FFD93D" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Suggestion text -->
  <g transform="translate(140, 180)">
    <text fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="18" font-weight="600">Focus on one repo</text>
    <text y="24" fill="#4A9E97" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14">Multitasking across repos reduces</text>
    <text y="44" fill="#4A9E97" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14">deep work quality by 40%</text>
  </g>

  <!-- Repo comparison -->
  <text x="24" y="370" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600">Your Repositories Today</text>

  <!-- Multi-repo (scattered) visualization -->
  <rect x="24" y="390" width="170" height="160" rx="16" fill="#FFFFFF" filter="url(#cardShadow)"/>

  <g transform="translate(40, 410)">
    <text y="12" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" font-weight="600">SCATTERED</text>

    <!-- Scattered dots representing multiple repos -->
    <circle cx="20" cy="50" r="16" fill="#FF6B3D" fill-opacity="0.6"/>
    <circle cx="60" cy="35" r="12" fill="#7EBAB5" fill-opacity="0.6"/>
    <circle cx="90" cy="55" r="14" fill="#AF52DE" fill-opacity="0.6"/>
    <circle cx="45" cy="80" r="10" fill="#FFD93D" fill-opacity="0.6"/>
    <circle cx="80" cy="90" r="12" fill="#34C759" fill-opacity="0.6"/>

    <text y="130" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11">3 context switches</text>
    <text y="146" fill="#FF3B30" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" font-weight="600">Low focus</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(195, 460)">
    <path d="M0 10 L20 10 M12 4 L20 10 L12 16" stroke="#00C7BE" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Single-repo (focused) visualization -->
  <rect x="196" y="390" width="170" height="160" rx="16" fill="#FFFFFF" filter="url(#cardShadow)"/>

  <g transform="translate(212, 410)">
    <text y="12" fill="#00C7BE" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" font-weight="600">FOCUSED</text>

    <!-- Single large dot representing one repo -->
    <circle cx="65" cy="70" r="32" fill="#FF6B3D" fill-opacity="0.8" filter="url(#focusGlow)"/>
    <circle cx="65" cy="70" r="24" fill="#FF6B3D"/>

    <text y="130" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11">0 context switches</text>
    <text y="146" fill="#34C759" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" font-weight="600">Deep focus</text>
  </g>

  <!-- Recommended repo card -->
  <text x="24" y="584" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600">Recommended</text>

  <rect x="24" y="602" width="342" height="100" rx="16" fill="#FFFFFF" filter="url(#cardShadow)"/>

  <g transform="translate(44, 622)">
    <!-- Repo avatar -->
    <rect x="0" y="0" width="48" height="48" rx="12" fill="#24292F"/>
    <text x="24" y="30" text-anchor="middle" fill="#FFFFFF" font-family="monospace" font-size="14" font-weight="700">FP</text>

    <text x="64" y="18" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="16" font-weight="600">focalpoint/core</text>
    <text x="64" y="38" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13">Most active this week</text>

    <!-- Activity indicator -->
    <rect x="64" y="46" width="60" height="6" rx="3" fill="#E5E5EA"/>
    <rect x="64" y="46" width="42" height="6" rx="3" fill="#34C759"/>
  </g>

  <!-- Action buttons -->
  <rect x="24" y="726" width="342" height="52" rx="14" fill="url(#tealGrad)"/>
  <text x="195" y="758" text-anchor="middle" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600">Focus on focalpoint/core</text>

  <!-- Dismiss link -->
  <text x="195" y="800" text-anchor="middle" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14">Maybe later</text>

  <!-- Home indicator -->
  <rect x="140" y="820" width="110" height="5" rx="2.5" fill="#000000" fill-opacity="0.3"/>
</svg>

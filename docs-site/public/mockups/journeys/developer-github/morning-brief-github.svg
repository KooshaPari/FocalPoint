<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="morning-brief-title morning-brief-desc">
  <title id="morning-brief-title">Morning Brief - GitHub Activity</title>
  <desc id="morning-brief-desc">Morning brief showing GitHub activity summary with PR reviews, commits, and focus recommendations</desc>

  <defs>
    <!-- iOS-style gradient background -->
    <linearGradient id="iosBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF8F5"/>
      <stop offset="100%" stop-color="#F2F2F7"/>
    </linearGradient>

    <!-- Card shadow -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.1"/>
    </filter>

    <!-- Morning gradient (warm sunrise) -->
    <linearGradient id="morningGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B3D"/>
      <stop offset="50%" stop-color="#FF8B65"/>
      <stop offset="100%" stop-color="#FFB84D"/>
    </linearGradient>

    <!-- Teal accent -->
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C7BE"/>
      <stop offset="100%" stop-color="#7EBAB5"/>
    </linearGradient>

    <!-- Stat card gradient -->
    <linearGradient id="statCardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FAFAFA"/>
    </linearGradient>

    <!-- Sun icon gradient -->
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD93D"/>
      <stop offset="100%" stop-color="#FF8B65"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="url(#iosBg)"/>

  <!-- Status bar -->
  <rect x="0" y="0" width="390" height="54" fill="#FFFBF9"/>
  <text x="195" y="34" text-anchor="middle" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600">8:30 AM</text>

  <!-- Header with greeting -->
  <g transform="translate(24, 80)">
    <text fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="28" font-weight="700">Good morning, Bob</text>
    <text y="28" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="16">Here's your development overview</text>
  </g>

  <!-- Focus recommendation card -->
  <rect x="24" y="160" width="342" height="100" rx="16" fill="url(#tealGrad)" filter="url(#cardShadow)"/>
  <circle cx="58" cy="200" r="24" fill="#FFFFFF" fill-opacity="0.2"/>
  <path d="M50 200 L58 192 L66 200 M58 192 L58 210" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="96" y="192" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="16" font-weight="600">Focus Time Recommended</text>
  <text x="96" y="212" fill="#FFFFFF" fill-opacity="0.9" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14">You have 3 PRs awaiting your review</text>
  <rect x="260" y="186" width="88" height="36" rx="18" fill="#FFFFFF"/>
  <text x="304" y="210" text-anchor="middle" fill="url(#tealGrad)" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" font-weight="600">Start</text>

  <!-- GitHub Activity section -->
  <text x="24" y="292" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="20" font-weight="700">GitHub Activity</text>

  <!-- Stats row -->
  <g transform="translate(24, 308)">
    <!-- PRs to review -->
    <rect x="0" y="0" width="105" height="90" rx="14" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <circle cx="52" cy="30" r="20" fill="#FF6B3D" fill-opacity="0.12"/>
    <path d="M46 30 L52 36 L58 24 M44 28 L52 36 L60 28" stroke="#FF6B3D" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="52" y="72" text-anchor="middle" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="24" font-weight="700">3</text>
    <text x="52" y="86" text-anchor="middle" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11">PRs to review</text>

    <!-- Commits today -->
    <rect x="117" y="0" width="105" height="90" rx="14" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <circle cx="169" cy="30" r="20" fill="#7EBAB5" fill-opacity="0.2"/>
    <path d="M163 30 L169 36 L175 30 M169 36 L169 24" stroke="#00C7BE" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="169" y="72" text-anchor="middle" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="24" font-weight="700">12</text>
    <text x="169" y="86" text-anchor="middle" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11">Commits today</text>

    <!-- Streak -->
    <rect x="234" y="0" width="105" height="90" rx="14" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <circle cx="286" cy="30" r="20" fill="#FFD93D" fill-opacity="0.25"/>
    <path d="M286 20 L286 40 M276 30 L296 30 M280 24 L286 30 L280 36 M292 24 L286 30 L292 36" stroke="#FF9500" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="286" y="72" text-anchor="middle" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="24" font-weight="700">7</text>
    <text x="286" y="86" text-anchor="middle" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11">Day streak</text>
  </g>

  <!-- PR Reviews section -->
  <text x="24" y="430" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600">Awaiting Your Review</text>

  <!-- PR Card 1 -->
  <rect x="24" y="444" width="342" height="84" rx="14" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <rect x="40" y="460" width="36" height="36" rx="8" fill="#FF6B3D" fill-opacity="0.1"/>
  <text x="58" y="484" text-anchor="middle" fill="#FF6B3D" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" font-weight="700">PR</text>
  <text x="88" y="474" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600">feat: Add OAuth support</text>
  <text x="88" y="494" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13">focalpoint/core</text>
  <rect x="296" y="468" width="54" height="24" rx="12" fill="#FF6B3D"/>
  <text x="323" y="485" text-anchor="middle" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" font-weight="600">Review</text>

  <!-- PR Card 2 -->
  <rect x="24" y="540" width="342" height="84" rx="14" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <rect x="40" y="556" width="36" height="36" rx="8" fill="#7EBAB5" fill-opacity="0.2"/>
  <text x="58" y="580" text-anchor="middle" fill="#00C7BE" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" font-weight="700">PR</text>
  <text x="88" y="570" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600">fix: Resolve auth token expiry</text>
  <text x="88" y="590" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13">ai-assistant/plugin</text>
  <rect x="296" y="564" width="54" height="24" rx="12" fill="#00C7BE"/>
  <text x="323" y="581" text-anchor="middle" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" font-weight="600">Review</text>

  <!-- Recent commits mini-list -->
  <text x="24" y="652" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600">Recent Commits</text>

  <rect x="24" y="666" width="342" height="120" rx="14" fill="#FFFFFF" filter="url(#cardShadow)"/>

  <!-- Commit items -->
  <g transform="translate(40, 682)">
    <circle cx="8" cy="8" r="8" fill="#34C759"/>
    <rect x="28" y="0" width="280" height="8" rx="4" fill="#E5E5EA"/>
    <rect x="28" y="16" width="180" height="6" rx="3" fill="#F2F2F7"/>
    <rect x="28" y="28" width="100" height="6" rx="3" fill="#F2F2F7"/>
  </g>

  <line x1="40" y1="722" x2="350" y2="722" stroke="#F2F2F7" stroke-width="1"/>

  <g transform="translate(40, 738)">
    <circle cx="8" cy="8" r="8" fill="#34C759"/>
    <rect x="28" y="0" width="260" height="8" rx="4" fill="#E5E5EA"/>
    <rect x="28" y="16" width="160" height="6" rx="3" fill="#F2F2F7"/>
    <rect x="28" y="28" width="120" height="6" rx="3" fill="#F2F2F7"/>
  </g>

  <!-- Bottom tab bar -->
  <rect x="0" y="780" width="390" height="64" fill="#FFFFFF"/>
  <line x1="0" y1="780" x2="390" y2="780" stroke="#E5E5EA" stroke-width="1"/>
  <!-- Active tab - Brief -->
  <g transform="translate(40, 792)">
    <rect x="0" y="0" width="64" height="44" rx="22" fill="#FF6B3D" fill-opacity="0.1"/>
    <circle cx="32" cy="20" r="12" fill="#FF6B3D"/>
    <path d="M28 20 L32 24 L36 16" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="32" y="42" text-anchor="middle" fill="#FF6B3D" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="10" font-weight="600">Brief</text>
  </g>
  <!-- Inactive tabs -->
  <g transform="translate(130, 792)">
    <circle cx="32" cy="16" r="12" fill="none"/>
    <path d="M28 16 L32 20 L36 12 M28 24 L36 24" stroke="#8E8E93" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="32" y="42" text-anchor="middle" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="10" font-weight="500">Focus</text>
  </g>
  <g transform="translate(220, 792)">
    <circle cx="32" cy="16" r="12" fill="none"/>
    <circle cx="32" cy="16" r="6" stroke="#8E8E93" stroke-width="2" fill="none"/>
    <text x="32" y="42" text-anchor="middle" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="10" font-weight="500">Activity</text>
  </g>
  <g transform="translate(310, 792)">
    <circle cx="32" cy="16" r="12" fill="none"/>
    <circle cx="29" cy="13" r="3" stroke="#8E8E93" stroke-width="2" fill="none"/>
    <circle cx="35" cy="19" r="3" stroke="#8E8E93" stroke-width="2" fill="none"/>
    <text x="32" y="42" text-anchor="middle" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="10" font-weight="500">Settings</text>
  </g>

  <!-- Home indicator -->
  <rect x="140" y="820" width="110" height="5" rx="2.5" fill="#000000" fill-opacity="0.3"/>
</svg>

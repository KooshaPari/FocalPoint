<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="repo-selection-title repo-selection-desc">
  <title id="repo-selection-title">Repository Selection</title>
  <desc id="repo-selection-desc">Multi-select repository list for tracking GitHub activity in FocalPoint</desc>

  <defs>
    <!-- iOS-style gradient background -->
    <linearGradient id="iosBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F2F2F7"/>
      <stop offset="100%" stop-color="#E5E5EA"/>
    </linearGradient>

    <!-- Card shadow -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.12"/>
    </filter>

    <!-- Focal orange -->
    <linearGradient id="focalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B3D"/>
      <stop offset="100%" stop-color="#FF8B65"/>
    </linearGradient>

    <!-- Teal accent -->
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C7BE"/>
      <stop offset="100%" stop-color="#7EBAB5"/>
    </linearGradient>

    <!-- Checkbox gradient -->
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C7BE"/>
      <stop offset="100%" stop-color="#7EBAB5"/>
    </linearGradient>

    <!-- Search bar gradient -->
    <linearGradient id="searchGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F2F2F7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="url(#iosBg)"/>

  <!-- Navigation bar -->
  <rect x="0" y="54" width="390" height="56" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <text x="195" y="89" text-anchor="middle" fill="#000000" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="600">Select Repositories</text>
  <text x="350" y="89" text-anchor="end" fill="#FF6B3D" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="17" font-weight="500">Done</text>

  <!-- Search bar -->
  <rect x="16" y="124" width="358" height="44" rx="12" fill="url(#searchGrad)"/>
  <circle cx="40" cy="146" r="8" stroke="#8E8E93" stroke-width="2" fill="none"/>
  <line x1="46" y1="152" x2="52" y2="158" stroke="#8E8E93" stroke-width="2" stroke-linecap="round"/>
  <text x="60" y="151" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="16">Search repositories...</text>

  <!-- Filter chips -->
  <g transform="translate(16, 182)">
    <rect x="0" y="0" width="80" height="32" rx="16" fill="url(#tealGrad)"/>
    <text x="40" y="21" text-anchor="middle" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" font-weight="500">All repos</text>

    <rect x="88" y="0" width="90" height="32" rx="16" fill="#FFFFFF"/>
    <text x="133" y="21" text-anchor="middle" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" font-weight="500">Owned</text>

    <rect x="186" y="0" width="100" height="32" rx="16" fill="#FFFFFF"/>
    <text x="236" y="21" text-anchor="middle" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" font-weight="500">Member</text>
  </g>

  <!-- Selection counter -->
  <text x="16" y="244" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14">4 repositories selected</text>

  <!-- Repo list card -->
  <rect x="16" y="260" width="358" height="480" rx="16" fill="#FFFFFF" filter="url(#cardShadow)"/>

  <!-- Repository items -->
  <!-- Repo 1 - Selected -->
  <g transform="translate(28, 276)">
    <rect x="0" y="0" width="24" height="24" rx="12" fill="url(#checkGrad)"/>
    <path d="M6 12 L10 16 L18 8" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="36" y="2" width="28" height="20" rx="4" fill="#24292F"/>
    <text x="50" y="16" text-anchor="middle" fill="#FFFFFF" font-family="monospace" font-size="10" font-weight="700">FP</text>
    <text x="76" y="10" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600">focalpoint/core</text>
    <text x="76" y="26" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12">Focus management app</text>
    <rect x="76" y="32" width="48" height="16" rx="8" fill="#FF6B3D" fill-opacity="0.15"/>
    <text x="100" y="44" text-anchor="middle" fill="#FF6B3D" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="10" font-weight="600">TypeScript</text>
  </g>

  <!-- Divider -->
  <line x1="28" y1="332" x2="362" y2="332" stroke="#E5E5EA" stroke-width="1"/>

  <!-- Repo 2 - Selected -->
  <g transform="translate(28, 344)">
    <rect x="0" y="0" width="24" height="24" rx="12" fill="url(#checkGrad)"/>
    <path d="M6 12 L10 16 L18 8" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="36" y="2" width="28" height="20" rx="4" fill="#24292F"/>
    <text x="50" y="16" text-anchor="middle" fill="#FFFFFF" font-family="monospace" font-size="10" font-weight="700">AI</text>
    <text x="76" y="10" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600">ai-assistant/plugin</text>
    <text x="76" y="26" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12">AI integration module</text>
    <rect x="76" y="32" width="52" height="16" rx="8" fill="#3178C6" fill-opacity="0.15"/>
    <text x="102" y="44" text-anchor="middle" fill="#3178C6" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="10" font-weight="600">Python</text>
  </g>

  <!-- Divider -->
  <line x1="28" y1="400" x2="362" y2="400" stroke="#E5E5EA" stroke-width="1"/>

  <!-- Repo 3 - Unselected -->
  <g transform="translate(28, 412)">
    <rect x="0" y="0" width="24" height="24" rx="12" fill="#E5E5EA"/>
    <rect x="36" y="2" width="28" height="20" rx="4" fill="#24292F"/>
    <text x="50" y="16" text-anchor="middle" fill="#FFFFFF" font-family="monospace" font-size="10" font-weight="700">CL</text>
    <text x="76" y="10" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600">cli-tools/utils</text>
    <text x="76" y="26" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12">Command line utilities</text>
    <rect x="76" y="32" width="48" height="16" rx="8" fill="#F1E05A" fill-opacity="0.2"/>
    <text x="100" y="44" text-anchor="middle" fill="#8B8000" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="10" font-weight="600">Go</text>
  </g>

  <!-- Divider -->
  <line x1="28" y1="468" x2="362" y2="468" stroke="#E5E5EA" stroke-width="1"/>

  <!-- Repo 4 - Selected -->
  <g transform="translate(28, 480)">
    <rect x="0" y="0" width="24" height="24" rx="12" fill="url(#checkGrad)"/>
    <path d="M6 12 L10 16 L18 8" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="36" y="2" width="28" height="20" rx="4" fill="#24292F"/>
    <text x="50" y="16" text-anchor="middle" fill="#FFFFFF" font-family="monospace" font-size="10" font-weight="700">AP</text>
    <text x="76" y="10" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600">api-gateway/server</text>
    <text x="76" y="26" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12">REST API gateway</text>
    <rect x="76" y="32" width="52" height="16" rx="8" fill="#563D7C" fill-opacity="0.15"/>
    <text x="102" y="44" text-anchor="middle" fill="#563D7C" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="10" font-weight="600">Ruby</text>
  </g>

  <!-- Divider -->
  <line x1="28" y1="536" x2="362" y2="536" stroke="#E5E5EA" stroke-width="1"/>

  <!-- Repo 5 - Unselected -->
  <g transform="translate(28, 548)">
    <rect x="0" y="0" width="24" height="24" rx="12" fill="#E5E5EA"/>
    <rect x="36" y="2" width="28" height="20" rx="4" fill="#24292F"/>
    <text x="50" y="16" text-anchor="middle" fill="#FFFFFF" font-family="monospace" font-size="10" font-weight="700">WB</text>
    <text x="76" y="10" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600">web-frontend/app</text>
    <text x="76" y="26" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12">React web application</text>
    <rect x="76" y="32" width="50" height="16" rx="8" fill="#61DAFB" fill-opacity="0.15"/>
    <text x="101" y="44" text-anchor="middle" fill="#0891B2" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="10" font-weight="600">JavaScript</text>
  </g>

  <!-- Divider -->
  <line x1="28" y1="604" x2="362" y2="604" stroke="#E5E5EA" stroke-width="1"/>

  <!-- Repo 6 - Unselected -->
  <g transform="translate(28, 616)">
    <rect x="0" y="0" width="24" height="24" rx="12" fill="#E5E5EA"/>
    <rect x="36" y="2" width="28" height="20" rx="4" fill="#24292F"/>
    <text x="50" y="16" text-anchor="middle" fill="#FFFFFF" font-family="monospace" font-size="10" font-weight="700">DB</text>
    <text x="76" y="10" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600">database/schema</text>
    <text x="76" y="26" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12">Database migrations</text>
    <rect x="76" y="32" width="44" height="16" rx="8" fill="#E34C26" fill-opacity="0.15"/>
    <text x="98" y="44" text-anchor="middle" fill="#A83D1C" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="10" font-weight="600">SQL</text>
  </g>

  <!-- Bottom action bar -->
  <rect x="0" y="760" width="390" height="84" fill="#FFFFFF"/>
  <line x1="0" y1="760" x2="390" y2="760" stroke="#E5E5EA" stroke-width="1"/>
  <rect x="16" y="776" width="170" height="48" rx="12" fill="#F2F2F7"/>
  <text x="101" y="806" text-anchor="middle" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="500">Select All</text>
  <rect x="204" y="776" width="170" height="48" rx="12" fill="url(#tealGrad)"/>
  <text x="289" y="806" text-anchor="middle" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600">Continue</text>

  <!-- Home indicator -->
  <rect x="140" y="820" width="110" height="5" rx="2.5" fill="#000000" fill-opacity="0.3"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="focus-pr-active-title focus-pr-active-desc">
  <title id="focus-pr-active-title">Focus Mode - PR Review Active</title>
  <desc id="focus-pr-active-desc">Deep focus mode screen showing active PR review with distraction blocking and timer</desc>

  <defs>
    <!-- Focus mode gradient (teal/green calm) -->
    <linearGradient id="focusBgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A3D3A"/>
      <stop offset="50%" stop-color="#0D4D48"/>
      <stop offset="100%" stop-color="#10615C"/>
    </linearGradient>

    <!-- Timer ring gradient -->
    <linearGradient id="timerRingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C7BE"/>
      <stop offset="100%" stop-color="#7EBAB5"/>
    </linearGradient>

    <!-- Progress ring -->
    <linearGradient id="progressGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B3D"/>
      <stop offset="100%" stop-color="#FF8B65"/>
    </linearGradient>

    <!-- Glowing effect filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for text -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#00C7BE" flood-opacity="0.5"/>
    </filter>

    <!-- Card glass effect -->
    <linearGradient id="glassCard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Focus mode background -->
  <rect width="390" height="844" fill="url(#focusBgGrad)"/>

  <!-- Ambient glow orbs -->
  <circle cx="50" cy="100" r="100" fill="#00C7BE" fill-opacity="0.08"/>
  <circle cx="350" cy="700" r="120" fill="#FF6B3D" fill-opacity="0.06"/>

  <!-- Top status bar -->
  <rect x="0" y="0" width="390" height="54" fill="transparent"/>
  <circle cx="44" cy="30" r="16" fill="#FFFFFF" fill-opacity="0.2"/>
  <path d="M40 30 L44 34 L48 26 M38 26 L50 26 M44 26 L44 38" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="195" y="34" text-anchor="middle" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600">Focus Mode</text>

  <!-- Focus indicator badge -->
  <rect x="310" y="16" width="70" height="28" rx="14" fill="#00C7BE" fill-opacity="0.3"/>
  <circle cx="325" cy="30" r="4" fill="#00C7BE"/>
  <text x="355" y="35" text-anchor="middle" fill="#00C7BE" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="11" font-weight="600">Active</text>

  <!-- Main timer circle -->
  <g transform="translate(195, 200)">
    <!-- Background ring -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="12"/>

    <!-- Progress ring (about 65% complete) -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="url(#progressGrad)" stroke-width="12" stroke-linecap="round"
            stroke-dasharray="449 691" transform="rotate(-90)" filter="url(#glow)"/>

    <!-- Inner glow circle -->
    <circle cx="0" cy="0" r="95" fill="#FFFFFF" fill-opacity="0.05"/>

    <!-- Timer display -->
    <text x="0" y="-20" text-anchor="middle" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="64" font-weight="200" filter="url(#textGlow)">18:42</text>
    <text x="0" y="20" text-anchor="middle" fill="#7EBAB5" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="16" font-weight="500">remaining</text>

    <!-- PR label -->
    <rect x="-60" y="50" width="120" height="28" rx="14" fill="#FF6B3D" fill-opacity="0.25"/>
    <text x="0" y="70" text-anchor="middle" fill="#FF8B65" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13" font-weight="600">PR #247 - Reviewing</text>
  </g>

  <!-- Current task card -->
  <rect x="24" y="340" width="342" height="140" rx="20" fill="url(#glassCard)" filter="url(#cardShadow)"/>
  <rect x="24" y="340" width="342" height="140" rx="20" fill="none" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1"/>

  <!-- PR details -->
  <g transform="translate(44, 366)">
    <rect x="0" y="0" width="48" height="48" rx="12" fill="#FF6B3D" fill-opacity="0.3"/>
    <text x="24" y="22" text-anchor="middle" fill="#FF6B3D" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" font-weight="700">PR</text>
    <text x="64" y="14" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="16" font-weight="600">feat: Add OAuth support</text>
    <text x="64" y="34" fill="#7EBAB5" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13">focalpoint/core</text>
    <rect x="64" y="44" width="60" height="20" rx="10" fill="#FF6B3D" fill-opacity="0.3"/>
    <text x="94" y="58" text-anchor="middle" fill="#FF8B65" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="10" font-weight="600">TypeScript</text>
  </g>

  <!-- Files changed summary -->
  <g transform="translate(44, 436)">
    <rect x="0" y="0" width="70" height="24" rx="6" fill="#34C759" fill-opacity="0.2"/>
    <text x="35" y="16" text-anchor="middle" fill="#34C759" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" font-weight="500">+142</text>

    <rect x="78" y="0" width="50" height="24" rx="6" fill="#FF3B30" fill-opacity="0.2"/>
    <text x="103" y="16" text-anchor="middle" fill="#FF3B30" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" font-weight="500">-23</text>

    <rect x="136" y="0" width="60" height="24" rx="6" fill="#7EBAB5" fill-opacity="0.2"/>
    <text x="166" y="16" text-anchor="middle" fill="#7EBAB5" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12" font-weight="500">8 files</text>
  </g>

  <!-- Focus stats row -->
  <g transform="translate(24, 508)">
    <!-- Distractions blocked -->
    <rect x="0" y="0" width="110" height="80" rx="16" fill="url(#glassCard)"/>
    <text x="55" y="36" text-anchor="middle" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="28" font-weight="700">12</text>
    <text x="55" y="58" text-anchor="middle" fill="#7EBAB5" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12">blocked</text>

    <!-- Deep work time -->
    <rect x="122" y="0" width="110" height="80" rx="16" fill="url(#glassCard)"/>
    <text x="177" y="36" text-anchor="middle" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="28" font-weight="700">41m</text>
    <text x="177" y="58" text-anchor="middle" fill="#7EBAB5" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12">deep work</text>

    <!-- Files reviewed -->
    <rect x="244" y="0" width="110" height="80" rx="16" fill="url(#glassCard)"/>
    <text x="299" y="36" text-anchor="middle" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="28" font-weight="700">5</text>
    <text x="299" y="58" text-anchor="middle" fill="#7EBAB5" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12">files seen</text>
  </g>

  <!-- Current file being reviewed -->
  <text x="24" y="620" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="14" font-weight="600" fill-opacity="0.7">CURRENT FILE</text>

  <rect x="24" y="634" width="342" height="80" rx="14" fill="url(#glassCard)"/>

  <g transform="translate(44, 656)">
    <!-- File icon -->
    <rect x="0" y="0" width="32" height="32" rx="8" fill="#7EBAB5" fill-opacity="0.3"/>
    <text x="16" y="22" text-anchor="middle" fill="#7EBAB5" font-family="monospace" font-size="12" font-weight="600">.ts</text>

    <!-- File path placeholder -->
    <rect x="44" y="4" width="200" height="10" rx="5" fill="#FFFFFF" fill-opacity="0.3"/>
    <rect x="44" y="20" width="140" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.15"/>
  </g>

  <!-- Action buttons -->
  <g transform="translate(24, 740)">
    <!-- Pause button -->
    <rect x="0" y="0" width="170" height="56" rx="28" fill="url(#glassCard)"/>
    <rect x="20" y="16" width="24" height="24" rx="6" fill="#FFFFFF" fill-opacity="0.3"/>
    <rect x="26" y="22" width="4" height="12" rx="2" fill="#FFFFFF"/>
    <rect x="34" y="22" width="4" height="12" rx="2" fill="#FFFFFF"/>
    <text x="100" y="35" text-anchor="middle" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="500">Pause</text>

    <!-- End session button -->
    <rect x="184" y="0" width="170" height="56" rx="28" fill="#FF6B3D" fill-opacity="0.8"/>
    <circle cx="210" cy="28" r="12" fill="#FFFFFF" fill-opacity="0.3"/>
    <path d="M206 22 L214 28 L206 34 Z" fill="#FFFFFF"/>
    <text x="290" y="35" text-anchor="middle" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600">End Session</text>
  </g>

  <!-- Home indicator -->
  <rect x="140" y="820" width="110" height="5" rx="2.5" fill="#FFFFFF" fill-opacity="0.3"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="context-switch-title context-switch-desc">
  <title id="context-switch-title">Context Switch Warning</title>
  <desc id="context-switch-desc">Coachy warning modal about context switching when moving from code review to meeting</desc>

  <defs>
    <!-- iOS-style gradient background -->
    <linearGradient id="iosBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F2F2F7"/>
      <stop offset="100%" stop-color="#E5E5EA"/>
    </linearGradient>

    <!-- Modal overlay gradient -->
    <radialGradient id="overlayGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1C1C1E" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.8"/>
    </radialGradient>

    <!-- Modal card gradient -->
    <linearGradient id="modalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8F8F8"/>
    </linearGradient>

    <!-- Warning orange -->
    <linearGradient id="warningGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B3D"/>
      <stop offset="100%" stop-color="#FF8B65"/>
    </linearGradient>

    <!-- Teal accent -->
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C7BE"/>
      <stop offset="100%" stop-color="#7EBAB5"/>
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="modalShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-color="#000000" flood-opacity="0.3"/>
    </filter>

    <!-- Coachy glow -->
    <filter id="coachyGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="url(#iosBg)"/>

  <!-- Blurred app preview in background -->
  <rect x="0" y="0" width="390" height="844" fill="#E5E5EA" fill-opacity="0.5"/>

  <!-- Context lines showing where user was -->
  <g fill="#D1D1D6" fill-opacity="0.5">
    <rect x="24" y="200" width="280" height="8" rx="4"/>
    <rect x="24" y="220" width="220" height="8" rx="4"/>
    <rect x="24" y="280" width="300" height="8" rx="4"/>
    <rect x="24" y="300" width="180" height="8" rx="4"/>
    <rect x="24" y="360" width="260" height="8" rx="4"/>
  </g>

  <!-- Overlay -->
  <rect width="390" height="844" fill="url(#overlayGrad)"/>

  <!-- Modal card -->
  <rect x="32" y="180" width="326" height="420" rx="24" fill="url(#modalGrad)" filter="url(#modalShadow)"/>

  <!-- Coachy mascot - concerned/warning expression -->
  <g transform="translate(195, 120)">
    <!-- Glow ring -->
    <ellipse cx="0" cy="0" rx="56" ry="52" fill="none" stroke="url(#warningGrad)" stroke-width="4" stroke-opacity="0.4" filter="url(#coachyGlow)"/>

    <!-- Body -->
    <ellipse cx="0" cy="0" rx="48" ry="44" fill="url(#warningGrad)"/>

    <!-- Face - concerned -->
    <ellipse cx="-16" cy="-6" rx="8" ry="8" fill="#FFFFFF"/>
    <ellipse cx="-18" cy="-8" rx="3" ry="3" fill="#001133"/>

    <ellipse cx="16" cy="-6" rx="8" ry="8" fill="#FFFFFF"/>
    <ellipse cx="14" cy="-8" rx="3" ry="3" fill="#001133"/>

    <!-- Concerned eyebrows -->
    <path d="M-28 -18 L-8 -14" stroke="#CC4400" stroke-width="3" stroke-linecap="round"/>
    <path d="M8 -14 L28 -18" stroke="#CC4400" stroke-width="3" stroke-linecap="round"/>

    <!-- Worried mouth -->
    <path d="M-12 16 Q0 10 12 16" stroke="#CC4400" stroke-width="3" stroke-linecap="round" fill="none"/>

    <!-- Sweat drop -->
    <ellipse cx="36" cy="-20" rx="5" ry="7" fill="#6EA8FF" fill-opacity="0.6"/>
  </g>

  <!-- Warning title -->
  <text x="195" y="300" text-anchor="middle" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="22" font-weight="700">Context Switch Detected</text>

  <!-- Warning message -->
  <text x="195" y="336" text-anchor="middle" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15">You're leaving your PR review</text>
  <text x="195" y="358" text-anchor="middle" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15">for a meeting in 5 minutes</text>

  <!-- Impact analysis card -->
  <rect x="48" y="382" width="294" height="80" rx="16" fill="#FFF8F5"/>

  <g transform="translate(64, 400)">
    <!-- Impact icon -->
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#FF6B3D" fill-opacity="0.15"/>
    <path d="M20 12 L20 28 M12 20 L28 20" stroke="#FF6B3D" stroke-width="2.5" stroke-linecap="round"/>

    <text x="56" y="16" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="600">Recovery Time</text>
    <text x="56" y="34" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="13">~23 minutes to regain focus</text>
  </g>

  <!-- Options -->
  <g transform="translate(48, 480)">
    <!-- Option 1: Delay meeting -->
    <rect x="0" y="0" width="294" height="56" rx="14" fill="#FFFFFF" stroke="#E5E5EA" stroke-width="1"/>
    <rect x="12" y="12" width="32" height="32" rx="8" fill="#7EBAB5" fill-opacity="0.15"/>
    <circle cx="28" cy="28" r="10" stroke="#00C7BE" stroke-width="2" fill="none"/>
    <text x="28" cy="28" fill="none"/>
    <path d="M24 28 L27 31 L32 25" stroke="#00C7BE" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="60" y="24" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="500">Delay 5 min, finish review</text>
    <text x="60" y="40" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12">Block calendar automatically</text>

    <!-- Option 2: Quick save and leave -->
    <rect x="0" y="68" width="294" height="56" rx="14" fill="#FFFFFF" stroke="#E5E5EA" stroke-width="1"/>
    <rect x="12" y="80" width="32" height="32" rx="8" fill="#FF6B3D" fill-opacity="0.15"/>
    <rect x="20" y="88" width="16" height="16" rx="3" stroke="#FF6B3D" stroke-width="2" fill="none"/>
    <path d="M24 96 L32 96" stroke="#FF6B3D" stroke-width="2" stroke-linecap="round"/>
    <text x="60" y="92" fill="#1C1C1E" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="500">Save progress, attend meeting</text>
    <text x="60" y="108" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="12">Bookmark spot, resume later</text>
  </g>

  <!-- Ignore button -->
  <text x="195" y="640" text-anchor="middle" fill="#8E8E93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" font-size="15" font-weight="500">Ignore and continue</text>
</svg>

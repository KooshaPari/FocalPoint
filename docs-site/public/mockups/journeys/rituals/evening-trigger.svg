<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="evening-trigger-title evening-trigger-desc">
  <title id="evening-trigger-title">Evening Shutdown Prompt</title>
  <desc id="evening-trigger-desc">iOS mockup showing evening shutdown prompt with daily summary and wind-down options</desc>

  <defs>
    <!-- Gradients -->
    <linearGradient id="bg-gradient-evening" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1520"/>
      <stop offset="100%" stop-color="#0F1012"/>
    </linearGradient>

    <linearGradient id="evening-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9B7BB5"/>
      <stop offset="100%" stop-color="#6B5B95"/>
    </linearGradient>

    <linearGradient id="sunset-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8B65"/>
      <stop offset="100%" stop-color="#FF6B3D"/>
    </linearGradient>

    <linearGradient id="star-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>

    <linearGradient id="teal-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C7BE"/>
      <stop offset="100%" stop-color="#0A9396"/>
    </linearGradient>

    <!-- Shadows -->
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>

    <filter id="glow-purple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background with stars -->
  <rect width="390" height="844" fill="url(#bg-gradient-evening)"/>

  <!-- Stars background -->
  <g opacity="0.6">
    <circle cx="50" cy="100" r="1.5" fill="#FFD700"/>
    <circle cx="120" cy="80" r="1" fill="#F6F5F5"/>
    <circle cx="200" cy="60" r="1.5" fill="#FFD700"/>
    <circle cx="280" cy="90" r="1" fill="#F6F5F5"/>
    <circle cx="340" cy="70" r="2" fill="#FFD700"/>
    <circle cx="80" cy="150" r="1" fill="#F6F5F5"/>
    <circle cx="310" cy="140" r="1.5" fill="#FFD700"/>
    <circle cx="180" cy="180" r="1" fill="#F6F5F5"/>
    <circle cx="360" cy="200" r="1" fill="#FFD700"/>
  </g>

  <!-- Moon -->
  <g transform="translate(300, 80)">
    <circle cx="30" cy="30" r="28" fill="#E8E4D9" filter="url(#soft-shadow)"/>
    <circle cx="40" cy="25" r="22" fill="url(#bg-gradient-evening)"/>
    <!-- Craters -->
    <circle cx="20" cy="35" r="4" fill="#D4D0C5" opacity="0.5"/>
    <circle cx="28" cy="22" r="3" fill="#D4D0C5" opacity="0.4"/>
    <circle cx="18" cy="22" r="2" fill="#D4D0C5" opacity="0.3"/>
  </g>

  <!-- Status Bar -->
  <rect x="0" y="0" width="390" height="54" fill="transparent"/>
  <text x="175" y="34" font-family="SF Pro Display, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#F6F5F5">8:30</text>

  <!-- Header -->
  <text x="24" y="200" font-family="SF Pro Display, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#F6F5F5">Good Evening</text>
  <text x="24" y="224" font-family="SF Pro Text, -apple-system, sans-serif" font-size="16" fill="#9B7BB5">Time to wind down</text>

  <!-- Main Card -->
  <g transform="translate(24, 250)">
    <rect width="342" height="280" rx="24" fill="#353A40" filter="url(#card-shadow)"/>

    <!-- Gradient overlay -->
    <rect x="0" y="0" width="342" height="280" rx="24" fill="url(#evening-purple)" opacity="0.15"/>

    <!-- Header -->
    <text x="24" y="36" font-family="SF Pro Display, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#F6F5F5">Daily Shutdown</text>
    <text x="24" y="56" font-family="SF Pro Text, -apple-system, sans-serif" font-size="13" fill="#9B7BB5">Review your day before resting</text>

    <!-- Stats row -->
    <g transform="translate(24, 80)">
      <!-- Focus time -->
      <rect width="90" height="70" rx="12" fill="#0F1012"/>
      <text x="45" y="28" font-family="SF Pro Display, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#00C7BE" text-anchor="middle">4h 15m</text>
      <text x="45" y="50" font-family="SF Pro Text, -apple-system, sans-serif" font-size="11" fill="#999" text-anchor="middle">Focus Time</text>

      <!-- Tasks done -->
      <g transform="translate(105, 0)">
        <rect width="90" height="70" rx="12" fill="#0F1012"/>
        <text x="45" y="28" font-family="SF Pro Display, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#FF6B3D" text-anchor="middle">8/12</text>
        <text x="45" y="50" font-family="SF Pro Text, -apple-system, sans-serif" font-size="11" fill="#999" text-anchor="middle">Tasks Done</text>
      </g>

      <!-- Streak -->
      <g transform="translate(210, 0)">
        <rect width="90" height="70" rx="12" fill="#0F1012"/>
        <text x="45" y="28" font-family="SF Pro Display, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#FFD700" text-anchor="middle">12</text>
        <text x="45" y="50" font-family="SF Pro Text, -apple-system, sans-serif" font-size="11" fill="#999" text-anchor="middle">Day Streak</text>
      </g>
    </g>

    <!-- Quick wins section -->
    <text x="24" y="178" font-family="SF Pro Text, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#F6F5F5">Today's Wins</text>

    <g transform="translate(24, 195)">
      <g transform="translate(0, 0)">
        <rect width="295" height="32" rx="8" fill="#0F1012"/>
        <circle cx="16" cy="16" r="8" fill="#00C7BE" opacity="0.2"/>
        <path d="M12,16 L15,19 L20,13" fill="none" stroke="#00C7BE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="34" y="20" font-family="SF Pro Text, -apple-system, sans-serif" font-size="13" fill="#F6F5F5">Completed code review sprint</text>
      </g>

      <g transform="translate(0, 40)">
        <rect width="295" height="32" rx="8" fill="#0F1012"/>
        <circle cx="16" cy="16" r="8" fill="#00C7BE" opacity="0.2"/>
        <path d="M12,16 L15,19 L20,13" fill="none" stroke="#00C7BE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="34" y="20" font-family="SF Pro Text, -apple-system, sans-serif" font-size="13" fill="#F6F5F5">Finished documentation update</text>
      </g>
    </g>
  </g>

  <!-- Action Cards -->
  <g transform="translate(24, 546)">
    <!-- Reflection card -->
    <rect width="342" height="64" rx="16" fill="#353A40" filter="url(#soft-shadow)"/>
    <rect x="0" y="0" width="5" height="64" rx="2.5" fill="url(#evening-purple)"/>

    <g transform="translate(24, 16)">
      <circle cx="16" cy="16" r="14" fill="#6B5B95" opacity="0.3"/>
      <path d="M12,14 Q16,20 20,14" fill="none" stroke="#9B7BB5" stroke-width="2" stroke-linecap="round"/>
      <circle cx="12" cy="12" r="2" fill="#9B7BB5"/>
      <circle cx="20" cy="12" r="2" fill="#9B7BB5"/>
    </g>

    <text x="60" y="26" font-family="SF Pro Text, -apple-system, sans-serif" font-size="15" font-weight="500" fill="#F6F5F5">Quick Reflection</text>
    <text x="60" y="44" font-family="SF Pro Text, -apple-system, sans-serif" font-size="12" fill="#999">3 quick questions</text>

    <g transform="translate(300, 20)">
      <path d="M8,12 L14,6 L14,10 L22,10 L22,14 L14,14 L14,18 Z" fill="#6B5B95"/>
    </g>
  </g>

  <g transform="translate(24, 622)">
    <!-- Export card -->
    <rect width="342" height="64" rx="16" fill="#353A40" filter="url(#soft-shadow)"/>
    <rect x="0" y="0" width="5" height="64" rx="2.5" fill="url(#teal-accent)"/>

    <g transform="translate(24, 16)">
      <circle cx="16" cy="16" r="14" fill="#0A9396" opacity="0.3"/>
      <rect x="10" y="12" width="12" height="10" rx="2" fill="none" stroke="#00C7BE" stroke-width="1.5"/>
      <path d="M13,12 L13,9 Q16,6 19,9 L19,12" fill="none" stroke="#00C7BE" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <text x="60" y="26" font-family="SF Pro Text, -apple-system, sans-serif" font-size="15" font-weight="500" fill="#F6F5F5">Export Audit Log</text>
    <text x="60" y="44" font-family="SF Pro Text, -apple-system, sans-serif" font-size="12" fill="#999">Share with your team</text>

    <g transform="translate(300, 20)">
      <path d="M8,12 L14,6 L14,10 L22,10 L22,14 L14,14 L14,18 Z" fill="#00C7BE"/>
    </g>
  </g>

  <!-- Start Shutdown Button -->
  <g transform="translate(24, 710)">
    <rect width="342" height="60" rx="30" fill="url(#evening-purple)" filter="url(#card-shadow)"/>

    <!-- Moon icon -->
    <g transform="translate(55, 14)">
      <circle cx="16" cy="16" r="14" fill="#E8E4D9"/>
      <circle cx="22" cy="14" r="10" fill="#6B5B95"/>
    </g>

    <text x="195" y="36" font-family="SF Pro Display, -apple-system, sans-serif" font-size="17" font-weight="600" fill="#F6F5F5" text-anchor="middle">Begin Evening Shutdown</text>
  </g>

  <!-- Skip option -->
  <text x="195" y="800" font-family="SF Pro Text, -apple-system, sans-serif" font-size="14" fill="#666" text-anchor="middle">Skip for now</text>

  <!-- Home Indicator -->
  <rect x="140" y="830" width="110" height="5" rx="2.5" fill="#4A4A55"/>
</svg>

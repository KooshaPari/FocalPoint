<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="morning-overview-title morning-overview-desc">
  <title id="morning-overview-title">Morning Brief Overview</title>
  <desc id="morning-overview-desc">iOS mockup showing morning briefing with sleep stats, daily schedule, and AI-suggested focus blocks</desc>

  <defs>
    <!-- Gradients -->
    <linearGradient id="bg-gradient-morning" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1F"/>
      <stop offset="100%" stop-color="#0F1012"/>
    </linearGradient>

    <linearGradient id="orange-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8B65"/>
      <stop offset="100%" stop-color="#FF6B3D"/>
    </linearGradient>

    <linearGradient id="teal-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C7BE"/>
      <stop offset="100%" stop-color="#0A9396"/>
    </linearGradient>

    <linearGradient id="sleep-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6B5B95"/>
      <stop offset="100%" stop-color="#3D2C5E"/>
    </linearGradient>

    <!-- Shadows -->
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>

    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>

    <filter id="glow-orange" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="url(#bg-gradient-morning)"/>

  <!-- Status Bar -->
  <rect x="0" y="0" width="390" height="54" fill="transparent"/>
  <text x="175" y="34" font-family="SF Pro Display, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#F6F5F5">9:41</text>
  <g transform="translate(320, 20)">
    <rect x="0" y="0" width="18" height="11" rx="2.5" fill="none" stroke="#F6F5F5" stroke-width="1"/>
    <rect x="2" y="3" width="12" height="5" rx="1" fill="#F6F5F5"/>
    <rect x="14" y="4" width="2" height="3" rx="0.5" fill="#F6F5F5"/>
  </g>
  <g transform="translate(290, 21)">
    <path d="M0,8 L3,5 L5,7 L8,0 L10,5 L12,3 L15,8" fill="none" stroke="#F6F5F5" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Header -->
  <text x="24" y="88" font-family="SF Pro Display, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#F6F5F5">Good Morning</text>
  <text x="24" y="112" font-family="SF Pro Text, -apple-system, sans-serif" font-size="16" fill="#7EBAB5">Tuesday, April 30</text>

  <!-- Coachy Avatar -->
  <g transform="translate(320, 68)">
    <circle cx="30" cy="30" r="28" fill="url(#orange-accent)" filter="url(#soft-shadow)"/>
    <ellipse cx="30" cy="38" rx="14" ry="12" fill="#FF8B65"/>
    <circle cx="30" cy="26" r="16" fill="#F07B3F"/>
    <ellipse cx="30" cy="20" rx="10" ry="8" fill="#FF8B65"/>
    <circle cx="24" cy="18" r="2" fill="#1A1A1F"/>
    <circle cx="36" cy="18" r="2" fill="#1A1A1F"/>
    <ellipse cx="30" cy="24" rx="3" ry="2" fill="#E05A26"/>
    <path d="M16,30 Q30,42 44,30" fill="#D4462E"/>
    <path d="M24,32 L30,36 L36,32" fill="none" stroke="#F6F5F5" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Sleep Stats Card -->
  <g transform="translate(24, 130)">
    <rect width="342" height="100" rx="16" fill="#353A40" filter="url(#card-shadow)"/>
    <rect x="0" y="0" width="342" height="100" rx="16" fill="url(#sleep-gradient)" opacity="0.4"/>

    <!-- Moon icon -->
    <g transform="translate(20, 20)">
      <circle cx="16" cy="16" r="14" fill="#6B5B95" opacity="0.6"/>
      <path d="M20,6 A12,12 0 1,0 20,26 A8,8 0 1,1 20,6" fill="#F6F5F5"/>
    </g>

    <text x="60" y="38" font-family="SF Pro Text, -apple-system, sans-serif" font-size="14" fill="#F6F5F5" opacity="0.7">Last Night's Sleep</text>
    <text x="60" y="60" font-family="SF Pro Display, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#F6F5F5">7h 23m</text>
    <text x="160" y="60" font-family="SF Pro Text, -apple-system, sans-serif" font-size="14" fill="#7EBAB5">+12% vs avg</text>

    <!-- Sleep quality dots -->
    <g transform="translate(60, 72)">
      <circle cx="0" cy="0" r="4" fill="#7EBAB5"/>
      <circle cx="14" cy="0" r="4" fill="#7EBAB5"/>
      <circle cx="28" cy="0" r="4" fill="#7EBAB5"/>
      <circle cx="42" cy="0" r="4" fill="#7EBAB5"/>
      <circle cx="56" cy="0" r="4" fill="#353A40" stroke="#7EBAB5" stroke-width="1"/>
    </g>
  </g>

  <!-- Today's Schedule Card -->
  <g transform="translate(24, 246)">
    <rect width="342" height="180" rx="16" fill="#353A40" filter="url(#card-shadow)"/>

    <text x="20" y="32" font-family="SF Pro Display, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#F6F5F5">Today's Schedule</text>

    <!-- Timeline -->
    <line x1="50" y1="55" x2="50" y2="160" stroke="#4A4A55" stroke-width="2"/>

    <!-- 9:00 AM Meeting -->
    <circle cx="50" cy="65" r="8" fill="#FF6B3D"/>
    <rect x="70" y="50" width="240" height="32" rx="8" fill="#0F1012"/>
    <text x="82" y="67" font-family="SF Pro Text, -apple-system, sans-serif" font-size="13" fill="#F6F5F5">9:00 AM</text>
    <text x="82" y="78" font-family="SF Pro Text, -apple-system, sans-serif" font-size="11" fill="#999">Team Standup</text>

    <!-- 11:00 AM Focus -->
    <circle cx="50" cy="110" r="8" fill="url(#teal-accent)"/>
    <rect x="70" y="95" width="240" height="32" rx="8" fill="#0F1012"/>
    <text x="82" y="112" font-family="SF Pro Text, -apple-system, sans-serif" font-size="13" fill="#F6F5F5">11:00 AM</text>
    <text x="82" y="123" font-family="SF Pro Text, -apple-system, sans-serif" font-size="11" fill="#7EBAB5">Deep Work Block</text>

    <!-- 2:00 PM -->
    <circle cx="50" cy="155" r="8" fill="#FF8B65" opacity="0.6"/>
    <rect x="70" y="140" width="240" height="32" rx="8" fill="#0F1012"/>
    <text x="82" y="157" font-family="SF Pro Text, -apple-system, sans-serif" font-size="13" fill="#F6F5F5">2:00 PM</text>
    <text x="82" y="168" font-family="SF Pro Text, -apple-system, sans-serif" font-size="11" fill="#999">1:1 with Manager</text>
  </g>

  <!-- Focus Opportunities Card -->
  <g transform="translate(24, 442)">
    <rect width="342" height="220" rx="16" fill="#353A40" filter="url(#card-shadow)"/>

    <text x="20" y="32" font-family="SF Pro Display, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#F6F5F5">Focus Opportunities</text>
    <text x="20" y="48" font-family="SF Pro Text, -apple-system, sans-serif" font-size="12" fill="#7EBAB5">AI-suggested based on your patterns</text>

    <!-- Opportunity 1 -->
    <g transform="translate(20, 60)">
      <rect width="302" height="48" rx="12" fill="#0F1012" filter="url(#soft-shadow)"/>
      <rect x="0" y="0" width="4" height="48" rx="2" fill="url(#teal-accent)"/>
      <text x="16" y="20" font-family="SF Pro Text, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#F6F5F5">Code Review Sprint</text>
      <text x="16" y="36" font-family="SF Pro Text, -apple-system, sans-serif" font-size="12" fill="#999">45 min · High impact</text>
      <circle cx="270" cy="24" r="16" fill="url(#teal-accent)" opacity="0.2"/>
      <path d="M265,24 L270,29 L280,19" fill="none" stroke="#00C7BE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Opportunity 2 -->
    <g transform="translate(20, 116)">
      <rect width="302" height="48" rx="12" fill="#0F1012" filter="url(#soft-shadow)"/>
      <rect x="0" y="0" width="4" height="48" rx="2" fill="url(#orange-accent)"/>
      <text x="16" y="20" font-family="SF Pro Text, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#F6F5F5">Update Documentation</text>
      <text x="16" y="36" font-family="SF Pro Text, -apple-system, sans-serif" font-size="12" fill="#999">30 min · Medium priority</text>
      <circle cx="270" cy="24" r="16" fill="url(#orange-accent)" opacity="0.2"/>
      <path d="M265,24 L270,29 L280,19" fill="none" stroke="#FF6B3D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Opportunity 3 -->
    <g transform="translate(20, 172)">
      <rect width="302" height="48" rx="12" fill="#0F1012" filter="url(#soft-shadow)"/>
      <rect x="0" y="0" width="4" height="48" rx="2" fill="#6B5B95"/>
      <text x="16" y="20" font-family="SF Pro Text, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#F6F5F5">Plan Next Week</text>
      <text x="16" y="36" font-family="SF Pro Text, -apple-system, sans-serif" font-size="12" fill="#999">20 min · Flexible</text>
      <circle cx="270" cy="24" r="16" fill="#6B5B95" opacity="0.2"/>
      <path d="M265,24 L270,29 L280,19" fill="none" stroke="#6B5B95" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Bottom Navigation -->
  <g transform="translate(0, 740)">
    <rect x="0" y="0" width="390" height="104" rx="24" fill="#1A1A1F"/>
    <rect x="0" y="0" width="390" height="1" fill="#353A40"/>

    <g transform="translate(55, 20)">
      <rect x="0" y="0" width="40" height="40" rx="12" fill="url(#teal-accent)"/>
      <path d="M12,32 L20,12 L28,32 M14,26 L26,26" fill="none" stroke="#F6F5F5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="75" y="74" font-family="SF Pro Text, -apple-system, sans-serif" font-size="11" fill="#00C7BE" text-anchor="middle">Focus</text>

    <g transform="translate(140, 20)">
      <rect x="0" y="0" width="40" height="40" rx="12" fill="transparent"/>
      <circle cx="20" cy="18" r="10" fill="none" stroke="#999" stroke-width="2"/>
      <line x1="20" y1="14" x2="20" y2="18" stroke="#999" stroke-width="2" stroke-linecap="round"/>
      <line x1="20" y1="18" x2="24" y2="22" stroke="#999" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="160" y="74" font-family="SF Pro Text, -apple-system, sans-serif" font-size="11" fill="#999" text-anchor="middle">Schedule</text>

    <g transform="translate(225, 20)">
      <rect x="0" y="0" width="40" height="40" rx="12" fill="transparent"/>
      <circle cx="20" cy="20" r="12" fill="none" stroke="#999" stroke-width="2"/>
      <line x1="20" y1="14" x2="20" y2="20" stroke="#999" stroke-width="2" stroke-linecap="round"/>
      <circle cx="20" cy="24" r="1.5" fill="#999"/>
    </g>
    <text x="245" y="74" font-family="SF Pro Text, -apple-system, sans-serif" font-size="11" fill="#999" text-anchor="middle">Insights</text>

    <g transform="translate(310, 20)">
      <rect x="0" y="0" width="40" height="40" rx="12" fill="transparent"/>
      <circle cx="20" cy="16" r="6" fill="none" stroke="#999" stroke-width="2"/>
      <path d="M12,28 Q20,22 28,28" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="330" y="74" font-family="SF Pro Text, -apple-system, sans-serif" font-size="11" fill="#999" text-anchor="middle">Profile</text>
  </g>

  <!-- Home Indicator -->
  <rect x="140" y="830" width="110" height="5" rx="2.5" fill="#4A4A55"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="reflection-title reflection-desc">
  <title id="reflection-title">Quick Reflection Questions</title>
  <desc id="reflection-desc">iOS mockup showing evening reflection questions with mood and gratitude prompts</desc>

  <defs>
    <!-- Gradients -->
    <linearGradient id="bg-gradient-reflection" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1F"/>
      <stop offset="100%" stop-color="#0F1012"/>
    </linearGradient>

    <linearGradient id="purple-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9B7BB5"/>
      <stop offset="100%" stop-color="#6B5B95"/>
    </linearGradient>

    <linearGradient id="teal-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C7BE"/>
      <stop offset="100%" stop-color="#0A9396"/>
    </linearGradient>

    <linearGradient id="orange-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8B65"/>
      <stop offset="100%" stop-color="#FF6B3D"/>
    </linearGradient>

    <linearGradient id="gold-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>

    <!-- Shadows -->
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>

    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>

    <filter id="glow-purple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="url(#bg-gradient-reflection)"/>

  <!-- Status Bar -->
  <rect x="0" y="0" width="390" height="54" fill="transparent"/>
  <text x="175" y="34" font-family="SF Pro Display, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#F6F5F5">8:52</text>

  <!-- Header -->
  <text x="24" y="88" font-family="SF Pro Display, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#F6F5F5">Evening Reflection</text>
  <text x="24" y="112" font-family="SF Pro Text, -apple-system, sans-serif" font-size="16" fill="#9B7BB5">Take a moment to reflect</text>

  <!-- Progress indicator -->
  <g transform="translate(24, 140)">
    <rect width="342" height="6" rx="3" fill="#353A40"/>
    <rect width="114" height="6" rx="3" fill="url(#purple-primary)" filter="url(#glow-purple)"/>
    <text x="342" y="20" font-family="SF Pro Text, -apple-system, sans-serif" font-size="12" fill="#999" text-anchor="end">1 of 3</text>
  </g>

  <!-- Question 1: Mood -->
  <g transform="translate(24, 180)">
    <rect width="342" height="200" rx="20" fill="#353A40" filter="url(#card-shadow)"/>
    <rect x="0" y="0" width="342" height="60" rx="20" fill="url(#purple-primary)" opacity="0.15"/>
    <rect x="0" y="40" width="342" height="20" fill="#353A40"/>

    <text x="24" y="40" font-family="SF Pro Display, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#F6F5F5">How are you feeling?</text>

    <!-- Mood emoji options -->
    <g transform="translate(30, 80)">
      <!-- Excellent -->
      <g>
        <circle cx="35" cy="35" r="32" fill="#0F1012"/>
        <circle cx="35" cy="35" r="30" fill="#353A40"/>
        <text x="35" y="45" font-size="32" text-anchor="middle">😊</text>
      </g>

      <!-- Good -->
      <g transform="translate(85, 0)">
        <circle cx="35" cy="35" r="32" fill="#0F1012"/>
        <circle cx="35" cy="35" r="30" fill="url(#teal-accent)" opacity="0.3"/>
        <text x="35" y="45" font-size="32" text-anchor="middle">🙂</text>
      </g>

      <!-- Okay -->
      <g transform="translate(170, 0)">
        <circle cx="35" cy="35" r="32" fill="#0F1012"/>
        <circle cx="35" cy="35" r="30" fill="#353A40"/>
        <text x="35" y="45" font-size="32" text-anchor="middle">😐</text>
      </g>

      <!-- Tired -->
      <g transform="translate(255, 0)">
        <circle cx="35" cy="35" r="32" fill="#0F1012"/>
        <circle cx="35" cy="35" r="30" fill="#353A40"/>
        <text x="35" y="45" font-size="32" text-anchor="middle">😴</text>
      </g>
    </g>

    <!-- Labels -->
    <text x="65" y="155" font-family="SF Pro Text, -apple-system, sans-serif" font-size="11" fill="#999" text-anchor="middle">Great</text>
    <text x="150" y="155" font-family="SF Pro Text, -apple-system, sans-serif" font-size="11" fill="#7EBAB5" text-anchor="middle">Good</text>
    <text x="235" y="155" font-family="SF Pro Text, -apple-system, sans-serif" font-size="11" fill="#999" text-anchor="middle">Okay</text>
    <text x="320" y="155" font-family="SF Pro Text, -apple-system, sans-serif" font-size="11" fill="#999" text-anchor="middle">Tired</text>
  </g>

  <!-- Question 2: Achievement -->
  <g transform="translate(24, 396)">
    <rect width="342" height="160" rx="20" fill="#353A40" filter="url(#card-shadow)"/>
    <rect x="0" y="0" width="342" height="60" rx="20" fill="url(#teal-accent)" opacity="0.15"/>
    <rect x="0" y="40" width="342" height="20" fill="#353A40"/>

    <text x="24" y="40" font-family="SF Pro Display, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#F6F5F5">What was your win today?</text>

    <!-- Text input area -->
    <rect x="24" y="76" width="294" height="60" rx="12" fill="#0F1012"/>
    <text x="36" y="100" font-family="SF Pro Text, -apple-system, sans-serif" font-size="14" fill="#666">Type your answer...</text>
    <text x="36" y="120" font-family="SF Pro Text, -apple-system, sans-serif" font-size="14" fill="#F6F5F5">Finished the code review sprint!</text>

    <!-- Character count -->
    <text x="300" y="130" font-family="SF Pro Text, -apple-system, sans-serif" font-size="11" fill="#666" text-anchor="end">32/100</text>
  </g>

  <!-- Question 3: Gratitude -->
  <g transform="translate(24, 572)">
    <rect width="342" height="140" rx="20" fill="#353A40" filter="url(#card-shadow)"/>
    <rect x="0" y="0" width="342" height="60" rx="20" fill="url(#orange-accent)" opacity="0.15"/>
    <rect x="0" y="40" width="342" height="20" fill="#353A40"/>

    <text x="24" y="40" font-family="SF Pro Display, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#F6F5F5">What are you grateful for?</text>

    <!-- Quick gratitude chips -->
    <g transform="translate(24, 76)">
      <rect width="90" height="36" rx="18" fill="#0F1012" stroke="#FF6B3D" stroke-width="1.5"/>
      <text x="45" y="23" font-family="SF Pro Text, -apple-system, sans-serif" font-size="12" fill="#FF6B3D" text-anchor="middle">Health</text>

      <g transform="translate(100, 0)">
        <rect width="110" height="36" rx="18" fill="#0F1012" stroke="#7EBAB5" stroke-width="1.5"/>
        <text x="55" y="23" font-family="SF Pro Text, -apple-system, sans-serif" font-size="12" fill="#7EBAB5" text-anchor="middle">Family</text>
      </g>

      <g transform="translate(220, 0)">
        <rect width="100" height="36" rx="18" fill="#0F1012" stroke="#9B7BB5" stroke-width="1.5"/>
        <text x="50" y="23" font-family="SF Pro Text, -apple-system, sans-serif" font-size="12" fill="#9B7BB5" text-anchor="middle">Work</text>
      </g>
    </g>
  </g>

  <!-- Navigation -->
  <g transform="translate(24, 740)">
    <!-- Back button -->
    <rect x="0" y="0" width="160" height="56" rx="28" fill="#353A40" filter="url(#soft-shadow)"/>
    <path d="M60,24 L70,32 L60,40" fill="none" stroke="#F6F5F5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="95" y="35" font-family="SF Pro Text, -apple-system, sans-serif" font-size="15" font-weight="500" fill="#F6F5F5">Back</text>

    <!-- Next button -->
    <g transform="translate(182, 0)">
      <rect width="160" height="56" rx="28" fill="url(#purple-primary)" filter="url(#soft-shadow)"/>
      <text x="105" y="26" font-family="SF Pro Text, -apple-system, sans-serif" font-size="15" font-weight="500" fill="#F6F5F5">Next</text>
      <path d="M155,24 L165,32 L155,40" fill="none" stroke="#F6F5F5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Skip option -->
  <text x="195" y="820" font-family="SF Pro Text, -apple-system, sans-serif" font-size="14" fill="#666" text-anchor="middle">Skip reflection</text>

  <!-- Home Indicator -->
  <rect x="140" y="830" width="110" height="5" rx="2.5" fill="#4A4A55"/>
</svg>

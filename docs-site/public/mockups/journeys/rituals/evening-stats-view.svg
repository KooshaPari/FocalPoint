<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="evening-stats-title evening-stats-desc">
  <title id="evening-stats-title">Evening Stats View</title>
  <desc id="evening-stats-desc">iOS mockup showing full day statistics including focus time, distractions, and productivity score</desc>

  <defs>
    <!-- Gradients -->
    <linearGradient id="bg-gradient-stats" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1520"/>
      <stop offset="100%" stop-color="#0F1012"/>
    </linearGradient>

    <linearGradient id="teal-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C7BE"/>
      <stop offset="100%" stop-color="#0A9396"/>
    </linearGradient>

    <linearGradient id="orange-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8B65"/>
      <stop offset="100%" stop-color="#FF6B3D"/>
    </linearGradient>

    <linearGradient id="purple-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9B7BB5"/>
      <stop offset="100%" stop-color="#6B5B95"/>
    </linearGradient>

    <linearGradient id="gold-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>

    <linearGradient id="danger-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF476F"/>
      <stop offset="100%" stop-color="#D63D5C"/>
    </linearGradient>

    <!-- Shadows -->
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>

    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>

    <filter id="glow-teal" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="url(#bg-gradient-stats)"/>

  <!-- Status Bar -->
  <rect x="0" y="0" width="390" height="54" fill="transparent"/>
  <text x="175" y="34" font-family="SF Pro Display, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#F6F5F5">8:45</text>

  <!-- Header with Back -->
  <g transform="translate(24, 68)">
    <rect x="-10" y="-10" width="44" height="44" rx="22" fill="#353A40"/>
    <path d="M8,16 L20,24 L8,32" fill="none" stroke="#F6F5F5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="195" y="80" font-family="SF Pro Display, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#F6F5F5" text-anchor="middle">Day Summary</text>

  <!-- Productivity Score -->
  <g transform="translate(195, 150)">
    <circle cx="0" cy="0" r="70" fill="none" stroke="#353A40" stroke-width="12"/>
    <circle cx="0" cy="0" r="70" fill="none" stroke="url(#teal-primary)" stroke-width="12"
            stroke-dasharray="352 440" stroke-linecap="round" transform="rotate(-90)" filter="url(#glow-teal)"/>

    <text x="0" y="8" font-family="SF Pro Display, -apple-system, sans-serif" font-size="40" font-weight="700" fill="#F6F5F5" text-anchor="middle">87</text>
    <text x="0" y="28" font-family="SF Pro Text, -apple-system, sans-serif" font-size="12" fill="#7EBAB5" text-anchor="middle">Productivity Score</text>
  </g>

  <!-- Main Stats Row -->
  <g transform="translate(24, 250)">
    <text x="0" y="0" font-family="SF Pro Display, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#F6F5F5">Today's Performance</text>

    <!-- Focus Time Card -->
    <g transform="translate(0, 20)">
      <rect width="165" height="100" rx="16" fill="#353A40" filter="url(#card-shadow)"/>
      <rect x="0" y="0" width="165" height="4" rx="2" fill="url(#teal-primary)"/>

      <g transform="translate(16, 24)">
        <circle cx="16" cy="16" r="14" fill="#0A9396" opacity="0.3"/>
        <rect x="10" y="10" width="12" height="12" rx="2" fill="#00C7BE"/>
      </g>

      <text x="56" y="38" font-family="SF Pro Text, -apple-system, sans-serif" font-size="12" fill="#999">Focus Time</text>
      <text x="16" y="70" font-family="SF Pro Display, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#F6F5F5">4h 15m</text>
      <text x="16" y="88" font-family="SF Pro Text, -apple-system, sans-serif" font-size="11" fill="#7EBAB5">+23% vs avg</text>
    </g>

    <!-- Distractions Card -->
    <g transform="translate(181, 20)">
      <rect width="165" height="100" rx="16" fill="#353A40" filter="url(#card-shadow)"/>
      <rect x="0" y="0" width="165" height="4" rx="2" fill="url(#danger-red)"/>

      <g transform="translate(16, 24)">
        <circle cx="16" cy="16" r="14" fill="#D63D5C" opacity="0.3"/>
        <path d="M10,16 L14,20 L22,12" fill="none" stroke="#EF476F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="10" y1="10" x2="22" y2="22" stroke="#EF476F" stroke-width="2" stroke-linecap="round"/>
      </g>

      <text x="56" y="38" font-family="SF Pro Text, -apple-system, sans-serif" font-size="12" fill="#999">Distractions</text>
      <text x="16" y="70" font-family="SF Pro Display, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#F6F5F5">7</text>
      <text x="50" y="70" font-family="SF Pro Text, -apple-system, sans-serif" font-size="14" fill="#EF476F">interrupts</text>
    </g>
  </g>

  <!-- Distraction Breakdown -->
  <g transform="translate(24, 390)">
    <rect width="342" height="180" rx="16" fill="#353A40" filter="url(#card-shadow)"/>

    <text x="20" y="28" font-family="SF Pro Display, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#F6F5F5">Distraction Sources</text>

    <!-- Slack -->
    <g transform="translate(20, 48)">
      <rect width="302" height="36" rx="8" fill="#0F1012"/>
      <rect x="4" y="8" width="20" height="20" rx="4" fill="#4A154B"/>
      <text x="34" y="24" font-family="SF Pro Text, -apple-system, sans-serif" font-size="13" fill="#F6F5F5">Slack</text>
      <text x="250" y="24" font-family="SF Pro Text, -apple-system, sans-serif" font-size="13" fill="#EF476F" font-weight="600">3x</text>
      <rect x="140" y="16" width="100" height="4" rx="2" fill="#353A40"/>
      <rect x="140" y="16" width="30" height="4" rx="2" fill="#EF476F"/>
    </g>

    <!-- Email -->
    <g transform="translate(20, 92)">
      <rect width="302" height="36" rx="8" fill="#0F1012"/>
      <rect x="4" y="8" width="20" height="20" rx="4" fill="#4285F4"/>
      <text x="34" y="24" font-family="SF Pro Text, -apple-system, sans-serif" font-size="13" fill="#F6F5F5">Email</text>
      <text x="250" y="24" font-family="SF Pro Text, -apple-system, sans-serif" font-size="13" fill="#FFA500" font-weight="600">2x</text>
      <rect x="140" y="16" width="100" height="4" rx="2" fill="#353A40"/>
      <rect x="140" y="16" width="20" height="4" rx="2" fill="#FFA500"/>
    </g>

    <!-- Meetings -->
    <g transform="translate(20, 136)">
      <rect width="302" height="36" rx="8" fill="#0F1012"/>
      <rect x="4" y="8" width="20" height="20" rx="4" fill="#7EBAB5"/>
      <text x="34" y="24" font-family="SF Pro Text, -apple-system, sans-serif" font-size="13" fill="#F6F5F5">Meetings</text>
      <text x="250" y="24" font-family="SF Pro Text, -apple-system, sans-serif" font-size="13" fill="#00C7BE" font-weight="600">2x</text>
      <rect x="140" y="16" width="100" height="4" rx="2" fill="#353A40"/>
      <rect x="140" y="16" width="20" height="4" rx="2" fill="#00C7BE"/>
    </g>
  </g>

  <!-- Focus Time Chart -->
  <g transform="translate(24, 586)">
    <rect width="342" height="160" rx="16" fill="#353A40" filter="url(#card-shadow)"/>

    <text x="20" y="28" font-family="SF Pro Display, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#F6F5F5">Hourly Focus Distribution</text>

    <!-- Bar chart -->
    <g transform="translate(20, 50)">
      <!-- Y-axis labels -->
      <text x="-5" y="5" font-family="SF Pro Text, -apple-system, sans-serif" font-size="9" fill="#666" text-anchor="end">60m</text>
      <text x="-5" y="50" font-family="SF Pro Text, -apple-system, sans-serif" font-size="9" fill="#666" text-anchor="end">30m</text>
      <text x="-5" y="95" font-family="SF Pro Text, -apple-system, sans-serif" font-size="9" fill="#666" text-anchor="end">0m</text>

      <!-- Grid lines -->
      <line x1="0" y1="0" x2="300" y2="0" stroke="#353A40" stroke-width="1"/>
      <line x1="0" y1="45" x2="300" y2="45" stroke="#353A40" stroke-width="1" stroke-dasharray="2 2"/>
      <line x1="0" y1="90" x2="300" y2="90" stroke="#353A40" stroke-width="1"/>

      <!-- Bars -->
      <rect x="10" y="75" width="24" height="15" rx="3" fill="url(#teal-primary)" opacity="0.4"/>
      <rect x="44" y="60" width="24" height="30" rx="3" fill="url(#teal-primary)" opacity="0.5"/>
      <rect x="78" y="30" width="24" height="60" rx="3" fill="url(#teal-primary)" opacity="0.7"/>
      <rect x="112" y="15" width="24" height="75" rx="3" fill="url(#teal-primary)" filter="url(#glow-teal)"/>
      <rect x="146" y="45" width="24" height="45" rx="3" fill="url(#teal-primary)" opacity="0.6"/>
      <rect x="180" y="20" width="24" height="70" rx="3" fill="url(#teal-primary)" opacity="0.8"/>
      <rect x="214" y="40" width="24" height="50" rx="3" fill="url(#teal-primary)" opacity="0.5"/>
      <rect x="248" y="55" width="24" height="35" rx="3" fill="url(#teal-primary)" opacity="0.4"/>

      <!-- X-axis labels -->
      <text x="22" y="108" font-family="SF Pro Text, -apple-system, sans-serif" font-size="9" fill="#666" text-anchor="middle">9AM</text>
      <text x="86" y="108" font-family="SF Pro Text, -apple-system, sans-serif" font-size="9" fill="#666" text-anchor="middle">10AM</text>
      <text x="150" y="108" font-family="SF Pro Text, -apple-system, sans-serif" font-size="9" fill="#666" text-anchor="middle">11AM</text>
      <text x="214" y="108" font-family="SF Pro Text, -apple-system, sans-serif" font-size="9" fill="#666" text-anchor="middle">12PM</text>
      <text x="278" y="108" font-family="SF Pro Text, -apple-system, sans-serif" font-size="9" fill="#666" text-anchor="middle">1PM</text>
    </g>
  </g>

  <!-- Bottom Summary -->
  <g transform="translate(24, 762)">
    <rect width="342" height="48" rx="12" fill="#0F1012"/>
    <text x="20" y="30" font-family="SF Pro Text, -apple-system, sans-serif" font-size="14" fill="#F6F5F5">Peak focus: <tspan fill="#00C7BE">11:00 AM</tspan></text>
    <text x="250" y="30" font-family="SF Pro Text, -apple-system, sans-serif" font-size="14" fill="#F6F5F5">Total: <tspan fill="#00C7BE">4h 15m</tspan></text>
  </g>

  <!-- Home Indicator -->
  <rect x="140" y="830" width="110" height="5" rx="2.5" fill="#4A4A55"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="export-options-title export-options-desc">
  <title id="export-options-title">Audit Export Options</title>
  <desc id="export-options-desc">iOS mockup showing audit export and share options for daily productivity reports</desc>

  <defs>
    <!-- Gradients -->
    <linearGradient id="bg-gradient-export" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1F"/>
      <stop offset="100%" stop-color="#0F1012"/>
    </linearGradient>

    <linearGradient id="teal-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C7BE"/>
      <stop offset="100%" stop-color="#0A9396"/>
    </linearGradient>

    <linearGradient id="orange-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8B65"/>
      <stop offset="100%" stop-color="#FF6B3D"/>
    </linearGradient>

    <linearGradient id="purple-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9B7BB5"/>
      <stop offset="100%" stop-color="#6B5B95"/>
    </linearGradient>

    <linearGradient id="blue-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4285F4"/>
      <stop offset="100%" stop-color="#2B5BC7"/>
    </linearGradient>

    <linearGradient id="green-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34A853"/>
      <stop offset="100%" stop-color="#2D8F4E"/>
    </linearGradient>

    <!-- Shadows -->
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>

    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>

    <filter id="glow-teal" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="url(#bg-gradient-export)"/>

  <!-- Status Bar -->
  <rect x="0" y="0" width="390" height="54" fill="transparent"/>
  <text x="175" y="34" font-family="SF Pro Display, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#F6F5F5">9:20</text>

  <!-- Header -->
  <text x="24" y="88" font-family="SF Pro Display, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#F6F5F5">Export Audit Log</text>
  <text x="24" y="112" font-family="SF Pro Text, -apple-system, sans-serif" font-size="16" fill="#7EBAB5">Share your productivity insights</text>

  <!-- Summary Card -->
  <g transform="translate(24, 140)">
    <rect width="342" height="100" rx="16" fill="#353A40" filter="url(#card-shadow)"/>

    <text x="20" y="28" font-family="SF Pro Text, -apple-system, sans-serif" font-size="12" fill="#999">EXPORTING</text>
    <text x="20" y="52" font-family="SF Pro Display, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#F6F5F5">Daily Productivity Report</text>
    <text x="20" y="76" font-family="SF Pro Text, -apple-system, sans-serif" font-size="13" fill="#999">April 30, 2026 · Complete day summary</text>

    <!-- File size badge -->
    <rect x="260" y="24" width="62" height="24" rx="12" fill="#0A9396" opacity="0.2"/>
    <text x="291" y="40" font-family="SF Pro Text, -apple-system, sans-serif" font-size="12" fill="#00C7BE" text-anchor="middle">2.4 MB</text>
  </g>

  <!-- Date Range Selector -->
  <g transform="translate(24, 256)">
    <text x="0" y="0" font-family="SF Pro Text, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#F6F5F5">Date Range</text>

    <g transform="translate(0, 16)">
      <rect width="165" height="48" rx="12" fill="#0F1012"/>
      <rect width="165" height="48" rx="12" fill="url(#teal-accent)" opacity="0.2"/>
      <circle cx="24" cy="24" r="14" fill="#0A9396" opacity="0.3"/>
      <text x="48" y="22" font-family="SF Pro Text, -apple-system, sans-serif" font-size="12" fill="#F6F5F5">Today</text>
      <text x="48" y="38" font-family="SF Pro Text, -apple-system, sans-serif" font-size="11" fill="#7EBAB5">Apr 30</text>
      <path d="M145,18 L150,24 L155,18" fill="none" stroke="#00C7BE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <g transform="translate(177, 16)">
      <rect width="165" height="48" rx="12" fill="#0F1012"/>
      <circle cx="24" cy="24" r="14" fill="#353A40"/>
      <text x="48" y="22" font-family="SF Pro Text, -apple-system, sans-serif" font-size="12" fill="#F6F5F5">This Week</text>
      <text x="48" y="38" font-family="SF Pro Text, -apple-system, sans-serif" font-size="11" fill="#999">Apr 24-30</text>
      <path d="M145,18 L150,24 L155,18" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Export Format Options -->
  <g transform="translate(24, 350)">
    <text x="0" y="0" font-family="SF Pro Text, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#F6F5F5">Export Format</text>

    <!-- PDF Option -->
    <g transform="translate(0, 20)">
      <rect width="342" height="72" rx="16" fill="#353A40" filter="url(#card-shadow)"/>
      <rect x="0" y="0" width="6" height="72" rx="3" fill="#EF476F"/>

      <!-- PDF icon -->
      <g transform="translate(24, 16)">
        <rect width="40" height="48" rx="4" fill="#EF476F" opacity="0.2"/>
        <rect x="8" y="4" width="24" height="32" rx="2" fill="#EF476F"/>
        <text x="20" y="26" font-family="SF Pro Text, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">PDF</text>
      </g>

      <text x="80" y="30" font-family="SF Pro Text, -apple-system, sans-serif" font-size="15" font-weight="500" fill="#F6F5F5">PDF Report</text>
      <text x="80" y="50" font-family="SF Pro Text, -apple-system, sans-serif" font-size="12" fill="#999">Formatted document with charts</text>

      <!-- Radio button -->
      <circle cx="314" cy="36" r="12" fill="url(#teal-accent)" filter="url(#glow-teal)"/>
      <circle cx="314" cy="36" r="6" fill="#F6F5F5"/>
    </g>

    <!-- JSON Option -->
    <g transform="translate(0, 104)">
      <rect width="342" height="72" rx="16" fill="#353A40" filter="url(#soft-shadow)"/>
      <rect x="0" y="0" width="6" height="72" rx="3" fill="#4285F4"/>

      <g transform="translate(24, 16)">
        <rect width="40" height="48" rx="4" fill="#4285F4" opacity="0.2"/>
        <rect x="8" y="4" width="24" height="32" rx="2" fill="#4285F4"/>
        <text x="20" y="26" font-family="SF Pro Text, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#FFFFFF" text-anchor="middle">JSON</text>
      </g>

      <text x="80" y="30" font-family="SF Pro Text, -apple-system, sans-serif" font-size="15" font-weight="500" fill="#F6F5F5">JSON Data</text>
      <text x="80" y="50" font-family="SF Pro Text, -apple-system, sans-serif" font-size="12" fill="#999">Raw data for integrations</text>

      <circle cx="314" cy="36" r="12" fill="#0F1012" stroke="#4A4A55" stroke-width="2"/>
    </g>

    <!-- CSV Option -->
    <g transform="translate(0, 188)">
      <rect width="342" height="72" rx="16" fill="#353A40" filter="url(#soft-shadow)"/>
      <rect x="0" y="0" width="6" height="72" rx="3" fill="#34A853"/>

      <g transform="translate(24, 16)">
        <rect width="40" height="48" rx="4" fill="#34A853" opacity="0.2"/>
        <rect x="8" y="4" width="24" height="32" rx="2" fill="#34A853"/>
        <text x="20" y="26" font-family="SF Pro Text, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#FFFFFF" text-anchor="middle">CSV</text>
      </g>

      <text x="80" y="30" font-family="SF Pro Text, -apple-system, sans-serif" font-size="15" font-weight="500" fill="#F6F5F5">CSV Spreadsheet</text>
      <text x="80" y="50" font-family="SF Pro Text, -apple-system, sans-serif" font-size="12" fill="#999">For Excel and Sheets</text>

      <circle cx="314" cy="36" r="12" fill="#0F1012" stroke="#4A4A55" stroke-width="2"/>
    </g>
  </g>

  <!-- Share Options -->
  <g transform="translate(24, 640)">
    <text x="0" y="0" font-family="SF Pro Text, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#F6F5F5">Share With</text>

    <g transform="translate(0, 20)">
      <!-- Slack -->
      <g>
        <rect width="72" height="72" rx="16" fill="#353A40" filter="url(#soft-shadow)"/>
        <rect width="72" height="72" rx="16" fill="#4A154B" opacity="0.3"/>
        <rect x="16" y="16" width="40" height="40" rx="8" fill="#4A154B"/>
        <text x="36" y="42" font-family="SF Pro Text, -apple-system, sans-serif" font-size="20" fill="#FFFFFF" text-anchor="middle">S</text>
      </g>

      <!-- Email -->
      <g transform="translate(88, 0)">
        <rect width="72" height="72" rx="16" fill="#353A40" filter="url(#soft-shadow)"/>
        <rect width="72" height="72" rx="16" fill="#4285F4" opacity="0.3"/>
        <rect x="16" y="16" width="40" height="40" rx="8" fill="#4285F4"/>
        <rect x="24" y="28" width="24" height="16" rx="2" fill="none" stroke="#FFFFFF" stroke-width="2"/>
        <path d="M24,30 L36,40 L48,30" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
      </g>

      <!-- Teams -->
      <g transform="translate(176, 0)">
        <rect width="72" height="72" rx="16" fill="#353A40" filter="url(#soft-shadow)"/>
        <rect width="72" height="72" rx="16" fill="#6364F4" opacity="0.3"/>
        <rect x="16" y="16" width="40" height="40" rx="8" fill="#6364F4"/>
        <text x="36" y="44" font-family="SF Pro Text, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#FFFFFF" text-anchor="middle">T</text>
      </g>

      <!-- More -->
      <g transform="translate(264, 0)">
        <rect width="72" height="72" rx="16" fill="#353A40" filter="url(#soft-shadow)"/>
        <rect x="16" y="16" width="40" height="40" rx="8" fill="#0F1012"/>
        <circle cx="26" cy="26" r="3" fill="#999"/>
        <circle cx="36" cy="26" r="3" fill="#999"/>
        <circle cx="46" cy="26" r="3" fill="#999"/>
        <circle cx="26" cy="36" r="3" fill="#999"/>
        <circle cx="36" cy="36" r="3" fill="#999"/>
        <circle cx="46" cy="36" r="3" fill="#999"/>
      </g>
    </g>

    <text x="36" y="108" font-family="SF Pro Text, -apple-system, sans-serif" font-size="11" fill="#999" text-anchor="middle">Slack</text>
    <text x="124" y="108" font-family="SF Pro Text, -apple-system, sans-serif" font-size="11" fill="#999" text-anchor="middle">Email</text>
    <text x="212" y="108" font-family="SF Pro Text, -apple-system, sans-serif" font-size="11" fill="#999" text-anchor="middle">Teams</text>
    <text x="300" y="108" font-family="SF Pro Text, -apple-system, sans-serif" font-size="11" fill="#999" text-anchor="middle">More</text>
  </g>

  <!-- Export Button -->
  <g transform="translate(24, 760)">
    <rect width="342" height="56" rx="28" fill="url(#teal-primary)" filter="url(#card-shadow)"/>

    <!-- Download icon -->
    <g transform="translate(55, 16)">
      <rect x="4" y="0" width="16" height="12" rx="2" fill="none" stroke="#F6F5F5" stroke-width="2"/>
      <path d="M12,12 L12,22 M8,18 L12,22 L16,18" fill="none" stroke="#F6F5F5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <text x="195" y="34" font-family="SF Pro Display, -apple-system, sans-serif" font-size="17" font-weight="600" fill="#F6F5F5" text-anchor="middle">Export Report</text>
  </g>

  <!-- Home Indicator -->
  <rect x="140" y="830" width="110" height="5" rx="2.5" fill="#4A4A55"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="coachy-insight-title coachy-insight-desc">
  <title id="coachy-insight-title">Coachy Insight</title>
  <desc id="coachy-insight-desc">iOS mockup showing personalized Coachy feedback with mascot character providing daily insights</desc>

  <defs>
    <!-- Gradients -->
    <linearGradient id="bg-gradient-coachy" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1F"/>
      <stop offset="100%" stop-color="#0F1012"/>
    </linearGradient>

    <linearGradient id="coachy-flame" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#E05A26"/>
      <stop offset="40%" stop-color="#F07B3F"/>
      <stop offset="100%" stop-color="#F8B26A"/>
    </linearGradient>

    <linearGradient id="coachy-cape" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E05545"/>
      <stop offset="100%" stop-color="#D4462E"/>
    </linearGradient>

    <linearGradient id="teal-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C7BE"/>
      <stop offset="100%" stop-color="#0A9396"/>
    </linearGradient>

    <linearGradient id="gold-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>

    <linearGradient id="orange-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8B65"/>
      <stop offset="100%" stop-color="#FF6B3D"/>
    </linearGradient>

    <linearGradient id="speech-bubble" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#353A40"/>
      <stop offset="100%" stop-color="#2A2A32"/>
    </linearGradient>

    <!-- Shadows -->
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>

    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>

    <filter id="glow-coachy" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glow-teal" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="url(#bg-gradient-coachy)"/>

  <!-- Decorative elements -->
  <g opacity="0.3">
    <circle cx="50" cy="200" r="60" fill="url(#orange-accent)" filter="url(#soft-shadow)"/>
    <circle cx="340" cy="300" r="40" fill="url(#teal-accent)" filter="url(#soft-shadow)"/>
  </g>

  <!-- Status Bar -->
  <rect x="0" y="0" width="390" height="54" fill="transparent"/>
  <text x="175" y="34" font-family="SF Pro Display, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#F6F5F5">9:15</text>

  <!-- Header -->
  <text x="24" y="88" font-family="SF Pro Display, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#F6F5F5">Your Coachy Insight</text>
  <text x="24" y="112" font-family="SF Pro Text, -apple-system, sans-serif" font-size="16" fill="#FF8B65">Personalized for today</text>

  <!-- Coachy Character -->
  <g transform="translate(195, 240)">
    <!-- Glow effect -->
    <ellipse cx="0" cy="80" rx="80" ry="20" fill="url(#orange-accent)" opacity="0.2" filter="url(#glow-coachy)"/>

    <!-- Body -->
    <ellipse cx="0" cy="70" rx="45" ry="40" fill="url(#coachy-flame)"/>

    <!-- Cape -->
    <path d="M-35,50 Q-50,80 -40,120 Q-20,100 0,120 Q20,100 40,120 Q50,80 35,50" fill="url(#coachy-cape)"/>

    <!-- Head -->
    <circle cx="0" cy="20" r="40" fill="url(#coachy-flame)"/>

    <!-- Face highlight -->
    <ellipse cx="-5" cy="5" rx="25" ry="20" fill="#F8B26A" opacity="0.4"/>

    <!-- Eyes -->
    <ellipse cx="-12" cy="10" rx="6" ry="7" fill="#FFFFFF"/>
    <ellipse cx="12" cy="10" rx="6" ry="7" fill="#FFFFFF"/>
    <circle cx="-10" cy="12" r="3" fill="#1A1A1F"/>
    <circle cx="14" cy="12" r="3" fill="#1A1A1F"/>

    <!-- Eye shine -->
    <circle cx="-9" cy="10" r="1" fill="#FFFFFF"/>
    <circle cx="15" cy="10" r="1" fill="#FFFFFF"/>

    <!-- Beak/Mouth -->
    <ellipse cx="0" cy="28" rx="8" ry="5" fill="#E05A26"/>
    <ellipse cx="0" cy="26" rx="6" ry="3" fill="#F07B3F"/>

    <!-- Eyebrows (excited) -->
    <path d="M-20,0 Q-12,-6 -4,0" fill="none" stroke="#E05A26" stroke-width="3" stroke-linecap="round"/>
    <path d="M4,0 Q12,-6 20,0" fill="none" stroke="#E05A26" stroke-width="3" stroke-linecap="round"/>

    <!-- Belt -->
    <rect x="-40" y="55" width="80" height="10" rx="2" fill="#8B4513"/>
    <rect x="-10" y="53" width="20" height="14" rx="2" fill="url(#gold-accent)"/>
    <text x="0" y="63" font-family="SF Pro Text, -apple-system, sans-serif" font-size="8" fill="#8B4513" text-anchor="middle">FP</text>

    <!-- Flame effects -->
    <g opacity="0.6">
      <path d="M-30,60 Q-35,45 -25,50 Q-30,55 -30,60" fill="#FFD700"/>
      <path d="M30,60 Q35,45 25,50 Q30,55 30,60" fill="#FFD700"/>
    </g>

    <!-- Arms raised (celebrating) -->
    <ellipse cx="-55" cy="40" rx="15" ry="10" fill="url(#coachy-flame)" transform="rotate(-30 -55 40)"/>
    <ellipse cx="55" cy="40" rx="15" ry="10" fill="url(#coachy-flame)" transform="rotate(30 55 40)"/>
  </g>

  <!-- Speech Bubble -->
  <g transform="translate(24, 360)">
    <rect width="342" height="160" rx="20" fill="url(#speech-bubble)" filter="url(#card-shadow)"/>

    <!-- Bubble tail -->
    <polygon points="50,0 70,0 50,25" fill="url(#speech-bubble)"/>

    <!-- Content -->
    <text x="24" y="36" font-family="SF Pro Display, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#F6F5F5">Great work today!</text>

    <text x="24" y="68" font-family="SF Pro Text, -apple-system, sans-serif" font-size="15" fill="#E0E0E0">You crushed your focus goals and</text>
    <text x="24" y="90" font-family="SF Pro Text, -apple-system, sans-serif" font-size="15" fill="#E0E0E0">finished 8 of 12 tasks. Your 12-day</text>
    <text x="24" y="112" font-family="SF Pro Text, -apple-system, sans-serif" font-size="15" fill="#E0E0E0">streak is impressive! Keep it up.</text>

    <!-- Highlight -->
    <rect x="24" y="125" width="140" height="24" rx="12" fill="url(#teal-accent)" opacity="0.2"/>
    <text x="94" y="141" font-family="SF Pro Text, -apple-system, sans-serif" font-size="13" fill="#00C7BE" text-anchor="middle">You're in the top 15%!</text>
  </g>

  <!-- Insight Cards -->
  <g transform="translate(24, 540)">
    <!-- Pattern Insight -->
    <rect width="342" height="90" rx="16" fill="#353A40" filter="url(#soft-shadow)"/>
    <rect x="0" y="0" width="5" height="90" rx="2.5" fill="url(#teal-accent)"/>

    <g transform="translate(24, 20)">
      <circle cx="20" cy="20" r="18" fill="#0A9396" opacity="0.2"/>
      <path d="M12,20 L18,26 L28,14" fill="none" stroke="#00C7BE" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <text x="70" y="32" font-family="SF Pro Text, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#F6F5F5">Pattern Detected</text>
    <text x="70" y="52" font-family="SF Pro Text, -apple-system, sans-serif" font-size="13" fill="#999">Your focus peaks at 11AM. Schedule</text>
    <text x="70" y="70" font-family="SF Pro Text, -apple-system, sans-serif" font-size="13" fill="#999">hard tasks then tomorrow!</text>
  </g>

  <g transform="translate(24, 646)">
    <!-- Recommendation -->
    <rect width="342" height="90" rx="16" fill="#353A40" filter="url(#soft-shadow)"/>
    <rect x="0" y="0" width="5" height="90" rx="2.5" fill="url(#orange-accent)"/>

    <g transform="translate(24, 20)">
      <circle cx="20" cy="20" r="18" fill="#FF6B3D" opacity="0.2"/>
      <path d="M20,12 L20,24 M14,18 L20,12 L26,18" fill="none" stroke="#FF6B3D" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <text x="70" y="32" font-family="SF Pro Text, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#F6F5F5">Tomorrow's Tip</text>
    <text x="70" y="52" font-family="SF Pro Text, -apple-system, sans-serif" font-size="13" fill="#999">Try the Pomodoro technique for your</text>
    <text x="70" y="70" font-family="SF Pro Text, -apple-system, sans-serif" font-size="13" fill="#999">code review - it worked great today!</text>
  </g>

  <!-- Continue Button -->
  <g transform="translate(24, 760)">
    <rect width="342" height="56" rx="28" fill="url(#orange-accent)" filter="url(#soft-shadow)"/>

    <!-- Sparkle icon -->
    <g transform="translate(55, 16)">
      <path d="M12,0 L14,10 L24,12 L14,14 L12,24 L10,14 L0,12 L10,10 Z" fill="#FFD700"/>
    </g>

    <text x="195" y="34" font-family="SF Pro Display, -apple-system, sans-serif" font-size="17" font-weight="600" fill="#F6F5F5" text-anchor="middle">Continue</text>
  </g>

  <!-- Home Indicator -->
  <rect x="140" y="830" width="110" height="5" rx="2.5" fill="#4A4A55"/>
</svg>

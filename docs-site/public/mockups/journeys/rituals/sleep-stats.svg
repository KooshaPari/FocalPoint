<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="sleep-stats-title sleep-stats-desc">
  <title id="sleep-stats-title">Sleep Statistics Detail View</title>
  <desc id="sleep-stats-desc">iOS mockup showing detailed sleep statistics including duration, quality, stages, and trends</desc>

  <defs>
    <!-- Gradients -->
    <linearGradient id="bg-gradient-sleep" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1F"/>
      <stop offset="100%" stop-color="#0F1012"/>
    </linearGradient>

    <linearGradient id="sleep-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B7BB5"/>
      <stop offset="100%" stop-color="#6B5B95"/>
    </linearGradient>

    <linearGradient id="deep-sleep" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3D2C5E"/>
      <stop offset="100%" stop-color="#2A1E45"/>
    </linearGradient>

    <linearGradient id="rem-sleep" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00C7BE"/>
      <stop offset="100%" stop-color="#0A9396"/>
    </linearGradient>

    <linearGradient id="light-sleep" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF8B65"/>
      <stop offset="100%" stop-color="#FF6B3D"/>
    </linearGradient>

    <linearGradient id="awake" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7EBAB5"/>
      <stop offset="100%" stop-color="#5A9995"/>
    </linearGradient>

    <linearGradient id="chart-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6B5B95" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6B5B95" stop-opacity="0"/>
    </linearGradient>

    <!-- Shadows -->
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>

    <filter id="glow-purple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="url(#bg-gradient-sleep)"/>

  <!-- Status Bar -->
  <rect x="0" y="0" width="390" height="54" fill="transparent"/>
  <text x="175" y="34" font-family="SF Pro Display, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#F6F5F5">9:41</text>

  <!-- Header with Back -->
  <g transform="translate(24, 68)">
    <rect x="-10" y="-10" width="44" height="44" rx="22" fill="#353A40"/>
    <path d="M8,16 L20,24 L8,32" fill="none" stroke="#F6F5F5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="195" y="80" font-family="SF Pro Display, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#F6F5F5" text-anchor="middle">Sleep Analysis</text>

  <!-- Main Sleep Duration Ring -->
  <g transform="translate(195, 200)">
    <!-- Background ring -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="#353A40" stroke-width="20"/>

    <!-- Progress ring -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="url(#sleep-purple)" stroke-width="20"
            stroke-dasharray="502 628" stroke-linecap="round" transform="rotate(-90)" filter="url(#glow-purple)"/>

    <!-- Inner content -->
    <circle cx="0" cy="0" r="75" fill="#1A1A1F"/>

    <!-- Moon icon -->
    <path d="M-20,-30 A25,25 0 1,0 -20,30 A18,18 0 1,1 -20,-30" fill="#6B5B95" transform="translate(0,-45)"/>

    <text x="0" y="15" font-family="SF Pro Display, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#F6F5F5" text-anchor="middle">7h</text>
    <text x="0" y="42" font-family="SF Pro Display, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#F6F5F5" text-anchor="middle">23m</text>
    <text x="0" y="62" font-family="SF Pro Text, -apple-system, sans-serif" font-size="14" fill="#7EBAB5" text-anchor="middle">+1h 12m vs goal</text>
  </g>

  <!-- Sleep Quality Card -->
  <g transform="translate(24, 340)">
    <rect width="342" height="100" rx="16" fill="#353A40" filter="url(#card-shadow)"/>

    <text x="20" y="28" font-family="SF Pro Display, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#F6F5F5">Sleep Quality Score</text>

    <!-- Quality bars -->
    <g transform="translate(20, 45)">
      <!-- Label -->
      <text x="0" y="12" font-family="SF Pro Text, -apple-system, sans-serif" font-size="12" fill="#999">Deep Sleep</text>
      <text x="120" y="12" font-family="SF Pro Text, -apple-system, sans-serif" font-size="12" fill="#F6F5F5" font-weight="600">2h 15m</text>
      <rect x="0" y="18" width="180" height="6" rx="3" fill="#0F1012"/>
      <rect x="0" y="18" width="112" height="6" rx="3" fill="url(#deep-sleep)"/>
    </g>

    <g transform="translate(20, 72)">
      <text x="0" y="12" font-family="SF Pro Text, -apple-system, sans-serif" font-size="12" fill="#999">REM Sleep</text>
      <text x="120" y="12" font-family="SF Pro Text, -apple-system, sans-serif" font-size="12" fill="#F6F5F5" font-weight="600">1h 48m</text>
      <rect x="0" y="18" width="180" height="6" rx="3" fill="#0F1012"/>
      <rect x="0" y="18" width="90" height="6" rx="3" fill="url(#rem-sleep)"/>
    </g>
  </g>

  <!-- Sleep Stages Timeline -->
  <g transform="translate(24, 456)">
    <rect width="342" height="160" rx="16" fill="#353A40" filter="url(#card-shadow)"/>

    <text x="20" y="28" font-family="SF Pro Display, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#F6F5F5">Sleep Stages</text>

    <!-- Timeline visualization -->
    <g transform="translate(20, 50)">
      <!-- Time labels -->
      <text x="0" y="0" font-family="SF Pro Text, -apple-system, sans-serif" font-size="10" fill="#666">10PM</text>
      <text x="130" y="0" font-family="SF Pro Text, -apple-system, sans-serif" font-size="10" fill="#666">2AM</text>
      <text x="280" y="0" font-family="SF Pro Text, -apple-system, sans-serif" font-size="10" fill="#666">6AM</text>

      <!-- Stage bars -->
      <rect x="0" y="15" width="50" height="24" rx="4" fill="url(#awake)"/>
      <rect x="50" y="15" width="80" height="24" rx="4" fill="url(#light-sleep)"/>
      <rect x="130" y="15" width="70" height="24" rx="4" fill="url(#deep-sleep)"/>
      <rect x="200" y="15" width="60" height="24" rx="4" fill="url(#rem-sleep)"/>
      <rect x="260" y="15" width="60" height="24" rx="4" fill="url(#light-sleep)"/>

      <!-- Legend -->
      <g transform="translate(0, 55)">
        <rect x="0" y="0" width="12" height="12" rx="2" fill="url(#awake)"/>
        <text x="18" y="10" font-family="SF Pro Text, -apple-system, sans-serif" font-size="10" fill="#999">Awake</text>

        <rect x="70" y="0" width="12" height="12" rx="2" fill="url(#light-sleep)"/>
        <text x="88" y="10" font-family="SF Pro Text, -apple-system, sans-serif" font-size="10" fill="#999">Light</text>

        <rect x="140" y="0" width="12" height="12" rx="2" fill="url(#deep-sleep)"/>
        <text x="158" y="10" font-family="SF Pro Text, -apple-system, sans-serif" font-size="10" fill="#999">Deep</text>

        <rect x="210" y="0" width="12" height="12" rx="2" fill="url(#rem-sleep)"/>
        <text x="228" y="10" font-family="SF Pro Text, -apple-system, sans-serif" font-size="10" fill="#999">REM</text>
      </g>
    </g>
  </g>

  <!-- Weekly Trend -->
  <g transform="translate(24, 632)">
    <rect width="342" height="130" rx="16" fill="#353A40" filter="url(#card-shadow)"/>

    <text x="20" y="28" font-family="SF Pro Display, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#F6F5F5">7-Day Trend</text>

    <!-- Bar chart -->
    <g transform="translate(20, 50)">
      <!-- Bars -->
      <rect x="0" y="30" width="32" height="40" rx="4" fill="#353A40"/>
      <rect x="0" y="45" width="32" height="25" rx="4" fill="#6B5B95" opacity="0.6"/>

      <rect x="44" y="20" width="32" height="50" rx="4" fill="#353A40"/>
      <rect x="44" y="30" width="32" height="40" rx="4" fill="#6B5B95" opacity="0.6"/>

      <rect x="88" y="10" width="32" height="60" rx="4" fill="#353A40"/>
      <rect x="88" y="25" width="32" height="45" rx="4" fill="url(#sleep-purple)"/>

      <rect x="132" y="25" width="32" height="45" rx="4" fill="#353A40"/>
      <rect x="132" y="40" width="32" height="30" rx="4" fill="#6B5B95" opacity="0.6"/>

      <rect x="176" y="15" width="32" height="55" rx="4" fill="#353A40"/>
      <rect x="176" y="28" width="32" height="42" rx="4" fill="#6B5B95" opacity="0.6"/>

      <rect x="220" y="5" width="32" height="65" rx="4" fill="#353A40"/>
      <rect x="220" y="18" width="32" height="52" rx="4" fill="#6B5B95" opacity="0.6"/>

      <rect x="264" y="0" width="32" height="70" rx="4" fill="url(#sleep-purple)" filter="url(#glow-purple)"/>
      <rect x="264" y="0" width="32" height="50" rx="4" fill="url(#sleep-purple)"/>

      <!-- Day labels -->
      <text x="16" y="85" font-family="SF Pro Text, -apple-system, sans-serif" font-size="10" fill="#666" text-anchor="middle">M</text>
      <text x="60" y="85" font-family="SF Pro Text, -apple-system, sans-serif" font-size="10" fill="#666" text-anchor="middle">T</text>
      <text x="104" y="85" font-family="SF Pro Text, -apple-system, sans-serif" font-size="10" fill="#666" text-anchor="middle">W</text>
      <text x="148" y="85" font-family="SF Pro Text, -apple-system, sans-serif" font-size="10" fill="#666" text-anchor="middle">T</text>
      <text x="192" y="85" font-family="SF Pro Text, -apple-system, sans-serif" font-size="10" fill="#666" text-anchor="middle">F</text>
      <text x="236" y="85" font-family="SF Pro Text, -apple-system, sans-serif" font-size="10" fill="#666" text-anchor="middle">S</text>
      <text x="280" y="85" font-family="SF Pro Text, -apple-system, sans-serif" font-size="10" fill="#7EBAB5" text-anchor="middle">S</text>
    </g>

    <!-- Average line -->
    <line x1="20" y1="95" x2="320" y2="95" stroke="#7EBAB5" stroke-width="1" stroke-dasharray="4 4"/>
    <text x="325" y="99" font-family="SF Pro Text, -apple-system, sans-serif" font-size="10" fill="#7EBAB5">avg</text>
  </g>

  <!-- Home Indicator -->
  <rect x="140" y="830" width="110" height="5" rx="2.5" fill="#4A4A55"/>
</svg>

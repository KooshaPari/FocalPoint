<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="focus-opps-title focus-opps-desc">
  <title id="focus-opps-title">Focus Opportunities</title>
  <desc id="focus-opps-desc">iOS mockup showing AI-suggested focus blocks and task prioritization</desc>

  <defs>
    <!-- Gradients -->
    <linearGradient id="bg-gradient-focus" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1F"/>
      <stop offset="100%" stop-color="#0F1012"/>
    </linearGradient>

    <linearGradient id="teal-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C7BE"/>
      <stop offset="100%" stop-color="#0A9396"/>
    </linearGradient>

    <linearGradient id="orange-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8B65"/>
      <stop offset="100%" stop-color="#FF6B3D"/>
    </linearGradient>

    <linearGradient id="gold-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>

    <linearGradient id="purple-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9B7BB5"/>
      <stop offset="100%" stop-color="#6B5B95"/>
    </linearGradient>

    <!-- Shadows -->
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>

    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>

    <filter id="glow-teal" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="url(#bg-gradient-focus)"/>

  <!-- Status Bar -->
  <rect x="0" y="0" width="390" height="54" fill="transparent"/>
  <text x="175" y="34" font-family="SF Pro Display, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#F6F5F5">9:41</text>

  <!-- Header -->
  <text x="24" y="88" font-family="SF Pro Display, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#F6F5F5">Focus Time</text>
  <text x="24" y="112" font-family="SF Pro Text, -apple-system, sans-serif" font-size="16" fill="#7EBAB5">2h 15m available today</text>

  <!-- AI Insight Banner -->
  <g transform="translate(24, 130)">
    <rect width="342" height="70" rx="16" fill="#353A40" filter="url(#card-shadow)"/>
    <rect x="0" y="0" width="6" height="70" rx="3" fill="url(#teal-primary)"/>

    <!-- Sparkle icon -->
    <g transform="translate(24, 20)">
      <path d="M12,0 L14,10 L24,12 L14,14 L12,24 L10,14 L0,12 L10,10 Z" fill="url(#gold-accent)"/>
    </g>

    <text x="50" y="30" font-family="SF Pro Text, -apple-system, sans-serif" font-size="12" fill="#7EBAB5" font-weight="500">AI Suggestion</text>
    <text x="50" y="50" font-family="SF Pro Text, -apple-system, sans-serif" font-size="14" fill="#F6F5F5">You're most focused between 10-12PM. Try the code review then!</text>
  </g>

  <!-- Priority Task Section -->
  <g transform="translate(24, 216)">
    <text x="0" y="0" font-family="SF Pro Display, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#F6F5F5">Priority Tasks</text>

    <!-- High Priority Card -->
    <g transform="translate(0, 20)">
      <rect width="342" height="90" rx="16" fill="#353A40" filter="url(#card-shadow)"/>

      <!-- Priority badge -->
      <rect x="20" y="16" width="60" height="24" rx="12" fill="#FF6B3D" opacity="0.2"/>
      <text x="50" y="32" font-family="SF Pro Text, -apple-system, sans-serif" font-size="12" fill="#FF6B3D" font-weight="600" text-anchor="middle">High</text>

      <!-- Task content -->
      <text x="20" y="58" font-family="SF Pro Display, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#F6F5F5">Code Review Sprint</text>
      <text x="20" y="76" font-family="SF Pro Text, -apple-system, sans-serif" font-size="13" fill="#999">PR #1234, #1235, #1236</text>

      <!-- Duration & energy -->
      <g transform="translate(240, 24)">
        <rect width="80" height="48" rx="8" fill="#0F1012"/>
        <text x="40" y="22" font-family="SF Pro Display, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#F6F5F5" text-anchor="middle">45</text>
        <text x="40" y="38" font-family="SF Pro Text, -apple-system, sans-serif" font-size="11" fill="#7EBAB5" text-anchor="middle">minutes</text>
      </g>

      <!-- Energy indicator -->
      <g transform="translate(20, 85)">
        <rect width="80" height="20" height="20" rx="4" fill="#0F1012"/>
        <rect x="2" y="2" width="16" height="16" rx="2" fill="url(#gold-accent)" opacity="0.8"/>
        <rect x="20" y="2" width="16" height="16" rx="2" fill="url(#gold-accent)" opacity="0.8"/>
        <rect x="38" y="2" width="16" height="16" rx="2" fill="url(#gold-accent)" opacity="0.8"/>
        <rect x="56" y="2" width="16" height="16" rx="2" fill="#353A40"/>
      </g>
    </g>

    <!-- Medium Priority Card -->
    <g transform="translate(0, 124)">
      <rect width="342" height="90" rx="16" fill="#353A40" filter="url(#card-shadow)"/>

      <rect x="20" y="16" width="72" height="24" rx="12" fill="#0A9396" opacity="0.2"/>
      <text x="56" y="32" font-family="SF Pro Text, -apple-system, sans-serif" font-size="12" fill="#00C7BE" font-weight="600" text-anchor="middle">Medium</text>

      <text x="20" y="58" font-family="SF Pro Display, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#F6F5F5">Update Documentation</text>
      <text x="20" y="76" font-family="SF Pro Text, -apple-system, sans-serif" font-size="13" fill="#999">API docs, README updates</text>

      <g transform="translate(240, 24)">
        <rect width="80" height="48" rx="8" fill="#0F1012"/>
        <text x="40" y="22" font-family="SF Pro Display, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#F6F5F5" text-anchor="middle">30</text>
        <text x="40" y="38" font-family="SF Pro Text, -apple-system, sans-serif" font-size="11" fill="#7EBAB5" text-anchor="middle">minutes</text>
      </g>

      <g transform="translate(20, 85)">
        <rect width="80" height="20" rx="4" fill="#0F1012"/>
        <rect x="2" y="2" width="16" height="16" rx="2" fill="url(#gold-accent)" opacity="0.6"/>
        <rect x="20" y="2" width="16" height="16" rx="2" fill="url(#gold-accent)" opacity="0.6"/>
        <rect x="38" y="2" width="16" height="16" rx="2" fill="#353A40"/>
        <rect x="56" y="2" width="16" height="16" rx="2" fill="#353A40"/>
      </g>
    </g>

    <!-- Low Priority Card -->
    <g transform="translate(0, 228)">
      <rect width="342" height="90" rx="16" fill="#353A40" filter="url(#card-shadow)"/>

      <rect x="20" y="16" width="52" height="24" rx="12" fill="#6B5B95" opacity="0.2"/>
      <text x="46" y="32" font-family="SF Pro Text, -apple-system, sans-serif" font-size="12" fill="#8B7BB5" font-weight="600" text-anchor="middle">Low</text>

      <text x="20" y="58" font-family="SF Pro Display, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#F6F5F5">Plan Next Week</text>
      <text x="20" y="76" font-family="SF Pro Text, -apple-system, sans-serif" font-size="13" fill="#999">Sprint planning prep</text>

      <g transform="translate(240, 24)">
        <rect width="80" height="48" rx="8" fill="#0F1012"/>
        <text x="40" y="22" font-family="SF Pro Display, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#F6F5F5" text-anchor="middle">20</text>
        <text x="40" y="38" font-family="SF Pro Text, -apple-system, sans-serif" font-size="11" fill="#7EBAB5" text-anchor="middle">minutes</text>
      </g>

      <g transform="translate(20, 85)">
        <rect width="80" height="20" rx="4" fill="#0F1012"/>
        <rect x="2" y="2" width="16" height="16" rx="2" fill="url(#gold-accent)" opacity="0.3"/>
        <rect x="20" y="2" width="16" height="16" rx="2" fill="#353A40"/>
        <rect x="38" y="2" width="16" height="16" rx="2" fill="#353A40"/>
        <rect x="56" y="2" width="16" height="16" rx="2" fill="#353A40"/>
      </g>
    </g>
  </g>

  <!-- Start Focus Button -->
  <g transform="translate(24, 580)">
    <rect width="342" height="56" rx="28" fill="url(#teal-primary)" filter="url(#soft-shadow)"/>

    <!-- Play icon -->
    <polygon points="165,18 165,38 182,28" fill="#F6F5F5"/>

    <text x="195" y="34" font-family="SF Pro Display, -apple-system, sans-serif" font-size="17" font-weight="600" fill="#F6F5F5">Start Focus Session</text>
  </g>

  <!-- Quick Actions -->
  <g transform="translate(24, 652)">
    <rect width="165" height="80" rx="16" fill="#353A40" filter="url(#soft-shadow)"/>
    <g transform="translate(60, 20)">
      <circle cx="22" cy="22" r="20" fill="#0A9396" opacity="0.2"/>
      <rect x="14" y="14" width="16" height="16" rx="2" fill="#00C7BE"/>
    </g>
    <text x="82" y="62" font-family="SF Pro Text, -apple-system, sans-serif" font-size="13" fill="#F6F5F5" text-anchor="middle">Break Timer</text>

    <g transform="translate(201, 0)">
      <rect width="165" height="80" rx="16" fill="#353A40" filter="url(#soft-shadow)"/>
      <g transform="translate(237, 20)">
        <circle cx="22" cy="22" r="20" fill="#FF6B3D" opacity="0.2"/>
        <path d="M18,14 L18,30 L30,22 Z" fill="#FF6B3D"/>
      </g>
      <text x="259" y="62" font-family="SF Pro Text, -apple-system, sans-serif" font-size="13" fill="#F6F5F5" text-anchor="middle">Pomodoro</text>
    </g>
  </g>

  <!-- Coachy Tip -->
  <g transform="translate(24, 748)">
    <rect width="342" height="56" rx="16" fill="#353A40"/>
    <rect x="0" y="0" width="4" height="56" rx="2" fill="url(#orange-primary)"/>

    <g transform="translate(20, 12)">
      <circle cx="16" cy="16" r="14" fill="#FF6B3D" opacity="0.3"/>
      <ellipse cx="16" cy="20" rx="7" ry="6" fill="#FF8B65"/>
      <circle cx="16" cy="14" r="8" fill="#F07B3F"/>
      <ellipse cx="16" cy="11" rx="5" ry="4" fill="#FF8B65"/>
      <circle cx="13" cy="10" r="1" fill="#1A1A1F"/>
      <circle cx="19" cy="10" r="1" fill="#1A1A1F"/>
    </g>

    <text x="56" y="26" font-family="SF Pro Text, -apple-system, sans-serif" font-size="12" fill="#FF8B65" font-weight="500">Coachy Tip</text>
    <text x="56" y="44" font-family="SF Pro Text, -apple-system, sans-serif" font-size="13" fill="#F6F5F5">Music boosts focus by 15% - try lo-fi beats!</text>
  </g>

  <!-- Home Indicator -->
  <rect x="140" y="830" width="110" height="5" rx="2.5" fill="#4A4A55"/>
</svg>

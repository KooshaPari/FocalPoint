<?xml version="1.0" encoding="UTF-8"?>
<!-- iPhone 15 Pro Max device frame: 1290x2796 (screen area) -->
<svg viewBox="0 0 1464 3032" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="metalGradient" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ccc;stop-opacity:1" />
    </radialGradient>
  </defs>
  <!-- Outer bezel -->
  <rect x="0" y="0" width="1464" height="3032" fill="url(#metalGradient)" rx="96"/>
  <!-- Screen opening -->
  <rect x="87" y="96" width="1290" height="2796" fill="#000" rx="64"/>
  <!-- Content placeholder -->
  <rect x="87" y="96" width="1290" height="2796" fill="#f8f9fa" rx="64" id="device-content"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="280" height="64" viewBox="0 0 280 64" fill="none">
  <!-- FocalPoint wordmark — dark mode (alternate, all white variant for dark backgrounds) -->
  <defs>
    <style>
      .fp-text { font-family: "SF Pro Text", system-ui, -apple-system, sans-serif; font-size: 40px; font-weight: 600; letter-spacing: -0.01em; }
      .fp-mark { font-family: "SF Mono", "JetBrains Mono", ui-monospace, monospace; font-size: 36px; font-weight: 500; }
    </style>
  </defs>

  <!-- Lettermark: "FP" in brand color -->
  <text x="8" y="44" class="fp-mark" fill="#ff6b3d">FP</text>

  <!-- Wordmark: "FocalPoint" in white for maximum contrast on dark bkgd -->
  <text x="56" y="44" class="fp-text" fill="#ffffff">FocalPoint</text>

  <!-- Accent underscore -->
  <line x1="56" y1="50" x2="268" y2="50" stroke="#ff6b3d" stroke-width="2.5" stroke-linecap="round"/>
</svg>

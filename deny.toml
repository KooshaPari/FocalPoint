[advisories]
db-path = "$CARGO_HOME/advisory-db"
# W-69 audit (2026-04-25): 19 advisories, 0 patchable without structural changes.
# Root cause: templates-registry@0.1.0 depends on multipart@0.18 (UNMAINTAINED),
# which pulls hyper 0.10 + iron + nickel (all unmaintained/vulnerable).
# Recommendation: Migrate templates-registry to modern async stack (e.g., axum + modern multipart).
# Timeline: Track as architecture debt; defer until templates-registry migration planned.

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "0BSD",
    "CC0-1.0",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"

# enable post-templates-registry-redesign — see docs/changes/templates-registry-modernization/proposal.md
# [[bans.deny]]
# name = "hyper"
# version = "<0.14"
# reason = "Unmaintained <0.14; blocks templates-registry modernization. Migrate to axum + modern multipart."

# enable post-templates-registry-redesign — see docs/changes/templates-registry-modernization/proposal.md
# [[bans.deny]]
# name = "iron"
# reason = "Unmaintained; blocks templates-registry modernization. Migrate to axum."

# enable post-templates-registry-redesign — see docs/changes/templates-registry-modernization/proposal.md
# [[bans.deny]]
# name = "nickel"
# reason = "Unmaintained; blocks templates-registry modernization. Migrate to axum."

# enable post-templates-registry-redesign — see docs/changes/templates-registry-modernization/proposal.md
# [[bans.deny]]
# name = "multipart"
# version = "0.18"
# reason = "UNMAINTAINED; blocks templates-registry modernization. Upgrade to modern multipart crate."

[sources]
unknown-registry = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

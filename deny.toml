[advisories]
db-path = "$CARGO_HOME/advisory-db"
# W-69 audit (2026-04-25): 19 advisories, 0 patchable without structural changes.
# Root cause: templates-registry@0.1.0 depends on multipart@0.18 (UNMAINTAINED),
# which pulls hyper 0.10 + iron + nickel (all unmaintained/vulnerable).
# Recommendation: Migrate templates-registry to modern async stack (e.g., axum + modern multipart).
# Timeline: Track as architecture debt; defer until templates-registry migration planned.

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "0BSD",
    "CC0-1.0",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

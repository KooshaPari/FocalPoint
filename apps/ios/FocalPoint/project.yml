name: FocalPoint
options:
  bundleIdPrefix: com.koosha
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"

settings:
  base:
    DEVELOPMENT_TEAM: GCT2BN8WLL
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    # Let framework targets auto-generate their Info.plist so code signing
    # works without per-target plist files.
    GENERATE_INFOPLIST_FILE: "YES"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.2.0"

targets:
  DesignSystem:
    type: framework
    platform: iOS
    sources:
      - path: Sources/DesignSystem
    settings:
      base:
        PRODUCT_NAME: DesignSystem
        DEFINES_MODULE: "YES"

  FocalPointCore:
    type: framework
    platform: iOS
    sources:
      - path: Sources/FocalPointCore
        excludes:
          # Shipped inside the XCFramework; exclude SwiftPM-local copies to
          # avoid duplicate module definitions.
          - focus_ffiFFI.h
          - focus_ffiFFI.modulemap
    dependencies:
      - framework: Frameworks/FocusFFI.xcframework
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_NAME: FocalPointCore
        DEFINES_MODULE: "YES"
        # Let the generated UniFFI Swift import the XCFramework's module.
        FRAMEWORK_SEARCH_PATHS: "$(inherited) $(SRCROOT)/Frameworks"

  MascotUI:
    type: framework
    platform: iOS
    sources:
      - path: Sources/MascotUI
    dependencies:
      - target: DesignSystem
      - target: FocalPointCore
    settings:
      base:
        PRODUCT_NAME: MascotUI
        DEFINES_MODULE: "YES"

  Enforcement:
    type: framework
    platform: iOS
    sources:
      - path: Sources/Enforcement
    dependencies:
      - target: FocalPointCore
    settings:
      base:
        PRODUCT_NAME: Enforcement
        DEFINES_MODULE: "YES"

  # UnlockProof target archived 2026-04-22 (QR/NFC deprioritized). Source at
  # .archive/unlock-proof-v0/UnlockProof. Revive when scope demands.

  FocalPointApp:
    type: application
    platform: iOS
    sources:
      - path: Sources/FocalPointApp
      - path: Resources
        type: resources
    dependencies:
      - target: DesignSystem
      - target: MascotUI
      - target: Enforcement
      - target: FocalPointCore
    tests:
      - target: FocalPointAppSnapshotTests
    capabilities:
      - identifiers:
          - com.apple.developer.icloud-services
          - com.apple.developer.icloud-container-identifiers
        entitlements:
          com.apple.developer.icloud-services:
            - CloudKit
          com.apple.developer.icloud-container-identifiers:
            - iCloud.com.koosha.focalpoint
    info:
      path: Sources/FocalPointApp/Info.plist
      properties:
        CFBundleDisplayName: FocalPoint
        CFBundleShortVersionString: 0.2.0
        CFBundleVersion: 1
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        # NSCameraUsageDescription removed — QR scanner archived.
        # FR-CAL-001 — EventKit-backed CalendarPort for Morning Brief.
        NSCalendarsFullAccessUsageDescription: "FocalPoint reads your calendar to preview your day in the Morning Brief and to flag schedule conflicts with focus blocks."
        # Background sync — rules keep firing when app is closed.
        UIBackgroundModes:
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.koosha.focalpoint.refresh
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleURLTypes:
          - CFBundleURLName: com.koosha.focalpoint.auth
            CFBundleURLSchemes:
              - focalpoint
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.koosha.focalpoint
        PRODUCT_NAME: FocalPointApp
        # Run directly on Apple Silicon Macs as "Designed for iPad" —
        # no simulator needed.
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "YES"
        SUPPORTS_MACCATALYST: "NO"
        # XCFramework embeds a static libfocus_ffi.a inside FocalPointCore
        # framework; bitcode_strip fails on the copy step otherwise.
        STRIP_BITCODE_FROM_COPIED_FILES: "NO"
        ENABLE_BITCODE: "NO"

  FocalPointWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/FocalPointWidget
    dependencies:
      - target: DesignSystem
    info:
      path: Sources/FocalPointWidget/Info.plist
      properties:
        CFBundleDisplayName: FocalPoint Widget
        CFBundleShortVersionString: 0.2.0
        CFBundleVersion: 1
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.koosha.focalpoint.widget
        PRODUCT_NAME: FocalPointWidget
        SKIP_INSTALL: "YES"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: "YES"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        OTHER_LDFLAGS: "-lsqlite3"
        BRIDGING_HEADER: "Sources/FocalPointWidget/FocalPointWidget-Bridging-Header.h"

  FocalPointIntegrationTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/FocalPointIntegrationTests
    dependencies:
      - target: FocalPointCore
      - target: DesignSystem
      - target: MascotUI
    settings:
      base:
        PRODUCT_NAME: FocalPointIntegrationTests
        FRAMEWORK_SEARCH_PATHS: "$(inherited) $(SRCROOT)/Frameworks"

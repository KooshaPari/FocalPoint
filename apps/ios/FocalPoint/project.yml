name: FocalPoint
options:
  bundleIdPrefix: com.koosha
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"

settings:
  base:
    DEVELOPMENT_TEAM: GCT2BN8WLL
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    # Let framework targets auto-generate their Info.plist so code signing
    # works without per-target plist files.
    GENERATE_INFOPLIST_FILE: "YES"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.2.0"

targets:
  DesignSystem:
    type: framework
    platform: iOS
    sources:
      - path: Sources/DesignSystem
    settings:
      base:
        PRODUCT_NAME: DesignSystem
        DEFINES_MODULE: "YES"

  FocalPointCore:
    type: framework
    platform: iOS
    sources:
      - path: Sources/FocalPointCore
        excludes:
          # Shipped inside the XCFramework; exclude SwiftPM-local copies to
          # avoid duplicate module definitions.
          - focus_ffiFFI.h
          - focus_ffiFFI.modulemap
    dependencies:
      - framework: Frameworks/FocusFFI.xcframework
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_NAME: FocalPointCore
        DEFINES_MODULE: "YES"
        # Let the generated UniFFI Swift import the XCFramework's module.
        FRAMEWORK_SEARCH_PATHS: "$(inherited) $(SRCROOT)/Frameworks"

  MascotUI:
    type: framework
    platform: iOS
    sources:
      - path: Sources/MascotUI
    dependencies:
      - target: DesignSystem
      - target: FocalPointCore
    settings:
      base:
        PRODUCT_NAME: MascotUI
        DEFINES_MODULE: "YES"

  Enforcement:
    type: framework
    platform: iOS
    sources:
      - path: Sources/Enforcement
    dependencies:
      - target: FocalPointCore
    settings:
      base:
        PRODUCT_NAME: Enforcement
        DEFINES_MODULE: "YES"

  UnlockProof:
    type: framework
    platform: iOS
    sources:
      - path: Sources/UnlockProof
    settings:
      base:
        PRODUCT_NAME: UnlockProof
        DEFINES_MODULE: "YES"

  FocalPointApp:
    type: application
    platform: iOS
    sources:
      - path: Sources/FocalPointApp
    dependencies:
      - target: DesignSystem
      - target: MascotUI
      - target: Enforcement
      - target: UnlockProof
      - target: FocalPointCore
    info:
      path: Sources/FocalPointApp/Info.plist
      properties:
        CFBundleDisplayName: FocalPoint
        CFBundleShortVersionString: 0.2.0
        CFBundleVersion: 1
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        NSCameraUsageDescription: "FocalPoint reads QR codes posted at your physical focus zones to unlock a session."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.koosha.focalpoint
        PRODUCT_NAME: FocalPointApp

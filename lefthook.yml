# Lefthook — local git hooks for FocalPoint.
#
# Install once after clone:
#   brew install lefthook && lefthook install
#
# Fast by default: pre-commit runs only on staged files. Full workspace
# checks run on pre-push. Mirrors hwLedger's layout; adapted for FocalPoint.

pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "crates/**/*.rs"
      run: |
        for f in {staged_files}; do
          rustfmt --edition 2021 --check "$f" || exit 1
        done
      stage_fixed: false

    secrets-files:
      # Refuse to commit obvious secret material. Adjust allowlist as needed.
      run: |
        if git diff --cached --name-only \
          | grep -E '\.(p8|p12|pem|key|mobileprovision)$' \
          | grep -v '^vendor/' \
          | grep -v '^tests/fixtures/'; then
          echo "Refusing to commit a .p8 / .p12 / .pem / .key / .mobileprovision file."
          echo "Move it out of the index or add to vendor/ or tests/fixtures/ if intentional."
          exit 1
        fi

    trufflehog:
      # Verified-only secret scan. Falls back to filesystem mode when the
      # repo is a worktree (git dir indirection breaks trufflehog's git driver).
      run: |
        if ! command -v trufflehog >/dev/null 2>&1; then
          echo "trufflehog not installed; skipping."
          echo "Install: brew install trufflesecurity/trufflehog/trufflehog"
          exit 0
        fi
        if [ -f .git ]; then
          files=$(git diff --cached --name-only --diff-filter=ACM)
          if [ -z "$files" ]; then
            echo "no staged files to scan"
            exit 0
          fi
          echo "$files" | xargs -I{} trufflehog filesystem --only-verified --fail {} || exit 1
        else
          trufflehog git file://. --since-commit HEAD --only-verified --fail
        fi

    clippy-changed:
      # Clippy only the crates touched by staged files. Full-workspace clippy
      # moves to pre-push.
      glob: "crates/**/*.rs"
      run: |
        set -euo pipefail
        crates=$(echo "{staged_files}" | tr ' ' '\n' \
          | sed -nE 's|^(crates/[^/]+)/.*|\1|p' \
          | sort -u)
        if [ -z "$crates" ]; then exit 0; fi
        for c in $crates; do
          name=$(basename "$c")
          echo ">>> clippy -p $name"
          cargo clippy -p "$name" --all-targets -- -D warnings
        done

pre-push:
  parallel: false
  commands:
    workspace-verify:
      run: |
        set -euo pipefail
        cargo fmt --all -- --check
        cargo clippy --workspace --all-targets -- -D warnings
        cargo test --workspace --no-fail-fast

    encoding:
      # AgilePlus mandates UTF-8 on all markdown. Skip if CLI missing.
      run: |
        if command -v agileplus >/dev/null 2>&1; then
          agileplus validate-encoding --all || true
        fi

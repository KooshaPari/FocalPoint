}

"""Defined at line 117: A focus session (e.g., locked-in time on a task)."""
type FocusSession {
  """Unique session ID."""
  id: String!
  """Task being worked on."""
  taskId: String!
  """When the session started."""
  startedAt: DateTime!
  """When the session ended (if completed)."""
  endedAt: DateTime
  """Duration of the session in seconds."""
  durationSecs: Int
}

"""Defined at line 131: Result of a sync trigger."""
type SyncResult {
  """Connector ID that was synced."""
  connectorId: String!
  """Sync status ("started", "success", "error")."""
  status: String!
  """Error message if status is "error"."""
  error: String
}

"""Defined at line 142: Root query type for the GraphQL schema."""
type Query {
  """Fetch tasks by optional status filter. Traces to: FR-GRAPHQL-QUERIES-001"""
  tasks(status: TaskStatus): [Task!]!

  """Fetch rules by optional enabled filter. Traces to: FR-GRAPHQL-QUERIES-002"""
  rules(enabled: Boolean): [Rule!]!

  """Fetch wallet snapshot (credits, penalties, rewards). Traces to: FR-GRAPHQL-QUERIES-003"""
  wallet: WalletSnapshot!

  """Fetch audit records (since optional timestamp, limit default 100). Traces to: FR-GRAPHQL-QUERIES-004"""
  audit(since: DateTime, limit: Int): [AuditRecord!]!

  """Fetch connectors (github, gcal, canvas, etc). Traces to: FR-GRAPHQL-QUERIES-005"""
  connectors: [Connector!]!

  """Fetch focus sessions (since optional timestamp). Traces to: FR-GRAPHQL-QUERIES-006"""
  focusSessions(since: DateTime): [FocusSession!]!
}

"""Mutation type (future extension point)."""
type Mutation {

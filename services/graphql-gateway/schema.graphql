"""Defined at line 11: Task status enumeration."""
enum TaskStatus {
  ACTIVE
  DONE
  ARCHIVED
}

"""Defined at line 19: Rigidity level for a rule."""
enum RigidityLevel {
  HARD
  SEMI
  SOFT
}

"""Defined at line 31: A task representing user work."""
type Task {
  """Unique task ID."""
  id: String!
  """Task title."""
  title: String!
  """Task status."""
  status: TaskStatus!
  """When the task was created."""
  createdAt: DateTime!
  """When the task is due."""
  dueAt: DateTime
  """Task description."""
  description: String
}

"""Defined at line 49: A behavior rule."""
type Rule {
  """Unique rule ID."""
  id: String!
  """Rule name."""
  name: String!
  """Is this rule currently enabled?"""
  enabled: Boolean!
  """How rigid this enforcement is."""
  rigidity: String!
  """When the rule was created."""
  createdAt: DateTime!
  """When the rule was last modified."""
  updatedAt: DateTime!
}

"""Defined at line 67: A connector integration."""
type Connector {
  """Unique connector ID."""
  id: String!
  """Connector type (e.g., "github", "gcal", "canvas")."""
  connectorType: String!
  """Is the connector currently connected?"""
  isConnected: Boolean!
  """Last time data was synced from this connector."""
  lastSyncedAt: DateTime
}

"""Defined at line 82: Wallet snapshot: aggregate credit/penalty state."""
type WalletSnapshot {
  """Current credit balance."""
  credits: Int!
  """Total penalties applied."""
  totalPenalties: Int!
  """Total rewards earned."""
  totalRewards: Int!
  """Snapshot timestamp."""
  snapshotAt: DateTime!
}

"""Defined at line 96: Audit record in the tamper-evident chain."""
type AuditRecord {
  """Audit record ID."""
  id: String!
  """Type of event (e.g., "task_completed", "rule_enabled")."""
  recordType: String!
  """Subject being audited (e.g., task ID, rule ID)."""
  subjectRef: String!
  """When the event occurred."""
  occurredAt: DateTime!
  """SHA-256 hash of previous record (or "genesis")."""
  prevHash: String!
  """SHA-256 hash of this record."""
  hash: String!
  """Event payload (arbitrary JSON)."""

# Fly.io configuration for FocalPoint GraphQL Gateway

app = "focalpoint-graphql-gateway"
primary_region = "lax"

[build]
builder = "docker"
dockerfile = "services/graphql-gateway/Dockerfile"

[env]
FOCALPOINT_GRAPHQL_PROD = "true"
RUST_LOG = "info"

[processes]
app = "./focus-graphql-gateway --bind 0.0.0.0:8473"

[http_service]
internal_port = 8473
force_https = true
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 1

[http_service.concurrency]
type = "connections"
hard_limit = 250
soft_limit = 200

[[http_service.checks]]
grace_period = "5s"
interval = "30s"
method = "GET"
path = "/health"
protocol = "http"
timeout = "3s"
tls_skip_verify = false

[metrics]
port = 9090
handlers = {prometheus = "/metrics"}

[[statics]]
guest_path = "/metrics"
url_prefix = "prometheus"

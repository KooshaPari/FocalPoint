version: '3.8'

services:
  graphql-gateway:
    build:
      context: ../..
      dockerfile: services/graphql-gateway/Dockerfile
    container_name: focalpoint-graphql-gateway
    ports:
      - "8473:8473"
    environment:
      FOCALPOINT_GRAPHQL_PROD: "false"
      FOCALPOINT_GRAPHQL_TOKEN: "${FOCALPOINT_GRAPHQL_TOKEN:-}"
      RUST_LOG: "debug"
    volumes:
      - ./core.db:/app/core.db:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8473/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - focalpoint

networks:
  focalpoint:
    driver: bridge

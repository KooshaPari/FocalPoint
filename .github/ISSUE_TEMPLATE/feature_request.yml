name: Feature request
description: Propose a feature. Larger changes should also open an ADR.
title: "feat: [brief summary]"
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Before opening this issue, please:
        1. Search [open issues](https://github.com/KooshaPari/FocalPoint/issues) to avoid duplicates
        2. Read the [CHARTER.md](../../CHARTER.md) and [ADR.md](../../ADR.md) for scope and principles

        For larger changes, consider opening an ADR (Architecture Decision Record) alongside this issue.

  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: What user problem does this solve? Whose? When?
      placeholder: "Many users have irregular sleep schedules and want to set flexible bed/wake windows instead of fixed times."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Shortest possible description of what you'd add or change.
      placeholder: |
        Add a `flexible_schedule` rule condition that accepts a time range (e.g., "bed between 10pm–midnight") instead of fixed times. The rule engine would match the user's actual sleep within that window.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Why not option B, C, D? Include "do nothing" if relevant.
      placeholder: |
        - **Option A (fixed times):** Current behavior; doesn't work for irregular schedules.
        - **Option B (time ranges):** Proposed above—best UX.
        - **Option C (multi-rule):** Users create separate rules per time window; fragile and hard to maintain.
        - **Do nothing:** Users with irregular schedules can't benefit from sleep-debt penalties.
    validations:
      required: true

  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      description: Which area(s) does this affect?
      options:
        - label: Core (`crates/focus-*`)
        - label: Connector (`crates/connector-*`)
        - label: Rule engine / DSL
        - label: Mascot / Coachy
        - label: iOS enforcement layer
        - label: Android enforcement layer
        - label: Docs-site
        - label: Tooling / CI

  - type: input
    id: related-frs
    attributes:
      label: Related FRs
      description: Link any Functional Requirements (e.g., FR-RULE-005, FR-CORE-012).
      placeholder: "FR-RULE-005, FR-CORE-012"

  - type: input
    id: agilepius-id
    attributes:
      label: AgilePlus feature ID (if known)
      description: If already tracked in AgilePlus, provide the feature ID.
      placeholder: "feat-flexible-schedule"

  - type: input
    id: depends-on
    attributes:
      label: Depends on
      description: Link any blocking issues (e.g., #123, #456).
      placeholder: "#123, #456"

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: Conditions under which this feature is considered complete.
      placeholder: |
        - [ ] Rule DSL supports `flexible_schedule` condition with time ranges
        - [ ] Parser validates time range format (HH:mm–HH:mm)
        - [ ] Rule evaluator matches events within the window
        - [ ] Unit tests cover 3+ time-range scenarios (spanning midnight, overlapping ranges, invalid ranges)
        - [ ] Integration test with sample rule pack
        - [ ] Docs-site page added explaining the new condition
    validations:
      required: true

  - type: textarea
    id: non-goals
    attributes:
      label: Non-goals
      description: What this issue is explicitly NOT about.
      placeholder: |
        - Timezone handling (out of scope; rules use system time)
        - Recurring schedules with exceptions (future work)
        - UI calendar picker (handled separately in connector-specific UI)

  - type: checkboxes
    id: template-pack
    attributes:
      label: Would you be interested in contributing?
      options:
        - label: I can help implement this feature
        - label: I can help test / provide feedback
        - label: I would like a template pack for this feature once available
        - label: Just proposing—I can't contribute

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched for existing issues and found none
          required: true
        - label: I have read CHARTER.md and understand the project scope
          required: true
        - label: This is not a duplicate of another feature request
          required: true

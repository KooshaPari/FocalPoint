name: cargo doc

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  doc:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Generate docs
        run: cargo doc --workspace --no-deps --document-private-items 2>&1 | tee /tmp/rustdoc.log

      - name: Check rustdoc warning budget
        run: |
          WARNINGS=$(grep -c "^warning:" /tmp/rustdoc.log || true)
          BUDGET=0
          echo "Rustdoc warnings: $WARNINGS (budget: $BUDGET)"
          if [ "$WARNINGS" -gt "$BUDGET" ]; then
            echo "ERROR: Exceeded rustdoc warning budget ($WARNINGS > $BUDGET)"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@373f7f263a76c20808c831209c920827a82a2847 # v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/doc

name: traceability

# Soft-fail: this job reports findings but does NOT block merges. Tighten to
# hard-fail once FR coverage is at 100% and UTF-8 validation is clean.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  encoding:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Check UTF-8 encoding on markdown
        run: |
          set -u
          bad=0
          while IFS= read -r f; do
            if ! iconv -f UTF-8 -t UTF-8 "$f" >/dev/null 2>&1; then
              echo "::warning file=$f::not valid UTF-8"
              bad=$((bad + 1))
            fi
          done < <(find . -type f -name '*.md' \
            -not -path './target/*' \
            -not -path './docs-site/node_modules/*' \
            -not -path './.git/*')
          if [ "$bad" -gt 0 ]; then
            echo "::warning::found $bad non-UTF-8 markdown files (soft-fail)"
          fi

  fr-test-trace:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Scan FR references in tests
        run: |
          set -u
          # Extract FR ids from FUNCTIONAL_REQUIREMENTS.md.
          if [ ! -f FUNCTIONAL_REQUIREMENTS.md ]; then
            echo "::warning::FUNCTIONAL_REQUIREMENTS.md missing; skipping"
            exit 0
          fi
          mapfile -t frs < <(grep -oE 'FR-[A-Z]+-[0-9]+' FUNCTIONAL_REQUIREMENTS.md | sort -u)
          echo "found ${#frs[@]} FR ids"
          missing=0
          for fr in "${frs[@]}"; do
            if ! grep -rq --include='*.rs' "$fr" crates/ tests/ 2>/dev/null; then
              echo "::warning::$fr has no test reference in crates/ or tests/"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "::warning::$missing FRs lack test traceability (soft-fail)"
          fi

      - name: Scan tests for orphan FR tags
        run: |
          set -u
          orphans=0
          grep -rEn --include='*.rs' 'FR-[A-Z]+-[0-9]+' crates/ tests/ 2>/dev/null \
            | while read -r line; do
                fr=$(echo "$line" | grep -oE 'FR-[A-Z]+-[0-9]+' | head -n1)
                if ! grep -q "$fr" FUNCTIONAL_REQUIREMENTS.md; then
                  echo "::warning::$line references undefined $fr"
                  orphans=$((orphans + 1))
                fi
              done

name: Release Dry-Run

# Run whenever Cargo.toml or version-related files change
on:
  pull_request:
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'apps/ios/FocalPoint/Sources/FocalPointApp/Info.plist'
      - 'tooling/release-cut/**'

permissions:
  contents: read

jobs:
  dry-run:
    name: Validate Release Plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Run release-cut dry-run
        run: cargo run -p release-cut -- "v${{ steps.version.outputs.version }}"

      - name: Comment on PR
        if: always()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            const version = '${{ steps.version.outputs.version }}';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Release Plan Validated**\n\nDry-run for \`v${version}\` completed successfully. Release is ready to cut.\n\n🚀 To execute: \`task release:cut\``
            });

name: CLI Demo Walkthrough

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  demo:
    name: Run CLI Walkthrough
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.82

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run CLI demo walkthrough
        id: demo
        run: |
          cargo run -p demo-walkthrough --release 2>&1 | tee demo-transcript.md
        continue-on-error: true

      - name: Post transcript as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const transcript = fs.readFileSync('demo-transcript.md', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📋 CLI Demo Walkthrough\n\n${transcript}`
            });

      - name: Upload transcript
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cli-demo-transcript
          path: demo-transcript.md
          retention-days: 30

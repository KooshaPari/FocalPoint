name: Supply Chain Security

on:
  push:
    branches: [main, research-docs-push]
  pull_request:
    branches: [main]
  schedule:
    # Run nightly at 2 AM UTC
    - cron: "0 2 * * *"

permissions:
  contents: read

jobs:
  deny-check:
    name: cargo-deny
    runs-on: ubuntu-latest
    # NOTE: FocalPoint is affected by GitHub Actions billing limits.
    # Continue on error until billing is restored (KooshaPari/phenotype-infrakit#1234)
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.82

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: |
            .
            tooling/sbom-gen

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run advisories check
        run: cargo deny check advisories

      - name: Run licenses check
        run: cargo deny check licenses

      - name: Run bans check
        run: cargo deny check bans

      - name: Run sources check
        run: cargo deny check sources

      - name: Upload deny report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deny-report
          path: |
            deny.toml
            Cargo.lock

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.82

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: |
            .
            tooling/sbom-gen

      - name: Build SBOM generator
        run: cargo build --release --manifest-path tooling/sbom-gen/Cargo.toml

      - name: Generate SBOM
        run: cargo run --release --manifest-path tooling/sbom-gen/Cargo.toml

      - name: Verify SBOM format
        run: |
          if ! jq empty docs/security/sbom.json 2>/dev/null; then
            echo "ERROR: Invalid SBOM JSON"
            exit 1
          fi
          echo "SBOM format valid ($(jq '.components | length' docs/security/sbom.json) components)"

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom
          path: docs/security/sbom.json

  summary:
    name: Supply Chain Report
    if: always()
    needs: [deny-check, sbom]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4

      - name: Print summary
        run: |
          echo "## Supply Chain Security Check"
          echo ""
          echo "### Advisories"
          if [ -f deny-report/deny.toml ]; then
            echo "✓ Configuration: deny.toml"
          fi
          echo ""
          echo "### SBOM"
          if [ -f sbom/sbom.json ]; then
            COMPONENTS=$(jq '.components | length' sbom/sbom.json 2>/dev/null || echo "N/A")
            echo "✓ Generated: $COMPONENTS components"
          fi
          echo ""
          echo "See artifacts for full reports."

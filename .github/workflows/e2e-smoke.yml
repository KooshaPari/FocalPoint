name: E2E Smoke Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  smoke:
    name: Full Loop Validation
    runs-on: ubuntu-latest
    timeout-minutes: 2
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.82

      - name: Cache Cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-directories: target

      - name: Run E2E Smoke Test
        run: cargo run -p focuspoint-e2e --bin smoke --release
        timeout-minutes: 2

      - name: Emit Report (on failure)
        if: failure()
        run: |
          echo "E2E smoke test failed. See logs above for details."
          echo "This is a continue-on-error job — CI will not block."
          echo ""
          echo "To debug locally:"
          echo "  cargo run -p focuspoint-e2e --bin smoke --release"

name: E2E Smoke Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  smoke:
    name: Full Loop Validation
    runs-on: ubuntu-latest
    timeout-minutes: 2
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.82

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-directories: target

      - name: Run E2E Smoke Test
        run: cargo run -p focuspoint-e2e --bin smoke --release
        timeout-minutes: 2

      - name: Emit Report (on failure)
        if: failure()
        run: |
          echo "E2E smoke test failed. See logs above for details."
          echo "This is a continue-on-error job — CI will not block."
          echo ""
          echo "To debug locally:"
          echo "  cargo run -p focuspoint-e2e --bin smoke --release"

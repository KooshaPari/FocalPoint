name: pr-checks

# Non-billing-dependent checks for pull requests.
# These jobs provide feedback on documentation, traceability, and dual-surface parity.
# They do NOT block merges (soft-fail), but help reviewers catch issues early.

on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  doc-links:
    name: Check documentation links
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Validate markdown links (docs-site)
        run: |
          set -u
          bad=0
          # Simple link checker: find [text](url) patterns and validate
          while IFS= read -r f; do
            # Skip node_modules and hidden dirs
            if [[ "$f" == *"/node_modules/"* ]] || [[ "$f" == *"/.git/"* ]]; then
              continue
            fi
            # Extract markdown links: [...](...)
            while IFS= read -r line; do
              # Only check internal links (starting with ./ or ../ or /)
              if [[ "$line" =~ \]\((\./|\.\.\/|\/)[^)]+\) ]]; then
                url="${BASH_REMATCH[1]}"
                # Remove anchor fragment
                target="${url%%#*}"
                # Resolve relative path
                dir=$(dirname "$f")
                if [[ "$target" == /* ]]; then
                  fullpath=".$target"
                else
                  fullpath="$dir/$target"
                fi
                # Check if target exists
                if [ ! -e "$fullpath" ] && [ ! -d "$fullpath" ]; then
                  echo "::warning file=$f::broken link: $url (resolved to $fullpath)"
                  bad=$((bad + 1))
                fi
              fi
            done < <(grep -E '\[[^\]]*\]\(' "$f" || true)
          done < <(find docs-site -name '*.md' -not -path '*/node_modules/*' -not -path '*/.git/*')

          if [ "$bad" -gt 0 ]; then
            echo "::notice::Found $bad broken links (soft-fail)"
          fi

  fr-coverage:
    name: FR test coverage
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Check FR references in tests
        run: |
          set -u
          # Extract FR ids from FUNCTIONAL_REQUIREMENTS.md
          if [ ! -f FUNCTIONAL_REQUIREMENTS.md ]; then
            echo "::notice::FUNCTIONAL_REQUIREMENTS.md missing; skipping FR coverage check"
            exit 0
          fi

          mapfile -t frs < <(grep -oE 'FR-[A-Z]+-[0-9]+' FUNCTIONAL_REQUIREMENTS.md | sort -u)
          [ ${#frs[@]} -gt 0 ] && echo "Found ${#frs[@]} FR ids in FUNCTIONAL_REQUIREMENTS.md"

          missing=0
          for fr in "${frs[@]}"; do
            # Check if FR is referenced in crates/, tests/, or apps/
            if ! grep -rq "$fr" crates/ tests/ apps/ examples/ 2>/dev/null; then
              echo "::warning::$fr has no test reference (define a test or trace existing test)"
              missing=$((missing + 1))
            fi
          done

          if [ "$missing" -gt 0 ]; then
            echo "::notice::$missing FRs lack test traceability (soft-fail)"
          fi

  dual-surface-drift:
    name: Dual-surface coverage check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Check for untraced new primitives
        run: |
          set -u
          # This check detects if a new condition/action/event/connector was added to focus-core
          # but not yet reflected in the rule DSL parser, CLI, or other surfaces.

          # Extract new enums from focus-core (added in this PR)
          echo "Scanning for new rule conditions, actions, or event types..."

          # Check if this PR modifies focus-core
          if git diff --name-only origin/main...HEAD | grep -q "crates/focus-core"; then
            echo "::notice::focus-core was modified; ensure new primitives are traced to:"
            echo "  - focus-rules (parser + evaluator)"
            echo "  - CLI (command output)"
            echo "  - iOS/Android (if applicable)"
            echo "  - docs-site (new primitive page)"
          fi

          # Check if rule DSL was modified
          if git diff --name-only origin/main...HEAD | grep -q "crates/focus-rules"; then
            echo "::notice::focus-rules was modified; ensure it maps to:"
            echo "  - CLI (--explain output)"
            echo "  - apps/builder (web UI)"
            echo "  - docs-site/dsl (updated syntax page)"
          fi

  encoding:
    name: UTF-8 validation
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Check UTF-8 encoding on markdown
        run: |
          set -u
          bad=0
          while IFS= read -r f; do
            if ! iconv -f UTF-8 -t UTF-8 "$f" >/dev/null 2>&1; then
              echo "::warning file=$f::not valid UTF-8"
              bad=$((bad + 1))
            fi
          done < <(find . -type f -name '*.md' \
            -not -path './target/*' \
            -not -path './docs-site/node_modules/*' \
            -not -path './.git/*')

          if [ "$bad" -gt 0 ]; then
            echo "::notice::Found $bad non-UTF-8 markdown files (soft-fail)"
          fi

  issue-template-check:
    name: Issue template references
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Verify issue templates reference SECURITY.md and CONTRIBUTING.md
        run: |
          set -u
          templates=(.github/ISSUE_TEMPLATE/*.yml)
          if [ ${#templates[@]} -eq 0 ]; then
            echo "::warning::No issue templates found"
            exit 0
          fi

          echo "Checking ${#templates[@]} issue templates..."
          # Minimal check: just report that templates exist
          echo "::notice::Issue templates present: ${#templates[@]}"
          echo "  - Users will see SECURITY.md link in config.yml"
          echo "  - Users will see CONTRIBUTING.md link in templates"

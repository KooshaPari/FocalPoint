name: connector-manifest

# Lints connector manifest.json files against a baseline schema. No manifests
# exist yet (Canvas connector predates the manifest format); this workflow is
# a stub that will tighten as the SDK stabilizes. Soft-fails today.

on:
  pull_request:
    branches: [main]
    paths:
      - 'crates/connector-*/**'
      - '.github/workflows/connector-manifest.yml'
  push:
    branches: [main]
    paths:
      - 'crates/connector-*/**'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node (for ajv)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ajv-cli
        run: npm install -g ajv-cli@5 ajv-formats@3

      - name: Find connector manifests
        id: find
        run: |
          set -u
          manifests=$(find crates -type f -name 'manifest.json' -path '*/connector-*/*' 2>/dev/null || true)
          if [ -z "$manifests" ]; then
            echo "::notice::no connector manifest.json files found yet (stub)"
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "$manifests" | tee manifests.txt
          count=$(wc -l < manifests.txt | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Validate manifests against schema
        if: steps.find.outputs.count != '0'
        run: |
          set -u
          schema="docs-site/connector-sdk/manifest.schema.json"
          if [ ! -f "$schema" ]; then
            echo "::warning::$schema missing; skipping validation"
            exit 0
          fi
          fail=0
          while IFS= read -r m; do
            echo ">>> validate $m"
            if ! ajv validate -c ajv-formats -s "$schema" -d "$m"; then
              fail=$((fail + 1))
            fi
          done < manifests.txt
          if [ "$fail" -gt 0 ]; then
            echo "::warning::$fail manifest(s) failed validation (soft-fail)"
          fi
